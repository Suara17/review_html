<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Git 基础与操作知识点 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 内容操作 ===== */
.content-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}

.edit-btn,
.edit-modal-close,
.edit-modal-btn {
  border: 1px solid rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.12);
  color: #00ffff;
}

.edit-btn,
.edit-modal-btn {
  min-width: 72px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.25s ease;
}

.edit-btn:hover,
.edit-modal-btn:hover {
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.edit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#click-hint {
  margin-top: 12px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}

.edit-modal[hidden] {
  display: none;
}

.edit-modal.open {
  display: flex;
}

.edit-modal-panel {
  width: min(860px, 100%);
  max-height: min(80vh, 760px);
  display: flex;
  flex-direction: column;
  background: rgba(0,12,24,0.96);
  border: 1px solid rgba(0,255,255,0.24);
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.45);
  overflow: hidden;
}

.edit-modal-header,
.edit-modal-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(0,255,255,0.06);
}

.edit-modal-header h3 {
  margin: 0;
  font-size: 1em;
  color: #9fffe7;
}

.edit-modal-close {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  font-size: 1.2em;
  cursor: pointer;
}

.edit-modal-body {
  padding: 18px;
  overflow: auto;
}

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 14px;
  background: rgba(0,0,0,0.38);
  color: #ffffff;
  line-height: 1.8;
  outline: none;
}

.edit-modal-editor:focus {
  border-color: rgba(0,255,255,0.45);
  box-shadow: 0 0 20px rgba(0,255,255,0.16);
}

.edit-modal-editor strong {
  color: #00ffcc;
}

.edit-modal-editor p {
  margin: 0 0 1em;
}

.edit-modal-editor ul,
.edit-modal-editor ol {
  margin: 0 0 1.2em 1.4em;
}

.edit-modal-editor li {
  margin-bottom: 0.45em;
}

.edit-modal-editor .embedded-entry {
  margin: 0 0 1.1em;
}

.edit-modal-editor .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}

.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}

.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}

.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}

.edit-modal-editor th,
.edit-modal-editor td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}

.edit-modal-editor th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}

.edit-modal-actions {
  justify-content: flex-end;
}

body.modal-open {
  overflow: hidden;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从左侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-left: none;
    border-right: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: left 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  
#click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}

.content p { margin: 0 0 1em; }
.content ul, .content ol { margin: 0 0 1.2em 1.4em; }
.content li { margin-bottom: 0.45em; }
.content .embedded-entry { margin: 0 0 1.1em; }
.content .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}
.content pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}
.content code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.content th, .content td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}
.content th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}
</style>
</head>
<body>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>
<!-- 扫描线叠层 -->
<div class="scanlines"></div>

<div class="main-content">
  <!-- 粘性头部：进度条 + 标题 -->
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <!-- 倒计时（固定在头部右上角） -->
  <div class="countdown" id="countdown">30</div>

  <!-- 卡片（滚动区域） -->
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div class="content-toolbar">
      <button class="edit-btn" id="edit-btn" type="button">修改</button>
    </div>
    <div id="click-hint">点标题展开，点修改编辑</div>
  </div>

  <button class="next-btn" id="next-btn">下一个 →</button>
</div>


<div class="edit-modal" id="edit-modal" hidden>
  <div class="edit-modal-panel" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal-header">
      <h3 id="edit-modal-title">修改内容</h3>
      <button class="edit-modal-close" id="edit-modal-close" type="button">✕</button>
    </div>
    <div class="edit-modal-body">
      <div class="edit-modal-editor" id="edit-modal-editor" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="edit-modal-actions">
      <button class="edit-modal-btn" id="edit-cancel-btn" type="button">取消</button>
      <button class="edit-modal-btn" id="edit-save-btn" type="button">保存</button>
    </div>
  </div>
</div>

<!-- 侧边栏（桌面端侧栏 / 手机端滑动抽屉） -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Git 基础与操作</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<!-- 侧边栏切换按钮（手机端） -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>

<script src="./tts-player.js"></script>
<script src="./sidebar-manager.js"></script>
<script src="./gist-sync.js"></script>
<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
let knowledgePoints = [{"title": "1. 先理解 Git 的三个区域", "content": "<p><strong>Git 的核心不是命令背诵，而是状态流转。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">工作区 / 暂存区 / 版本库</p><p><strong>工作区：</strong>你正在编辑的文件所在地，改完但还没提交的内容都在这里。</p><p><strong>暂存区：</strong>通过 <code>git add</code> 放进去的“待提交清单”，决定这次 commit 到底提交什么。</p><p><strong>版本库：</strong>通过 <code>git commit</code> 形成的历史记录。</p><p><strong>一句话记忆：</strong>工作区是草稿，暂存区是待发件箱，版本库是已发送记录。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么这很重要</p><p>你文档里很多场景本质都在处理这三者之间的移动：比如只提交一部分文件、临时收起改动、撤销误操作、同步远程代码。</p></div>"}, {"title": "2. git status：一切操作前先看状态", "content": "<p><strong>不确定就先看状态，这是最稳的 Git 习惯。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常用方式</p><p><code>git status</code>：查看当前分支、工作区、暂存区整体状态。</p><p><code>git status --short</code>：短格式，更适合快速扫一眼。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">它能回答什么问题</p><p>哪些文件修改了、哪些已暂存、哪些还没跟踪、当前是否适合 pull / merge / commit。</p><p><strong>最佳实践：</strong>在 add、restore、stash、pull、reset 前后，都先跑一次 status。</p></div>"}, {"title": "3. git log：看清历史再做后续操作", "content": "<p><strong>很多危险操作不是命令危险，而是你没看清当前历史位置。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常用命令</p><p><code>git log</code>：完整查看提交历史。</p><p><code>git log --oneline</code>：一行一个提交，最常用。</p><p><code>git log --oneline -5</code>：只看最近 5 条，适合快速确认。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">适用场景</p><p>做 <code>reset</code>、<code>rebase</code>、<code>revert</code> 前先定位目标提交；提交前也可以观察团队已有 commit 风格。</p></div>"}, {"title": "4. git add：决定这次提交到底带什么", "content": "<p><strong>git add 不是“提交”，而是“挑选本次提交内容”。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">核心作用</p><p><code>git add 文件名</code>：只把某个文件放入暂存区。</p><p><code>git add 目录名</code>：把整个目录的改动暂存。</p><p><code>git add .</code>：当前目录下改动一起加入暂存区。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实战理解</p><p>如果你只想提交 JX 相关文件，就不要一股脑全提交；或者先 add，再把不该提交的文件移出暂存区。</p><p><strong>本质：</strong>commit 提交的是暂存区，不是整个工作区。</p></div>"}, {"title": "5. git restore：恢复文件时一定分清两个方向", "content": "<p><strong>restore 最容易出事故的点，就是没分清“改工作区”还是“改暂存区”。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">方向一：丢弃工作区改动</p><p><code>git restore 文件</code>：用暂存区或指定版本覆盖工作区，等于放弃本地未提交修改。</p><p><strong>风险：</strong>这会真的丢代码，用前一定确认。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">方向二：移出暂存区但保留代码</p><p><code>git restore --staged 文件</code>：把文件从暂存区拿出来，但工作区内容还保留。</p><p>这非常适合“我写了很多，但这次只想提交一部分”的场景。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">一句话记忆</p><p>不带 <code>--staged</code> 多半在动工作区；带 <code>--staged</code> 主要在动暂存区。</p></div>"}, {"title": "6. git stash：你的工作暂存箱", "content": "<p><strong>stash 的价值是保护现场，而不是替代提交。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">它解决什么问题</p><p>你本地改了一大堆，还没准备提交，但现在必须切分支、合并、拉远程、回退历史——这时先 stash，最稳。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">高频命令</p><p><code>git stash push -u -m \"说明信息\"</code>：连未跟踪文件一起暂存，并写备注。</p><p><code>git stash pop</code>：恢复最近一次 stash，并从列表中删除。</p><p><code>git stash list</code>：查看所有暂存记录。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">典型场景</p><p>pull 前保护本地未提交代码；merge 前清理工作区；reset --hard 前做保险；中途被打断要切任务时先收起当前改动。</p></div>"}, {"title": "7. commit：提交的是一次有边界的变更", "content": "<p><strong>好的 commit 应该只表达一件相对完整的事情。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常见流程</p><p>先 <code>git status</code> 确认状态，再 <code>git add</code> 选择内容，必要时用 <code>git diff --cached</code> 检查暂存区，最后再 commit。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么不要乱提</p><p>把无关文件、调试代码、半成品一起提交，会让后续回滚、排查、代码审查都变得麻烦。</p><p><strong>实战习惯：</strong>一次 commit 尽量只解决一个问题或完成一个小目标。</p></div>"}, {"title": "8. branch / switch：分支是协作和隔离的基础", "content": "<p><strong>分支的意义是把不同任务隔离开，避免互相污染。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">高频命令</p><p><code>git branch</code>：查看本地分支。</p><p><code>git branch 分支名</code>：创建分支。</p><p><code>git switch 分支名</code>：切换分支。</p><p><code>git switch -c 新分支名</code>：创建并切换到新分支。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常见误区</p><p>带着一堆未提交改动直接切分支，可能造成状态混乱；如果改动还没准备好，先 stash 再切更安全。</p></div>"}, {"title": "9. merge vs rebase：都是同步代码，但历史风格不同", "content": "<p><strong>merge 和 rebase 都能整合代码，区别在于是否重写历史。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">merge 的特点</p><p><code>git merge</code> 会生成一个合并提交，保留真实分叉与汇合历史。</p><p><strong>优点：</strong>稳妥、直观、对共享分支友好。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">rebase 的特点</p><p><code>git rebase</code> 会把你的提交“重新接”到新的基准点之后，形成更线性的历史。</p><p><strong>优点：</strong>历史干净；<strong>代价：</strong>会改提交哈希，属于重写历史。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">怎么选</p><p>共享分支、团队协作、追求稳妥：优先 merge。</p><p>个人本地分支、想整理提交历史：可以 rebase。</p></div>"}, {"title": "10. git pull：同步远程时先想清楚采用 merge 还是 rebase", "content": "<p><strong>pull 本质是 fetch + merge 或 fetch + rebase。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">两种常见方式</p><p><code>git pull --no-rebase</code>：采用 merge，同步更稳妥，可能产生合并提交。</p><p><code>git pull --rebase</code>：采用 rebase，历史更线性，但在共享分支要谨慎。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实战建议</p><p>如果本地还有很多未提交改动，先 <code>git stash</code>，同步完成后再恢复，这样最不容易把工作区搞乱。</p></div>"}, {"title": "11. git push：推送前先同步，别把 force 当默认按钮", "content": "<p><strong>push 被拒绝，通常说明远程已经比你领先了。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">正常推送</p><p><code>git push</code>：把本地提交推到远程。</p><p><code>git push -u origin 分支名</code>：首次推送本地新分支并建立跟踪关系。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">被拒绝怎么办</p><p>优先 pull 同步远程，再解决冲突，再 push。不要第一反应就强推。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么谨慎对待 force push</p><p><code>git push --force</code> 会覆盖远程历史，可能直接把别人的提交顶掉。除非你完全知道后果，否则别轻易用。</p></div>"}, {"title": "12. git reset：回退时最要命的是没分清 soft / mixed / hard", "content": "<p><strong>reset 不是一个命令，而是三种完全不同的后悔药。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">三种模式</p><p><code>--soft</code>：只移动 HEAD，改动保留在暂存区。</p><p><code>--mixed</code>：默认模式，移动 HEAD 并清理暂存区，改动保留在工作区。</p><p><code>--hard</code>：最危险，工作区和暂存区都会回到目标提交状态。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">高风险提醒</p><p>执行 <code>reset --hard</code> 前，如果还有有价值的本地改动，先 stash 一次再说。</p></div>"}, {"title": "13. revert：公共分支撤销更推荐这个", "content": "<p><strong>如果提交已经推到公共分支，通常优先用 revert，而不是 reset 改历史。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">核心作用</p><p><code>git revert 提交ID</code>：创建一个新的“反向提交”，撤销指定旧提交带来的影响。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么更安全</p><p>它不会重写已有公共历史，对团队协作更友好，别人已经拉下来的提交也不会被改掉。</p></div>"}, {"title": "14. 最实用的 Git 工作流建议", "content": "<p><strong>把命令串起来，形成稳定习惯，远比死记命令有效。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">推荐流程</p><p>1）不确定先 <code>git status</code> 和 <code>git log --oneline</code>。</p><p>2）提交前先明确本次提交边界，只 add 该提交的内容。</p><p>3）pull / merge / reset --hard 前，只要工作区不干净，优先 stash。</p><p>4）push 被拒绝，先同步远程，不要本能地 force push。</p><p>5）在共享分支上少改历史，在个人分支上再考虑 rebase 美化历史。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">一句话总结</p><p>Git 的关键不是“会几个命令”，而是始终知道自己当前处在哪个状态、下一步会改动哪里、是否会影响历史。</p></div>"}, {"title": "15. 实战：只提交一部分文件，别把无关改动一起带上", "content": "<p><strong>最常见的实战需求：我改了很多，但这次只想提交其中一部分。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">推荐流程</p><p>先 <code>git status</code> 看清改动，再用 <code>git add 文件名</code> 只暂存需要提交的文件。</p><p>如果已经误加了文件，用 <code>git restore --staged 文件名</code> 把它从暂存区拿出来，但保留工作区代码。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">核心原则</p><p>一次 commit 只表达一件事。不要把调试代码、顺手改动、半成品和正式修复混在一起。</p><p><strong>一句话：</strong>commit 提交的是暂存区，所以你真正要控制的是 add 进去的内容。</p></div>"}, {"title": "16. 实战：pull 前本地有改动怎么办", "content": "<p><strong>工作区不干净时直接 pull，是最容易把现场弄乱的场景之一。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">稳妥做法</p><p>1）先 <code>git status</code> 确认本地改动。</p><p>2）如果这些改动还不适合提交，执行 <code>git stash push -u -m \"pull前暂存\"</code>。</p><p>3）再执行 <code>git pull --no-rebase</code> 或 <code>git pull --rebase</code>。</p><p>4）同步完成后，用 <code>git stash pop</code> 恢复现场。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么这么做</p><p>这样可以把“同步远程代码”和“处理本地未提交改动”分开，排错更简单，冲突范围也更清晰。</p></div>"}, {"title": "17. 实战：stash 的正确姿势", "content": "<p><strong>stash 最适合临时收起现场，不适合长期把重要工作藏在里面。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">建议用法</p><p><code>git stash push -u -m \"任务名或原因\"</code>，尽量带说明，后续更容易辨认。</p><p>用 <code>git stash list</code> 查看记录；需要恢复时优先用 <code>git stash pop</code>。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常见误区</p><p>不要连续 stash 很多次却不写说明，也不要把 stash 当长期存档工具。</p><p><strong>最佳实践：</strong>stash 只是过渡手段，合适的时候还是要整理后 commit。</p></div>"}, {"title": "18. 实战：push 被拒绝时怎么处理", "content": "<p><strong>push rejected 往往不是权限问题，而是远程分支已经比你本地更新。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">正确处理步骤</p><p>先 <code>git status</code> 看本地是否干净；必要时先 stash。</p><p>然后执行 <code>git pull --no-rebase</code> 或 <code>git pull --rebase</code> 同步远程。</p><p>如果有冲突，先解决冲突并完成合并或 rebase，再重新 <code>git push</code>。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">不要默认 force push</p><p><code>git push --force</code> 可能覆盖远程历史。除非这是你自己的分支、并且你明确知道不会影响别人，否则不要把它当快捷修复。</p></div>"}, {"title": "19. 实战：reset 和 revert 到底什么时候用", "content": "<p><strong>这两个命令最容易混：一个偏向本地回退历史，一个偏向公共历史上的安全撤销。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">适用判断</p><p><strong>本地提交还没推送：</strong>可以考虑 <code>git reset</code>，按需要选择 <code>--soft</code>、<code>--mixed</code>、<code>--hard</code>。</p><p><strong>提交已经推到公共分支：</strong>优先用 <code>git revert</code>，通过新增反向提交来撤销影响。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">记忆方法</p><p><code>reset</code> 更像“回到过去并改历史”，<code>revert</code> 更像“承认历史已发生，再补一个撤销动作”。</p></div>"}, {"title": "20. 实战：处理冲突时的思路", "content": "<p><strong>冲突不可怕，可怕的是你没先判断“谁的改动该保留”。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">处理顺序</p><p>1）先看冲突文件和冲突原因。</p><p>2）理解当前分支与目标分支分别改了什么。</p><p>3）手动编辑文件，保留正确内容，删掉冲突标记。</p><p>4）再 <code>git add</code> 标记冲突已解决，按当前流程完成 merge 或 rebase。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">核心提醒</p><p>解决冲突不是“随便选一边”，而是根据业务逻辑合并正确结果。改完后最好重新跑一下关键功能，确认没引入新问题。</p></div>"}, {"title": "21. 实战：一套最稳的日常 Git 操作顺序", "content": "<p><strong>如果你经常在 Git 上手忙脚乱，说明缺的不是命令，而是固定顺序。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">推荐日常顺序</p><p>开始工作前先 <code>git status</code> 和 <code>git log --oneline -5</code>。</p><p>编码过程中按任务边界整理改动；提交前只 add 本次需要的内容。</p><p>同步远程前，如果工作区不干净，先 stash；push 被拒绝则先同步再处理冲突。</p><p>需要撤销时，先判断是本地历史问题还是公共历史问题，再决定 reset 还是 revert。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">目标</p><p>让每一步都知道自己在改工作区、暂存区、还是提交历史。只要这个判断稳定，Git 就不会再显得混乱。</p></div>"}, {"title": "22. 面试高频：cherry-pick 是什么，什么时候该用", "content": "<p><strong>cherry-pick 的本质是：不合并整条分支，只挑某一个或某几个提交拿过来。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">典型工作场景</p><p>线上热修复已经在 A 分支完成，但你还想把这一个修复同步到 B 分支；或者同事某个 commit 很有用，你只想拿那一条，不想把整个分支都 merge 进来。</p><p>这时可以用 <code>git cherry-pick 提交ID</code>。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">面试回答重点</p><p>它适合“按提交搬运变更”，不是“按分支整体同步”。优点是精准，缺点是如果频繁 cherry-pick，历史可能分散、重复，后续排查成本会上升。</p><p><strong>一句话：</strong>需要挑一个确定的提交过来时用 cherry-pick，需要整体同步分支时用 merge 或 rebase。</p></div>"}, {"title": "23. 工作现场：误删分支、误 reset 后怎么救", "content": "<p><strong>很多人以为代码没了，其实只是“引用没了”，这时第一反应应该是找历史指针。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">高频补救手段</p><p><code>git reflog</code> 可以查看 HEAD 和分支最近指向过哪里，常用于找回误 reset、误切换、误删除前的提交位置。</p><p>找到目标提交后，可以用 <code>git branch 新分支名 提交ID</code> 重新拉出分支，或用 <code>git reset --hard 提交ID</code> 回到那个状态。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">工作中的关键原则</p><p>一旦发现误操作，先不要继续做更多提交或清理动作，先跑 <code>git reflog</code> 定位能恢复的锚点。</p><p><strong>面试常见追问：</strong>为什么 reflog 能救？因为它记录的是本地引用变动历史，不只是 commit 树本身。</p></div>"}, {"title": "24. 面试对比：merge、rebase、cherry-pick 各自适合什么场景", "content": "<p><strong>这类题不只是问命令，而是在问你有没有协作意识和历史治理能力。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">三者定位</p><p><strong>merge：</strong>整合分支，保留分叉历史，最稳，适合团队协作和公共分支。</p><p><strong>rebase：</strong>重放提交，让历史更线性，适合个人分支整理，但会改历史。</p><p><strong>cherry-pick：</strong>只搬运指定提交，适合热修复同步、定点摘取变更。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">高质量回答方式</p><p>不要只背定义，要带场景：公共分支优先 merge；个人开发分支在推送前可 rebase 整理；跨分支同步单个修复时用 cherry-pick。</p><p><strong>加分点：</strong>你能说明“为什么某场景不用另外两个”。</p></div>"}, {"title": "25. 工作现场：同一需求改了很多次，怎么把提交历史整理干净", "content": "<p><strong>代码能跑不等于提交历史合格。很多团队会要求合并前先整理 commit。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常见做法</p><p>如果这些提交还只在你本地或个人分支上，可以通过 <code>git rebase -i</code> 做交互式整理，把碎提交合并、改顺序、改说明。</p><p>目标是让提交历史能体现清晰演进，而不是暴露一堆“test”“fix again”“临时改一下”。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">风险提醒</p><p>交互式 rebase 会重写历史，所以如果这些提交已经推到多人共用分支，就要非常谨慎。</p><p><strong>面试回答：</strong>本地整理历史可以提升 review 和回滚效率，但共享历史不要随便重写。</p></div>"}, {"title": "26. 面试与现场：遇到 force push，你应该怎么判断风险", "content": "<p><strong>真正成熟的回答不是“不能用”，而是“知道什么时候能用、什么时候绝对不能乱用”。</strong></p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">可以考虑的场景</p><p>你在自己的临时分支上做了 rebase，且该分支没有别人基于它继续开发；这时为了同步重写后的历史，可能会用到 <code>git push --force-with-lease</code>。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为什么更推荐 force-with-lease</p><p>它会先检查远程是否还是你预期的状态，能减少把别人新推的提交直接覆盖掉的风险。</p><p><strong>工作现场原则：</strong>公共分支谨慎甚至禁止 force push；个人分支也要先确认没人依赖，再操作。</p></div>"}];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof sidebarMgr !== 'undefined') sidebarMgr.save();
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'git-topics',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
