<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Redis知识点笔记</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ─── 数字雨背景 ─── */
#matrix-canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0; opacity: 0.12;
  pointer-events: none;
}
.scanlines {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(34,211,238,0.015) 2px, rgba(34,211,238,0.015) 4px);
}

/* ─── 主题覆盖（与首页统一） ─── */
:root {
  --color-base-100: #0d0d14;
  --color-base-200: #14141e;
  --color-base-300: #1c1c2a;
  --color-base-content: #e2e2f0;
  --color-primary: #22d3ee;
  --color-primary-content: #02161c;
  --color-secondary: #818cf8;
  --color-secondary-content: #0e0a22;
  --color-accent: #f472b6;
  --color-neutral: #1a1a28;
  --color-info: #67e8f9;
  --color-success: #6ee7b7;
  --color-warning: #fcd34d;
  --color-error: #fca5a5;
}

.main-content, .sidebar { position: relative; z-index: 2; }

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ─── 粘性头部 ─── */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: color-mix(in srgb, var(--color-base-100) 85%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--color-base-300);
}

#progress-bar::-moz-progress-bar { background: var(--color-primary); }
#progress-bar::-webkit-progress-value { background: var(--color-primary); }
#progress-bar { transition: width 1s linear; }

#knowledge-title {
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  color: var(--color-primary);
}

/* ─── 内容区 ─── */
#card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 90px;
  background: color-mix(in srgb, var(--color-base-200) 40%, transparent);
  position: relative;
}
#knowledge-container {
  font-size: 1.18em;
  line-height: 1.85em;
}
#knowledge-container strong {
  color: var(--color-primary);
}

/* ─── 倒计时 ─── */
#countdown {
  position: absolute;
  top: 12px;
  right: 20px;
  z-index: 11;
}

/* ─── 编辑弹窗 ─── */
.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}
.edit-modal[hidden] { display: none; }
.edit-modal.open { display: flex; }

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid var(--color-base-300);
  border-radius: 14px;
  background: color-mix(in srgb, var(--color-base-200) 80%, transparent);
  color: var(--color-base-content);
  line-height: 1.8;
  outline: none;
}
.edit-modal-editor:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 20px rgba(34,211,238,0.12);
}
.edit-modal-editor strong { color: var(--color-primary); }
.edit-modal-editor p { margin: 0 0 1em; }
.edit-modal-editor ul, .edit-modal-editor ol { margin: 0 0 1.2em 1.4em; }
.edit-modal-editor li { margin-bottom: 0.45em; }
.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0,0,0,0.45);
  border: 1px solid var(--color-base-300);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
  color: var(--color-base-content);
}
.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: var(--color-primary);
}
.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.edit-modal-editor th, .edit-modal-editor td {
  border: 1px solid var(--color-base-300);
  padding: 8px 10px;
  text-align: left;
}
.edit-modal-editor th {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  color: var(--color-primary);
}

/* ─── 侧边栏 ─── */
.sidebar {
  width: 320px;
  background: color-mix(in srgb, var(--color-base-100) 85%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 1px solid var(--color-base-300);
  position: relative;
  z-index: 2;
}
.sidebar-close { display: none; }

.sidebar ul { list-style: none; }
.sidebar li {
  padding: 10px 14px;
  margin: 3px 0;
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.92em;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.sidebar li:hover {
  background: color-mix(in srgb, var(--color-primary) 12%, transparent);
  border-color: color-mix(in srgb, var(--color-primary) 25%, transparent);
}
.sidebar li.active {
  background: color-mix(in srgb, var(--color-primary) 15%, transparent);
  border-color: color-mix(in srgb, var(--color-primary) 35%, transparent);
}

/* ─── 侧边栏切换（手机端） ─── */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  pointer-events: none;
  opacity: 0;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

/* ─── 滚动条 ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-base-300); border-radius: 3px; }

body.modal-open { overflow: hidden; }

/* ─── 手机适配 ─── */
@media (max-width: 768px) {
  body { flex-direction: column; overflow: hidden; }
  #matrix-canvas { opacity: 0.08; }
  .main-content { flex: 1; height: 100vh; }
  .sticky-header { padding: 10px 14px 8px; }
  #knowledge-title { font-size: 0.95em; padding-right: 50px; }
  #card { padding: 14px 14px 90px; }
  #knowledge-container { font-size: 0.95em; line-height: 1.6em; }

  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  .sidebar {
    position: fixed;
    top: 0;
    right: -300px;
    left: auto;
    width: 280px;
    height: 100vh;
    z-index: 30;
    border-left: 1px solid var(--color-base-300);
    padding: 16px;
    transition: right 0.3s ease;
    background: color-mix(in srgb, var(--color-base-100) 95%, transparent);
  }
  .sidebar.open { right: 0; }
  .sidebar-close { display: block; }
  .sidebar ul { padding-bottom: 60px; }
  .sidebar-overlay.show { display: block; opacity: 1; }

  .sidebar-swipe-area {
    position: fixed;
    top: 0; right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }
}

</style>
</head>
<body>

<!-- 数字雨 Canvas -->

<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>

<div class="main-content">
  <div class="sticky-header">
    <div class="flex items-center gap-3 mb-2">
      <progress id="progress-bar" class="progress w-full" value="0" max="100"></progress>
      <span id="countdown" class="badge badge-soft badge-primary shrink-0 tabular-nums">30</span>
    </div>
    <h2 id="knowledge-title" class="text-base md:text-lg font-semibold tracking-tight" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <div id="card">
    <div id="knowledge-container" class="content px-2"></div>
    <div class="flex justify-end mt-5">
      <button class="btn btn-soft btn-primary btn-sm" id="edit-btn" type="button">修改</button>
    </div>
    <p id="click-hint" class="text-xs text-base-content/30 mt-3">点标题展开 · 点修改编辑</p>

</div>

<div class="edit-modal" id="edit-modal" hidden>
  <div class="modal-box max-w-3xl max-h-[80vh] flex flex-col p-0 overflow-hidden" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="flex items-center justify-between gap-3 px-5 py-4 bg-base-200/50">
      <h3 id="edit-modal-title" class="font-semibold text-base-content">修改内容</h3>
      <button class="btn btn-ghost btn-sm btn-square" id="edit-modal-close" type="button">✕</button>
    </div>
    <div class="flex-1 overflow-auto p-5">
      <div class="edit-modal-editor" id="edit-modal-editor" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="flex justify-end gap-2 px-5 py-3 bg-base-200/50">
      <button class="btn btn-ghost btn-sm" id="edit-cancel-btn" type="button">取消</button>
      <button class="btn btn-primary btn-sm" id="edit-save-btn" type="button">保存</button>
    </div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="flex items-center justify-between mb-4 pb-3 border-b border-base-300">
    <h3 class="font-semibold text-sm text-base-content/70 tracking-wider">Redis 高频知识点</h3>
    <button class="btn btn-ghost btn-xs btn-square sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<button class="sidebar-toggle btn btn-square btn-soft btn-primary fixed bottom-6 left-6 z-30 shadow-lg" id="sidebar-toggle">☰</button>
<div class="sidebar-swipe-area" id="sidebar-swipe-area" aria-hidden="true"></div>
<script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
<script src="./db-manager.js"></script>
<script src="./d1-sync.js" data-api-url=""></script>
<script src="./tts-player.js"></script>
<script src="./sidebar-manager.js"></script>
<script src="./repo-sync.js"></script>
<script>
// ===== Cloudflare Worker API 地址配置 =====
// 部署 Worker 后，把以下地址替换为实际的 workers.dev 域名
// 如果 Workers 和 Pages 在同一域名下，留空则用相对路径
window.__API_BASE__  = 'https://review.zrui73366.workers.dev';
window.__D1_API_URL__ = window.__API_BASE__ || undefined;

// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
var knowledgePoints = [];
window.knowledgePoints = knowledgePoints;
window.__PAGE_SLUG__ = 'redis-topics';
var PENDING_SEED = [
  {
    "id": "redis-topics--001--redis",
    "title": "1. Redis 是什么？有什么特点？",
    "content": "<strong>结论：</strong>Redis 是一个基于内存的高性能键值数据库，常用于缓存、计数、排行榜和分布式协调。<br><br><strong>要点：</strong><br>1. 读写快，适合高并发场景。<br>2. 支持多种数据结构，不只是简单字符串。<br>3. 常见问题也集中在内存、持久化和高可用。"
  },
  {
    "id": "redis-topics--002--redis",
    "title": "2. Redis 为什么快？",
    "content": "<strong>结论：</strong>Redis 快的核心原因是内存操作 + 高效数据结构 + 较少上下文切换。<br><br><strong>要点：</strong><br>1. 数据主要在内存里，避免大量磁盘 IO。<br>2. 命令执行路径短，数据结构做了专门优化。<br>3. 单线程模型避免了很多锁竞争开销。"
  },
  {
    "id": "redis-topics--003--redis",
    "title": "3. Redis 是单线程吗？",
    "content": "<strong>结论：</strong>Redis 的命令执行核心模型长期以单线程为主，但并不意味着整个系统所有工作都只有一个线程。<br><br><strong>要点：</strong><br>1. 命令执行单线程，简化并发控制。<br>2. 某些版本在网络读写等环节引入了多线程优化。<br>3. 面试重点不是“绝对单线程”，而是它为什么单线程还能快。"
  },
  {
    "id": "redis-topics--004--redis",
    "title": "4. Redis 常见数据类型有哪些？",
    "content": "<strong>结论：</strong>高频记住 String、List、Hash、Set、ZSet。<br><br><strong>要点：</strong><br>1. String 最通用，可做缓存、计数、分布式锁。<br>2. Hash 常用于存对象字段。<br>3. ZSet 常用于排行榜、带分数排序场景。"
  },
  {
    "id": "redis-topics--005--bitmap-hyperloglog-geo-stream",
    "title": "5. BitMap、HyperLogLog、GEO、Stream 分别适合什么场景？",
    "content": "<strong>结论：</strong>它们是 Redis 的扩展能力，分别解决位图统计、基数估算、地理位置、消息流处理问题。<br><br><strong>要点：</strong><br>1. BitMap 适合签到、活跃标记。<br>2. HyperLogLog 适合海量去重计数但允许少量误差。<br>3. GEO 适合附近的人，Stream 适合轻量消息队列。"
  },
  {
    "id": "redis-topics--006--redis",
    "title": "6. Redis 持久化有哪些方式？",
    "content": "<strong>结论：</strong>高频记住 RDB、AOF、混合持久化。<br><br><strong>要点：</strong><br>1. RDB 是快照，恢复快，但可能丢最近一段时间数据。<br>2. AOF 是追加日志，数据更完整，但文件更大。<br>3. 混合持久化兼顾恢复速度和数据完整性。"
  },
  {
    "id": "redis-topics--007--rdb-aof",
    "title": "7. RDB 和 AOF 有什么区别？",
    "content": "<strong>结论：</strong>RDB 偏恢复速度，AOF 偏数据完整性。<br><br><strong>要点：</strong><br>1. RDB 适合做备份和快速恢复。<br>2. AOF 适合降低数据丢失风险。<br>3. 实际生产常常是多种机制组合使用。"
  },
  {
    "id": "redis-topics--008--aof",
    "title": "8. AOF 的三种写回策略是什么？",
    "content": "<strong>结论：</strong>核心是 always、everysec、no，区别在于性能和数据安全性的平衡。<br><br><strong>要点：</strong><br>1. always 最安全，但性能开销最大。<br>2. everysec 是最常见折中方案。<br>3. no 把刷盘时机更多交给操作系统，风险更高。"
  },
  {
    "id": "redis-topics--009--aof",
    "title": "9. 什么是 AOF 重写？",
    "content": "<strong>结论：</strong>AOF 重写是把冗余命令压缩成恢复当前数据状态所需的更精简指令集合。<br><br><strong>要点：</strong><br>1. 目的是缩小 AOF 文件体积。<br>2. 它不是简单复制原日志，而是重建更短的恢复命令。<br>3. 本质是以当前结果为准，而不是保留所有历史过程。"
  },
  {
    "id": "redis-topics--010--redis",
    "title": "10. Redis 过期删除机制怎么理解？",
    "content": "<strong>结论：</strong>Redis 不会在键一到期就立刻全部删除，而是采用惰性删除 + 定期删除。<br><br><strong>要点：</strong><br>1. 惰性删除：访问时发现过期再删。<br>2. 定期删除：周期性抽样清理过期键。<br>3. 这样在 CPU 和内存回收之间做平衡。"
  },
  {
    "id": "redis-topics--011--redis",
    "title": "11. Redis 为什么还需要内存淘汰机制？",
    "content": "<strong>结论：</strong>因为只靠过期删除不一定能及时释放足够内存。<br><br><strong>要点：</strong><br>1. 有些键没设置过期时间。<br>2. 有些过期键未被访问，可能暂时还留在内存里。<br>3. 当内存达到上限时，就需要淘汰策略参与。"
  },
  {
    "id": "redis-topics--012--item",
    "title": "12. 常见内存淘汰策略有哪些？",
    "content": "<strong>结论：</strong>高频记住 noeviction、LRU、LFU、TTL 这几类思路。<br><br><strong>要点：</strong><br>1. noeviction 表示不淘汰，直接报错。<br>2. LRU 偏向淘汰最近最少使用的数据。<br>3. LFU 偏向淘汰访问频率最低的数据。"
  },
  {
    "id": "redis-topics--013--redis",
    "title": "13. Redis 主从复制怎么理解？",
    "content": "<strong>结论：</strong>主从复制就是主节点负责写，从节点同步主节点数据，常用于读扩展和高可用基础。<br><br><strong>要点：</strong><br>1. 初次同步通常是全量复制。<br>2. 后续大多走增量复制。<br>3. 它是哨兵和高可用切换的前提。"
  },
  {
    "id": "redis-topics--014--item",
    "title": "14. 全量复制和增量复制有什么区别？",
    "content": "<strong>结论：</strong>全量复制传的是完整数据快照，增量复制传的是复制积压区中的新增命令。<br><br><strong>要点：</strong><br>1. 全量复制开销更大。<br>2. 网络短暂抖动后，若积压数据还在，通常可走增量复制。<br>3. 增量复制能显著降低恢复同步成本。"
  },
  {
    "id": "redis-topics--015--item",
    "title": "15. 哨兵模式的作用是什么？",
    "content": "<strong>结论：</strong>哨兵模式用于监控 Redis 主从集群并在主节点故障时自动完成故障转移。<br><br><strong>要点：</strong><br>1. 它负责监控节点健康状态。<br>2. 主节点异常时会选举新主。<br>3. 它解决的是高可用，不解决海量数据分片问题。"
  },
  {
    "id": "redis-topics--016--item",
    "title": "16. 什么是集群脑裂？",
    "content": "<strong>结论：</strong>脑裂是因为网络分区等原因，系统里短时间出现多个都认为自己合法的主节点。<br><br><strong>要点：</strong><br>1. 它会带来数据不一致风险。<br>2. 常见诱因是网络分区和心跳异常。<br>3. 应对思路是合理配置复制确认和故障判定策略。"
  },
  {
    "id": "redis-topics--017--redis",
    "title": "17. Redis 事务怎么理解？",
    "content": "<strong>结论：</strong>Redis 事务更像“命令批量顺序执行”，和关系型数据库事务不是一个强度。<br><br><strong>要点：</strong><br>1. 它能保证队列中的命令按顺序执行。<br>2. 但通常不具备关系型数据库那种完整回滚能力。<br>3. 面试里不要把 Redis 事务和 MySQL 事务等同。"
  },
  {
    "id": "redis-topics--018--redis",
    "title": "18. Redis 怎么实现分布式锁？",
    "content": "<strong>结论：</strong>分布式锁的核心是“互斥 + 过期时间 + 只释放自己的锁”。<br><br><strong>要点：</strong><br>1. 需要防止死锁，所以一定要设置过期时间。<br>2. 删除锁时要保证只能删掉自己加的锁。<br>3. 面试中还可以补充：它适合很多业务场景，但不是绝对强一致锁。"
  },
  {
    "id": "redis-topics--019--item",
    "title": "19. 什么是缓存穿透？怎么解决？",
    "content": "<strong>结论：</strong>缓存穿透是请求的数据既不在缓存，也不在数据库，导致流量直接打到数据库。<br><br><strong>要点：</strong><br>1. 常见原因是恶意请求或查询不存在的数据。<br>2. 解决思路包括布隆过滤器、缓存空值、参数校验。<br>3. 核心目标是别让无效请求反复穿到 DB。"
  },
  {
    "id": "redis-topics--020--item",
    "title": "20. 什么是缓存击穿？怎么解决？",
    "content": "<strong>结论：</strong>缓存击穿是某个热点 key 失效瞬间，大量请求同时打到数据库。<br><br><strong>要点：</strong><br>1. 它强调的是“热点 key”。<br>2. 解决办法常见有互斥锁、逻辑过期、热点永不过期。<br>3. 和缓存雪崩、穿透要区分开。"
  },
  {
    "id": "redis-topics--021--item",
    "title": "21. 什么是缓存雪崩？怎么解决？",
    "content": "<strong>结论：</strong>缓存雪崩是大量缓存同一时间失效，导致数据库压力骤增。<br><br><strong>要点：</strong><br>1. 它强调的是“大量 key 同时失效”。<br>2. 解决思路包括过期时间加随机值、限流降级、多级缓存。<br>3. 本质是避免失效时间过于集中。"
  },
  {
    "id": "redis-topics--022--cache-aside",
    "title": "22. Cache Aside 是什么？",
    "content": "<strong>结论：</strong>Cache Aside 是最常见缓存模式：先查缓存，没命中再查数据库并回填缓存。<br><br><strong>要点：</strong><br>1. 读路径通常是“先缓存后数据库”。<br>2. 写路径常见做法是更新数据库后删除缓存。<br>3. 这种模式实现简单，业务中最常用。"
  },
  {
    "id": "redis-topics--023--read-through-write-through",
    "title": "23. Read Through / Write Through 怎么理解？",
    "content": "<strong>结论：</strong>它们把缓存和数据库的一部分读写逻辑封装到统一层里。<br><br><strong>要点：</strong><br>1. Read Through 由缓存层负责读穿透数据库。<br>2. Write Through 由缓存层同步写数据库。<br>3. 面试里知道概念和与 Cache Aside 的区别就够了。"
  }
];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
Object.defineProperty(window, 'index', {
  get() { return index; },
  set(v) { index = v; }
});
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof DbManager !== 'undefined') {
      var cardId = knowledgePoints[index].id;
      if (cardId) DbManager.updateCard(cardId, knowledgePoints[index].title, updatedContent);
    }
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
window.sidebarMgr = sidebarMgr;
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'redis-topics',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: (window.__API_BASE__ || '') + '/api/tts'
});

// 数据库初始化后再显示
(async function initDbAndShow() {
  var cards = null;

  // Phase 1: 优先从 D1 云端拉取（跨设备持久化）
  if (typeof D1Sync !== 'undefined' && D1Sync.isConfigured()) {
    try {
      var d1Cards = await D1Sync.init(window.__PAGE_SLUG__);
      if (d1Cards && d1Cards.length > 0) {
        cards = d1Cards;
        // 存入本地 IndexedDB 作为缓存
        await DbManager.init([], window.__PAGE_SLUG__);
        DbManager.syncFromArray(cards);
        cards = DbManager.getCards();
      }
    } catch(e) {
      console.warn('[Init] D1 unavailable, falling back to local:', e);
    }
  }

  // Phase 2: 降级到本地 DbManager（IndexedDB）
  if (!cards || !cards.length) {
    try {
      await DbManager.init(PENDING_SEED, window.__PAGE_SLUG__);
      cards = DbManager.getCards();
    } catch(e) {
      console.warn('[Init] DbManager failed, using seed data:', e);
    }
  }

  // Phase 3: 最后的兜底 — 直接使用页面内嵌种子数据
  if (!cards || !cards.length) {
    cards = PENDING_SEED;
  }

  // 填充 knowledgePoints
  knowledgePoints.length = 0;
  (cards || []).forEach(function(c) {
    knowledgePoints.push(c.id ? { id: c.id, title: c.title, content: c.content } : c);
  });
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.syncFromKnowledgePoints();
  showKnowledge();
})();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
