<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Redis知识点动态展示 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 点击展开提示 ===== */
#click-hint {
  margin-top: 20px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从左侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-left: none;
    border-right: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: left 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  #click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}

.content p { margin: 0 0 1em; }
.content ul, .content ol { margin: 0 0 1.2em 1.4em; }
.content li { margin-bottom: 0.45em; }
.content .embedded-entry { margin: 0 0 1.1em; }
.content .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}
.content pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}
.content code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.content th, .content td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}
.content th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}
</style>
</head>
<body>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>
<!-- 扫描线叠层 -->
<div class="scanlines"></div>

<div class="main-content">
  <!-- 粘性头部：进度条 + 标题 -->
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <!-- 倒计时（固定在头部右上角） -->
  <div class="countdown" id="countdown">30</div>

  <!-- 卡片（滚动区域） -->
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div id="click-hint">👆 点击上方标题展开详细内容</div>
  </div>

  <button class="next-btn" id="next-btn">下一个 →</button>
</div>

<!-- 侧边栏（桌面端侧栏 / 手机端滑动抽屉） -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Redis 高频知识点</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<!-- 侧边栏切换按钮（手机端） -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>

<script src="./tts-player.js"></script>
<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
const knowledgePoints = [{"title":"Redis是什么，有哪些特点","content":"<p>Redis是⼀个开源的基于内存的数据库，读写速度⾮常快，通常被⽤作缓存、消息队列、分布式锁和键值存储数据库。它⽀持多种数据结构，如字符串、哈希表、列表、集合、有序集合等，除此之外，Redis 还⽀持事务 、持久化、Lua 脚本、多种集群⽅案（主从复制模式、哨兵模式、切⽚机群模式）、发布/订阅模式，内存淘汰机制、过期删除机制等。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">具有以下特点：</p><p>基于内存： Redis 将数据存储在内存中，使得它具有快速的读写访问速度。这也使得 Redis 适⽤于需要⾼性能的应⽤场景，⽐如缓存。</p><p>持久性：虽然 Redis 主要是内存中的存储系统，但它可以通过将数据持久化到磁盘上的快照和⽇志⽂件来保证数据的持久性，以防⽌数据丢失。</p><p>多数据结构：Redis 不仅⽀持简单的键值对存储，还提供了丰富的数据结构，如列表、哈希表、集合等，使得它更灵活地适应不同的应⽤场景。</p><p>原⼦性操作： Redis ⽀持原⼦性操作，这意味着它可以保证⼀个操作是原⼦的，要么执⾏成功，要么完全不执⾏，这对于并发环境下的数据⼀致性很重要。</p><p>分布式： Redis 提供了分布式特性，可以将数据分布在多个节点上，以提⾼可扩展性和可⽤性。</p></div>"},{"title":"Redis 具备「⾼性能」和「⾼并发」两种特性","content":"<p>Redis读写⾮常快速，对于需要频繁读写的数据，特别是缓存数据，Redis 的性能优势⾮常明显，将⼀部分常⽤的、频繁访问的数据存储在 Redis 中，可以有效减轻对 MySQL 等持久性数据库的压⼒。</p><p>Redis 提供了丰富的数据结构，这使得 Redis 在处理特定类型数据和实现特定功能时更为灵活。</p><p>Redis 能够更好地处理⾼并发请求，尤其适⽤于⼀些需要快速响应的场景。通过缓存和原⼦性操作，可以降低数据库的并发压⼒</p><p>Redis 更适合处理⾼速、⾼并发的数据访问，以及需要复杂数据结构和功能的场景，在实际应⽤中，很多系统会同时使⽤ MySQL 和 Redis。</p>"},{"title":"Redis是单线程吗","content":"<p>Redis 是单线程的，但是Redis 单线程指的是⽹络请求模块使⽤单线程进⾏处理，其他模块仍⽤多个线程，Redis程序并不是单线程的，在启动的时候，会启动后台线程。</p><p>Redis 在 2.6 版本，会启动 2 个后台线程，分别处理关闭⽂件、AOF 刷盘这两个任务；</p><p>Redis 在 4.0 版本之后，新增了⼀个新的后台线程，⽤来异步释放 Redis 内存，也就是 lazyfree 线程。</p><p>之所以 Redis 为「关闭⽂件、AOF 刷盘、释放内存」这些任务创建单独的线程来处理，是因为这些任务的操作都是很耗时的，如果把这些任务都放在主线程来处理，那么 Redis 主线程就很容易发⽣阻塞，这样就⽆法处理后续的请求了。</p><p>为了提⾼⽹络 I/O 的并⾏度，Redis 6.0 采⽤了多个 I/O 线程来处理⽹络请求，但是对于命令的执⾏，Redis 仍然使⽤单线程来处理。</p>"},{"title":"Redis单线程为什么还这么快","content":"<p>基于内存存储：Redis 将数据存储在内存中，⽽不是磁盘上。内存访问速度远远快于磁盘访问速度，因此Redis 能够快速读取和写⼊数据。</p><p>⾮阻塞单线程： Redis 使⽤单线程模型，不需要进⾏多线程间的上下⽂切换，避免了多线程带来的竞争和同步开销。此外，Redis 使⽤了⾮阻塞 I/O，可以更⾼效地处理并发请求。</p><p>⾼效的数据结构：Redis专⻔设计了STRING、LIST、HASH等⾼效的数据结构，依赖各种数据结构提升了读写的效率。</p><p>I/O多路复⽤：采⽤I/O多路复⽤机制同时监听多个Socket，内核会⼀直监听这些 Socket 上的连接请求或数据请求。⼀旦有请求到达，就会根据Socket上的事件来选择对应的事件处理器进⾏处理，这就实现了⼀个 Redis线程处理多个 IO 流的效果。</p>"},{"title":"Redis五种数据结构和应⽤场景","content":"<p>Redis 提供了丰富的数据类型，常⻅的有五种数据类型：String（字符串），Hash（哈希），List（列表），Set（集合）、Zset（有序集合）。</p><table><tr><td>结构类型</td><td>结构存储的值</td><td>结构的读写能力</td></tr><tr><td>String字符串</td><td>可以是字符串、整数或浮点数</td><td>对整个字符串或字符串的一部分进行操作;对整数或浮点数进行自增或自减操作;</td></tr><tr><td>List列表</td><td>一个链表,链表上的每个节点都包含一个字符串</td><td>对链表的两端进行push和pop操作,读取单个或多个元素;根据值查找或删除元素;</td></tr><tr><td>Set集合</td><td>包含字符串的无序集合</td><td>字符串的集合,包含基础的方法有看是否存在添加、获取、删除;还包含计算交集、并集、差集等</td></tr><tr><td>Hash散列</td><td>包含键值对的无序散列表</td><td>包含方法有添加、获取、删除单个元素</td></tr><tr><td>Zset有序集合</td><td>和散列一样,用于存储键值对</td><td>字符串成员与浮点数分数之间的有序映射;元素的排列顺序由分数的大小决定;包含方法有添加、获取、删除单个元素以及根据分值范围或成员来获取元素</td></tr></table><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. String</p><p>String类型的底层的数据结构实现主要是SDS(简单动态字符串)。应⽤场景主要有：</p><p>缓存对象：例如可以⽤STRING缓存整个对象的JSON。</p><p>计数：Redis处理命令是单线程，所以执⾏命令的过程是原⼦的，因此String数据类型适合计数场景，⽐如计算访问次数、点赞、转发、库存数量等等。</p><p>分布式锁：可以利⽤SETNX命令。</p><p>共享Session信息：服务器都会去同⼀个Redis获取相关的Session信息，解决了分布式系统下Session存储的问题。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">命令：</p><p>get、set、del</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. List</p><p>List 类型的底层数据结构是由双向链表或压缩列表实现的：</p><p>如果列表的元素个数⼩于 512 个，列表每个元素的值都⼩于 64 字节，Redis 会使⽤压缩列表作为 List 类型的底层数据结构；</p><p>如果列表的元素不满⾜上⾯的条件，Redis 会使⽤双向链表作为 List 类型的底层数据结构；</p><p>在 Redis 3.2 版本之后，List 数据类型底层数据结构只由 quicklist 实现，替代了双向链表和压缩列表。在 Redis7.0 中，压缩列表数据结构被废弃，由 listpack 来实现。应⽤场景主要有：</p><p>微信朋友圈点赞：要求按照点赞顺序显示点赞好友信息，如果取消点赞，移除对应好友信息。</p><p>消息队列：可以使⽤左进右出的命令组成来完成队列的设计。⽐如：数据的⽣产者可以通过Lpush命令从左边插⼊数据，多个数据消费者，可以使⽤BRpop命令阻塞的”抢”列表尾部的数据。</p><p>命令：</p><p>rpush、lrange、index、lpop</p><ul><li>Set</li></ul><p>Set 类型的底层数据结构是由哈希表或整数集合实现的：</p><p>如果集合中的元素都是整数且元素个数⼩于 512个，Redis 会使⽤整数集合作为 Set 类型的底层数据结构；</p><p>如果集合中的元素不满⾜上⾯条件，则 Redis 使⽤哈希表作为 Set 类型的底层数据结构。</p><p>应⽤场景主要有：</p><p>点赞：key 是⽂章id，value 是⽤户id。</p><p>共同关注：Set 类型⽀持交集运算，所以可以⽤来计算共同关注的好友、公众号等。key 可以是⽤户id，value则是已关注的公众号的id。</p><p>抽奖活动：存储某活动中中奖的⽤户名 ，Set 类型因为有去重功能，可以保证同⼀个⽤户不会中奖两次。</p><p>命令：</p><p>sadd、smember、sismember、srem</p><ul><li>Hash</li></ul><p>Hash 类型的底层数据结构是由压缩列表或哈希表实现的：</p><p>如果哈希类型元素个数⼩于 512 个，所有值⼩于 64 字节的话，Redis 会使⽤压缩列表作为 Hash 类型的底层数据结构；</p><p>如果哈希类型元素不满⾜上⾯条件，Redis 会使⽤哈希表作为 Hash 类型的底层数据结构。</p><p>在Redis 7.0 中，压缩列表数据结构被废弃，交由 listpack 来实现。应⽤场景主要有：</p><p>缓存对象：⼀般对象⽤ String + Json 存储，对象中某些频繁变化的属性可以考虑抽出来⽤ Hash 类型存储。</p><p>购物⻋：以⽤户 id 为 key，商品 id 为 field，商品数量为 value，恰好构成了购物⻋的3个要素。</p><p>命令：</p><p>hset、hget、hgetall、hdel</p><ul><li>Zset</li></ul><p>Zset类型(Sorted Set，有序集合)可以根据元素的权重来排序，可以⾃⼰来决定每个元素的权重值。⽐如说，可以根据元素插⼊Sorted Set 的时间确定权重值，先插⼊的元素权重⼩，后插⼊的元素权重⼤。</p><p>Zset 类型的底层数据结构是由压缩列表或跳表实现的, 应⽤场景主要有：</p><p>在⾯对需要展示最新列表、排⾏榜等场景时，如果数据更新频繁或者需要分⻚显示，可以优先考虑使⽤Zset。</p><p>排⾏榜：有序集合⽐较典型的使⽤场景就是排⾏榜。例如学⽣成绩的排名榜、游戏积分排⾏榜、视频播放排名、电商系统中商品的销量排名等。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">命令：</p><p>zadd、zrange、zrangebyscore、zrem</p><p>随着 Redis 版本的更新，后⾯⼜⽀持了四种数据类型： BitMap（2.2 版新增）、HyperLogLog（2.8 版新增）、GEO（3.2 版新增）、Stream（5.0 版新增）</p></div>"},{"title":"BitMap","content":"<p>bit 是计算机中最⼩的单位，使⽤它进⾏储存将⾮常节省空间，特别适合⼀些数据量⼤且使⽤⼆值统计的场景。可以⽤于签到统计、判断⽤户登陆态等操作。</p>"},{"title":"HyperLogLog","content":"<p>HyperLogLog⽤于基数统计，统计规则是基于概率完成的，不准确，标准误算率是 0.81%。优点是，在输⼊元素的数量或者体积⾮常⾮常⼤时，所需的内存空间总是固定的、并且很⼩。⽐如百万级⽹⻚ UV 计数等；</p>"},{"title":"GEO","content":"<p>主要⽤于存储地理位置信息，并对存储的信息进⾏操作。底层是由Zset实现的，使⽤GeoHash编码⽅法实现了经纬度到Zset中元素权重分数的转换，这其中的两个关键机制就是「对⼆维地图做区间划分」和「对区间进⾏编码」。⼀组经纬度落在某个区间后，就⽤区间的编码值来表示，并把编码值作为Zset元素的权重分数。</p>"},{"title":"Stream","content":"<p>Redis专⻔为消息队列设计的数据类型。相⽐于基于 List 类型实现的消息队列，有这两个特有的特性：⾃动⽣成全局唯⼀消息ID，⽀持以消费组形式消费数据。</p><p>之前⽅法缺陷：不能持久化，⽆法可靠的保存消息，并且对于离线重连的客户端不能读取历史消息。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. SDS: 简单动态字符串</p><p>SDS 可以存储字符串，还可以存储⼆进制数据，包括空字符。这使得SDS在处理⼆进制数据时更为灵活，不受空字符的限制。</p><p>缓存⻓度信息：SDS在头部保存了字符串的⻓度信息，因此可以在O(1)的时间复杂度内获取字符串的⻓度。这样，不需要遍历整个字符串来计算⻓度，提⾼了获取⻓度的效率。</p><p>动态扩容：SDS可以根据实际存储的数据动态扩容。当字符串⻓度变⻓时，SDS会⾃动进⾏内存的扩展，⽽不需要像C语⾔中的传统字符串那样⼿动管理内存。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 双端链表</p><p>Redis中的List就是⽤双端链表实现的，双端链表的链表节点可以保存不同类型的值，⽀持在两端进⾏元素的快速插⼊和删除，并且链表结构提供了表头指针和表尾指针，获取链表的表头节点和表尾节点的时间复杂度只需O(1)；获取链表数量的时间复杂度也只需O(1);</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺陷：</p><p>链表每个节点之间的内存都是不连续的，意味着⽆法很好利⽤ CPU 缓存</p><p>保存⼀个链表节点的值都需要⼀个链表节点结构头的分配，内存开销较⼤。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 压缩列表</p><p>压缩列表是⼀种紧凑的、可变⻓度，由连续内存块组成的顺序型数据结构，类似于数组，被⽤于存储列表和哈希表的数据。压缩列表在内存使⽤效率上相对较⾼，它可以根据数据⼤⼩进⾏灵活的扩容和收缩。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺陷：</p><p>空间扩展操作也就是重新分配内存，因此连锁更新⼀旦发⽣，就会导致压缩列表占⽤的内存空间要多次重新分配，直接影响到压缩列表的访问性能。</p><p>如果保存的元素数量增加了，或是元素变⼤了，会导致内存重新分配，会有连锁更新的问题。</p><p>压缩列表只会⽤于保存的节点数量不多的场景，只要节点数量⾜够⼩，即使发⽣连锁更新也能接受。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 哈希表</p><p>哈希表是⼀种保存键值对(key-value)的数据结构。优点在于能以O(1)的复杂度快速查询数据。Redis 采⽤了拉链法来解决哈希冲突，在不扩容哈希表的前提下，将具有相同哈希值的数据串起来，形成链接。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 整数集合</p><p>整数集合是⼀种专⻔⽤于存储整数值的数据结构，通过紧凑的⼆进制表示，提⾼了整数存储的效率。整数集合被⽤于存储Redis中的集合数据结构的整数元素。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. 跳表</p><p>跳跃表是⼀种在链表基础上改进过来的，实现了⼀种「多层」的有序链表，当数据量很⼤时，跳表的查找复杂度就是O(logN)。⽤于实现有序集合（Sorted Set）。</p><p>跳表的查找过程？</p><p>查找⼀个跳表节点的过程时，跳表会从头节点的最⾼层开始，逐⼀遍历每⼀层。在遍历某⼀层的跳表节点时，会⽤跳表节点中的 SDS 类型的元素和元素的权重来进⾏判断：</p><p>如果当前节点的权重⼩于要查找的权重时，跳表就会访问该层上的下⼀个节点。</p><p>如果当前节点的权重等于要查找的权重时，并且当前节点的 SDS 类型数据⼩于要查找的数据时，跳表就会访问该层上的下⼀个节点。</p><p>如果上⾯两个条件都不满⾜，或者下⼀个节点为空时，跳表就会使⽤⽬前遍历到的节点的 level 数组⾥的下⼀层指针，然后沿着下⼀层指针继续查找。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7. quicklist</p><p>quicklist 就是双向链表 + 压缩列表组合，quicklist 就是⼀个链表，⽽链表中的每个元素⼜是⼀个压缩列表。 quicklist 解决办法，通过控制每个链表节点中的压缩列表的⼤⼩或者元素个数，来规避连锁更新的问题。因为压缩列表元素越少或越⼩，连锁更新带来的影响就越⼩，从⽽提供了更好的访问性能。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">8. listpack</p><p>listpack 没有压缩列表中记录前⼀个节点⻓度的字段，listpack 只记录当前节点的⻓度，当我们向 listpack 加⼊⼀个新元素的时候，不会影响其他节点的⻓度字段的变化，从⽽避免了压缩列表的连锁更新问题。</p></div>"},{"title":"Redis如何实现数据不丢失","content":"<p>Redis 实现了数据持久化的机制，这个机制会把数据存储到磁盘，这样在 Redis 重启就能够从磁盘中恢复原有的数据。</p><p>Redis 共有三种数据持久化的⽅式：</p><p>AOF ⽇志：每执⾏⼀条写操作命令，就把该命令以追加的⽅式写⼊到⼀个⽂件⾥；</p><p>RDB 快照：将某⼀时刻的内存数据，以⼆进制的⽅式写⼊磁盘；</p><p>混合持久化⽅式：Redis 4.0 新增的⽅式，集成了 AOF 和 RBD 的优点；</p>"},{"title":"AOF⽇志","content":"<p>以⽇志的形式记录服务器所处理的每⼀个写操作，redis服务器启动之初，会读取该⽇志来重新构建数据库，以保证启动后的数据库是完整的。</p><p>AOF ⽇志是写后⽇志，&quot;写后&quot; 的意思是 Redis 是先执⾏命令，把数据写⼊内存，然后才记录⽇志，Redis是内存和⽇志(写后⽇志)，mysql是磁盘数据和⽇志(写前⽇志)。</p><p>Redis 使⽤写后⽇志这⼀⽅式的好处：</p><ul><li>可以避免出现记录错误命令的情况。</li></ul><ul><li>它是在命令执⾏后才记录⽇志，所以不会阻塞当前的写操作。</li></ul>"},{"title":"AOF的三种写回测策略","content":"<p>Always，同步写回；</p><p>Everysec，每秒写回；</p><p>No，操作系统控制的写回。</p><p>Always是每次写操作命令执⾏完后，同步将 AOF ⽇志数据写回硬盘；Everysec每次写操作命令执⾏完后，先将命令写⼊到 AOF ⽂件的内核缓冲区，然后每隔⼀秒将缓冲区⾥的内容写回到硬盘；No就是不控制写回硬盘的时机。每次写操作命令执⾏完后，先将命令写⼊到 AOF ⽂件的内核缓冲区，再由操作系统决定何时将缓冲区内容写回硬盘。</p><p>DPNO</p><table><tr><td>配置项</td><td>写回时机</td><td>优点</td><td>缺点</td></tr><tr><td>Always</td><td>同步写回</td><td>可靠性高,数据基本不丢失</td><td>每个写命令都要落盘,性能影响较大</td></tr><tr><td>Everysec</td><td>每秒写回</td><td>性能适中</td><td>宕机时丢失1秒内的数据最多是丢失2s</td></tr><tr><td>No</td><td>操作系统控制的写回</td><td>性能好</td><td>宕机时丢失数据较多</td></tr></table><p>写回策略选择：</p><p>想要获得⾼性能，就选择 No 策略；如果想要得到⾼可靠性保证，就选择 Always 策略；如果允许数据有⼀点丢失，⼜希望性能别受太⼤影响的话，那么就选择 Everysec 策略。</p>"},{"title":"AOF的磁盘重写机制","content":"<p>随着执⾏的命令越多，AOF ⽂件的体积⾃然也会越来越⼤，为了避免⽇志⽂件过⼤， Redis 提供了 AOF 重写机制，它会直接扫描数据中所有的键值对数据，然后为每⼀个键值对⽣成⼀条写操作命令，接着将该命令写⼊到新的AOF ⽂件，重写完成后，就替换掉现有的 AOF ⽇志。重写的过程是由后台⼦进程完成的，这样可以使得主进程可以继续正常处理命令。</p><p>AOF重写过程：⼀处拷⻉，两处⽇志</p><p>AOF 重写的四个触发时机：</p><p>时机⼀：bgrewriteaof 命令被执⾏。</p><p>时机⼆：主从复制完成 RDB ⽂件解析和加载（⽆论是否成功）。</p><p>时机三：AOF 重写被设置为待调度执⾏。</p><p>时机四：AOF 被启⽤，同时 AOF ⽂件的⼤⼩⽐例超出阈值，以及 AOF ⽂件的⼤⼩绝对值超出阈值。</p><p>另外，这⾥还需要注意，在这四个时机下，其实都不能有正在执⾏的 RDB ⼦进程和 AOF 重写⼦进程，否则的话，AOF 重写就⽆法执⾏了。</p><p>AOF 重写的基本执⾏过程。AOF 重写和 RDB 创建的过程类似，它也是创建了⼀个⼦进程来完成重写⼯作。这是因为 AOF 重写操作，实际上需要遍历 Redis server 上的所有数据库，把每个键值对以插⼊操作的形式写⼊⽇志⽂件，⽽⽇志⽂件⼜要进⾏写盘操作。所以，Redis 源码使⽤⼦进程来实现 AOF 重写，这就避免了阻塞主线程，也减少了对 Redis 整体性能的影响。</p>"},{"title":"RDB快照","content":"<p>RDB 快照就是记录某⼀个瞬间的内存数据，记录的是实际数据。每次执⾏快照，都是把内存中的「所有数据」都记录到磁盘中。如果频率太频繁，可能会对 Redis 性能产⽣影响。如果频率太低，服务器故障时，丢失的数据会更多。通常可能设置⾄少 5 分钟才保存⼀次快照。</p><p>Redis 提供了两个命令来⽣成 RDB ⽂件，分别是 save 和 bgsave，他们的区别就在于是否在「主线程」⾥执⾏：</p><p>执⾏了 save 命令，就会在主线程⽣成 RDB ⽂件，由于和执⾏操作命令在同⼀个线程，所以如果写⼊ RDB ⽂件的时间太⻓，会阻塞主线程；</p><p>执⾏了 bgsave 命令，会创建⼀个⼦进程来⽣成 RDB ⽂件，这样可以避免主线程的阻塞；</p>"},{"title":"混合持久化","content":"<p>RDB 优点是数据恢复速度快，但是快照的频率不好把握。频率太低，丢失的数据就会⽐较多，频率太⾼，就会影响性能。AOF 优点是丢失数据少，但是数据恢复不快。为了集成了两者的优点， Redis 4.0 提出了混合使⽤ AOF ⽇志和内存快照，也叫混合持久化，既保证了 Redis 重启速度，⼜降低数据丢失⻛险。</p><p>混合持久化⼯作在 AOF ⽇志重写过程，在 AOF 重写⽇志时，fork出来的重写⼦进程会先将与主线程共享的内存数据以 RDB ⽅式写⼊到 AOF ⽂件，然后主线程处理的操作命令会被记录在重写缓冲区⾥，重写缓冲区⾥的增量命令会以 AOF ⽅式写⼊到 AOF ⽂件，写⼊完成后通知主进程将新的含有 RDB 格式和 AOF 格式的 AOF ⽂件替换旧的的AOF ⽂件。⽂件的前半部分是 RDB 格式的全量数据，后半部分是 AOF 格式的增量数据。</p><p>这样的好处在于，重启 Redis 加载数据的时候，由于前半部分是 RDB 内容，这样加载的时候速度会很快。加载完RDB 的内容后，才会加载后半部分的 AOF 内容，这⾥的内容是 Redis 后台⼦进程重写 AOF 期间，主线程处理的操作命令，可以使得数据更少的丢失。</p><p>混合持久化的缺点是AOF⽂件的可读性变差了，以及兼容性⽐较差（Redis4.0之前版本不⽀持）</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 主从复制</p><p>Redis 提供了主从库模式，以保证数据副本的⼀致，主从库之间采⽤的是读写分离的⽅式。</p><p>读操作：主库、从库都可以接收；</p><p>写操作：⾸先到主库执⾏，然后，主库将写操作同步给从库。</p></div>"},{"title":"全量复制","content":"<p>主从库间进⾏第⼀次复制操作（全量复制）</p><p>第⼀阶段是从库和主库建⽴起连接，并告诉主库即将进⾏同步，主库确认回复后，主从库间就可以开始同步了。</p><p>第⼆阶段主库收到 psync 命令后，会⽤ FULLRESYNC 响应命令带上两个参数：主库 runID 和主库⽬前的复制进度offset，返回给从库。</p><p>第三个阶段，主库会把第⼆阶段执⾏过程中新收到的写命令，再发送给从库。</p>"},{"title":"增量复制","content":"<p>从库发⽣宕机，重新连接后数据的同步操作（增量复制）</p><p>若从库发⽣宕机，主库会把断连期间收到的写操作命令，写到repl_backlog_buffer中，当从库重连后，从库⾸先会给主库发送 psync 命令，并把⾃⼰当前的 slave_repl_offset 发给主库，主库会判断⾃⼰的 master_repl_offset 和slave_repl_offset 之间的差距。若此时从库相差 &gt; repl_backlog_buffer说明可能⼀个从库如果和主库断连时间过⻓，不能够进⾏增量复制(因为前⾯的值被覆盖的了，会导致数据不⼀致)，所以直接进⾏全量复制。</p><p>⽽从库相差 &lt; repl_backlog_buffer，则将master_repl_offset 和 slave_repl_offset 之间的差距发送给从库进⾏执⾏。</p><p>Redis 的主从库同步的基本原理，总结来说，有三种模式：全量复制、基于⻓连接的命令传播，以及增量复制。</p><p>第⼀次同步(本来就是全量复制)或者增量复制时master_repl_offset 和 slave_repl_offset差值&gt;repl_backlog_buffer时(repl_backlog_size这个配置参数) 就⽆法增量复制，就被迫导致全量复制。</p><p>主从库正常运⾏后的常规同步阶段，在这个阶段中，主从库之间通过命令传播实现同步。</p><p>从库断开重连后进⾏增量复制。</p><p>主从全量同步使⽤RDB⽽不使⽤AOF的原因：</p><ul><li>RDB⽂件内容是经过压缩的⼆进制数据（不同数据类型数据做了针对性优化），⽂件很⼩。⽽AOF⽂件记录的是每⼀次写操作的命令，写操作越多⽂件会变得很⼤，其中还包括很多对同⼀个key的多次冗余操作。</li></ul><ul><li>打开AOF就要选择⽂件刷盘的策略，选择不当会严重影响Redis性能。⽽RDB只有在需要定时备份和主从全量同步数据时才会触发⽣成⼀次快照。</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 哨兵模式</p><p>当 Redis 的主从服务器出现故障宕机时，需要⼿动进⾏恢复，为了解决这个问题，Redis 增加了哨兵模式，哨兵监控主从服务器，并且提供主从节点故障转移的功能。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">监控：</p><p>监控主从是否正常</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">通知：</p><p>出现问题的时候，通知相关⼈员</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">故障迁移：</p><p>⾃动主从切换</p><p>统⼀的配置管理：获取主从地址</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 切⽚集群</p><p>当数据量⼤到⼀台服务器⽆法承载，需要使⽤Redis切⽚集群⽅案，它将数据分布在不同的服务器上，以此来降低系统对单主节点的依赖，提⾼ Redis 服务的读写性能。</p><p>什么是Redis主从复制</p><p>主从复制将⼀个Redis服务器的数据复制到其他服务器，其中⼀个被视为主节点（master），⽽其他的是从节点（slave）</p><p>主服务器上可以进⾏读写操作，当发⽣写操作时⾃动将写操作同步给从服务器</p><p>从服务器⼀般只读，并接受主服务器同步过来写操作命令，然后执⾏这条命令。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 建⽴连接</p><p>从节点通过向主节点发送SYNC命令请求建⽴连接。如果是初次同步，主节点会创建⼀个专⻔的后台线程进⾏数据传输。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 主节点创建RDB快照</p><p>如果是初次同步，主节点会执⾏BGSAVE命令，创建⼀个RDB（Redis Database Dump）快照，将当前内存中的数据保存到⼀个⽂件中。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 主节点发送RDB⽂件和AOF缓冲区内容：</p><p>主节点在创建RDB快照后，会将这个RDB⽂件发送给从节点。同时，主节点将AOF缓冲区中的写命令也发送给从节点。这确保了从节点在收到RDB⽂件后，能够通过执⾏AOF缓冲区中的写命令将数据更新⾄主节点执⾏BGSAVE时的状态。</p><ul><li>从节点载⼊RDB⽂件和执⾏AOF缓冲区命令：</li></ul><p>从节点收到RDB⽂件后，会载⼊这个⽂件，将⾃⼰的数据状态更新为主节点在执⾏BGSAVE时的状态。接着，从节点会执⾏AOF缓冲区中的写命令，以追赶主节点的最新状态。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 增量复制：</p><p>⼀旦初次同步完成，从节点就会转⼊增量复制的阶段。主节点会实时将写⼊命令发送给从节点，从节点接收并执⾏这些写⼊命令，保持和主节点数据的⼀致性。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. ⼼跳和命令传播</p><p>主节点和从节点之间会维持⼼跳连接，以检测对⽅的存活状态。主节点将写⼊命令通过命令传播机制发送给从节点，确保数据的实时同步。</p></div>"},{"title":"Redis哨兵机制是什么","content":"<p>Redis的哨兵⽤于监控和管理Redis实例，它可以实现⾃动故障转移和⾼可⽤性。哨兵系统由⼀组独⽴运⾏的进程组成，这些进程定期检查Redis主节点和从节点的状态，并在主节点宕机时选择⼀个从节点升级为新的主节点。</p>"},{"title":"如何避免主从数据的不⼀致","content":"<p>持久化和复制配置：确保在主节点和从节点上都启⽤了持久化（如RDB快照和AOF⽂件）以及复制配置。这样可以保证从节点在重启后能够通过持久化⽂件进⾏数据的完整恢复。</p><p>保证⽹络稳定性：确保主节点和从节点之间的⽹络连接是稳定的，⽐如让主从节点处于同⼀机房，降低⽹络延迟</p><p>监控和报警：使⽤监控系统来实时监测主从节点的状态，包括复制延迟、连接状态等。设置报警机制。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 监控</p><p>哨兵定期检查与其关联的所有Redis实例的健康状况，包括主节点和从节点。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 故障检测</p><p>当哨兵检测到主节点不可⽤（宕机）时，会尝试选举⼀个新的主节点。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 故障转移</p><p>选举新主节点后，哨兵会通知所有相关的从节点更新其配置，使其将选出的新主节点作为其新的主节点。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. ⾃动恢复</p><p>⼀旦主节点重新可⽤，哨兵会将其重新添加到系统中，并根据需要将其配置为从节点，以提供故障恢复和负载分担。</p><p>哨兵机制使得Redis在主节点发⽣故障时能够快速进⾏⾃动故障转移，确保系统的⾼可⽤性。</p></div>"},{"title":"Redis切⽚集群的⼯作原理","content":"<p>当 Redis 缓存数据量⼤到⼀台服务器⽆法缓存时，就需要使⽤ Redis 切⽚集群（Redis Cluster ）⽅案，它将数据分布在不同的服务器上，以此来降低系统对单主节点的依赖，从⽽提⾼ Redis 服务的读写性能。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 数据分⽚</p><p>切⽚集群将整个数据集划分为16384个槽（slot），每个槽对应⼀个整数值。每个节点负责管理其中⼀部分槽的数据。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 节点间通信</p><p>切⽚集群中的节点通过gossip协议相互通信，分享节点信息和集群状态。节点使⽤PING、PONG等消息保持通信，并通过定期的集群信息交换来保持⼀致性。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 数据分布</p><p>当⼀个新的键值对被添加到切⽚集群时，根据键的CRC16哈希值确定它属于哪个槽，然后将数据存储到负责该槽的节点上。这确保了数据在集群中均匀分布。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 故障检测</p><p>切⽚集群使⽤哨兵机制来检测节点的健康状态。当⼀个节点不可⽤时，其他节点会发起故障检测流程，重新分配槽到可⽤节点，并选举⼀个新的主节点。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 客户端路由</p><p>客户端连接到切⽚集群时，通过计算键的CRC16哈希值确定它所属的槽，然后将请求发送到负责该槽的节点上。这样，客户端可以直接与负责相应数据的节点通信，⽽⽆需中间代理。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. 数据复制</p><p>切⽚集群使⽤主从复制机制，每个槽都有⼀个主节点和若⼲个从节点。数据在主节点上写⼊后，会被异步地复制到从节点上，确保数据的持久性和⾼可⽤性。</p></div>"},{"title":"什么是集群脑裂","content":"<p>如果主节点的⽹络突然发⽣了问题与所有的从节点都失联了，但此时的主节点和客户端的⽹络是正常的，客户端不知道集群内部已经出现了问题，还在向这个失联的主节点写数据，此时这些数据被主节点缓存到了缓冲区⾥。哨兵也发现主节点失联了，就会在从节点中选举出⼀个leader作为主节点，会导致集群有两个主节点。</p><p>⽹络恢复后哨兵因为之前已经选举出⼀个新主节点了，它就会把旧主节点降级，然后从旧主节点会向新主节点请求数据同步，因为第⼀次同步是全量同步的⽅式，旧主节点会清空掉⾃⼰本地的数据。客户端在过程之前写⼊的数据就会丢失了。所以脑裂会导致集群数据的丢失。</p>"},{"title":"集群脑裂带来数据丢失怎么办","content":"<p>当主节点发现从节点下线或者通信超时的总数量⼩于阈值时，那么禁⽌主节点进⾏写数据，直接把错误返回给客户端。设置主节点连接的从节点中⾄少有 N 个从节点，并且主节点进⾏数据复制时的 ACK 消息延迟不能超过 T 秒，否则，主节点就不会再接收客户端的写请求了。等到新主节点上线时，就只有新主节点能接收和处理客户端请求，此时，新写的数据会被直接写到新主节点中。⽽原主节点会被哨兵降为从节点，即使它的数据被清空了，也不会有新数据丢失。</p>"},{"title":"Redis过期删除","content":"<p>在Redis中，可以为键设置过期时间，使得键在⼀定时间后⾃动过期并被删除。你可以使⽤ EXPIRE 命令或 SET 命令的EX选项来设置过期时间，因此需要有相应的机制将已过期的键值对删除，⽽做这个⼯作的就是过期键值删除策略。</p>"},{"title":"过期删除策略有哪些","content":"<p>定时删除：设置 key 的过期时间时，同时创建⼀个定时事件，当时间到达时，由事件处理器⾃动执⾏ key 的删除操作。这样可以保证过期的 key 会被尽快删除，但删除过期 key 会占⽤⼀部分 CPU 时间，对CPU不友好。</p><p>惰性删除： 不主动删除过期键，每次从数据库访问 key 时，都检测 key 是否过期，如果过期则删除该 key。这样会使⽤很少的系统资源，对CPU友好，但是可能会导致过期key⻓期不被删除，浪费内存空间。</p><p>定期删除：每隔⼀段时间「随机」从数据库中取出⼀定数量的 key 进⾏检查，并删除其中的过期key。这种⽅法减少了删除操作对cpu的影响，也减少了内存空间的浪费，但是效果也没有两者好，且难以确定删除操作执⾏的时⻓和频率。</p>"},{"title":"Redis过期删除策略是什么","content":"<p>Redis 选择「惰性删除+定期删除」这两种策略配和使⽤，以求在合理使⽤ CPU 时间和避免内存浪费之间取得平衡。</p><ul><li>惰性删除依据 expireIfNeeded 函数来实现，每次返回或者修改key之前，都会调⽤该函数检查 key 是否过期</li></ul><p>如果过期，删除该key, lazyfree_lazy_expire 参数决定是同步删除还是异步删除，然后返回 null 给客户端</p><p>如果没有过期，则返回正常的键给客户端</p><ul><li>定期删除的做法是每隔⼀段时间「随机」从数据库中取出⼀定数量的 key 进⾏检查，并删除其中的过期key。</li></ul><p>默认每隔10s检查⼀次数据库，配置键为hz: 10</p><p>随机抽查的数量是20个key</p><p>定期删除的流程：</p><p>从过期字典中随机抽取 20 个 key</p><p>检查这 20 个 key 是否过期，并删除已过期的 key；</p><p>如果本轮检查的已过期 key 的数量，超过 5 个（20/4），也就是「已过期 key 的数量」占⽐「随机抽取 key的数量」⼤于 25%，则继续重复步骤 1；如果已过期的 key ⽐例⼩于 25%，则停⽌继续删除过期 key，然后等待下⼀轮再检查。</p>"},{"title":"Redis内存淘汰","content":"<p>Redis通过参数 maxmemory &lt;bytes&gt; 来设定最⼤运⾏内存。当系统内存不⾜时，Redis会根据配置的淘汰策略来删除⼀些键以释放内存。</p>"},{"title":"内存淘汰策略","content":"<ul><li>不进⾏数据淘汰</li></ul><p>NoEviction： 如果内存不⾜以执⾏写操作，Redis将返回错误，默认的淘汰策略。</p><ul><li>进⾏数据淘汰</li></ul><p>VolatileTTL：优先淘汰更早过期的键值。</p><p>VolatitleLRU: 只对带有过期时间的键使⽤LRU策略，其他键使⽤NoEviction策略。</p><p>VolatitleRandom： 只对带有过期时间的键使⽤随机淘汰，其他键使⽤NoEviction策略。</p><p>VolatitleLFU: 只对带有过期时间的键使⽤LFU策略，其他键使⽤NoEviction策略。</p><p>AllKeysLRU： 根据最近最少使⽤的原则淘汰最久未使⽤的键。</p><p>AllKeysRandom： 随机选择⼀个键进⾏淘汰。</p><p>AllKeysLFU： 根据最少频繁使⽤的原则淘汰最少使⽤的键。</p><p>可以使⽤ config get maxmemory-policy 命令，来查看当前 Redis 的内存淘汰策略</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. LRU（Least Recently Used）：</p><p>LRU算法假设最近被访问的数据更有可能在未来被再次访问，所以选择最近最少被使⽤的对象进⾏淘汰。</p><p>Redis 实现的是⼀种近似 LRU 算法，在 Redis 的对象结构体中添加⼀个额外的字段，⽤于记录此数据的最后⼀次访问时间。当 Redis 进⾏内存淘汰时，会使⽤随机采样的⽅式来淘汰数据，它是随机取 5 个值（此值可配置），然后淘汰最久没有使⽤的那个。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. LFU（Least Frequently Used）：</p><p>LFU算法假设使⽤频率较低的对象在未来仍然会较少被访问，所以选择使⽤频率最低的对象进⾏淘汰。</p><p>LFU维护⼀个使⽤计数，每当⼀个对象被访问时，其使⽤计数增加。在需要淘汰对象时，选择使⽤计数最低的对象淘汰。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">区别：</p><p>LRU关注的是最近的访问情况，认为最近被访问的对象更可能在未来被再次访问。</p><p>LFU关注的是使⽤频率，认为使⽤频率较低的对象在未来仍然会较少被访问。</p></div>"},{"title":"Redis缓存","content":"<p>因为⽤户请求访问数据库的请求数量⽐较多时，数据库很容易崩溃，所以⼀般将Re dis作为数据库的缓存层，</p>"},{"title":"什么是缓存雪崩","content":"<p>缓存雪崩：在某个时间点，缓存中的⼤量数据同时失效，⼤量请求都需要重新计算或重新获取数据，数据库压⼒剧增。这可能是由于缓存的过期时间设置相近，导致在某个时间点同时失效。或者Redis故障宕机。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⼤量数据同时过期</p><p>针对⼤量数据同时过期⽽引发缓存雪崩问题，常⻅的应对⽅法有以下⼏种：</p><p>均匀设置过期时间: 避免将⼤量数据设置成同⼀个过期时间，可以给这些数据的过期时间加⼀个随机数。</p><p>互斥锁：如果发现访问的数据不在 Redis ⾥，就加个互斥锁，保证同⼀时间内只有⼀个请求来构建缓存</p><p>后台更新缓存：让缓存“永久有效”，并将更新缓存的⼯作交由后台线程定时更新。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. Redis故障宕机</p><p>针对 Redis 故障宕机⽽引发的缓存雪崩问题，常⻅的应对⽅法有下⾯这⼏种：</p><p>服务熔断或请求限流机制：</p><p>服务熔断：暂停业务应⽤对缓存服务的访问，直接返回错误</p><p>请求限流：只将少部分请求发送到数据库进⾏处理，再多的请求就在⼊⼝直接拒绝服务</p><p>构建Redis缓存⾼可靠集群：</p><p>通过主从节点的⽅式构建 Redis 缓存⾼可靠集群，</p><p>如果 Redis 缓存的主节点故障宕机，从节点可以切换成为主节点，继续提供缓存服务，避免了由于Redis 故障宕机⽽导致的缓存雪崩问题。</p></div>"},{"title":"什么是缓存击穿","content":"<p>缓存击穿：当某个“热点数据”过期时，⼤量并发请求查询这个缓存不存在的数据时，导致请求直接访问数据库，增加数据库的负载。缓存击穿是缓存雪崩的⼀个⼦集，可以使⽤前⾯说到的⽅案，添加互斥锁或者后台更新缓存。</p>"},{"title":"什么是缓存穿透","content":"<p>缓存穿透要访问的数据既不在缓存中，也不在数据库中，这样就⽆法构建缓存数据，后续所有的请求都会向数据库查找，增加数据库的负载。</p><p>出现缓存穿透⼀般是因为以下两种原因：</p><p>业务误操作，缓存中的数据和数据库中的数据都被误删除了</p><p>恶意攻击，通过构造不存在的 key ⼤量访问缓存，导致对数据库的频繁查询。</p><p>对应的解决办法% 3种：</p><p>对⾮法请求做限制</p><p>针对查询的数据，在缓存中设置⼀个空值或者默认值</p><p>使⽤布隆过滤器快速判断数据是否存在，避免通过查询数据库来判断数据是否存在。</p><table><tr><td>缓存异常</td><td>产生原因</td><td>应对方案</td></tr><tr><td rowspan=\"2\">缓存雪崩</td><td>大量数据同时过期</td><td>-均匀设置过期时间,避免同一时间过期-互斥锁,保证同一时间只有一个应用在构建缓存-双key策略,主key设置过期时间,备key永久,主key过期时,返回备key的内容-后台更新缓存,定时更新、消息队列通知更新</td></tr><tr><td>Redis故障宕机</td><td>-服务熔断-请求限流-构建Redis缓存高可靠集群</td></tr><tr><td>缓存击穿</td><td>频繁访问的热点数据过期</td><td>-互斥锁-不给热点数据设置过期时间,由后台更新缓存</td></tr><tr><td>缓存穿透</td><td>访问的数据既不在缓存,也不在数据库</td><td>-非法请求的限制;-缓存空值或者默认值;-使用布隆过滤器快速判断数据是否存在;</td></tr></table>"},{"title":"Cache Aside策略","content":"<p>细分为「读策略」和「写策略</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">写策略的步骤：</p><p>更新数据库中的数据；</p><p>. 删除缓存中的数据。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">读策略的步骤：</p><p>如果读取的数据命中了缓存，则直接返回数据；</p><p>如果读取的数据没有命中缓存，则从数据库中读取数据，然后将数据写⼊到缓存，并且返回给⽤户。</p><p>「先更新数据库 + 再删除缓存」的⽅案，是可以保证数据⼀致性的，但是每次更新数据的时候，缓存的数据都会被删除，这样会对缓存的命中率带来影响。</p><p>如果业务对缓存命中率有很⾼的要求，我们可以采⽤「更新数据库 + 更新缓存（不是删除缓存，⽽是更新缓存）」的⽅案，因为更新缓存并不会出现缓存未命中的情况，但是在两个更新请求并发执⾏的时候，会出现数据不⼀致的问题，可以⽤以下⼿段来解决。</p><p>在更新缓存前先加个分布式锁，保证同⼀时间只运⾏⼀个请求更新缓存，就会不会产⽣并发问题了。</p><p>在更新完缓存时，给缓存加上较短的过期时间</p></div>"},{"title":"重试机制","content":"<p>引⼊消息队列</p><p>如果应⽤删除缓存失败，可以从消息队列中重新读取数据，然后再次删除缓存，这个就是重试机制。如果重试超过的⼀定次数，还是没有成功，就需要向业务层发送报错信息了。</p><p>如果删除缓存成功，就要把数据从消息队列中移除，避免重复操作，否则就继续重试。</p>"},{"title":"订阅BINLog","content":"<p>订阅 binlog ⽇志，拿到具体要操作的数据，然后再执⾏缓存删除。可以让删除服务模拟⾃⼰伪装成⼀个 MySQL 的从节点，向 MySQL 主节点发送 dump 请求，主节点收到请求后，就会开始推送 BINLog ，删除服务解析 BINLog字节流之后，转换为便于读取的结构化数据，再进⾏删除。</p>"},{"title":"什么是Redis, 具有哪些特点","content":"<p>Redis是⼀个基于内存的数据库，读写速度⾮常快，通常被⽤作缓存、消息队列、分布式锁和键值存储数据库。它⽀持多种数据结构，如字符串、哈希表、列表、集合、有序集合等， Redis 还提供了分布式特性，可以将数据分布在多个节点上，以提⾼可扩展性和可⽤性。</p>"},{"title":"Redis为什么快","content":"<p>基于内存操作： 传统的磁盘⽂件操作相⽐减少了IO，提⾼了操作的速度。</p><p>⾼效的数据结构：Redis专⻔设计了STRING、LIST、HASH等⾼效的数据结构，依赖各种数据结构提升了读写的效率。</p><p>单线程：单线程操作省去了上下⽂切换带来的开销和CPU的消耗，同时不存在资源竞争，避免了死锁现象的发⽣。</p><p>I/O多路复⽤：采⽤I/O多路复⽤机制同时监听多个Socket，根据Socket上的事件来选择对应的事件处理器进⾏处理。</p>"},{"title":"为什么Redis是单线程","content":"<p>Redis单线程指的是：⽹络请求模块使⽤单线程进⾏处理，其他模块仍⽤多个线程，单线程减少了上下⽂切换的开销，也减少了资源竞争⽽导致的锁的问题，提升了整体性能。</p><p>官⽅答案是：因为CPU不是Redis的瓶颈，Redis的瓶颈最有可能是机器内存或者⽹络带宽。既然单线程容易实现，⽽且CPU不会成为瓶颈，那就顺理成章地采⽤单线程的⽅案了。</p>"},{"title":"Redis为什么⼜要引⼊多线程呢","content":"<p>因为Redis的瓶颈不在内存，⽽是在⽹络I/O模块带来CPU的耗时，所以Redis6.0的多线程是⽤来处理⽹络I/O这部分，充分利⽤CPU资源，减少⽹络I/O阻塞带来的性能损耗。Redis引⼊的多线程 I/O 特性对性能提升⾄少是⼀倍以上。</p>"},{"title":"Redis数据类型 【常问】","content":"<p>Redis 常⻅的五种数据类型：String（字符串），Hash（哈希），List（列表），Set（集合）及 Zset(sortedset：有序集合)。</p><ul><li>字符串STRING：存储字符串数据，最基本的数据类型。</li></ul><ul><li>哈希表HASH：存储字段和值的映射，⽤于存储对象。</li></ul><ul><li>列表 LIST ：存储有序的字符串元素列表。</li></ul><ul><li>集合SET：存储唯⼀的字符串元素，⽆序。</li></ul><ul><li>有序集合 ZSET ：类似于集合，但每个元素都关联⼀个分数，可以按分数进⾏排序。</li></ul><p>Redis版本更新，⼜增加了⼏种数据类型，</p><p>BitMap: 存储位的数据结构，可以⽤于处理⼀些位运算操作。</p><p>HyperLogLog ：⽤于基数估算的数据结构，⽤于统计元素的唯⼀数量。</p><p>GEO： 存储地理位置信息的数据结构。</p><p>Stream：专⻔为消息队列设计的数据类型。</p>"},{"title":"Redis数据类型的应⽤场景","content":"<p>Redis 五种常⻅数据类型的应⽤场景：</p><p>String 类型的应⽤场景：缓存对象、常规计数、分布式锁、共享session信息等。</p><p>List 类型的应⽤场景：消息队列（有两个问题：1. ⽣产者需要⾃⾏实现全局唯⼀ ID；2. 不能以消费组形式消费数据）等。</p><p>Hash 类型：缓存对象、购物⻋等。</p><p>Set 类型：聚合计算（并集、交集、差集）场景，⽐如点赞、共同关注、抽奖活动等。</p><p>Zset 类型：排序场景，⽐如排⾏榜、电话和姓名排序等。</p><p>Redis 后续版本⼜⽀持四种数据类型，它们的应⽤场景如下：</p><p>BitMap（2.2 版新增）：⼆值状态统计的场景，⽐如签到、判断⽤户登陆状态、连续签到⽤户总数等；</p><p>HyperLogLog（2.8 版新增）：海量数据基数统计的场景，⽐如百万级⽹⻚ UV 计数等；</p><p>GEO（3.2 版新增）：存储地理位置信息的场景，⽐如滴滴叫⻋；</p><p>Stream（5.0 版新增）：消息队列，相⽐于基于 List 类型实现的消息队列，有这两个特有的特性：⾃动⽣成全局唯⼀消息ID，⽀持以消费组形式消费数据。</p>"},{"title":"Redis底层使⽤了什么数据结构","content":"<ul><li>SDS: 简单动态字符串：⽤于存储⼆进制安全的字符串数据，包含字符串的⻓度信息以及字符数组，⽀持动态扩展。</li></ul><ul><li>双端链表：Redis中的List就是⽤双端链表实现的，⽀持在两端进⾏元素的快速插⼊和删除。</li></ul><ul><li>压缩列表：紧凑的由连续内存块组成的顺序型数据结构，可以在元素较少时减少内存占⽤。</li></ul><ul><li>哈希表：⽤于实现 Redis 的哈希表数据类型。它使⽤两种不同的底层实现：ziplist 和哈希表，当哈希表的元素较少时，使⽤压缩列表（ziplist）来存储，⽽在元素较多时，切换到更为传统的哈希表结构。</li></ul><ul><li>整数集合：整数集合是⼀种专⻔⽤于存储整数值的数据结构，通过紧凑的⼆进制表示，提⾼了整数存储的效率。整数集合被⽤于存储Redis中的集合数据结构的整数元素。</li></ul><ul><li>跳表：跳跃表是⼀种在链表基础上改进过来的，实现了⼀种「多层」的有序链表，当数据量很⼤时，跳表的查找复杂度就是O(logN)。⽤于实现有序集合（Sorted Set）。</li></ul><ul><li>quicklist ： quicklist 就是双向链表 + 压缩列表组合，quicklist 就是⼀个链表，⽽链表中的每个元素⼜是⼀个压缩列表。</li></ul><ul><li>listpack ：listpack 没有压缩列表中记录前⼀个节点⻓度的字段，listpack 只记录当前节点的⻓度，当我们向 listpack 加⼊⼀个新元素的时候，不会影响其他节点的⻓度字段的变化，从⽽避免了压缩列表的连锁更新问题。</li></ul>"},{"title":"Redis与MySQL的区别是什么","content":"<p>Redis基于键值对，⽀持多种数据结构；⽽MySQL是⼀种关系型数据库，使⽤表来组织数据。</p><p>Redis将数据存在内存中，通过持久化机制将数据写⼊磁盘，MySQL通常将数据存储在磁盘上。</p><p>Redis不使⽤SQL，⽽是使⽤⾃⼰的命令集，MySQL使⽤SQL来进⾏数据查询和操作。</p><p>Redis以⾼性能和低延迟为⽬标，适⽤于读多写少的应⽤场景，MySQL 适⽤于需要⽀持复杂查询、事务处理、拥有⼤规模数据集的场景。</p><p>Redis 更适合处理⾼速、⾼并发的数据访问，以及需要复杂数据结构和功能的场景，在实际应⽤中，很多系统会同时使⽤ MySQL 和 Redis。</p>"},{"title":"Redis与Memcached有什么区别","content":"<p>Redis⽀持更多的数据结构，⽽Memcached主要关注于简单的键值存储。</p><p>Redis⽀持数据的持久性，⽽Memcached重启服务会导致数据丢失。</p><p>Redis通常⽐Memcached更快，部分原因是由于Redis采⽤单线程模型，⽽Memcached使⽤多线程来处理并发请求</p><p>总结来说Redis适⽤于需要更丰富数据结构和功能、需要数据持久性⽀持、以及对⾼可⽤性有要求的场景，⽽Memcached：适⽤于简单的键值对缓存。</p>"},{"title":"Redis为什么不使⽤红⿊树，⽽使⽤跳表","content":"<ul><li>跳表相对于红⿊树来说实现更加简单</li></ul><ul><li>跳表是⼀种相对简单的数据结构，更容易理解和调试。</li></ul><ul><li>跳表对于范围查询的⽀持较好，这符合有序集合数据类型的特性。有序集合中的元素是有序的，⽽跳表天然⽀持按范围查找。</li></ul><ul><li>跳表在插⼊和删除操作上的性能表现较好，尤其是在有序集合的场景下。</li></ul>"},{"title":"Redis实现分布式锁","content":"<p>使⽤SETNX命令，只有插⼊的key不存在才插⼊，如果SETNX的key存在就插⼊失败，key插⼊成功代表加锁成功，否则加锁失败；解锁的过程就是将key删除，保证执⾏操作的客户端就是加锁的客户端，加锁时候要设置 unique_value ，解锁的时候，要先判断锁的 unique_value 是否为加锁客户端，是才将 lock_key 键删除。此外要给锁设置⼀个过期时间，以免客户端拿到锁后发⽣异常，导致锁⼀直⽆法释放，可以指定 EX/PX 参数设置过期时间。</p><pre><code class=\"language-txt\">SET lock_key unique_value NX PX 10000 </code></pre>"},{"title":"Redis持久化机制有哪些【常问】","content":"<p>AOF ⽇志：每执⾏⼀条写操作命令，就把该命令以追加的⽅式写⼊到⼀个⽂件⾥；</p><p>RDB 快照：将某⼀时刻的内存数据，以⼆进制的⽅式写⼊磁盘；</p><p>混合持久化⽅式：Redis 4.0 新增的⽅式，集成了 AOF 和 RBD 的优点；</p>"},{"title":"AOF的三种写回策略","content":"<p>Always、Everysec 和 No，这三种策略在可靠性上是从⾼到低，⽽在性能上从低到⾼。</p><p>Always是每次写操作命令执⾏完后，同步将 AOF ⽇志数据写回硬盘；Everysec每次写操作命令执⾏完后，先将命令写⼊到 AOF ⽂件的内核缓冲区，然后每隔⼀秒将缓冲区⾥的内容写回到硬盘；No就是不控制写回硬盘的时机。每次写操作命令执⾏完后，先将命令写⼊到 AOF ⽂件的内核缓冲区，再由操作系统决定何时将缓冲区内容写回硬盘。</p>"},{"title":"什么是Redis事务","content":"<p>在 Redis 中，事务是⼀组命令的有序执⾏序列，它们被⼀起执⾏，⽽在执⾏期间不会被其他客户端的命令打断。Redis 使⽤ MULTI 和 EXEC 命令来实现事务。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">基本流程如下：</p><p>MULTI： 开始⼀个事务，标记事务的开始。</p><p>在 MULTI 和 EXEC 之间，可以输⼊多个 Redis 命令。这些命令并不会⽴即执⾏，⽽是放⼊⼀个队列中，等待执⾏。</p><p>EXEC： 执⾏所有在 MULTI 和 EXEC 之间输⼊的命令。这些命令作为⼀个事务⼀起执⾏，⽽且是按照顺序执⾏的。如果在 EXEC 之前发⽣错误，整个事务会被取消。</p><p>如果事务执⾏成功，客户端会收到⼀个包含所有命令执⾏结果的数组。</p><p>如果事务执⾏失败（⽐如在 MULTI 和 EXEC 之间发⽣了错误），那么事务中的所有命令都不会被执⾏，Redis将回滚到 MULTI 命令执⾏之前的状态。</p><p>在事务中，还可以使⽤ WATCH 命令来监视⼀个或多个键。如果在事务执⾏期间监视的键被其他客户端修改了，事务就会被取消，从⽽确保事务执⾏的原⼦性。</p></div>"},{"title":"缓存中的热点数据和冷数据是什么","content":"<p>热数据指的就是访问次数较多的数据</p><p>冷数据就是访问很少或者从不访问的数据</p><p>只有热数据，缓存才有价值。</p>"},{"title":"Redis集群模式有哪些","content":"<p>主从复制：将⼀个Redis实例的数据复制到其他实例，其中⼀个是主节点，其余是从节点。主节点将写操作传播到所有从节点。</p><p>哨兵：监控Redis实例的状态，发现主节点的故障并⾃动进⾏故障转移。</p><p>切⽚集群：将数据分布在不同的服务器上，以此来降低系统对单主节点的依赖</p>"},{"title":"Redis的哨兵是⽤来做什么的","content":"<p>Redis哨兵⽤于监控Redis实例的状态，发现主节点的故障并⾃动进⾏故障转移。</p><p>监控：监控 Redis 主服务器和从服务器的状态，包括连接状态、是否能够执⾏命令、是否有持久性问题等</p><p>故障转移：当 Sentinel （哨兵）发现主服务器不可⽤时（⽐如宕机），它会通过⼀定的选举机制选择⼀个从服务器升级为新的主服务器，然后通知其他从服务器将其切换到新的主服务器。</p>"},{"title":"主从模式的同步过程","content":"<p>连接协商：从服务器先发送命令给主服务器表示要进⾏数据同步，命令内容包括主服务器的runID和复制进度两个参数，主服务器收到命令之后会给从服务响应命令，响应包括主服务器的runID和复制进度。从服务器收到响应之后会记录这两个值。</p><p>主从数据同步：主服务器执⾏ BGSAVE 命令，⽣成 RDB 快照⽂件。这个⽂件包含了主服务器当前时刻的数据状态，将⽣成的 RDB 快照⽂件发送给从服务器。从服务器接收到 RDB 快照⽂件后，通过 LOAD 命令将其加载到内存中，从服务器的数据现在与主服务器的数据⼀致。</p><p>主服务器开启增量同步：主服务器将开启 TCP 连接，等待从服务器连接，并开始记录所有的写命令，将它们发送给从服务器，从服务器连接到主服务器，执⾏ PSYNC 命令，开始接收主服务器发送的增量同步命令，从服务器按顺序执⾏主服务器发送的所有写命令，确保与主服务器同步。</p>"},{"title":"判断节点是否存活","content":"<p>每个哨兵定期向 Redis 服务器发送 PING 命令，以检测服务器是否处于活跃状态。如果哨兵连续⼀定次数未收到服务器的响应，就认为服务器主观下线。然后哨兵会从从节点中选择⼀个作为主节点。</p>"},{"title":"选出新主节点","content":"<p>在发现主服务器下线后，哨兵会协调选举⼀个新的主服务器。这个过程中，哨兵会考虑每个可⽤的从服务器，选择⼀个作为新的主服务器，并将其他从服务器配置为复制新的主服务器。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">具体过程：</p><p>选择候选从服务器： 哨兵会从可⽤的从服务器中选择⼀组候选服务器，通常选择复制偏移量（replicationoffset）最⼤的从服务器。</p><p>计算投票： 每个哨兵为每个候选从服务器投票。投票的考量因素包括从服务器的复制偏移量、连接质量、优</p><p>先级等。</p><p>达成共识： 哨兵们根据投票结果达成共识，选择⼀个从服务器作为新的主服务器。这通常需要获得多数哨兵的同意。</p></div>"},{"title":"更新配置信息","content":"<p>⼀旦新的主服务器被选出，哨兵会更新 Redis 集群的配置信息，包括将新的主服务器的地址和端⼝通知给其他哨兵和客户端。</p>"},{"title":"通知客户端","content":"<p>哨兵会向客户端发送通知，告知客户端新的主服务器的位置，以便客户端能够重新连接。</p>"},{"title":"缓存雪崩、击穿、穿透和解决办法【常问】","content":"<ul><li>缓存雪崩是指在某个时间点，⼤量缓存同时失效，导致请求直接访问数据库或其他后端系统，增加了系统负载。</li></ul><p>对于缓存雪崩，可以通过合理设置缓存的过期时间，分散缓存失效时间点，或者采⽤永不过期的策略，再结合定期更新缓存。</p><ul><li>缓存击穿是指⼀个缓存中不存在但是数据库中存在的数据，当有⼤量并发请求查询这个缓存不存在的数据时，导致请求直接访问数据库，增加数据库的负载。典型的场景是当⼀个缓存中的数据过期或被清理，⽽此时有⼤量请求访问这个缓存中不存在的数据，导致⼤量请求直接访问底层存储系统。</li></ul><p>对于缓存击穿，可以采⽤互斥锁（例如分布式锁）或者在查询数据库前先检查缓存是否存在，如果不存在再允许查询数据库，并将查询结果写⼊缓存。</p><ul><li>缓存穿透是指查询⼀个在缓存和数据库都不存在的数据，这个数据始终⽆法被缓存，导致每次请求都直接访问数据库，增加数据库的负载。典型的情况是攻击者可能通过构造不存在的 key ⼤量访问缓存，导致对数据库的频繁查询。</li></ul><p>对于缓存穿透，可以采⽤布隆过滤器等⼿段来过滤掉恶意请求，或者在查询数据库前先进⾏参数的合法性校验。</p>"},{"title":"Cache Aside","content":"<p>原理：先从缓存中读取数据，如果没有就再去数据库⾥⾯读数据，然后把数据放回缓存中，如果缓存中可以找到数据就直接返回数据；更新数据的时候先把数据持久化到数据库，然后再让缓存失效。</p><p>问题：假如有两个操作⼀个更新⼀个查询，第⼀个操作先更新数据库，还没来及删除数据库，查询操作可能拿到的就是旧的数据；更新操作⻢上让缓存失效了，所以后续的查询可以保证数据的⼀致性；还有的问题就是有⼀个是读操作没有命中缓存，然后就到数据库中取数据，此时来了⼀个写操作，写完数据库后，让缓存失效，然后，之前的那个读操作再把⽼的数据放进去，也会造成脏数据。</p><p>可⾏性：出现上述问题的概率其实⾮常低，需要同时达成读缓存时缓存失效并且有并发写的操作。数据库读写要⽐缓存慢得多，所以读操作在写操作之前进⼊数据库，并且在写操作之后更新，概率⽐较低。</p>"},{"title":"Read/Write Through","content":"<p>原理：Read/Write Through原理是把更新数据库（Repository）的操作由缓存代理，应⽤认为后端是⼀个单⼀的存储，⽽存储⾃⼰维护⾃⼰的缓存。</p><p>Read Through：就是在查询操作中更新缓存，也就是说，当缓存失效的时候，Cache Aside策略是由调⽤⽅负责把数据加载⼊缓存，⽽Read Through则⽤缓存服务⾃⼰来加载，从⽽对调⽤⽅是透明的。</p><p>Write Through：当有数据更新的时候，如果没有命中缓存，直接更新数据库，然后返回。如果命中了缓存，则更新缓存，然后再由缓存⾃⼰更新数据库（这是⼀个同步操作）。</p>"},{"title":"Write Behind","content":"<p>原理：在更新数据的时候，只更新缓存，不更新数据库，⽽缓存会异步地批量更新数据库。这个设计的好处就是让数据的I/O操作⾮常快，带来的问题是，数据不是强⼀致性的，⽽且可能会丢。</p><p>第⼆步失效问题：这种可能性极⼩，缓存删除只是标记⼀下⽆效的软删除，可以看作不耗时间。如果会出问题，⼀般程序在写数据库那⾥就没有完成：故意在写完数据库后，休眠很⻓时间再来删除缓存。</p>"},{"title":"Redis过期删除策略有哪些","content":"<p>定时删除：设置 key 的过期时间，当时间到达时，⾃动执⾏ key 的删除操作。</p><p>惰性删除： 每次从数据库访问 key 时，都检测 key 是否过期，如果过期则删除该 key。</p><p>定期删除：每隔⼀段时间「随机」从数据库中取出⼀定数量的 key 进⾏检查，并删除其中的过期key。</p><p>Redis 选择「惰性删除+定期删除」这两种策略配和使⽤</p>"},{"title":"在应⽤中是怎么使⽤Redis的","content":"<p>可以⽤作缓存层，存储频繁访问的数据，提⾼访问速度。</p><p>⽤作消息队列，通过发布订阅模式传递消息。</p><p>存储会话数据、计数器等。</p>"}];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

// 初始化侧边栏
knowledgePoints.forEach((kp, i) => {
  const li = document.createElement('li');
  li.textContent = kp.title;
  li.dataset.index = i;
  li.onclick = () => {
    index = i;
    showKnowledge();
    closeSidebar();
  };
  sidebar.appendChild(li);
});

function updateSidebarActive() {
  const items = sidebar.querySelectorAll('li');
  items.forEach((li, i) => {
    li.classList.toggle('active', i === index);
  });
}

function toggleContent(show) {
  const detailEl = document.getElementById('detail-content');
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = document.getElementById('detail-content');
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'redis-topics',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
