<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天工·弈控项目面试讲稿动态展示</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}
.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}
.main-content, .sidebar { position: relative; z-index: 2; }
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}
.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}
.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}
.card .content ul,
.card .content ol {
  margin: 12px 0 12px 24px;
}
.card .content li {
  margin-bottom: 8px;
}
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}
.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}
.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }
#click-hint {
  margin-top: 20px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }
  .main-content {
    flex: 1;
    height: 100vh;
  }
  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }
  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }
  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }
  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }
  .sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-left: none;
    border-right: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: left 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }
  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }
  #click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>
<div class="main-content">
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>
  <div class="countdown" id="countdown">30</div>
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div id="click-hint">点击上方标题展开详细内容</div>
  </div>
  <button class="next-btn" id="next-btn">下一个 →</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>天工·弈控面试问题</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<script src="./tts-player.js"></script>
<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 35);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});
const knowledgePoints = [
  {
    title: '1. 面试官：你先讲讲这个项目的背景，你为什么要做天工·弈控？',
    content: `<strong>我：</strong>天工·弈控最初是我们为 <strong>挑战杯</strong> 准备的展示型系统，同时也兼顾了 <strong>互联网+</strong> 比赛里的商业化表达。它不是为了做一个静态原型，而是希望评委打开系统后，能直观看到这个项目解决了什么问题、核心能力是什么、后续为什么具备商业延展空间。<br><br><strong>我当时理解的业务痛点主要有四个：</strong><ul><li>制造现场的数据分散在不同环节，管理者很难快速看到全局状态。</li><li>异常处理经验更多依赖老师傅个人经验，知识沉淀和复用成本很高。</li><li>从发现异常到判断原因、选择方案，这条链路比较长，现场处理效率不稳定。</li><li>很多系统只能展示数据，不能把“分析”和“经验复用”真正串起来。</li></ul><strong>所以这个项目真正想讲清楚的不是某个单独功能，而是一条闭环：</strong><br>从 <strong>发现问题 → 分析原因 → 推荐方案 → 沉淀经验</strong>，把离散制造业里最难标准化的一段流程做成可视化、可演示、可继续扩展的系统。`
  },
  {
    title: '2. 面试官：这个系统做成以后，对比赛和业务表达分别有什么价值？',
    content: `<strong>我：</strong>我会把项目目标拆成“比赛展示价值”和“业务叙事价值”两层来讲。<br><br><strong>第一层是比赛展示。</strong> 评委在很短时间内就要判断一个项目是不是成立，所以系统必须能在线访问、能稳定演示、能快速看到核心模块，而不是停留在 PPT 或流程图上。<br><br><strong>第二层是业务叙事。</strong> 我们希望这个系统不只是展示技术点，还能支撑后续商业化表达，比如模块订阅制、面向不同产线角色的能力拆分等。<br><br><strong>从目标用户来看，系统主要面向的是：</strong><ul><li>中小型制造业的产线管理人员</li><li>一线操作员</li><li>需要快速了解异常状态和处理路径的现场角色</li></ul><strong>所以我在面试里会强调：</strong>这个项目不是为了“把页面做出来”，而是为了让评委和潜在场景方都能快速理解：我们到底解决了什么问题，为什么这个方向值得继续做。`
  },
  {
    title: '3. 面试官：你在这个项目里具体负责什么？',
    content: `<strong>我：</strong>这部分我会讲得很明确，因为这是我和团队协作关系的核心。<br><br>我在项目里的角色是 <strong>全栈开发</strong>，系统的前端页面、后端服务、接口联调、部署上线，基本都由我负责开发实现。功能需求不是我一个人闭门决定的，而是我和队长、队员讨论后再收敛成系统模块。<br><br><strong>团队分工上，我会主动把上下文说清楚：</strong><ul><li>我负责系统开发和落地，把想法变成一个可运行、可访问、可演示的完整网站。</li><li>队员分别负责 PPT 制作、算法开发、商业计划书撰写等部分。</li><li>所以我的职责不是只写代码，而是把团队的展示需求、算法成果、商业叙事，最终承接到系统层面。</li></ul><strong>我的个人目标也很明确：</strong>我想证明自己不仅能做前端或后端中的某一部分，而是能够在时间很紧的情况下，借助现有框架和 AI 工具，快速完成全栈交付，并把效果、完整度和上线展示都做出来。`
  },
  {
    title: '4. 面试官：前端为什么没有纯手写，而是借助 Lovable 和 Gemini？',
    content: `<strong>我：</strong>这是我觉得很能体现个人判断的一段。<br><br>前端页面我前期用了 <strong>Lovable</strong> 生成初版界面，后面又用 <strong>Google AI Studio + Gemini</strong> 继续完善展示效果。原因不是我偷懒，而是当时只有大概 <strong>4 周</strong> 时间，而且我白天在实习，主要只能利用晚上大概 <strong>3 小时</strong> 开发。<br><br><strong>我当时的判断是：</strong><ul><li>纯手写当然更可控，但会把大量时间消耗在我并不擅长的视觉设计和页面交互打磨上。</li><li>Lovable 更适合快速生成第一版整体样式，但后续修改成本偏高，而且多轮对话会受到付费限制。</li><li>Gemini 在前端生成和页面细化上的能力更强，Google AI Studio 又可以免费高频使用，所以我把它作为后续优化主力。</li></ul><strong>这件事我想传达给面试官的不是“我会用工具”，而是：</strong>我能根据时间、成本和交付目标，选择最合适的路径，把有限时间优先投入到更关键的系统闭环、接口联调和上线效果上。`
  },
  {
    title: '5. 面试官：你的关键判断是什么？为什么优先做知识图谱、AI 助手和智能诊断？',
    content: `<strong>我：</strong>我没有把重点放在普通管理页面上，而是优先抓三个最能拉开层次的点。<br><br><strong>第一是知识图谱。</strong> 因为它最贴合“异常—原因—解决方案”这条业务逻辑链，也最能回应“制造业知识经验难提取、难沉淀”的痛点。知识一旦能结构化存储，后续查询、复用和分析都会更快更准。<br><br><strong>第二是 AI 助手。</strong> 这个能力一方面能体现我们项目对前沿技术的结合，另一方面也适合比赛展示，因为它能让系统从单纯的数据展示，变成带有解释和辅助分析能力的平台。<br><br><strong>第三是智能诊断。</strong> 这是把“看见异常”和“给出处理建议”连接起来的关键一跳。只有把诊断链路建立起来，项目才不只是一个展示型后台，而是更接近真实业务系统。<br><br><strong>我在面试里会这样总结这个判断：</strong>我没有平均用力地做一堆功能，而是先抓最能体现项目价值、最能回应业务痛点、也最适合比赛讲述的几个核心能力。`
  },
  {
    title: '6. 面试官：你是怎么把一个概念项目做成可在线演示的完整系统的？',
    content: `<strong>我：</strong>我最重要的行动，不是单独完成了哪个页面，而是把系统真正搭起来并跑通。<br><br>前端这边，我做了多模块页面的搭建和组织，项目里最终覆盖了首页、仪表盘、智能诊断、知识图谱、能力商店、场景编排、内核接入、仿真分析等多个模块。后端这边，我基于 FastAPI 全栈框架做业务承接，把认证、数据模型、接口、迁移链路和客户端联动都补齐。<br><br><strong>这部分我会强调几个动作：</strong><ul><li>把讨论出的需求转成前后端都能落地的系统模块，而不是停留在概念层。</li><li>把前端展示、后端接口、数据库结构和客户端调用逐步打通。</li><li>把系统部署到 <strong>阿里云服务器</strong>，确保它不是本地 demo，而是能真正在线访问和演示。</li></ul><strong>我会给面试官传达一个很明确的印象：</strong>我不是只负责写某个局部功能，而是负责把这个项目从想法推进到“能打开、能访问、能讲解、能展示”的完整状态。`
  },
  {
    title: '7. 面试官：这个项目里你经历过哪些返工和踩坑？',

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
let index = 0;
let timeLeft = 30;
let phase = 'hidden';
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
knowledgePoints.forEach((kp, i) => {
  const li = document.createElement('li');
  li.textContent = kp.title;
  li.dataset.index = i;
  li.onclick = () => {
    index = i;
    showKnowledge();
    closeSidebar();
  };
  sidebar.appendChild(li);
});
function updateSidebarActive() {
  const items = sidebar.querySelectorAll('li');
  items.forEach((li, i) => {
    li.classList.toggle('active', i === index);
  });
}
function toggleContent(show) {
  const detailEl = document.getElementById('detail-content');
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}
function showKnowledge() {
  const kp = knowledgePoints[index];
  phase = 'hidden';
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';
  container.innerHTML = `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = document.getElementById('detail-content');
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}
function goToNext() {
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
nextBtn.addEventListener('click', goToNext);
setupTtsPlayer({
  pageId: 'guanlan',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});
showKnowledge();
setInterval(() => {
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (phase === 'hidden') {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
