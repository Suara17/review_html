<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天工·弈控项目知识点动态展示</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}
.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}
.main-content, .sidebar { position: relative; z-index: 2; }
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}
.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}
.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}
.card .content ul,
.card .content ol {
  margin: 12px 0 12px 24px;
}
.card .content li {
  margin-bottom: 8px;
}
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}
.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}
.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}
.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }
#click-hint {
  margin-top: 20px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }
  .main-content {
    flex: 1;
    height: 100vh;
  }
  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }
  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }
  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }
  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }
  .sidebar-toggle {
    display: flex;
  }
  .sidebar {
    position: fixed;
    top: 0;
    left: -320px;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-left: none;
    border-right: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: left 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    left: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }
  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }
  #click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>
<div class="main-content">
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>
  <div class="countdown" id="countdown">30</div>
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div id="click-hint">点击上方标题展开详细内容</div>
  </div>
  <button class="next-btn" id="next-btn">下一个 →</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>天工·弈控项目知识点</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 35);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});
const knowledgePoints = [
  {
    title: '1. 面试开场：这个项目是做什么的？',
    content: `<strong>如果面试官先问项目背景，我会这样开场：</strong><br><br>我做的是 <strong>天工·弈控</strong>，这是一个面向离散制造业的智能生产管理平台。它不是单纯做几个管理页面，而是想把 <strong>生产监控、异常分析、质量管理、知识沉淀和 AI 辅助决策</strong> 放到同一个系统里。<br><br><strong>我通常会补一句业务痛点：</strong><ul><li>现场数据分散在不同系统里，问题发现慢。</li><li>异常处理经验依赖老师傅，知识很难复用。</li><li>从发现异常到判断根因、选择方案，人工成本很高。</li><li>传统系统偏被动展示，缺少主动辅助分析能力。</li></ul><strong>一句话总结：</strong>这个项目本质上是在做一条“<strong>发现问题 → 分析原因 → 推荐方案 → 沉淀经验</strong>”的数字化闭环。`
  },
  {
    title: '2. 面试常问：为什么选择前后端分离？',
    content: `<strong>我一般不会只说“因为流行”，而是会结合业务复杂度来讲：</strong><br><br>这个项目同时涉及登录权限、仪表盘可视化、异常诊断、AI 助手、案例沉淀等能力，如果全部放在一个单体工程里，后期会很难维护。<br><br><strong>所以我会这样解释分工：</strong><ul><li><strong>前端</strong> 负责页面交互、图表展示、路由和用户体验。</li><li><strong>后端</strong> 负责业务规则、数据库、认证和 API 提供。</li></ul><strong>这样拆的好处：</strong><ul><li>前后端可以独立开发和部署。</li><li>页面改动不会强耦合后端逻辑。</li><li>后续扩展诊断模块、知识图谱模块时更清晰。</li></ul><strong>面试一句话：</strong>前后端分离不是为了技术炫技，而是为了支撑更复杂的工业业务。`
  },
  {
    title: '3. 这类项目最该讲的核心闭环是什么？',
    content: `<strong>这部分是我觉得最能体现项目价值的地方：</strong><br><br>我不会把它讲成“做了几个页面”，而是会讲成一个完整闭环：<ul><li>先通过仪表盘发现异常或异常趋势。</li><li>再进入司南模块做诊断和根因分析。</li><li>然后给出解决方案或处理建议。</li><li>最后把案例和经验沉淀下来，反过来支持下一次分析。</li></ul><strong>这个闭环的价值：</strong>它说明系统不是孤立的 CRUD 功能堆积，而是在尝试把“<strong>监控、分析、决策、复用</strong>”串起来。<br><br><strong>面试表达：</strong>我会强调，这个项目最大的特点不是页面多，而是把制造现场的问题处理流程做成了可复用的数字化闭环。`
  },
  {
    title: '4. 前端部分我会怎么讲？',
    content: `<strong>如果面试官问前端，我会先讲技术栈，再讲为什么这样选：</strong><br><br><strong>技术栈：</strong>React 19、TypeScript、Vite、React Router DOM，配合 Recharts、D3、Framer Motion 和 Lucide React。<br><br><strong>我会重点突出三点：</strong><ul><li>这不是传统后台模板，而是一个对可视化和交互要求比较高的平台。</li><li>前端要承接仪表盘、智能诊断、能力展示、知识图谱等多个页面模块。</li><li>TypeScript 和路由拆分说明项目在往长期维护和多人协作的方向走。</li></ul><strong>页面层面可落到：</strong>Dashboard、SinanAnalysis、KernelConnect、Marketplace、ScenarioBuilder、KnowledgeGraph。<br><br><strong>需要稳一点的说法：</strong>像场景编排、能力商店这类模块，我更倾向于在面试里说成“能力方向和阶段性成果”，不把它们说成完全成熟的商业模块。`
  },
  {
    title: '5. 后端部分我会怎么讲？',
    content: `<strong>后端我通常会从“工程骨架”来讲：</strong><br><br><strong>技术栈：</strong>FastAPI、SQLModel、PostgreSQL、Alembic、Redis、Celery、JWT。<br><br><strong>我的讲法一般是：</strong><ul><li>FastAPI 负责提供 REST API，而且天然支持 OpenAPI 规范。</li><li>SQLModel + PostgreSQL 负责业务建模和数据落库。</li><li>Alembic 负责数据库迁移，说明不是手动改表。</li><li>Redis + Celery 给系统预留了异步任务扩展空间。</li><li>JWT + 密码哈希组成完整的认证链路。</li></ul><strong>面试结论：</strong>这个后端不是几个接口的练手项目，而是按真实服务的组织方式在搭建，所以它的可讲点不仅是功能，还有结构设计和可扩展性。`
  },
  {
    title: '6. AI 助手这个亮点要怎么讲才不空？',
    content: `<strong>我会避免只说“我们接了大模型”，那样太虚。</strong><br><br><strong>更好的说法是：</strong>项目里前端有 <strong>AiAssistant.tsx</strong> 组件，也有 <strong>geminiService.ts</strong> 服务，底层通过 <strong>@google/genai</strong> 接入 Gemini。它的意义不是单独做一个聊天窗，而是把 AI 能力和工业场景结合起来。<br><br><strong>我会强调的价值：</strong><ul><li>AI 助手可以服务于产线健康分析、异常说明和辅助决策。</li><li>相比传统报表，它让系统具备了“解释”和“辅助判断”的能力。</li><li>它体现出项目在从管理平台向智能化平台演进。</li></ul><strong>面试里更稳妥的表述：</strong>我会说“项目已经接入 AI 助手能力，并围绕工业场景做辅助分析探索”，这样既体现亮点，也不至于把它说成完全自治系统。`
  },
  {
    title: '7. 智能诊断这个亮点该怎么讲？',
    content: `<strong>这一部分我会讲得更具体，因为它是核心能力之一：</strong><br><br>项目里有独立的 <strong>司南智能诊断中心</strong> 页面，后端也提供了 <strong>POST /api/v1/anomalies/{id}/diagnose</strong> 诊断接口。<br><br><strong>我通常会从设计角度展开：</strong><ul><li>异常不是只做记录，而是继续走“诊断 → 根因 → 方案”的链路。</li><li>后端专门引入了 diagnoses 表，把 anomaly、diagnosis、solution 拆成更清晰的数据层次。</li><li>这说明系统在设计上已经考虑诊断结果和方案推荐的独立演进。</li></ul><strong>边界我也会主动说清楚：</strong>当前部分诊断逻辑还是模拟实现，但诊断流程、接口和数据模型已经打通了，所以后续接入更强的 AI 服务会更顺。<br><br><strong>面试话术：</strong>我会说“我先把诊断链路和数据结构打通，再为后续 AI 能力增强预留接口位置”。`
  },
  {
    title: '8. 知识图谱这个亮点怎么讲更高级？',
    content: `<strong>知识图谱是很适合拉开项目层次的一个点。</strong><br><br><strong>我会这样讲：</strong>项目里已经有 KnowledgeGraph 页面、相关类型定义和图谱数据结构，这部分能力主要用于异常传播路径展示、根因分析可视化和知识沉淀。<br><br><strong>它真正的价值不是“图好看”，而是三件事：</strong><ul><li>把“异常、原因、方案、设备、工艺”之间的关系结构化。</li><li>把老师傅经验从文档描述变成可关联、可查询、可复用的知识网络。</li><li>为后续的相似问题检索、根因推理和经验复用打基础。</li></ul><strong>更成熟的面试表达：</strong>我不会直接说“知识图谱已经完全闭环落地”，而是会说“项目已经具备知识图谱页面和数据结构基础，并把它作为根因分析和知识沉淀的重要方向”。这样更真实，也更专业。`
  },

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
let index = 0;
let timeLeft = 30;
let phase = 'hidden';
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);
knowledgePoints.forEach((kp, i) => {
  const li = document.createElement('li');
  li.textContent = kp.title;
  li.dataset.index = i;
  li.onclick = () => {
    index = i;
    showKnowledge();
    closeSidebar();
  };
  sidebar.appendChild(li);
});
function updateSidebarActive() {
  const items = sidebar.querySelectorAll('li');
  items.forEach((li, i) => {
    li.classList.toggle('active', i === index);
  });
}
function toggleContent(show) {
  const detailEl = document.getElementById('detail-content');
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}
function showKnowledge() {
  const kp = knowledgePoints[index];
  phase = 'hidden';
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';
  container.innerHTML = `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = document.getElementById('detail-content');
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}
function goToNext() {
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
nextBtn.addEventListener('click', goToNext);
showKnowledge();
setInterval(() => {
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (phase === 'hidden') {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
