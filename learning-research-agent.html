<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Research Agent学习问答动态展示 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 内容操作 ===== */
.content-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}

.edit-btn,
.edit-modal-close,
.edit-modal-btn {
  border: 1px solid rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.12);
  color: #00ffff;
}

.edit-btn,
.edit-modal-btn {
  min-width: 72px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.25s ease;
}

.edit-btn:hover,
.edit-modal-btn:hover {
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.edit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#click-hint {
  margin-top: 12px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}

.edit-modal[hidden] {
  display: none;
}

.edit-modal.open {
  display: flex;
}

.edit-modal-panel {
  width: min(860px, 100%);
  max-height: min(80vh, 760px);
  display: flex;
  flex-direction: column;
  background: rgba(0,12,24,0.96);
  border: 1px solid rgba(0,255,255,0.24);
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.45);
  overflow: hidden;
}

.edit-modal-header,
.edit-modal-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(0,255,255,0.06);
}

.edit-modal-header h3 {
  margin: 0;
  font-size: 1em;
  color: #9fffe7;
}

.edit-modal-close {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  font-size: 1.2em;
  cursor: pointer;
}

.edit-modal-body {
  padding: 18px;
  overflow: auto;
}

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 14px;
  background: rgba(0,0,0,0.38);
  color: #ffffff;
  line-height: 1.8;
  outline: none;
}

.edit-modal-editor:focus {
  border-color: rgba(0,255,255,0.45);
  box-shadow: 0 0 20px rgba(0,255,255,0.16);
}

.edit-modal-editor strong {
  color: #00ffcc;
}

.edit-modal-editor p {
  margin: 0 0 1em;
}

.edit-modal-editor ul,
.edit-modal-editor ol {
  margin: 0 0 1.2em 1.4em;
}

.edit-modal-editor li {
  margin-bottom: 0.45em;
}

.edit-modal-editor .embedded-entry {
  margin: 0 0 1.1em;
}

.edit-modal-editor .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}

.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}

.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}

.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}

.edit-modal-editor th,
.edit-modal-editor td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}

.edit-modal-editor th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}

.edit-modal-actions {
  justify-content: flex-end;
}

body.modal-open {
  overflow: hidden;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从左侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    right: -320px;
    left: auto;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-right: none;
    border-left: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: right 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    right: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  /* 右侧滑出的侧边栏：从右侧边缘向左滑打开 */
  .sidebar-swipe-area {
    position: fixed;
    top: 0;
    right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }

  
#click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}
</style>
</head>
<body>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>
<!-- 扫描线叠层 -->
<div class="scanlines"></div>

<div class="main-content">
  <!-- 粘性头部：进度条 + 标题 -->
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <!-- 倒计时（固定在头部右上角） -->
  <div class="countdown" id="countdown">30</div>

  <!-- 卡片（滚动区域） -->
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div class="content-toolbar">
      <button class="edit-btn" id="edit-btn" type="button">修改</button>
    </div>
    <div id="click-hint">点标题展开，点修改编辑</div>
  </div>

  <button class="next-btn" id="next-btn">下一个 →</button>
</div>


<div class="edit-modal" id="edit-modal" hidden>
  <div class="edit-modal-panel" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal-header">
      <h3 id="edit-modal-title">修改内容</h3>
      <button class="edit-modal-close" id="edit-modal-close" type="button">✕</button>
    </div>
    <div class="edit-modal-body">
      <div class="edit-modal-editor" id="edit-modal-editor" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="edit-modal-actions">
      <button class="edit-modal-btn" id="edit-cancel-btn" type="button">取消</button>
      <button class="edit-modal-btn" id="edit-save-btn" type="button">保存</button>
    </div>
  </div>
</div>

<!-- 侧边栏（桌面端侧栏 / 手机端滑动抽屉） -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Research Agent 学习问答</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<!-- 侧边栏切换按钮（手机端） -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<div class="sidebar-swipe-area" id="sidebar-swipe-area" aria-hidden="true"></div>

<script src="./tts-player.js"></script>
<script src="./sidebar-manager.js"></script>
<script src="./gist-sync.js"></script>
<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
let knowledgePoints = [{"title":"1. 面试官：你先讲讲这个项目背景，你为什么会做 Learning Research Agent？","content":"<strong>我：</strong>这个项目最初是我为了参加 <strong>阿里云 Agent 构建比赛</strong> 做的。比赛题目的特点不是普通问答，而是那种<strong>复杂、多跳、需要经过多轮搜索、筛选、推理后才能得到唯一正确答案</strong>的问题。也就是说，模型不能只靠记忆直接回答，它必须像人在做研究题一样，先找线索、再验证线索，最后才能收敛到答案。<br><br><strong>我当时看到的核心问题有三个：</strong><ul><li>这类题往往要跨多个网页和信息源，人手工查证很慢，效率也不稳定。</li><li>普通单轮问答模型很容易在前几条线索上就草率下结论，缺少系统性的搜索与验证过程。</li><li>比赛要求答案必须尽量收敛到唯一正确答案，答偏一点、漏掉限制条件，结果就直接算错。</li></ul><strong>所以我做这个项目的本质，不是做一个会聊天的 Agent，</strong>而是想做一个能把“接题 → 规划 → 搜索 → 提取 → 推理 → 校验 → 输出答案”这条链路尽可能自动化的研究型 Agent，让它在复杂题目里替代人工完成一大段重复但高强度的分析工作。"},{"title":"2. 面试官：你想解决什么问题？这个 Agent 真正提升的是什么？","content":"<strong>我：</strong>我会把它定义成“复杂研究问题求解效率”的提升。<br><br>很多看似只是“搜索一下就能答”的问题，真正做起来会发现需要多轮检索、网页抓取、信息过滤、时间线核对、实体关系串联，最后还要判断哪个答案才是题目要求的那个唯一结果。这个过程如果靠人工做，一方面很耗时，另一方面不同人做出来的稳定性也不一样。<br><br><strong>所以这个项目真正提升的是三类能力：</strong><ul><li><strong>搜索效率</strong>：把人工反复开网页、试关键词、换线索的过程交给 Agent 循环处理。</li><li><strong>信息提纯能力</strong>：不是把抓到的网页原样堆给用户，而是让 Agent 提取有用证据继续推理。</li><li><strong>答案收敛能力</strong>：通过约束条件识别、答案校验、必要时的反思重试，尽量把输出往唯一正确答案上逼近。</li></ul><strong>所以我面试里会强调：</strong>这个项目不是“做了个大模型外壳”，而是我围绕比赛题目的解题特征，把搜索、推理、控制和验证这几件事真正串成了一个完整系统。"},{"title":"3. 面试官：你在这个项目里具体负责什么？","content":"<strong>我：</strong>这个项目基本是我独立完成的。<br><br>我负责的不是单一编码环节，而是从技术路线调研、方案选择、Agent 逻辑实现，到部署上线和迭代优化的整条链路。前期我主要调研了 <strong>LangChain / LangGraph、ReAct 模式、可用的搜索方案、可接入的模型平台</strong>，然后结合比赛场景，用 AI 编程工具去快速实现、运行、观察日志、继续迭代，最后把它部署成可以直接调用的服务，放到 <strong>阿里云 ECS</strong> 上。<br><br><strong>我个人想证明的能力也很明确：</strong><ul><li>我会利用现有框架、模型和平台，不是从零重复造轮子，而是快速做出可运行结果。</li><li>我有项目落地能力，不只是调调 Demo，而是能把 Agent 跑起来、调通、上线。</li><li>我善于使用 AI 工具，但不是停留在“让 AI 写代码”，而是能把 AI 用在实现、调试、迭代整个研发流程里。</li></ul><strong>所以我会把自己的角色总结成一句话：</strong>我是这个 Agent 系统的方案设计者、实现者和迭代负责人。"},{"title":"4. 面试官：为什么你选 LangGraph + ReAct，而不是别的 Agent 框架？","content":"<strong>我：</strong>这部分我会重点讲“为什么它适合比赛型研究题”。<br><br>我最后选的是 <strong>LangGraph + ReAct</strong>。原因不是它最时髦，而是它最适合这种需要<strong>多轮循环、可控流程、状态管理清晰</strong>的题目。<br><br><strong>我的判断主要有四点：</strong><ul><li><strong>第一，比赛题不是一次调用能解决的。</strong> 它天然需要 planner、agent、tools 之间反复循环，所以图结构工作流比单链式调用更合适。</li><li><strong>第二，我需要很强的流程控制权。</strong> 例如最大步数限制、接近超时时强制收口、进入答案阶段后禁用工具、没有最终答案时重试，这些都更适合放在 LangGraph 这种显式状态流里处理。</li><li><strong>第三，ReAct 的模式和题目特征匹配。</strong> 先思考，再调用工具，再根据工具结果继续思考，本质上就是这类研究题的解法。</li><li><strong>第四，相比一些更“黑盒”的 Agent 封装，LangGraph 更容易观察每一轮状态、日志和失败点，便于我后续优化。</strong></li></ul><strong>所以我没有优先选那些上手更快但封装更厚的框架，</strong>因为比赛里真正重要的不是“几分钟搭出来”，而是你能不能在第 20 轮、第 30 轮还知道 Agent 为什么偏了、卡了、没答出来。"},{"title":"5. 面试官：这个 Agent 的核心流程是怎样的？","content":"<strong>我：</strong>如果面试官追问系统流程，我会按代码里的真实链路来讲。<br><br>用户问题进来以后，系统先进入 <strong>planner 节点</strong>，对题目做结构化分析，比如判断复杂度、估算最大步数、识别语言策略、提取限制条件和优先搜索锚点。之后进入 <strong>agent 主循环</strong>，让模型根据当前上下文决定下一步是继续思考还是调用工具。工具层主要负责搜索、网页抓取、内容整理等，拿到结果后再回到 agent 继续推理。<br><br><strong>整个循环不是盲跑，而是有明确控制：</strong><ul><li>复杂问题默认给更高步数预算，简单问题则收紧。</li><li>会持续压缩和截断上下文，避免无节制堆积搜索结果。</li><li>当接近步数上限或超时时，会注入提示要求它尽快收口，不再无限搜索。</li><li>最终答案输出前，还会经过一次答案校验逻辑，尽量确认它是否符合题目约束。</li></ul><strong>所以这个 Agent 的核心，不是“搜索很多次”，而是：</strong>我把规划、循环、工具调用、状态控制和最终校验，做成了一个可持续迭代的解题闭环。"},{"title":"6. 面试官：你做了哪些关键控制，为什么它能在 600 秒内尽量把答案交出来？","content":"<strong>我：</strong>我觉得这个项目最能体现工程判断的地方，就是我没有把 Agent 当成“自己会好起来”的黑盒。<br><br>比赛里我给单题设置了 <strong>600 秒</strong> 的全局时限，同时限制最大搜索/推理轮数。因为如果不强控，Agent 很容易一直搜、一直想，最后不是超时就是来不及给最终答案。<br><br><strong>所以我做了几层控制：</strong><ul><li><strong>步数控制</strong>：根据题目复杂度给出不同最大步数，避免简单题浪费资源，也避免复杂题太早收口。</li><li><strong>超时控制</strong>：接近最后阶段会注入紧迫提示，让它减少继续探索，优先整理已有证据输出答案。</li><li><strong>答案阶段控制</strong>：当已经进入收口阶段时，我会限制继续调用工具，防止它一边快超时一边还想再开新搜索。</li><li><strong>空答案补救</strong>：如果模型没有真正给出最终答案，而是停在半途中，我又补了继续生成和回退重试机制。</li></ul><strong>我想传达的是：</strong>我不是只让模型“尽量做对”，而是在系统层面强制它在有限时间内完成一场有节奏的解题过程。"},{"title":"7. 面试官：你怎么做答案校验和反思？为什么强调唯一正确答案？","content":"<strong>我：</strong>这部分和比赛规则强相关，也是项目区别于普通问答 Agent 的关键。<br><br>比赛题目要求答案必须尽量落在标准答案集合里，换句话说，哪怕方向差不多，只要不是题目要求的那个唯一结果，最终也算错。所以我在系统里加了 <strong>最终答案校验</strong> 机制：先让 Agent 尝试给出答案，再用一个更轻量的小模型去看这个答案是否满足原问题约束，必要时结合实体提示和外部信息做二次确认。<br><br><strong>除了校验，我还做了“反思式止损”。</strong> 实际跑题时我发现，模型有时会盯住一个锚点反复搜相似关键词，迟迟不验证其他线索。针对这种情况，我又加了相似搜索检测逻辑，当它连续多次搜非常接近的内容时，就提醒它不要继续在同一个方向里打转。<br><br><strong>所以“唯一正确答案”不是一句口号，</strong>而是我围绕赛制要求，把“搜索到了什么”进一步推进到“这个答案到底能不能交卷”的工程处理。"},{"title":"8. 面试官：这个项目里你踩过哪些关键坑？","content":"<strong>我：</strong>这部分我会讲失败，因为这个项目的价值很大一部分就来自排障和返工。<br><br><strong>第一个大坑是搜索链路不稳定。</strong> 比如搜索接口超时、搜不到有效页面、抓取回来的网页噪声太大，都会导致 Agent 明明步骤很多，却没有获得能支持最终答案的证据。<br><br><strong>第二个大坑是锚点固化。</strong> 模型有时会被题目里的某个关键词带偏，反复围绕一个方向搜索，不愿意切换线索，也不主动验证别的可能性，结果就是三十多轮过去了，仍然没有真正收敛。<br><br><strong>第三个大坑是模型切换后的性能骤变。</strong> 我一开始用的是更轻量的免费 Qwen 方案，后面因为复赛部署要求切到百炼平台的 Qwen 模型，结果单轮搜索推理耗时明显上升，token 消耗也飙得很快，系统甚至出现过一道题都跑不完、根本给不出答案的情况。<br><br><strong>这几个坑说明了一件事：</strong>研究型 Agent 真正难的不是写出一个循环，而是搜索基础设施、提示词长度、上下文规模、模型特性这些因素会互相放大，任何一个环节失控，最后都可能表现成“没有最终答案”。"},{"title":"9. 面试官：你后来做了哪些关键优化，才把它从能跑变成可交卷？","content":"<strong>我：</strong>如果只说“我调了一下提示词”，其实太轻了。<br><br>我后面做的优化，本质上是在把系统从一个会搜索的 Agent，改造成一个更稳定的解题系统。<br><br><strong>我重点做了几类改进：</strong><ul><li><strong>精简系统提示词和各节点提示词</strong>，减少无效 token 占用，让模型切换后还能把一整题跑完。</li><li><strong>控制上下文长度和搜索结果保留量</strong>，避免前面搜到的内容越堆越多，最后把关键答案挤掉或者直接触发长度问题。</li><li><strong>加强最终答案产出约束</strong>，避免模型只给分析过程、不肯真正落答案。</li><li><strong>增加重复搜索检测和引导</strong>，让它在错误方向上少空转。</li><li><strong>尝试 3 个 Agent 并行处理 1 道题</strong>，利用不同运行轨迹做结果互补，用户侧观察到正确率提升了 30% 以上。</li></ul><strong>我会把这段总结成一句话：</strong>我后面的工作重点，不再是“再加一个能力”，而是不断提升这个 Agent 的稳定性、收敛能力和最终可交付性。"},{"title":"10. 面试官：你最后拿到了什么结果？有哪些量化指标？","content":"<strong>我：</strong>结果部分我会尽量讲可量化的，不只讲“做出来了”。<br><br><strong>第一，比赛结果上。</strong> 我通过了第一阶段，进入复赛，最后拿到了 <strong>第 11 名</strong> 的成绩。对于一个强调复杂检索和解题稳定性的 Agent 项目来说，这个结果说明方向和系统优化是有效的。<br><br><strong>第二，周期上。</strong> 我大概投入了 <strong>3 个月</strong> 左右，把它从一个可运行原型不断迭代到更稳定的比赛版本。<br><br><strong>第三，指标上。</strong> 从项目文档里的前后对比结果看，整体正确率大约从 <strong>40% 提升到 75%</strong>，平均搜索步数下降了大约 <strong>40%</strong>；像负向约束识别、时间同步、多实体链路这些原来很容易错的题型，后面都有比较明显的提升。<br><br><strong>第四，工程结果上。</strong> 我不只是本地跑通了逻辑，还把它部署到了 <strong>阿里云 ECS</strong>，形成了一个可以稳定调用、可以继续迭代的服务形态。<br><br><strong>更适合面试的收口方式：</strong>我会说，这个项目最能说明我的不是“我会调模型”，而是我能把一个复杂题目求解系统做出来、跑起来、优化起来，并最终在比赛环境里拿到结果。"},{"title":"11. 面试官：如果重来一次，你会更早做什么？这个项目带给你什么成长？","content":"<strong>我：</strong>复盘这部分我会讲得诚实一点，因为这正好能体现我现在对大模型系统的理解更深了。<br><br><strong>第一，我会更早系统化研究模型参数和上下文策略。</strong> 当时我更多是围绕功能和流程在改，后面才意识到温度、上下文长度、提示词密度这些因素，会直接影响答案稳定性和最终是否能输出答案。<br><br><strong>第二，我会更早建立“无最终答案”问题的排查框架。</strong> 后面看日志我才逐渐意识到，有些题不是答错，而是因为上下文超长、搜索超时、抓取失败、校验链路中断等原因，压根没有把最终答案成功吐出来。<br><br><strong>第三，我会更早做系统级实验，而不只是点状修补。</strong> 比如更早比较不同模型、不同上下文裁剪方式、不同提示词长度对准确率和耗时的影响，让优化更数据化，而不是边跑边猜。<br><br><strong>但这个项目给我的成长也非常直接：</strong><ul><li>我第一次比较完整地把一个研究型 Agent 从概念做到比赛可用。</li><li>我更理解 Agent 项目不是“Prompt + Tool”这么简单，而是一个涉及工作流、搜索、上下文、模型特性和超时控制的系统工程。</li><li>我也更确定自己擅长利用现有平台和 AI 工具快速落地，再通过迭代把结果做扎实。</li></ul><strong>如果用一句话收尾：</strong>这个项目让我成长最大的地方，是我不再把大模型应用看成“调一个接口”，而是开始真正把它当作需要设计、控制、验证和运维的系统来做。"}];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof sidebarMgr !== 'undefined') sidebarMgr.save();
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'learning-research-agent',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
