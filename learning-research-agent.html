<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ─── 数字雨背景 ─── */
#matrix-canvas {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 0; opacity: 0.12;
  pointer-events: none;
}
.scanlines {
  position: fixed; top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg,
    transparent, transparent 2px,
    rgba(34,211,238,0.015) 2px, rgba(34,211,238,0.015) 4px);
}

/* ─── 主题覆盖（与首页统一） ─── */
:root {
  --color-base-100: #0d0d14;
  --color-base-200: #14141e;
  --color-base-300: #1c1c2a;
  --color-base-content: #e2e2f0;
  --color-primary: #22d3ee;
  --color-primary-content: #02161c;
  --color-secondary: #818cf8;
  --color-secondary-content: #0e0a22;
  --color-accent: #f472b6;
  --color-neutral: #1a1a28;
  --color-info: #67e8f9;
  --color-success: #6ee7b7;
  --color-warning: #fcd34d;
  --color-error: #fca5a5;
}

.main-content, .sidebar { position: relative; z-index: 2; }

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ─── 粘性头部 ─── */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: color-mix(in srgb, var(--color-base-100) 85%, transparent);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 14px 20px 10px;
  border-bottom: 1px solid var(--color-base-300);
}

#progress-bar::-moz-progress-bar { background: var(--color-primary); }
#progress-bar::-webkit-progress-value { background: var(--color-primary); }
#progress-bar { transition: width 1s linear; }

#knowledge-title {
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  color: var(--color-primary);
}

/* ─── 内容区 ─── */
#card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 90px;
  background: color-mix(in srgb, var(--color-base-200) 40%, transparent);
  position: relative;
}
#knowledge-container {
  font-size: 1.18em;
  line-height: 1.85em;
}
#knowledge-container strong {
  color: var(--color-primary);
}

/* ─── 倒计时 ─── */
#countdown {
  position: absolute;
  top: 12px;
  right: 20px;
  z-index: 11;
}

/* ─── 编辑弹窗 ─── */
.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}
.edit-modal[hidden] { display: none; }
.edit-modal.open { display: flex; }

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid var(--color-base-300);
  border-radius: 14px;
  background: color-mix(in srgb, var(--color-base-200) 80%, transparent);
  color: var(--color-base-content);
  line-height: 1.8;
  outline: none;
}
.edit-modal-editor:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 20px rgba(34,211,238,0.12);
}
.edit-modal-editor strong { color: var(--color-primary); }
.edit-modal-editor p { margin: 0 0 1em; }
.edit-modal-editor ul, .edit-modal-editor ol { margin: 0 0 1.2em 1.4em; }
.edit-modal-editor li { margin-bottom: 0.45em; }
.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0,0,0,0.45);
  border: 1px solid var(--color-base-300);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
  color: var(--color-base-content);
}
.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: var(--color-primary);
}
.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.edit-modal-editor th, .edit-modal-editor td {
  border: 1px solid var(--color-base-300);
  padding: 8px 10px;
  text-align: left;
}
.edit-modal-editor th {
  background: color-mix(in srgb, var(--color-primary) 10%, transparent);
  color: var(--color-primary);
}

/* ─── 侧边栏 ─── */
.sidebar {
  width: 320px;
  background: color-mix(in srgb, var(--color-base-100) 85%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 1px solid var(--color-base-300);
  position: relative;
  z-index: 2;
}
.sidebar-close { display: none; }

.sidebar ul { list-style: none; }
.sidebar li {
  padding: 10px 14px;
  margin: 3px 0;
  cursor: pointer;
  border-radius: 8px;
  font-size: 0.92em;
  border: 1px solid transparent;
  transition: all 0.2s;
}
.sidebar li:hover {
  background: color-mix(in srgb, var(--color-primary) 12%, transparent);
  border-color: color-mix(in srgb, var(--color-primary) 25%, transparent);
}
.sidebar li.active {
  background: color-mix(in srgb, var(--color-primary) 15%, transparent);
  border-color: color-mix(in srgb, var(--color-primary) 35%, transparent);
}

/* ─── 侧边栏切换（手机端） ─── */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  pointer-events: none;
  opacity: 0;
}
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

/* ─── 滚动条 ─── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-base-300); border-radius: 3px; }

body.modal-open { overflow: hidden; }

/* ─── 手机适配 ─── */
@media (max-width: 768px) {
  body { flex-direction: column; overflow: hidden; }
  #matrix-canvas { opacity: 0.08; }
  .main-content { flex: 1; height: 100vh; }
  .sticky-header { padding: 10px 14px 8px; }
  #knowledge-title { font-size: 0.95em; padding-right: 50px; }
  #card { padding: 14px 14px 90px; }
  #knowledge-container { font-size: 0.95em; line-height: 1.6em; }

  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  .sidebar {
    position: fixed;
    top: 0;
    right: -300px;
    left: auto;
    width: 280px;
    height: 100vh;
    z-index: 30;
    border-left: 1px solid var(--color-base-300);
    padding: 16px;
    transition: right 0.3s ease;
    background: color-mix(in srgb, var(--color-base-100) 95%, transparent);
  }
  .sidebar.open { right: 0; }
  .sidebar-close { display: block; }
  .sidebar ul { padding-bottom: 60px; }
  .sidebar-overlay.show { display: block; opacity: 1; }

  .sidebar-swipe-area {
    position: fixed;
    top: 0; right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }
}

</style>

const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {

  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof DbManager !== 'undefined') {
      var cardId = knowledgePoints[index].id;
      if (cardId) DbManager.updateCard(cardId, knowledgePoints[index].title, updatedContent);
    }
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
window.sidebarMgr = sidebarMgr;
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'learning-research-agent',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: (window.__API_BASE__ || '') + '/api/tts'
});

// 数据库初始化后再显示
(async function initDbAndShow() {
  var cards = null;

  // Phase 1: 优先从 D1 云端拉取（跨设备持久化）
  if (typeof D1Sync !== 'undefined' && D1Sync.isConfigured()) {
    try {
      var d1Cards = await D1Sync.init(window.__PAGE_SLUG__);
      if (d1Cards && d1Cards.length > 0) {
        cards = d1Cards;
        // 存入本地 IndexedDB 作为缓存
        await DbManager.init([], window.__PAGE_SLUG__);
        DbManager.syncFromArray(cards);
        cards = DbManager.getCards();
      }
    } catch(e) {
      console.warn('[Init] D1 unavailable, falling back to local:', e);
    }
  }

  // Phase 2: 降级到本地 DbManager（IndexedDB）
  if (!cards || !cards.length) {
    try {
      await DbManager.init(PENDING_SEED, window.__PAGE_SLUG__);
      cards = DbManager.getCards();
    } catch(e) {
      console.warn('[Init] DbManager failed, using seed data:', e);
    }
  }

  // Phase 3: 最后的兜底 — 直接使用页面内嵌种子数据
  if (!cards || !cards.length) {
    cards = PENDING_SEED;
  }

  // 填充 knowledgePoints
  knowledgePoints.length = 0;
  (cards || []).forEach(function(c) {
    knowledgePoints.push(c.id ? { id: c.id, title: c.title, content: c.content } : c);
  });
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.syncFromKnowledgePoints();
  showKnowledge();
})();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
