* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #ffffff; min-height: 100vh; overflow-x: hidden; background: #000; }
#matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; opacity: 0.28; }
.scanlines { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,0.02) 2px, rgba(0,255,255,0.02) 4px); }
.page-shell { position: relative; z-index: 2; min-height: 100vh; padding: 28px 24px 40px; }
.hero { max-width: 980px; margin: 0 auto 24px; background: rgba(0,8,16,0.82); border: 1px solid rgba(0,255,255,0.18); border-radius: 18px; padding: 24px 24px 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 12px 32px rgba(0,0,0,0.28); }
.hero-kicker { font-size: 0.82em; letter-spacing: 2px; color: rgba(0,255,255,0.76); margin-bottom: 10px; }
.hero h1 { font-size: 1.8em; color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.35); margin-bottom: 10px; line-height: 1.4; }
.hero p { color: rgba(255,255,255,0.82); line-height: 1.8; font-size: 1em; }
.card-grid { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
.card-grid.dragging { gap: 8px; }
.nav-card { display: block; text-decoration: none; background: rgba(0,10,20,0.78); border: 1px solid rgba(0,255,255,0.12); border-radius: 14px; padding: 14px 16px; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: 0 6px 18px rgba(0,0,0,0.16); transition: transform 0.18s, border-color 0.18s, background 0.18s, opacity 0.18s; touch-action: none; user-select: none; -webkit-user-select: none; }
.nav-card:hover { border-color: rgba(0,255,255,0.26); background: rgba(0,18,30,0.86); }
.nav-card:active { transform: scale(0.985); }
.nav-card.drag-source { opacity: 0.35; }
.nav-card.drag-ghost { border-color: rgba(0,255,255,0.42); background: rgba(0,30,45,0.92); box-shadow: 0 0 0 1px rgba(0,255,255,0.16), 0 10px 24px rgba(0,0,0,0.28); }
.toolbar { max-width: 760px; margin: 0 auto 12px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; color: rgba(255,255,255,0.72); }
.sort-tip { margin: 0; color: rgba(160,255,255,0.74); font-size: 0.82em; }
.sync-btn { border: none; border-radius: 999px; padding: 6px 10px; font-size: 12px; color: #d9ffff; background: rgba(0,255,255,0.10); border: 1px solid rgba(0,255,255,0.16); }
.sync-btn-muted { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.82); }
.homepage-sync-status { max-width: 760px; margin: 0 auto 12px; color: #9cc; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
.toolbar code { background: rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 8px; }
.card-icon { width: 34px; height: 28px; border-radius: 8px 8px 6px 6px; background: linear-gradient(180deg, rgba(0,255,255,0.22), rgba(0,255,255,0.08)); border: 1px solid rgba(0,255,255,0.16); position: relative; flex: 0 0 auto; }
.card-icon::before { content: ''; position: absolute; left: 4px; top: -5px; width: 16px; height: 8px; border-radius: 6px 6px 0 0; background: rgba(0,255,255,0.18); border: 1px solid rgba(0,255,255,0.12); border-bottom: none; }
.card-main { min-width: 0; flex: 1; }
.card-tag { display: inline-flex; align-items: center; width: fit-content; padding: 1px 7px; margin-bottom: 5px; border-radius: 999px; border: 1px solid rgba(0,255,255,0.16); background: rgba(0,255,255,0.05); color: rgba(143,255,255,0.88); font-size: 0.68em; letter-spacing: 0.2px; }
.nav-card h2 { font-size: 0.98em; line-height: 1.35; color: #ffffff; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.route, .description, .meta, .enter-btn { display: none; }
.card-arrow { flex: 0 0 auto; color: rgba(0,255,255,0.72); font-size: 1.05em; padding-left: 8px; }
.toolbar { max-width: 980px; margin: 0 auto 18px; display: flex; gap: 10px; flex-wrap: wrap; color: rgba(255,255,255,0.72); }
.toolbar code { background: rgba(255,255,255,0.08); padding: 4px 8px; border-radius: 8px; }
@media (max-width: 900px) { .card-grid { max-width: 100%; } }
@media (max-width: 640px) { .page-shell { padding: 16px 14px 28px; } .hero { padding: 18px 16px 16px; border-radius: 16px; margin-bottom: 16px; } .hero h1 { font-size: 1.28em; } .hero p { font-size: 0.92em; line-height: 1.68; } .nav-card { padding: 13px 14px; border-radius: 13px; } .card-icon { width: 30px; height: 24px; } .nav-card h2 { font-size: 0.94em; } }

<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
const fontSize = 14;
let columns = Math.floor(window.innerWidth / fontSize);
let drops = Array(columns).fill(1);
function drawMatrix(){
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0ff';
  ctx.font = fontSize + 'px monospace';
  for(let i=0;i<drops.length;i++){
    const text = chars[Math.floor(Math.random()*chars.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 38);

(function(){
  const STORAGE_KEY='homepage-folder-order-v1';
  const ORDER_FILE_PATH='data/sidebar-state/homepage-folder-order.json';
  const SHA_KEY='homepage-folder-order-sha';
  const TOKEN_KEY='repo-sync-token';
  const OWNER_KEY='repo-sync-owner';
  const REPO_KEY='repo-sync-repo';
  const DEFAULT_OWNER='Suara17';
  const DEFAULT_REPO='review_html';
  const API_ROOT='https://api.github.com';
  const list=document.getElementById('folder-list');
  if(!list) return;
  const items=Array.from(list.querySelectorAll('.nav-card'));
  items.forEach((el,i)=>{
    if(!el.dataset.key) el.dataset.key = el.dataset.slug || el.getAttribute('href') || String(i);
    el.dataset.defaultOrder = String(i);
  });

  function getOrder(){
    return Array.from(list.querySelectorAll('.nav-card')).map(el => el.dataset.key);
  }
  function saveOrder(){
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(getOrder())); } catch(e) {}
  }
  function restoreOrder(){
    let raw=null;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch(e) {}
    if(!raw) return;
    try {
      const order = JSON.parse(raw);
      const map = new Map(Array.from(list.querySelectorAll('.nav-card')).map(el => [el.dataset.key, el]));
      order.forEach(key => { const el = map.get(key); if(el) list.appendChild(el); });
      Array.from(map.keys()).forEach(key => { if(!order.includes(key)) list.appendChild(map.get(key)); });
    } catch(e) {}
  }
  restoreOrder();

  function setStatus(msg, type){
    const el=document.getElementById('homepage-sync-status');
    if(!el) return;
    el.textContent = msg || '';
    el.style.color = type==='error' ? '#ff9b9b' : type==='success' ? '#9ff7c2' : type==='warn' ? '#ffd37a' : '#9cc';
  }
  function getConfig(){
    const token=(localStorage.getItem(TOKEN_KEY)||'').trim();
    const owner=(localStorage.getItem(OWNER_KEY)||DEFAULT_OWNER).trim();
    const repo=(localStorage.getItem(REPO_KEY)||DEFAULT_REPO).trim();
    if(!token){ setStatus('未找到 GitHub Token，请先在知识点页面配置后再试。','warn'); return null; }
    return { token, owner, repo };
  }
  function applyOrder(order){
    if(!Array.isArray(order) || !order.length) return;
    const map = new Map(Array.from(list.querySelectorAll('.nav-card')).map(el => [el.dataset.key, el]));
    const frag = document.createDocumentFragment();
    const used = new Set();
    order.forEach(key => { const el = map.get(key); if(el){ frag.appendChild(el); used.add(key); } });
    map.forEach((el,key) => { if(!used.has(key)) frag.appendChild(el); });
    list.appendChild(frag);
    saveOrder();
  }
  function clearOrder(){ try { localStorage.removeItem(STORAGE_KEY); } catch(e) {} }
  function b64EncodeUnicode(str){ return btoa(unescape(encodeURIComponent(str))); }
  function b64DecodeUnicode(str){ return decodeURIComponent(escape(atob(str))); }
  async function ghFetchFile(cfg){
    const url = API_ROOT + '/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + ORDER_FILE_PATH;
    const res = await fetch(url, { headers: { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json' } });
    if(res.status === 404) return null;
    if(!res.ok) throw new Error('拉取 GitHub 排序失败：' + res.status);
    return await res.json();
  }
  async function ghSaveFile(cfg, order, sha){
    const url = API_ROOT + '/repos/' + cfg.owner + '/' + cfg.repo + '/contents/' + ORDER_FILE_PATH;
    const body = { message: 'chore: update homepage folder order', content: b64EncodeUnicode(JSON.stringify({ order: order }, null, 2)) };
    if(sha) body.sha = sha;
    const res = await fetch(url, { method: 'PUT', headers: { Authorization: 'Bearer ' + cfg.token, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if(!res.ok){ const txt = await res.text(); throw new Error('保存 GitHub 排序失败：' + res.status + ' ' + txt.slice(0,160)); }
    return await res.json();
  }
  async function pullOrderFromGitHub(){
    const cfg = getConfig(); if(!cfg) return;
    setStatus('正在从 GitHub 拉取首页排序...');
    try {
      const file = await ghFetchFile(cfg);
      if(!file){ setStatus('GitHub 上还没有首页排序文件。','warn'); return; }
      const json = JSON.parse(b64DecodeUnicode((file.content || '').replace(/\n/g,'')));
      applyOrder(json.order || []);
      try { localStorage.setItem(SHA_KEY, file.sha || ''); } catch(e) {}
      setStatus('已从 GitHub 拉取首页排序。','success');
    } catch(err) {
      setStatus(err.message || String(err),'error');
    }
  }
  async function pushOrderToGitHub(){
    const cfg = getConfig(); if(!cfg) return;
    setStatus('正在保存首页排序到 GitHub...');
    try {
      let sha = '';
      try { sha = localStorage.getItem(SHA_KEY) || ''; } catch(e) {}
      if(!sha){ const cur = await ghFetchFile(cfg); sha = cur && cur.sha ? cur.sha : ''; }
      const saved = await ghSaveFile(cfg, getOrder(), sha);
      try { localStorage.setItem(SHA_KEY, saved.content && saved.content.sha ? saved.content.sha : ''); } catch(e) {}
      setStatus('已保存首页排序到 GitHub。','success');
    } catch(err) {
      setStatus(err.message || String(err),'error');
    }
  }
  function resetOrder(){
    if(!confirm('恢复默认排序会清空本地首页顺序，并按页面原始顺序重新排列。是否继续？')) return;
    const arr = Array.from(list.querySelectorAll('.nav-card')).sort((a,b)=>(+a.dataset.defaultOrder)-(+b.dataset.defaultOrder));
    const frag = document.createDocumentFragment();
    arr.forEach(el => frag.appendChild(el));
    list.appendChild(frag);
    clearOrder();
    setStatus('已恢复默认排序。','success');
  }
  const toolbar = document.querySelector('.homepage-sync-toolbar');
  if(toolbar){
    toolbar.addEventListener('click', (e) => {
      const action = e.target && e.target.getAttribute('data-action');
      if(action === 'pull-order') pullOrderFromGitHub();
      if(action === 'push-order') pushOrderToGitHub();
      if(action === 'reset-order') resetOrder();
    });
  }

  let pressTimer=null, draggingEl=null, ghost=null, startX=0, startY=0, moved=false, longPressed=false;

  function clearPress(){ if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; } }
  function cleanupDrag(){
    clearPress();
    list.classList.remove('dragging');
    Array.from(list.querySelectorAll('.nav-card')).forEach(el => el.classList.remove('drag-source','drag-ghost'));
    draggingEl=null; ghost=null; moved=false; longPressed=false;
  }
  function getAfterElement(y){
    const els=[...list.querySelectorAll('.nav-card:not(.drag-source)')];
    let closest={offset:Number.NEGATIVE_INFINITY, el:null};
    els.forEach(el=>{
      const box=el.getBoundingClientRect();
      const offset=y - box.top - box.height/2;
      if(offset < 0 && offset > closest.offset) closest={offset, el};
    });
    return closest.el;
  }
  function startDrag(target){
    draggingEl = target.closest('.nav-card');
    if(!draggingEl) return;
    longPressed = true;
    list.classList.add('dragging');
    draggingEl.classList.add('drag-source');
    ghost = draggingEl;
    ghost.classList.add('drag-ghost');
    if(navigator.vibrate) navigator.vibrate(16);
  }

  list.querySelectorAll('.nav-card').forEach(card=>{
    card.addEventListener('pointerdown', (e)=>{
      if(e.pointerType === 'mouse' && e.button !== 0) return;
      startX=e.clientX; startY=e.clientY; moved=false; longPressed=false;
      clearPress();
      pressTimer=setTimeout(()=> startDrag(card), 320);
    }, {passive:true});

    card.addEventListener('pointermove', (e)=>{
      if(Math.abs(e.clientX-startX) > 8 || Math.abs(e.clientY-startY) > 8) moved=true;
      if(!longPressed || !draggingEl) return;
      e.preventDefault();
      const afterEl = getAfterElement(e.clientY);
      if(afterEl == null) list.appendChild(draggingEl);
      else if(afterEl !== draggingEl) list.insertBefore(draggingEl, afterEl);
    });

    card.addEventListener('pointerup', (e)=>{
      if(longPressed && draggingEl){
        e.preventDefault();
        saveOrder();
      }
      cleanupDrag();
    });

    card.addEventListener('pointercancel', cleanupDrag);
    card.addEventListener('pointerleave', ()=>{ if(!longPressed && moved) clearPress(); });
    card.addEventListener('click', (e)=>{ if(longPressed) { e.preventDefault(); e.stopPropagation(); } });
  });

  document.addEventListener('scroll', ()=>{ if(longPressed) saveOrder(); }, {passive:true});
})();
</script>
