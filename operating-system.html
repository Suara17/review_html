oid put_two(i) {\n    down(&amp;mutex);\n    state[i] = THINKING;</code></pre><pre><code class=\"language-c\">check(LEFT); // 尝试通知左右邻居，自己吃完了，你们可以开始吃了\ncheck(RIGHT);\nup(&amp;mutex);\n}\n\nvoid eat(int i) {\n    down(&amp;mutex);\n    state[i] = EATING;\n    up(&amp;mutex);\n}\n\n// 检查两个邻居是否都没有用餐，如果是的话，就 up(&amp;s[i])，使得 down(&amp;s[i]) 能够得到通知并继续执行\nvoid check(i) {\n    if(state[i] == HUNGRY &amp;&amp; state[LEFT] != EATING &amp;&amp; state[RIGHT] !=EATING) {\n    state[i] = EATING;\n    up(&amp;s[i]);\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 读者-写者问题</p><p>允许多个进程同时对数据进⾏读操作，但是不允许读和写以及写和写操作同时发⽣。</p><p>⼀个整型变量 count 记录在对数据进⾏读操作的进程数量，⼀个互斥量 count_mutex ⽤于对 count 加锁，⼀个互斥量 data_mutex ⽤于对读写的数据加锁。</p><pre><code class=\"language-txt\">typedef int semaphore;\nsemaphore count_mutex = 1;\nsemaphore data_mutex = 1;\nint count = 0;\n\nvoid reader() {\n    while(TRUE) {\n    down(&amp;count_mutex);\n    count++;\n    if(count == 1) down(&amp;data_mutex); // 第一个读者需要对数据进行加锁，防止写进程访问\n    up(&amp;count_mutex);\n    read();\n    down(&amp;count_mutex);\n    count--;\n    if(count == 0) up(&amp;data_mutex);\n    up(&amp;count_mutex);\n    }\n}\n\nvoid writer() {\n    while(TRUE) {\n    down(&amp;data_mutex);\n    write();\n    up(&amp;data_mutex);</code></pre><pre><code class=\"language-txt\">}\n} </code></pre></div>"},{"title":"存储系统","content":"<p>存储系统层级</p><ul><li>存储器的层次结构</li></ul><p>我们从图书馆书架取书，把书放到桌子上，再阅读书，我们大脑就会记忆知识点，然后再经过大脑思考，这一系列过程相当于，数据从硬盘加载到内存，再从内存加载到CPU的寄存器和Cache中，然后再通过CPU 进行处理和计算。</p><p>对于存储器，它的速度越快、能耗会越高、而且材料的成本也是越贵的，以至于速度快的存储器的容量都比较小。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）寄存器</p><p>寄存器的访问速度⾮常快，⼀般要求在半个 CPU 时钟周期内完成读写，CPU 时钟周期跟 CPU 主频息息相关，⽐如2 GHz 主频的 CPU，那么它的时钟周期就是 1/2G，也就是 0.5ns（纳秒）。</p><ul><li>CPU Cache（⽤的是⼀种叫 SRAM（Static Random-Access Memory，静态随机存储器）的芯⽚）</li></ul><p>SRAM 之所以叫「静态」存储器，是因为只要有电，数据就可以保持存在，⽽⼀旦断电，数据就会丢失了。</p><p>CPU Cache 通常分为三层，如下图所示：</p><p>查看各级Cache的⼤⼩：</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）内存</p><p>内存⽤的芯⽚和 CPU Cache 有所不同，它使⽤的是⼀种叫作 DRAM （Dynamic Random Access Memory，动态随机存取存储器） 的芯⽚。相⽐ SRAM，DRAM 的密度更⾼，功耗更低，有更⼤的容量，⽽且造价⽐ SRAM 芯⽚便宜很多。</p><p>DRAM 存储⼀个 bit 数据，只需要⼀个晶体管和⼀个电容就能存储，但是因为数据会被存储在电容⾥，电容会不断漏电，所以需要「定时刷新」电容，才能保证数据不会被丢失，这就是 DRAM 之所以被称为「动态」存储器的原因，只有不断刷新，数据才能被存储起来。</p><p>DRAM 的数据访问电路和刷新电路都⽐ SRAM 更复杂，所以访问的速度会更慢，内存速度⼤概在 200~300 个 时钟周期之间。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）SSD/HDD硬盘:</p><p>SSD（Solid-state disk） 就是我们常说的固体硬盘，结构和内存类似，但是它相⽐内存的优点是断电后数据还是存在的，⽽内存、寄存器、⾼速缓存断电后数据都会丢失。内存的读写速度⽐ SSD ⼤概快 10~1000 倍。</p><p>机械硬盘（Hard Disk Drive, HDD），它是通过物理读写的⽅式来访问 数据的，因此它访问速度是⾮常慢的，它的速度⽐内存慢 10W 倍左右。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、存储器的层次关系</p><p>CPU 并不会直接和每⼀种存储器设备直接打交道，⽽是每⼀种存储器设备只和它相邻的存储器设备打交道。</p><p>所以，每个存储器只和相邻的⼀层存储器设备打交道，并且存储设备为了追求更快的速度，所需的材料成本必然也是更⾼，也正因为成本太⾼，所以 CPU 内部的寄存器、L1\\L2\\L3 Cache 只好⽤较⼩的容量，相反内存、硬盘则可⽤更⼤的容量，这就我们今天所说的存储器层次结构。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、存储器之间的实际价格和性能差距</p><p>不同层级的存储器之间的成本对⽐图：</p><table><tr><td>存储器</td><td>硬件介质</td><td>单位成本(美元/MB)</td><td>随机访问延时</td></tr><tr><td>L1 Cache</td><td>SRAM</td><td>7</td><td>1ns</td></tr><tr><td>L2 Cache</td><td>SRAM</td><td>7</td><td>4ns</td></tr><tr><td>Memory</td><td>DRAM</td><td>0.015</td><td>100ns</td></tr><tr><td>Disk</td><td>SSD(NAND)</td><td>0.0004</td><td>150μs</td></tr><tr><td>Disk</td><td>HDD</td><td>0.00004</td><td>10ms</td></tr></table><p>机械硬盘（HDD)到底有多慢：</p><p>·SSD 比机械硬盘快 70 倍左右;</p><p>·内存比机械硬盘快 100000 倍左右;</p><p>·CPUL1Cache比机械硬盘快 10000000 倍左右;</p></div>"},{"title":"虚拟内存","content":"<p>虚拟内存是计算机操作系统中的⼀种内存管理技术，它允许程序访问⽐物理内存（RAM）更⼤的地址空间，但⾸先我们要区分这两个概念：</p><p>虚拟内存地址：程序所使⽤的内存地址</p><p>物理内存地址：实际存在硬件⾥⾯的空间地址</p><p>操作系统会提供⼀种机制，在物理内存和虚拟内存之间建⽴⼀个地址映射表，进程持有的虚拟地址会通过 CPU 芯⽚中的内存管理单元（MMU）的映射关系，来转换变成物理地址，然后再通过物理地址访问内存</p><p>操作系统主要通过内存分段和内存分⻚来管理虚拟内存和物理内存之间的关系。</p>"},{"title":"内存分段","content":"<p>内存分段将物理内存划分成不同的逻辑段或区域，每个段⽤于存储特定类型的数据或执⾏特定类型的任务。每个段具有不同的⼤⼩和属性。常⻅的段包括代码段（存储程序执⾏代码）、数据段（存储程序数据）、堆栈段（存储函数调⽤和局部变量），以及其他⾃定义段，如共享库段等。</p><p>分段机制下的虚拟地址由两部分组成，段选择因⼦和段内偏移量，⽽虚拟地址是通过段表与物理地址进⾏映射的。</p><p>段选择因⼦中的段号与段表对应，作为段表的索引。段表⾥⾯保存的是这个段的基地址、段的界限和特权等级等。虚拟地址中的段内偏移量应该位于 0 和段界限之间，如果段内偏移量是合法的，就将段基地址加上段内偏移量得到物理内存地址。</p>"},{"title":"内存碎⽚","content":"<p>内存碎⽚是指内存中的空闲空间被分割成多个不连续的⼩块，⽽不是⼀个连续的⼤块。这些⼩块空闲内存可能分布在整个内存地址空间中，导致内存资源的不充分利⽤。</p><p>外部碎⽚：虽然整体内存容量⾜够，但⽆法为较⼤的内存请求分配连续的内存块，因为已分配的内存块分散在内存中，它们之间的未分配空间太⼩。</p><p>内部碎⽚：有时分配的内存块⼤于进程实际需要的内存量，这意味着有⼀些内存浪费在内部碎⽚中。</p><p>内存分段</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、最佳⻚⾯置换算法(OPT)</p><p>置换在「未来」最⻓时间不访问的⻚⾯,但是实际系统中⽆法实现，因为程序访问⻚⾯时是动态的</p><p>我们是⽆法预知每个⻚⾯在「下⼀次」访问前的等待时间，因此作为实际算法效率衡量标准。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、先进先出置换算法(FIFO)</p><p>顾名思义，将⻚⾯以队列形式保存，先进⼊队列的⻚⾯先被置换进⼊磁盘。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、最近最久未使⽤的置换算法（LRU）</p><p>根据⻚⾯未被访问时⻓⽤升序列表将⻚⾯排列，每次将最久未被使⽤⻚⾯置换出去。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、时钟⻚⾯置换算法</p><p>把所有的⻚⾯都保存在⼀个类似钟⾯的「环形链表」中，⻚⾯包含⼀个访问位。</p><p>当发⽣缺⻚中断时，顺时针遍历⻚⾯，如果访问位为1，将其改为0，继续遍历，直到访问到访问位为0⻚⾯，进⾏置换。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、最不常⽤算法</p><p>记录每个⻚⾯访问次数，当发⽣缺⻚中断时候，将访问次数最少的⻚⾯置换出去，此⽅法需要对每个⻚⾯访问次数统计，额外开销。</p></div>"},{"title":"分段","content":"<p>虚拟内存采⽤的是分⻚技术，也就是将地址空间划分成固定⼤⼩的⻚，每⼀⻚再与内存进⾏映射。</p><p>如果使⽤分⻚系统的⼀维地址空间，动态增⻓的特点会导致覆盖问题的出现。</p><p>分段的做法是把每个表分成段，⼀个段构成⼀个独⽴的地址空间。</p><p>每个段的⻓度可以不同，并且可以动态增⻓。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、纯分段</p><p>分段和分⻚本质上是不同的，⻚⾯是定⻓的⽽段不是。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><ul><li>共享：有助于⼏个进程之间共享过程和数据。 ⽐如共享库</li></ul><ul><li>保护：每个段都可以独⽴地增⼤或减⼩⽽不会影响其他的段</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、分段和分⻚结合</p><p>程序的地址空间划分成多个拥有独⽴地址空间的段，每个段上的地址空间划分成⼤⼩相同的⻚。</p><p>这样既拥有分段系统的共享和保护，⼜拥有分⻚系统的虚拟内存功能.</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">对程序员的透明性：</p><p>分⻚透明，但是分段需要程序员显式划分每个段。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">地址空间的维度：</p><p>分⻚是⼀维地址空间，分段是⼆维的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">⼤⼩是否可以改变：</p><p>⻚的⼤⼩不可变，段的⼤⼩可以动态改变。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">出现的原因：</p><p>分⻚主要⽤于实现虚拟内存，从⽽获得更⼤的地址空间；分段主要是为了使程序和数据可以被划分为逻辑上独⽴的地址空间并且有助于共享和保护。</p></div>"},{"title":"简述","content":"<p>属于计算机系统内存管理的⼀种技术，虚拟地址空间构成虚拟内存，它使得应⽤程序认为⾃⼰拥有连续的可⽤内存空间，但实际上是被分隔的多个物理内存⻚、以及部分暂时存储在磁盘上的交换分区所构成的。虚拟内存的实现通过硬件异常、硬件地址翻译、主存、磁盘以及内核软件共同完成</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、地址空间：</p><p>地址空间是物理内存的抽象，是⼀个进程可⽤于寻址内存的⼀套地址集合。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、分⻚：</p><p>地址空间被分割成多个块，每⼀块称作⼀⻚或⻚⾯(Page)。每⼀⻚有连续的地址范围，这些⻚被映射到连续的物理内存(⻚框)。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、⻚表：</p><p>⻚表的⽬的是把虚拟⻚⾯(虚拟地址)映射为⻚框(物理地址)。⻚表给出了虚拟地址与物理地址的映射关系。从数学的⻆度说⻚表是⼀个函数，他的参数是虚拟⻚号，结果是物理⻚⻚框号</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）TLB加速分⻚</p><p>概念：将虚拟地址直接映射到物理地址，⽽不必再访问⻚表，这种设备被称为转换检测缓冲区（TLB）、相联存储器或快表</p><p>⼯作过程：将⼀个虚拟地址放⼊MMU中进⾏转换时，硬件⾸先通过将该虚拟⻚号与TLB中所有表项同时进⾏匹配，判断虚拟⻚⾯是否在其中：</p><ul><li>虚拟⻚号在TLB中。如果MMU检测⼀个有效的匹配并且访问操作并不违反保护位，则将⻚框号直接从TLB中取出⽽不必访问⻚表。</li></ul><ul><li>虚拟⻚号不在TLB中。如果MMU检测到没有有效的匹配项就会进⾏正常的⻚表查询。接着从TLB中淘汰⼀个表项，然后⽤新的⻚表项替换它。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、针对⼤内存的⻚表</p><ul><li>多级⻚表</li></ul><ul><li>倒排⻚表</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⾼速缓存</p><p>按照存储器层次结构中的缓存划分来看，将位于k层的更⼩更快的存储设备作为存储在k+1层的更⼤更慢的存储设备的缓存。具体如下：</p><p>在虚拟内存中的虚拟⻚共分为三种类型：</p><ul><li>未分配（没有被进程申请使⽤的，也就是空闲的虚拟内存， 不占⽤虚拟内存磁盘的任何空间）</li></ul><ul><li>未缓存（仅仅加载到磁盘中的⻚）</li></ul><ul><li>已缓存（已经加载到内存中的内存⻚（⻚框））</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 内存保护</p><p>现代操作系统中，⽤户进程不应该被允许修改它的只读代码段;</p><p>⽽且也不应该允许它读取或修改任何内核中的代码和数据结构;</p><p>并且也不允许其读取或者修改其他进程的私有内存，以及修改和其他进程共享的虚拟⻚⾯。</p><p>如果不对进程的内存访问进⾏限制，攻击者就能够访问和修改其他进程的私有内存，进⽽导致整个系统崩溃。⼤体的虚拟寻址如下：</p><p>通过MMU，每次都会读取⻚表中的⼀个⻚表条⽬(PTE)，通过在这些⻚表条⽬(PTE)中添加⼀些标志位，就能够实现对⼀个虚拟⻚的访问控制权限。譬如：</p><p>相关的其他概念</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⽤户态和内核态</p><p>为了使操作系统内核提供⼀个⽆懈可击的进程抽象，处理器必须提供⼀种机制，限制⼀个应⽤可以执⾏的指令以及他可以⽤来访问的地址空间范围。</p><p>处理器通常是⽤某个控制寄存器中的⼀个模式位来提供这种观功能的，该寄存器描述了进程当前享有的特权。</p><p>当设置了模式位时：</p><p>进程就运⾏在内核态中。</p><p>运⾏在内核态中的进程可以执⾏指令集中的任何指令，并且可以访问系统中的任何内存位置。</p><p>没有设置模式位时：</p><p>进程就运⾏在⽤户态。⽤户模式中的进程不允许执⾏特权指令。</p><p>⽐如：停⽌处理器、改变模式位、或者发起⼀个I/O操作。同时也不允许⽤户态下的进程直接引⽤地址空间中内核空间的代码和数据。</p><p>任何这样的尝试都会导致致命的保护故障。⽤户态下的程序必须通过系统调⽤接⼝间接的访问内核代码和数据。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 上下⽂切换 &#x27;</p><p>上下⽂切换属于⼀种较⾼层形式的异常控制流，进⾏上下切换涉及到的内容如下：</p><ul><li>各种寄存器，TLB 也是其中之⼀。</li></ul><ul><li>程序计数器</li></ul><ul><li>⽤户栈</li></ul><ul><li>内核栈</li></ul><ul><li>内核中的各种数据结构</li></ul><ul><li>⻚表</li></ul><ul><li>task_struct</li></ul><ul><li>mm_struct</li></ul></div>"},{"title":"⼩总结","content":"<p>虚拟内存的思想，整体来看就是：通过结合磁盘和内存各⾃的优势，利⽤中间层对资源进⾏更合理地调度，充分提⾼资源的利⽤率。并提供和谐以及统⼀的抽象。</p><p>为什么需要虚拟内存：（摘⾃ 为什么Linux需要虚拟内存⼀⽂)</p><ul><li>虚拟内存可以结合磁盘和物理内存的优势为进程提供看起来速度⾜够快并且容量⾜够⼤的存储</li></ul><ul><li>虚拟内存可以为进程提供独⽴的内存空间并引⼊多层的⻚表结构将虚拟内存翻译成物理内存，进程之间可以共享物理内存减少开销，也能简化程序的链接、装载以及内存分配过程;</li></ul><ul><li>虚拟内存可以控制进程对物理内存的访问，隔离不同进程的访问权限，提⾼系统的安全性。</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⽂件</p><p>⽂件是⼀种抽象机制，它提供了⼀种在磁上保存信息⽽且⽅便以后读取的⽅法。这种⽅法可以使⽤户不必了解存储信息的⽅法、位置和实际磁盘⼯作⽅式等有关细节</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. ⽂件命名</p><p>win95、win98⽤的都是MS-DOS的⽂件系统，即FAT-16， win98扩展了FAT-16成为FAT-32。</p><p>较新版的操作系统NTFS,win8配备ReFS。微软优化FAT,叫作exFAT。prog.c，圆点后⾯的部分称为⽂件扩展名。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、字节结构</p><p>把⽂件看成字节序列为操作系统提供了最⼤的灵活度</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、记录序列</p><p>⽂件结构上的第⼀步改进，这种模型中，⽂件是具有固定⻓度记录的序列</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、树</p><p>⽂件在这种结构中由⼀棵记录树构成，每个记录不必具有相同的⻓度，记录的固定位置上有⼀个键字段。这棵树按“键”字段进⾏排序，从⽽可以对特定“键”进⾏快速查找。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. ⽂件类型</p><ul><li>普通⽂件</li></ul><ul><li>⽬录</li></ul><ul><li>字符特殊⽂件（UNIX）</li></ul><ul><li>块特殊⽂件（UNIX）</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、顺序访问</p><p>按顺序读取⽂件的全部字节，早期操作系统只有这种访问⽅式</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、随机访问⽂件</p><p>当⽤磁盘存储⽂件时，可以以任何次序读取其中字节或记录的⽂件。许多应⽤程序需要这种类型⽂件</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. ⽂件属性</p><p>除了⽂件名和数据外，所有操作系统还会保存其他的⽂件相关信息，如创建⽇期、时间和⼤⼩等，这些附加的信息称为⽂件属性</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">举例：</p><p>创建者：创建⽂件者ID</p><p>所有者：当前所有者</p><p>当前⼤⼩：⽂件字节数</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7. ⽂件操作</p><p>使⽤⽂件的⽬的是存储信息并⽅便以后检索。对于存储和检索，不同系统提供了不同的操作。</p><p>常⻅的⽂件操作（系统调⽤）:</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、create</p><p>创建不包含任何数据的⽂件</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、delete</p><p>当不再需要某个⽂件时，必须删除该⽂件以释放磁盘空间</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、open</p><p>在使⽤⽂件之前，必须先打开⽂件</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、close</p><p>访问结束后，不再需要⽂件属性和磁盘地址，这时应该关闭⽂件以释放内部表空间</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、read</p><p>在⽂件中读取数据</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、write</p><p>向⽂件写数据，写操作⼀般也是从⽂件当前位置开始</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、append</p><p>此调⽤是write的限制形式，他只能在⽂件末尾添加数据</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">8、seek</p><p>对于随机访问⽂件，要指定从何处开始获取数据，通常的⽅法是⽤seek系统调⽤把当前位置指针指向⽂件中特定的位置。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">9、get attributes</p><p>进程运⾏常需要读取⽂件属性</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">10、set attributes</p><p>某些属性是可由⽤户设置的，甚⾄在⽂件创建之后</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">11、rename</p><p>⽤户尝尝要改变已有的名字，rename系统调⽤⽤于这⼀⽬的</p></div>"},{"title":"⽬录","content":"<p>⽂件系统通常提供⽬录或⽂件夹⽤于记录⽂件的位置，在很多操作系统中⽬录本身也是⽂件</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⼀级⽬录系统</p><p>在⼀个⽬录中包含所有⽂件，这有时称为根⽬录</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 层级⽬录系统</p><p>当⽤户有着数以千计的⽂件，为了寻找⽅便。需要层次结构（即⼀个⽬录树）</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、绝对路径名</p><p>它由从根⽬录到⽂件的路径组成。</p><pre><code class=\"language-txt\">Windows : \\usr\\ast\\maibox </code></pre><pre><code class=\"language-txt\">UNIX : /usr/ast/mailbox </code></pre><p>路径名的第⼀个字符是分隔符，则这个路径是绝对路径</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、相对路径名</p><p>它常和⼯作⽬录(working directory)(也和当前⽬录(acurrent directory))⼀起使⽤</p><p>例：UNIX</p><pre><code class=\"language-batch\">cp /usr/ast/mailbox /usr/ast/mailbox/mailbox.bak </code></pre><p>和命令</p><pre><code class=\"language-txt\">cp mailbox mailbox.bak # 具有相同的含义</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、特殊⽬录项</p><p>. dot ：指当前⽬录</p><p>.. dotdot 指其⽗⽬录</p><p><strong>eg:</strong></p><pre><code class=\"language-shell\">cp ../lib/dictionay . </code></pre><p>将usr/lib/下的dictionay复制到当前⽬录下</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. ⽬录操作</p><p>管理⽬录的系统调⽤</p><p>举例(Unix):</p><pre><code class=\"language-txt\">create # 创建目录\ndelete # 删除目录\nopendir # 目录内容可被读取\nclosedir # 读目录结束\nreaddir # 返回打开目录下一个目录项\nrename # 改变目录名\nlink # 链接技术允许在多个目录中出现同一个文件\nunlink # 删除目录项</code></pre></div>"},{"title":"⽂件系统的实现","content":"<p>⽂件存储实现的关键问题是记录各个⽂件分别⽤到哪些磁盘块。不同的操作系统⽤到不同的⽅法</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⽂件系统布局</p><p>⽂件系统存放在磁盘上。多数磁盘划分为⼀个或多个分区，每个分区中国有⼀个独⽴的⽂件系统。</p><p>磁盘0号扇区称为主引导记录(MBR)，⽤来引导计算机。在MBR结尾是分区表。该表给出每个分区的起始结束地址。</p><p>表中的⼀个分区被标记为活动区。在计算机被引导时，BIOS读⼊并执⾏MBR。MBR做的第⼀件事是确定活动分区，读⼊它的第⼀个块，称为引导块，并执⾏之。</p><p>引导块中的程序将装载该分区中的操作系统。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、连续分配</p><p>最简单的分配是把每个⽂件作为⼀连串连续数据块存储在磁盘</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）实现简单</p><p>记录每个⽂件⽤到磁盘块简化为只需记住两个数字即可：第⼀块的磁盘地址和⽂件的块数。给定了第⼀块编号，⼀个简单的加法就可以找到任何其他块的编号</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）操作性能较好</p><p>因为单个操作中就能从磁盘上读出整个⽂件。只需⼀次寻找。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、链表分配</p><p>为每个⽂件构造磁盘块链表。每⼀块的第⼀个字作为指向下⼀块的指针，块的其他部分存放数据。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优势：</p><ul><li>可以充分利⽤磁盘块，不会因为磁盘碎⽚浪费存储内存</li></ul><ul><li>随机访问快。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>指针占⽤⼀些字节，每个磁盘块存储数据的字节数不再是2的整数次幂。怪异的⼤⼩降低了系统的运⾏效率，每个块前⼏个字节被指向下⼀个块的指针所占据，需要从两个磁盘中获取拼接信息，这就因复制⽽引发额外的开销。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、采⽤内存中的表进⾏链表分配</p><p>取出每个磁盘块的指针字，把他放在内存的⼀个表中，解决链表分配的不⾜。内存中这样的表格称为⽂件分配表(File Allocation Table，FAT)</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、i节点</p><p>最后⼀个记录各⽂件分别包含哪些磁盘块的⽅法是给每个⽂件赋予⼀个称为i节点的数据结构，其中列出了⽂件属性和⽂件的磁盘地址。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. ⽬录的实现</p><p>在读⽂件之前，必须先打开⽂件。打开⽂件时，操作系统利⽤⽤户给出的路径名找到相应的⽬录项。</p><p>简单⽬录：包含固定⼤⼩的⽬录，在⽬录项中有磁盘地址和属性</p><p>采⽤i节点的系统：把⽂件属性存放在i节点中⽽不是⽬录项中。这种情形下，⽬录项会更短。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 共享⽂件</p><p>当⼏个⽤户同在⼀个项⽬⾥⼯作时，他们常常需要共享⽂件。</p><p>共享⽂件与⽬录的联系称为⼀个链接（link）。这样⽂件系统本身就是⼀个有向⽆环图（DAG），⽽不是⼀棵树。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. ⽇志结构⽂件系统</p><p>CPU运⾏速度越来越快，磁盘容量越来越⼤，价格越来越便宜（但磁盘速度并没有增快多少），同时内存容量也以指数形式增⻓。</p><p>⽽没有得到快速发展的参数是磁道的寻道时间。这些成为了⽂件系统性能的瓶颈，为了解决这⼀问题设计了全新的⽂件系统即⽇志结构⽂件系统（LFS）。</p><p>虽然是⼀个很吸引⼈的想法，由于它们和⽂件系统不匹配，该⽂件系统并没有被⼴泛应⽤。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. ⽇志⽂件系统</p><p>基本的想法是保存⼀个⽤于记录系统下⼀步将要做什么的⽇志。</p><p>这样当系统在完成他们即将完成的任务前崩溃时，重新启动后，可以通过查看⽇志，获取崩溃前计划完成的任务，并完成它们。</p><p>这样的⽂件⽇志系统，并已经被实际应⽤。微软的NTFS、Linux的 ext3和ReiserFS⽂件系统都使⽤⽇志。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7. 虚拟⽂件系统</p><p>将多个⽂件系统整合到⼀个统⼀的结构中。</p><p>⼀个Linux系统可以⽤ext2作为根⽂件系统，ext3分区装载在/usr下，另⼀块采⽤ReiserFS⽂件系统的硬盘装载在/home下，以及⼀个ISO 9660的CD-ROM临时装载在/mnt下。从⽤户的观点来看，只有⼀个⽂件系统层级。</p><p>它们事实上是多种⽂件系统，对于⽤户和进程是不可⻅的。绝⼤多数Unix操作系统都在使⽤虚拟⽂件系统（VirtualFile System, VFS）</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 磁盘空间管理</p><p>⼏乎所有⽂件系统都把⽂件分割成固定⼤⼩的块来存储，各块之间不⼀定相邻</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、块⼤⼩</p><p>从历史的观点上来说，⽂件系统将⼤⼩设在1~4KB之间，但现在随着磁盘超过了1TB，还是将块的⼤⼩提升到64KB并且接受浪费的磁盘孔空间，这样也许更好。磁盘空间⼏乎不再会短缺。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）磁盘块链表</p><p>链表的每个块中包含尽可能多的空闲磁盘块号。</p><p>通常情况下，采⽤空闲块存放空闲表，这样不会影响存储器</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）位图</p><p>在位图中，空闲块⽤1表示，已分配块⽤0表示。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）磁盘配额</p><p>为防⽌⼈们贪⼼⽽占有太多的磁盘空间，⽤户操作系统常常提供⼀种强制性磁盘配额机制。</p><p>其思想是系统管理员分给每个⽤户拥有⽂件和块的最⼤数量，操作系统确保每个⽤户不超过分给他们的配额。（配额表、打开⽂件表）</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. ⽂件系统备份</p><p>做磁盘备份主要是处理好两个潜在问题中的⼀个</p><ul><li>从意外的灾难中恢复</li></ul><ul><li>从错误的操作中恢复</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. ⽂件系统的⼀致性</p><p>很多⽂件系统读取磁盘块，进⾏修改后，再写回磁盘。</p><p>如果在修改过的磁盘块全部写回之前系统崩溃，则⽂件系统有可能处于不⼀致状态。</p><p>如果⼀些未被写回的块是i节点块、⽬录块或者是包含有空闲表的块时，这个问题尤为严重</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、⾼速缓存</p><p>减少磁盘访问次数技术是块⾼速缓存（block cache）或者缓冲区⾼速缓存（buffer cache）。</p><p>本书中，⾼速缓存指的是⼀系列的块，它们在逻辑上属于磁盘，但实际上基于性能的考虑被保存在内存中。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、块提取读</p><p>在需要⽤到块之前，试图提前将其写⼊⾼速缓存，从⽽提⾼命中率。</p><p>块提前读策略只适⽤于实际顺序读取的⽂件。对随机访问⽂件，提前读丝毫不起作⽤。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、减少磁盘臂运动</p><p>把可能顺序访问的块放⼀起，当然最好是同⼀柱⾯上，从⽽减少磁盘臂的移动次数。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 磁盘碎⽚整理</p><p>移动⽂件使它们相邻，并把所有的空闲空间放在⼀个或多个⼤的连续区域内。</p></div>"},{"title":"⽣磁盘的使⽤","content":"<p>⽣磁盘：根据盘块号来使⽤磁盘；</p><p>熟磁盘：根据⽂件来使⽤磁盘。</p>"},{"title":"磁盘如何使⽤？","content":"<ul><li>发送 out 指令；</li></ul><ul><li>⽂件视图；</li></ul><ul><li>发送 中断</li></ul>"},{"title":"磁盘的结构","content":"<p>盘⾯：类似于多个堆叠在⼀起的 DVD 光盘</p><p>磁道：每个 DVD 光盘上的同⼼圆</p><p>扇区：每个同⼼圆上的 ⼀段⼉ ⼩区域</p>"},{"title":"磁盘 IO 过程","content":"<p>寻道：将磁头移动到 指定 磁道</p><p>旋转：将磁头旋转到磁道中的指定 扇区</p><p>传输：对指定扇区 进⾏ 磁盘数据 IO 读写</p>"},{"title":"⼀层抽象","content":"<p>通过盘块号读写磁盘</p><p>对于⽤户来说，如果直接利⽤ 盘/柱⾯ C、磁头 H、扇区 S 来进⾏ 磁盘 IO 不太友好，所以通过⼀层抽象，即 ⽤户只⽤利⽤ 盘块号 block 来进⾏ 磁盘IO，然后由系统根据 block 计算出 C、H、S 即可</p>"},{"title":"磁盘编址","content":"<p>由于寻道时间 通常时间更⻓⼀些，所以，为了让 磁盘 IO 时间尽可能短⼀些，则需要使 寻道时间尽量段。即，把当⼀个 磁道编址⽤完后，向下⼀个 柱⾯ 继续编号，⽽不是向 下⼀个 磁道继续编号。</p><p>计算公式：盘块号 block = C (Heads Sectors) + H * Sectors + S</p>"},{"title":"⼆层抽象","content":"<p>多个进程通过队列使⽤磁盘</p><p>虽然⼀层抽象（利⽤ 盘块号）可以达到使⽤磁盘的⽬的，但是如果有多个磁盘访问请求出现在请求队列怎么办?此时，操作系统会根据 磁盘调度算法 来挑选⼀个 磁盘请求服务</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、FCFS：找最先来的请求</p><p>优点：公平</p><p>缺点：并不提供 最快的服务</p><p>FCFS 在寻道过程中，可能已经遇到⼀些以后可能需要访问的 磁道，但是会跳过，⽽造成 访问磁道 耗费时间较多。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、SSTF：类似于 SJF，每次选择距离当前磁头最近的待处理请求</p><p>优点：寻道时间最短</p><p>缺点：可能造成部分请求 “饥饿”（当某个请求的磁盘距离磁头较远，⽽⼀直有⽐其更近的请求时，这个请求⼀直⽆法执⾏）</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、SCAN 算法：类似电梯，先处理向上的请求，然后再处理反⽅向的请求</p><p>优点：不会造成部分请求的 “饥饿”</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">生磁盘(rawdisk)的使用整理</p><p>■(1)进程“得到盘块号”，算出扇区号(sector)</p><p>■(2)用扇区号make req，用电梯算法add_request</p><p>1(3)进程sleep_on static void read intr(void)(4)磁盘中断处理 end_request(1) ; 唤醒进程！do_hd_request() 门</p><p>■(5) do_hd_request算出cyl,head,sector</p><p>■(6) hd_out调用outp(...)完成端口写</p><p>Operating Systems</p><ul><li>15 -</li></ul><p>posper</p></div>"},{"title":"三层抽象","content":"<p>利⽤⽂件使⽤磁盘，就成了熟磁盘</p><p>让普通⽤户使⽤ raw disk： 许多⼈连扇区都不知道是什么? 要求他们根据盘块号来访问磁盘不太便利需要在盘块上引⼊更⾼⼀层次的抽象概念! ⽂件</p><p>⽤户眼⾥的 “⽂件”：⼀堆字符序列（字符流）</p><p>磁盘上的 “⽂件”：多个盘块构成的集合</p><p>所以，如果要利⽤⽂件来进⾏磁盘IO的话，就需要建⽴字符流到盘块集合的映射关系</p><p>常⻅的⽂件映射关系（⽂件实现⽅式）有以下 3 种：</p><ul><li>顺序结构</li></ul><ul><li>链式结构</li></ul><ul><li>索引</li></ul><p>顺序结构-实现⽂件</p><p>FCB：记录⽂件在磁盘中的起始块</p>"},{"title":"⽂件->盘块号","content":"<p>如何根据 ⽂件 找到 盘块号？</p><p>将⽂件按照 连续结构存放；（下 左图）；</p><p>对每个⽂件建⽴⼀个 FCB，记录该⽂件在磁盘中的 起始块号；</p><p>根据⽂件（字符流）中的第 n 个待查字符 + FCB 计算 （n / 每个盘块的⼤⼩ + FCB中的 起始块号】出其在磁盘上对应的 盘块号 【得到盘块号，然后采⽤ SCAN 算法]</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">这种⽅法的缺点：</p><ul><li>利⽤顺序结构存储⽂件，不利⽤⽂件的修改（因为 顺序存储的 增/删 代价⾮常⼤）</li></ul><ul><li>所以，当需要 动态修改 ⽂件时，最好使⽤ 链式存储⽂件</li></ul><p>链式结构-实现⽂件</p><p>优点：利于 增/删</p><p>缺点：不利于查询</p></div>"},{"title":"如何让外设动起来","content":"<ul><li>CPU 向 外设的控制器发送指令，即 out 指令</li></ul><ul><li>形成 ⽂件视图（为了统⼀ out 指令的形式）</li></ul><ul><li>中断（外设处理完事后，需要通知 cpu 继续接⼿ 下⼀步处理）</li></ul><p>显示器如何⼯作？即，printf 函数的⼯作流程</p>"},{"title":"键盘如何⼯作？","content":"<p>中断处理（根据扫描码 获取 对应的 ascii 码）；</p><p>将对应的 ascii 码 加⼊ 缓冲队列 read_que 中，等待上层程序调⽤</p>"},{"title":"什么是IO多路复⽤","content":"<p>I/O多路复⽤是⼀种在单个线程或进程中处理多个输⼊和输出操作的机制。它允许单个进程同时监视多个⽂件描述符(通常是套接字)，当⼀个或多个⽂件描述符准备好读或写时，它就可以⽴即响应。</p><p>I/O多路复⽤通常通过select、poll、epoll等系统调⽤来实现。</p><p>select： select是⼀个最古⽼的I/O多路复⽤机制，它可以监视多个⽂件描述符的可读、可写和错误状态。然⽽，但是它的效率可能随着监视的⽂件描述符数量的增加⽽降低。</p><p>poll： poll是select的⼀种改进，它使⽤轮询⽅式来检查多个⽂件描述符的状态，避免了select中⽂件描述符数量有限的问题。但对于⼤量的⽂件描述符，poll的性能也可能变得不⾜够⾼效。</p><p>epoll： epoll是Linux特有的I/O多路复⽤机制，相较于select和poll，它在处理⼤量⽂件描述符时更加⾼效。epoll使⽤事件通知的⽅式，只有在⽂件描述符就绪时才会通知应⽤程序，⽽不需要应⽤程序轮询。</p><p>I/O多路复⽤允许在⼀个线程中处理多个I/O操作，避免了创建多个线程或进程的开销，允许在⼀个线程中处理多个I/O操作，避免了创建多个线程或进程的开销。</p>"},{"title":"select/poll/epoll的区别和联系","content":"<p>select , poll 和 epoll 都是I/O多路复⽤技术，它们⽤于同时处理多个I/O操作，特别是在⾼并发⽹络编程中。</p>"},{"title":"select","content":"<p>select 是最早的I/O多路复⽤技术，它可以同时监视多个⽂件描述符（file descriptor, FD）的I/O状态（如可读、可写、异常等）。select函数使⽤⼀个⽂件描述符集合（通常是⼀个位图）来表示要监视的⽂件描述符，当有I/O事件发⽣时， select 会返回对应的⽂件描述符集合。</p><p>select的主要限制如下：</p><p>⽂件描述符数量限制： select 使⽤⼀个位图来表示⽂件描述符集合，这限制了它能够处理的⽂件描述符数量（通常是1024个）。</p><p>效率问题：当⽂件描述符数量较⼤时，select需要遍历整个⽂件描述符集合来查找就绪的⽂件描述符，这会导致较低的效率。</p><p>⾮实时性：每次调⽤ select 时，需要重新设置⽂件描述符集合，这会增加函数调⽤的开销。</p>"},{"title":"poll","content":"<p>poll 是为了克服 select 的限制⽽引⼊的⼀种I/O多路复⽤技术。 poll 使⽤⼀个⽂件描述符数组（通常是⼀个结构体数组）来表示要监视的⽂件描述符。与 select 类似， poll 可以监视多个⽂件描述符的I/O状态。</p><p>poll的优点如下：</p><p>⽂件描述符数量不受限制：由于 poll 使⽤⼀个动态数组来表示⽂件描述符，因此它可以处理任意数量的⽂件描述符。</p><p>效率相对较⾼： poll 在查找就绪的⽂件描述符时，只需要遍历实际使⽤的⽂件描述符数组，⽽不是整个⽂件描述符集合。</p><p>然⽽， poll 仍然存在⼀些问题：</p><p>效率问题：尽管 poll 相对于 select 具有较⾼的效率，但当⽂件描述符数量很⼤时，它仍然需要遍历整个⽂件描述符数组。</p><p>⾮实时性：与select类似，每次调⽤poll时，需要重新设置⽂件描述符数组。</p>"},{"title":"epoll","content":"<p>epoll 是Linux特有的⼀种⾼效I/O多路复⽤技术，它克服了 select 和 poll 的主要限制。 epoll 使⽤⼀个事件驱动（event-driven）的⽅式来处理I/O操作，它只会返回就绪的⽂件描述符，⽽不是遍历整个⽂件描述符集合。</p><p>epoll的主要优点如下：</p><p>⾼效： epoll 使⽤事件驱动的⽅式来处理I/O操作，因此它在处理⼤量⽂件描述符时具有很⾼的效率。当有I/O事件发⽣时， epoll 可以⽴即得到通知，⽽⽆需遍历整个⽂件描述符集合。这使得 epoll 在⾼并发场景中具有更好的性能。</p><p>可扩展性：与 poll 类似， epoll 可以处理任意数量的⽂件描述符，因为它使⽤⼀个动态数据结构来表示⽂件描述符。</p><p>实时性： epoll 使⽤⼀个内核事件表来记录要监视的⽂件描述符和事件，因此在每次调⽤ epoll 时⽆需重新设置⽂件描述符集合。这可以减少函数调⽤的开销，并提⾼实时性。</p><p>epoll 具有诸多优点，但它⽬前仅在Linux平台上可⽤。对于其他平台，可能需要使⽤类似的I/O多路复⽤技术，如BSD中的 kqueue 。</p><p>总结：select是最早的I/O多路复⽤技术，但受到⽂件描述符数量和效率⽅⾯的限制。poll克服了⽂件描述符数量的限制，但仍然存在⼀定的效率问题。 epoll 是⼀种⾼效的I/O多路复⽤技术，尤其适⽤于⾼并发场景，但它仅在Linux平台上可⽤。⼀般来说，epoll的效率是要⽐select和poll⾼的，但是对于活动连接较多的时候，由于回调函数触发的很频繁，其效率不⼀定⽐select和poll⾼。所以epoll在连接数量很多，但活动连接较⼩的情况性能体现的⽐较明显。</p><p>Linux 内存管理</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、程序⽂件段</p><p>包括程序的⼆进制可执⾏代码，只读；TEXT</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、已初始化数据段</p><p>包括已初始化的全局变量和静态常量；DATA</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、未初始化数据段</p><p>包括未初始化的静态变量和全局变量；BSS</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、堆段</p><p>包括动态分配的内存，从低地址开始向上增⻓；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、⽂件映射段</p><p>包括动态库、共享内存等，从低地址开始向上增⻓（跟硬件和内核版本有关）；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、栈段</p><p>包括函数的参数值和局部变量、函数调⽤的上下⽂等。栈的⼤⼩是固定的，⼀般是 8 MB 。当然系统也提供了参数，以便我们⾃定义⼤⼩；栈区是从⾼地址位向低地址位增⻓的</p></div>"},{"title":"Linux虚拟内存","content":"<p>对32位处理器，虚拟内存空间为4G，每个进程都认为⾃⼰拥有4G的空间，实际上，在虚拟内存对应的物理内存上，可能只对应的⼀点点的物理内存。</p><p>进程得到的这4G虚拟内存是⼀个连续的地址空间（这也只是进程认为），⽽实际上，它通常是被分隔成多个物理内存碎⽚，还有⼀部分存储在外部磁盘存储器上，在需要时进⾏数据交换。</p><p>由于存在两个内存地址，因此⼀个应⽤程序从编写到被执⾏，需要进⾏两次映射。第⼀次是映射到虚拟内存空间，第⼆次时映射到物理内存空间。在计算机系统中，第两次映射的⼯作是由硬件和软件共同来完成的。承担这个任务的硬件部分叫做存储管理单元 MMU，软件部分就是操作系统的内存管理模块了。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）内存分⻚</p><p>分⻚就是把整个虚拟和物理内存切成⼀段段固定⼤⼩的空间，连续且尺⼨固定的内存空间叫⻚，Linux下每⼀⻚⼤⼩4KB。虚拟内存和物理内存之间通过⻚表来映射。</p><p>当进程访问的虚拟地址在⻚表中查不到时，系统会产⽣⼀个缺⻚异常，进⼊系统内核空间分配物理内存、更新进程⻚表，最后再返回⽤户空间，恢复进程的运⾏。</p><ul><li>采⽤了分⻚，那么释放的内存都是以⻚为单位释放的，也就不会产⽣⽆法给进程使⽤的⼩内存，解决了内存碎⽚的问题</li></ul><ul><li>内存空间不⾜时，操作系统将正在运⾏的进程中，最近没使⽤的内存⻚⾯释放（暂时写⼊硬盘）需要的时候再加载进来，⼀次性只有少数的⻚，解决了交换效率低的问题</li></ul><ul><li>分⻚使我们在加载程序时，不⽤⼀次性加载到物理内存，可以只有在程序运⾏中，需要⽤到对应虚拟内存⻚⾥⾯的指令和数据时，再加载到物理内存⾥⾯去</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、分⻚虚拟地址和物理地址是如何映射的</p><p>虚拟地址分为：⻚号和⻚内偏移。</p><p>⻚号作为⻚表的索引，⻚表包含物理⻚每⻚所在物理内存的基地址，这个基地址与⻚内偏移的组合就形成了物理内存地址。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、简单的分⻚缺陷</p><p>空间上的缺陷：</p><p>32位，单进程⼀个⻚4KB，虚拟内存4GB，就有2^20个⻚，⼀个⻚表项4字节，结果是4GB空间映射需要4*2^20 =4MB存储⻚表。多进程100，需要400MB。</p><p>以⻚表⼀定要覆盖全部虚拟地址空间，不分级的⻚表就需要有 100 多万个⻚表项来映射，⼆级分⻚则只需要 1024个⻚表项（此时⼀级⻚表覆盖到了全部虚拟地址空间，⼆级⻚表在需要时创建）。</p><ul><li>段⻚式内存管理</li></ul><p>地址结构就由段号、段内⻚号和⻚内位移三部分组成。</p><ul><li>第⼀次访问段表，得到⻚表起始地址</li></ul><ul><li>第⼆次访问⻚表，得到物理⻚号</li></ul><ul><li>第三次将物理⻚号与⻚内位移组合，得到物理地址</li></ul><p>可⽤软、硬件相结合的⽅法实现段⻚式地址变换，这样虽然增加了硬件成本和系统开销，但提⾼了内存的利⽤率。</p></div>"},{"title":"Linux 信号","content":"<p>信号是⽤户、系统、进程发送给⽬标进程的信息，通知某个状态的改变或系统异常。</p><p>linux常⽤信号：</p><ul><li>SIGHUP控制终端挂起</li></ul><ul><li>SIGPIPE向读端关闭的通道或socket连接中写数据</li></ul><ul><li>SIGURG：socket连接上收到紧急数据</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、MutiTask 多任务</p><p>多个任务同时执⾏，同时可以是并发或并⾏。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、SMP 对称多处理</p><p>每个CPU地位相等，使⽤权限相同，多个CPU共享⼀个内存，每个 CPU 都可以访问完整的内存和硬件资源。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、ELF 可执⾏⽂件链接格式</p><p>Linux中可执⾏⽂件的存储格式。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、Monolithic Kerne宏内核的特征是系统内核的所有模块</p><p>⽐如进程调度、内存管理、⽂件系统、设备驱动等，都运⾏在内核态。Linux 的内核是⼀个完整的可执⾏程序，且拥有最⾼的权限。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、背景</p><p>I/O即Input/Output（输⼊和输出），由于程序和运⾏时数据是在内存中驻留，由CPU这个超快的计算核⼼来执⾏，涉及到数据交换的地⽅，通常是磁盘、⽹络等，就需要IO接⼝。</p><p>IO编程中涉及到流，其是相对于内存⽽⾔的，所以，Input Stream就是数据从外⾯（磁盘、⽹络）流进内存，Output Stream就是数据从内存流到外⾯去。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、概念</p><p>I/O操作就是在运⾏代码的过程中，可能需要对⽂件的读写，即将⽂件输⼊（Input）到内存和将代码执⾏结果产⽣的⽂件输出（Output）到外设（⽹络、磁盘）的过程。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、分类</p><ul><li>⽹络I/O：通过⽹络进⾏数据的拉取和输出;</li></ul><ul><li>磁盘I/O：主要是对磁盘进⾏读写⼯作。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、输⼊阶段⼀般操作</p><ul><li>等待数据准备好</li></ul><ul><li>从内核向进程复制数据</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、例如：</p><ul><li>等待数据从⽹络中到达：所等分组到达时，被复制到内核中的某个缓冲区</li></ul><ul><li>把数据从内核缓冲区复制到应⽤进程缓冲区</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、分类</p><ul><li>阻塞式I/O</li></ul><ul><li>⾮阻塞式I/O</li></ul><ul><li>I/O复⽤（select和poll）</li></ul><ul><li>信号驱动式I/O（SIGIO）</li></ul><ul><li>异步I/O（POSIX的aio_系列函数）</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）阻塞式I/O</p><p>进程或线程等待某个条件，如果条件不满⾜，则⼀直等下去。条件满⾜，则进⾏下⼀步操作。（默认情况下）</p><p>应⽤进程通过系统调⽤ recvfrom 接收数据，但由于内核还未准备好数据报，应⽤进程就会阻塞住，直到内核准备好数据报，recvfrom 完成数据报复制⼯作，应⽤进程才能结束阻塞状态。</p><p>懵d</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>设备⽂件不可操作时，可进⼊休眠状态，将CPU资源让出；当设备⽂件可以操作的时候就必须唤醒进程，⼀般在中断函数中完成唤醒⼯作;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>耗费时间，适合并发低，时效性要求低的情况。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）⾮阻塞式I/O</p><p>应⽤进程与内核交互，⽬的未达到之前，不再⼀味的等着，⽽是直接返回;</p><p>通过轮询的⽅式，不停的去问内核数据有没有准备好。如果某⼀次轮询发现数据已经准备好了，那就把数据拷⻉到⽤户空间中。</p><p>图6-2非阻塞式I/O模型</p><p>懵d</p><p>前三次调⽤ recvfrom 时没有数据可返回，内核⽴即返回 EWOULDBLOCK 错误</p><p>第四次调⽤ recvfrom 时，已有⼀个数据报准备好，将其从内核复制到应⽤进程缓冲区， recvfrom 成功返回;</p><p>轮询（polling）：</p><p>应⽤进程持续轮询内核，以查看某个操作是否就绪;</p><p>缺点：往往耗费⼤量CPU时间。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）IO复⽤</p><p>通过调⽤ select 或 poll，阻塞在这两个系统调⽤中的某⼀个之上，⽽不是阻塞在真正的I/O系统调⽤上。</p><p>阻塞于 select 调⽤，等待数据报套接字变为可读，当 select 返回套接字可读这⼀条件时，调⽤ recvfrom 把所读数据报复制到应⽤进程缓存区。</p><p>多个进程I/O注册到同⼀个 select，当⽤户进程调⽤ select，select 监听所有注册好的IO：</p><ul><li>若所有被监听的I/O需要的数据未准备好，则阻塞</li></ul><ul><li>任意⼀个所需数据准备好后，select 调⽤返回</li></ul><ul><li>⽤户进程通过 recvfrom 进⾏数据拷⻉</li></ul><p>优点：可以等待多个描述符就绪。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）信号驱动I/O</p><p>懵d</p><p>开启套接字信号驱动I/O功能，通过 sigaction 系统调⽤安装⼀个信号处理函数，该系统函数⽴即返回，不阻塞;</p><p>数据报准备好后，内核为该进程产⽣⼀个 SIGIO 信号递交给进程;</p><p>可以在信号处理函数中调⽤ recvfrom 读取数据报，通知主循环数据已准备好待处理;</p><p>可以⽴即通知主循环，读取数据报。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>等待数据报到达期间进程不被阻塞。主循环可以继续执⾏，等待来⾃信号处理函数的通知：既可以是数据已经准备好被处理，也可以是数据报已经准备好被读取。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（5）异步IO</p><p>⽤户进程告知内核启动某个操作，并由内核在整个操作中完成后通知⽤户进程。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">与信号驱动I/O的区别：</p><ul><li>信号驱动I/O是由内核通知我们何时可以启动⼀个I/O操作</li></ul><ul><li>异步I/O是由内核通知我们I/O操作何时完成</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">步骤：</p><ul><li>⽤户进程调⽤aio_read函数，给内核传递描述符、缓冲区指针、缓冲区⼤⼩和⽂件偏移，告诉内核整个操作完成时如何通知我们，然后就⽴刻去做其他事情;</li></ul><ul><li>当内核收到aio_read后，会⽴刻返回，然后内核开始等待数据准备，数据准备好以后，直接把数据拷⻉到⽤户空间，然后再通知进程本次IO已经完成。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、同步I/O</p><p>导致请求进程阻塞，直到I/O操作完成;</p><p>四种同步模型的区别在于第⼀阶段等待数据的处理⽅式不同，第⼆阶段均为将数据从内核空间复制到⽤户空间缓冲区期间，进程阻塞于recvfrom调⽤。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、异步I/O</p><p>不导致请求进程阻塞。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、I/O复⽤函数</p><p>多路复⽤接⼝ select/poll/epoll ，内核提供给⽤户态的多路复⽤系统调⽤，进程可以通过⼀个系统调⽤函数从内核中获取多个事件：</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）select--&gt;两次遍历+两次拷⻉</p><p>把已连接的socket放在⼀个⽂件描述符集合，调⽤ select 函数将⽂件描述符集合拷⻉到内核⾥，让内核来检查是否有⽹络事件产⽣；</p><p>通过遍历，有事件产⽣就把此socket标记为可读/可写，然后再整个拷⻉回⽤户态；</p><p>⽤户态还需要遍历找到刚刚标记的socket。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）poll</p><p>动态数组，以链表形式来组织，相⽐于select，没有⽂件描述符个数限制，当然还会受到系统⽂件描述符限制。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）epoll(event poll)--&gt;红⿊树</p><p>在内核⾥使⽤红⿊树来跟踪进程所有待检测的⽂件描述字。</p><p>调⽤epoll_ctl() 函数，把需要监控的 socket 加⼊内核中的红⿊树⾥：（红⿊树的增删查时间复杂度是O(logn)，不需要每次操作都传⼊整个集合，只需要传⼊⼀个待检测的socket，减少了内核和⽤户空间的⼤量数据拷⻉和内存分配）</p><p>epoll 使⽤事件驱动的机制，内核⾥维护了⼀个链表来记录就绪事件（当某个 socket 有事件发⽣时，通过回调函数，内核会将其加⼊到这个就绪事件列表中）</p><p>当⽤户调⽤ epoll_wait() 函数时，只会返回有事件发⽣的⽂件描述符的个数，不需要像 select/poll 那样轮询扫描整个 socket 集合，⼤⼤提⾼了检测的效率。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">epoll⽀持的事件触发模式：</p><ul><li>边缘触发ET</li></ul><ul><li>⽔平触发LT</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">边缘触发模式ET：</p><p>当被监控的 Socket 描述符上有可读事件发⽣时，服务器只会从 epoll_wait中苏醒⼀次，即使进程没有调⽤ read 函数从内核读取数据，也依然只苏醒⼀次，因此我们程序要保证⼀次性将内核缓冲区的数据读取完，只有第⼀次满⾜条件的时候才触发，之后就不会再传递同样的事件了。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">⽔平触发模式LT：</p><p>当被监控的 Socket 上有可读事件发⽣时，服务器不断地从 epoll_wait中苏醒，直到内核缓冲区数据被 read 函数读完才结束，⽬的是告诉我们有数据，只要满⾜事件的条件，⽐如内核中有数据需要读，就⼀直不断地把这个事件传递给⽤户。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（5）select和epoll的区别</p><ul><li>select 和 poll 采⽤轮询的⽅式检查就绪事件，每次都要扫描整个⽂件描述符，复杂度O(N);</li></ul><ul><li>epoll 采⽤回调⽅式检查就绪事件，只会返回有事件发⽣的⽂件描述符的个数，复杂度O(1);</li></ul><ul><li>select 只⼯作在低效的LT模式，epoll 可以在 ET ⾼效模式⼯作;</li></ul><ul><li>epoll 是 Linux 所特有，⽽ select 则应该是 POSIX 所规定，⼀般操作系统均有实现;</li></ul><ul><li>select 单个进程可监视的fd数量有限，即能监听端⼝的⼤⼩有限，64位是2048；epoll 没有最⼤并发连接的限制，能打开的 fd 的上限远⼤于2048（1G的内存上能监听约10万个端⼝）;</li></ul><ul><li>select 内核需要将消息传递到⽤户空间，都需要内核拷⻉动作；epoll通过内核和⽤户空间共享⼀块内存来实现的。</li></ul></div>"},{"title":"Linux⽹络","content":"<p>如何在基本⽹络通信模型基础上提升服务器⾃身服务响应？</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、多进程服务器</p><p>每次的请求⽗进程fork出⼦进程进⾏业务处理，⽗进程⽤于处理请求连接</p><ul><li>⽗⼦进程的⽣命周期绝⼤多数都不相同，如何、何时进⾏销毁，才能确保不会⼤量出僵⼫进程</li></ul><ul><li>⼦⽗进程之间如何进⾏通讯？</li></ul><p>进程的创建、切换都需要都会带来⼤量的开销，同时每个进程都具有⾃⼰独⽴的虚拟内存空间，所以需要使⽤到IPC机制，完成进程间的数据交换</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、I/O复⽤服务器</p><ul><li>在不额外创建进程的基础上同时为多个请求端提供请求</li></ul><ul><li>select、poll、epoll实现优缺点</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、多线程服务器</p><p>同⼀进程下的多个线程共享进程的系统资源，所以相⽐于多进程，同进程下的多线程通信更加⽅便，并且切换的开销⼩很多。</p><ul><li>如何创建、销毁线程</li></ul><ul><li>如何保证线程的安全</li></ul><ul><li>线程间的通信</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">物理实现：</p><p>软链接： 软链接是⼀个独⽴的⽂件，它包含了指向⽬标⽂件或⽬录的路径。软链接实际上是⼀个特殊的⽂件，其中包含有关⽬标⽂件的引⽤。</p><p>硬链接： 硬链接是⽬标⽂件的⼀个额外的⽬录项。⽬录项指向相同的物理数据块，实际上只是⽂件系统中的两个或多个⽬录项指向相同的inode。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">链接的⽬标：</p><p>软链接： 软链接可以链接到⽂件或⽬录，甚⾄可以链接到不存在的⽂件。</p><p>硬链接： 硬链接只能链接到⽂件，⽽且必须是同⼀⽂件系统中的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">对链接的影响：</p><p>软链接： 如果原始⽂件被删除或移动，软链接仍然存在，但链接将失效。软链接可以跨⽂件系统，但如果⽬标⽂件被删除，软链接将成为坏链接（dangling link）。</p><p>硬链接： 删除或移动原始⽂件并不会影响硬链接，因为硬链接只是inode的另⼀个引⽤。只有当所有硬链接都被删除后，inode的数据块才会被释放。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">创建⽅式：</p><p>软链接： 使⽤ ln -s 命令创建软链接。例如， ln -s target_file link_name 。</p><p>硬链接： 使⽤ ln 命令创建硬链接。例如， ln target_file link_name 。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">链接数量：</p><p>软链接： 软链接只会增加⽬标⽂件的链接计数，⽽不会增加inode的链接计数。</p><p>硬链接： 硬链接会增加⽬标⽂件的链接计数，也会增加inode的链接计数。当链接计数为零时，⽂件系统才会释放相关的数据块。</p></div>"},{"title":"什么是中断和异常","content":"<p>中断和异常都会导致处理器暂停当前正在执⾏的任务，并转向执⾏⼀个特定的处理程序（中断处理程序或异常处理程序）。然后在处理完这些特殊情况后，处理器会返回到被打断的任务继续执⾏。</p><ul><li>中断是由计算机系统外部事件触发的，通常与硬件设备相关。中断的⽬的是为了及时响应重要事件⽽暂时中断正常的程序执⾏。典型的中断包括时钟中断、I/O设备中断（如键盘输⼊、⿏标事件）和硬件错误中断等。操作系统通常会为每种类型的中断分配⼀个中断处理程序，⽤于处理相应的事件。</li></ul><ul><li>异常是由计算机系统内部事件触发的，通常与正在执⾏的程序或指令有关，⽐如程序的⾮法操作码、地址越界、运算溢出等错误引起的事件，异常不能被屏蔽，当出现异常时，计算机系统会暂停正常的执⾏流程，并转到异常处理程序来处理该异常。</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⽤户态和内核态的区别</p><p>⽤户态 （User Mode） 和内核态 （Kernel Mode） 是操作系统为了保护系统资源和实现权限控制⽽设计的两种不同的CPU运⾏级别，可以控制进程或程序对计算机硬件资源的访问权限和操作范围。</p><p>⽤户态：在⽤户态下，进程或程序只能访问受限的资源和执⾏受限的指令集，不能直接访问操作系统的核⼼部分，也不能直接访问硬件资源。</p><p>核⼼态：核⼼态是操作系统的特权级别，允许进程或程序执⾏特权指令和访问操作系统的核⼼部分。在核⼼态下，进程可以直接访问硬件资源，执⾏系统调⽤，管理内存、⽂件系统等操作。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 在什么场景下，会发⽣内核态和⽤户态的切换</p><p>系统调⽤：当⽤户程序需要请求操作系统提供的服务时，会通过系统调⽤进⼊内核态。</p><p>异常：当程序执⾏过程中出现错误或异常情况时，CPU会⾃动切换到内核态，以便操作系统能够处理这些异常。</p><p>中断：外部设备（如键盘、⿏标、磁盘等）产⽣的中断信号会使CPU从⽤户态切换到内核态。操作系统会处理这些中断，执⾏相应的中断处理程序，然后再将CPU切换回⽤户态。</p></div>"},{"title":"并⾏和并发是什么","content":"<p>并⾏是在同⼀时刻执⾏多个任务。</p><p>并发是在相同的时间段内执⾏多个任务，任务可能交替执⾏，通过调度实现。</p><p>并⾏是指在同⼀时刻执⾏多个任务，这些任务可以同时进⾏，每个任务都在不同的处理单元（如多个CPU核⼼）上执⾏。在并⾏系统中，多个处理单元可以同时处理独⽴的⼦任务，从⽽加速整体任务的完成。</p><p>并发是指在相同的时间段内执⾏多个任务，这些任务可能不是同时发⽣的，⽽是交替执⾏，通过时间⽚轮转或者事件驱动的⽅式。并发通常与任务之间的交替执⾏和任务调度有关。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说⼀说僵⼫进程和孤⼉进程</p><ul><li>孤⼉进程：⼀个⽗进程退出，⽽它的⼀个或多个⼦进程还在运⾏，那么那些⼦进程将成为孤⼉进程。孤⼉进程将被init进程(进程号为1)所收养，并由init进程对它们完成状态收集⼯作。</li></ul><ul><li>僵⼫进程：⼀个进程使⽤fork创建⼦进程，如果⼦进程退出，⽽⽗进程并没有调⽤wait或waitpid获取⼦进程的状态信息，那么⼦进程的进程描述符仍然保存在系统中。这种进程称之为僵⼫进程。</li></ul></div>"},{"title":"信号和信号量有什么区别","content":"<p>信号：⼀种处理异步事件的⽅式。信号是⽐较复杂的通信⽅式，⽤于通知接收进程有某种事件发⽣，除了⽤于进程外，还可以发送信号给进程本身。</p><p>信号量：进程间通信处理同步互斥的机制。是在多线程环境下使⽤的⼀种设施，它负责协调各个线程，以保证它们能够正确，合理的使⽤公共资源。</p>"},{"title":"常⽤的Linux命令","content":"<p>ls：列出当前⽬录下的⽂件和⼦⽬录。</p><p>cd：切换⽬录。</p><p>pwd：显示当前⼯作⽬录的路径。</p><p>touch：创建新⽂件。</p><p>mkdir：创建新⽬录。</p><p>rm：删除⽂件或⽬录。</p><p>cp：复制⽂件或⽬录。</p><p>mv：移动⽂件或⽬录，也⽤于重命名。</p><p>cat：显示⽂件的内容。</p><p>vi: 编辑⽂件</p><p>head 和 tail：查看⽂件的开头和结尾部分。</p><p>grep：查找⽂件或其他内容⾥符合条件的字符串</p><p>find：查找⽂件和⽬录。</p><p>chmod：更改⽂件或⽬录的权限。</p><p>chown：更改⽂件或⽬录的所有者。</p><p>ps：列出运⾏中的进程。</p><p>kill：终⽌进程。</p><p>df：显示磁盘空间使⽤情况。</p><p>tar：创建和提取归档⽂件（通常是.tar⽂件）。</p><p>ifconfig：查看ip地址</p><p>ping：测试⽹络连接。</p><p>ssh：通过SSH协议远程登录到其他计算机。</p><p>apt（Debian/Ubuntu）或 yum（Red Hat/CentOS）：包管理器，⽤于安装、更新和删除软件包。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">Linux中如何查看⼀个进程</p><p>ps 命令⽤于列出当前⽤户的进程信息如果要查找特定进程。</p><p>可以使⽤ grep 命令来过滤结果。例如，要查找名为 &quot;myprocess&quot; 的进程，可以执⾏以下命令：</p><pre><code class=\"language-txt\">ps aux | grep myprocess </code></pre><p>pgrep 和 pidof 命令⽤于通过进程名称查找进程的PID（进程ID）</p><pre><code class=\"language-txt\">pgrep myprocess\npidof myprocess </code></pre></div>"},{"title":"如何杀死⼀个进程","content":"<p>使⽤ kill 命令可以向⼀个进程发送信号，终⽌进程， kill [options] PID</p><p>killall 命令⽤于根据进程名杀死所有匹配的进程。</p><p>杀死⽗进程并不会同时杀死⼦进程：每个进程都有⼀个⽗进程。可以使⽤ pstree 或 ps ⼯具来观察这⼀点。</p><p>杀死⽗进程后，⼦进程将会成为孤⼉进程，⽽ init 进程将重新成为它的⽗进程。</p>"},{"title":"局部性原理","content":"<p>在⼀段时间内，程序倾向于多次访问相同的数据或接近的数据，⽽不是随机地访问内存中的各个位置。局部性原理通常分为两种类型：时间局部性和空间局部性。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 时间局部性</p><p>如果⼀个数据被访问，那么在不久的将来它很可能会再次被访问。这意味着程序在短时间内倾向于反复使⽤相同的数据项，例如在循环中反复访问数组的元素。</p><p>通过利⽤时间局部性，程序可以将频繁使⽤的数据存储在缓存中，从⽽减少访问主内存的次数，提⾼程序的执⾏速度。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 空间局部性</p><p>如果⼀个数据被访问，那么它附近的数据也很可能会被访问。这意味着程序在访问⼀个数据时，通常会在接近该数据的附近访问其他数据，例如遍历数组时，往往会访问相邻的元素。</p><p>⽂件系统在磁盘上存储数据时，通常会将相关的数据块放在相邻的磁盘扇区上，以便在访问⼀个数据块时能够快速地访问相邻的数据块。</p></div>"},{"title":"进程、线程的区别？","content":"<p>进程是系统进⾏资源分配和调度的基本单位。</p><p>线程是操作系统能够进⾏运算调度的最⼩单位，线程是进程的⼦任务，是进程内的执⾏单元。 ⼀个进程⾄少有⼀个线程，⼀个进程可以运⾏多个线程，这些线程共享同⼀块内存。</p><p>资源开销：</p><p>进程：由于每个进程都有独⽴的内存空间，创建和销毁进程的开销较⼤。进程间切换需要保存和恢复整个进程的状态，因此上下⽂切换的开销较⾼。</p><p>线程：线程共享相同的内存空间，创建和销毁线程的开销较⼩。线程间切换只需要保存和恢复少量的线程上下⽂，因此上下⽂切换的开销较⼩。</p><p>通信与同步：</p><p>进程：由于进程间相互隔离，进程之间的通信需要使⽤⼀些特殊机制，如管道、消息队列、共享内存等。</p><p>线程：由于线程共享相同的内存空间，它们之间可以直接访问共享数据，线程间通信更加⽅便。</p><p>安全性：</p><p>进程：由于进程间相互隔离，⼀个进程的崩溃不会直接影响其他进程的稳定性。</p><p>线程：由于线程共享相同的内存空间，⼀个线程的错误可能会影响整个进程的稳定性。</p>"},{"title":"进程的状态有哪些","content":"<p>进程的3种基本状态：运⾏、就绪和阻塞。</p><ul><li>就绪：当⼀个进程获得了除处理机以外的⼀切所需资源，⼀旦得到处理机即可运⾏，则称此进程处于就绪状态。就绪进程可以按多个优先级来划分队列。例如，当⼀个进程由于时间⽚⽤完⽽进⼊就绪状态时，排⼊低优先级队列；当进程由I／O操作完成⽽进⼊就绪状态时，排⼊⾼优先级队列。</li></ul><ul><li>运⾏：当⼀个进程在处理机上运⾏时，则称该进程处于运⾏状态。处于此状态的进程的数⽬⼩于等于处理器的数⽬，对于单处理机系统，处于运⾏状态的进程只有⼀个。在没有其他进程可以执⾏时（如所有进程都在阻塞状态），通常会⾃动执⾏系统的空闲进程。</li></ul><ul><li>阻塞：也称为等待或睡眠状态，⼀个进程正在等待某⼀事件发⽣（例如请求I/O⽽等待I/O完成等）⽽暂时停⽌运⾏，这时即使把处理机分配给进程也⽆法运⾏，故称该进程处于阻塞状态。</li></ul><p>进程的五种状态</p><p>创建状态：进程在创建时需要申请⼀个空⽩PCB，向其中填写控制和管理进程的信息，完成资源分配。如果创建⼯作⽆法完成，⽐如资源⽆法满⾜，就⽆法被调度运⾏，把此时进程所处状态称为创建状态</p><p>就绪状态：进程已经准备好，已分配到所需资源，只要分配到CPU就能够⽴即运⾏</p><p>执⾏状态：进程处于就绪状态被调度后，进程进⼊执⾏状态</p><p>阻塞状态：正在执⾏的进程由于某些事件（I/O请求，申请缓存区失败）⽽暂时⽆法运⾏，进程受到阻塞。在满⾜请求时进⼊就绪状态等待系统调⽤</p><p>终⽌状态：进程结束，或出现错误，或被系统终⽌，进⼊终⽌状态。⽆法再执⾏</p>"},{"title":"进程之间的通信⽅式","content":"<ul><li>管道：是⼀种半双⼯的通信⽅式，数据只能单向流动⽽且只能在具有⽗⼦进程关系的进程间使⽤。</li></ul><ul><li>命名管道： 也是半双⼯的通信⽅式，但是它允许⽆亲缘关系进程间的通信。</li></ul><ul><li>信号量：是⼀个计数器，可以⽤来控制多个进程对共享资源的访问，常作为⼀种锁机制，防⽌某进程正在访问共享资源时，其他进程也访问该资源。因此主要作为进程间以及同⼀进程内不同线程之间的同步⼿段。</li></ul><ul><li>消息队列：消息队列是消息的链表，存放在内核中并由消息队列标识符标识。消息队列克服了信号传递信息少、管道只能承载⽆格式字节流以及缓冲区⼤⼩受限等缺点。</li></ul><ul><li>信号：⽤于通知接收进程某个事件已经发⽣，从⽽迫使进程执⾏信号处理程序。</li></ul><ul><li>共享内存：就是映射⼀段能被其他进程所访问的内存，这段共享内存由⼀个进程创建，但多个进程都可以访问。共享内存是最快的进程通信⽅式，它是针对其他进程间通信⽅式运⾏效率低⽽专⻔设计的。它往往与其他通信机制，⽐如信号量配合使⽤，来实现进程间的同步和通信。</li></ul><ul><li>Socket 套接字：是⽀持TCP/IP 的⽹络通信的基本操作单元，主要⽤于在客户端和服务器之间通过⽹络进⾏通信。</li></ul>"},{"title":"线程之间的同步⽅式","content":"<p>线程同步机制是指在多线程编程中，为了保证线程之间的互不⼲扰，⽽采⽤的⼀种机制。常⻅的线程同步机制有以下⼏种：</p><ul><li>互斥锁：互斥锁是最常⻅的线程同步机制。它允许只有⼀个线程同时访问被保护的临界区（共享资源）</li></ul><ul><li>条件变量：条件变量⽤于线程间通信，允许⼀个线程等待某个条件满⾜，⽽其他线程可以发出信号通知等待线程。通常与互斥锁⼀起使⽤。</li></ul><ul><li>读写锁： 读写锁允许多个线程同时读取共享资源，但只允许⼀个线程写⼊资源。</li></ul><ul><li>信号量：⽤于控制多个线程对共享资源进⾏访问的⼯具。</li></ul>"},{"title":"介绍⼀下你知道的锁","content":"<p>两个基础的锁：</p><p>互斥锁：互斥锁是⼀种最常⻅的锁类型，⽤于实现互斥访问共享资源。在任何时刻，只有⼀个线程可以持有互斥锁，其他线程必须等待直到锁被释放。这确保了同⼀时间只有⼀个线程能够访问被保护的资源。</p><p>⾃旋锁：⾃旋锁是⼀种基于忙等待的锁，即线程在尝试获取锁时会不断轮询，直到锁被释放。</p><p>其他的锁都是基于这两个锁的</p><p>读写锁：允许多个线程同时读共享资源，只允许⼀个线程进⾏写操作。分为读（共享）和写（排他）两种状态。</p><p>悲观锁：认为多线程同时修改共享资源的概率⽐较⾼，所以访问共享资源时候要上锁</p><p>乐观锁：先不管，修改了共享资源再说，如果出现同时修改的情况，再放弃本次操作</p>"},{"title":"什么情况下会产⽣死锁","content":"<p>死锁是指两个或多个进程在争夺系统资源时，由于互相等待对⽅释放资源⽽⽆法继续执⾏的状态。</p><p>死锁只有同时满⾜以下四个条件才会发⽣：</p><p>互斥条件：⼀个进程占⽤了某个资源时，其他进程⽆法同时占⽤该资源。</p><p>请求保持条件：⼀个线程因为请求资源⽽阻塞的时候，不会释放⾃⼰的资源。</p><p>不可剥夺条件：资源不能被强制性地从⼀个进程中剥夺，只能由持有者⾃愿释放。</p><p>环路等待条件：多个进程之间形成⼀个循环等待资源的链，每个进程都在等待下⼀个进程所占有的资源。</p>"},{"title":"如何解除死锁","content":"<p>只需要破坏上⾯⼀个条件就可以破坏死锁。</p><p>破坏请求与保持条件：⼀次性申请所有的资源。</p><p>破坏不可剥夺条件：占⽤部分资源的线程进⼀步申请其他资源时，如果申请不到，可以主动释放它占有的资源。</p><p>破坏循环等待条件：靠按序申请资源来预防。让所有进程按照相同的顺序请求资源，释放资源则反序释放。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）先来先服务：</p><p>⾮抢占式的调度算法，按照请求的顺序进⾏调度。</p><p>有利于⻓作业，但不利于短作业，因为短作业必须⼀直等待前⾯的⻓作业执⾏完毕才能执⾏，⽽⻓作业⼜需要执⾏很⻓时间，造成了短作业等待时间过⻓。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）最短作业优先：</p><p>⾮抢占式的调度算法，按估计运⾏时间最短的顺序进⾏调度。</p><p>⻓作业有可能会饿死，处于⼀直等待短作业执⾏完毕的状态。因为如果⼀直有短作业到来，那么⻓作业永远得不到调度。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）最短剩余时间优先：</p><p>最短作业优先的抢占式版本，按剩余运⾏时间的顺序进⾏调度。</p><p>当⼀个新的作业到达时，其整个运⾏时间与当前进程的剩余时间作⽐较。如果新的进程需要的时间更少，则挂起当前进程，运⾏新的进程。否则新的进程等待。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）时间⽚轮转调度</p><p>将所有就绪进程按 FCFS 的原则排成⼀个队列，每次调度时，把 CPU 时间分配给队⾸进程，该进程可以执⾏⼀个时间⽚。当时间⽚⽤完时，由计时器发出时钟中断，调度程序便停⽌该进程的执⾏，并将它送往就绪队列的末尾，同时继续把 CPU 时间分配给队⾸的进程。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）优先级调度</p><p>为每个进程分配⼀个优先级，按优先级进⾏调度。为了防⽌低优先级的进程永远等不到调度，可以随着时间的推移增加等待进程的优先级。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）多级队列</p><p>⼀个进程需要执⾏ 100 个时间⽚，如果采⽤时间⽚轮转调度算法，那么需要交换 100 次。</p><p>多级队列是为这种需要连续执⾏多个时间⽚的进程考虑，它设置了多个队列，每个队列时间⽚⼤⼩都不同，例如1,2,4,8,..。进程在第⼀个队列没执⾏完，就会被移到下⼀个队列。这种⽅式下，之前的进程只需要交换 7 次。</p><p>每个队列优先权也不同，最上⾯的优先权最⾼。因此只有上⼀个队列没有进程在排队，才能调度当前队列上的进程。</p><p>可以将这种调度算法看成是时间⽚轮转调度算法和优先级调度算法的结合。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）最短进程优先</p><p>如果我们将每⼀条命令的执⾏看作是⼀个独⽴的“作业”，则我们可以通过⾸先运⾏最短的作业来使响应事件最短</p></div>"},{"title":"分段","content":"<p>基本单位： 地址空间被划分为不同的逻辑段，每个段具有独⽴的含义，如代码段、数据段等。</p><p>段的⻓度： 每个段的⻓度可以动态变化，不同段的⻓度可以不同。</p><p>内部碎⽚： 由于每个段的⻓度可以动态变化，可能会导致内部碎⽚，即段内部的未使⽤空间。</p><p>外部碎⽚： 可能会导致外部碎⽚，即段之间的未使⽤空间。</p><p>逻辑地址： 逻辑地址由两部分组成，⼀个是段号，另⼀个是段内偏移。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">分⻚（Paging）：</p><p>基本单位： 地址空间被划分为固定⼤⼩的⻚⾯，物理内存也被划分为相同⼤⼩的⻚⾯框。</p><p>⻚⾯的⻓度： ⻚⾯的⻓度是固定的，由操作系统定义。</p><p>内部碎⽚： 由于⻚⾯⻓度固定，可能会导致内部碎⽚，即⻚⾯内部的未使⽤空间。</p><p>外部碎⽚： 由于⻚⾯⻓度固定，不同⻚⾯之间的未使⽤空间⽆法利⽤，可能导致外部碎⽚。</p><p>逻辑地址： 逻辑地址由两部分组成，⼀个是⻚号，另⼀个是⻚内偏移。</p></div>"},{"title":"⻚⾯置换算法","content":"<p>LRU（最近最少使⽤）算法：每次选择最⻓时间没有被使⽤的⻆⾊进⾏切换。这种策略基于你对⻆⾊的喜好，认为最近被使⽤过的⻆⾊很可能还会被使⽤，⽽最久未被使⽤的⻆⾊很可能不会再被使⽤。LRU算法可以有效地减少切换次数，但是实现起来⽐较复杂，需要记录每个⻆⾊的使⽤时间或者维护⼀个使⽤顺序的列表。</p><p>FIFO（先进先出）算法：每次选择最早进⼊内存的⻆⾊进⾏切换。这种策略很简单，只需要维护⼀个⻆⾊队列，每次淘汰队⾸的⻆⾊，然后把新的⻆⾊加⼊队尾。但是FIFO算法可能会淘汰⼀些经常被使⽤的⻆⾊，导致切换次数增加。⽽且FIFO算法有可能出现⻉拉迪异常（Belady anomaly），即当分配给内存的空间增加时，切换次数反⽽增加。</p><p>最佳⻚⾯置换算法(OPT)</p><p>置换在「未来」最⻓时间不访问的⻚⾯,但是实际系统中⽆法实现，因为程序访问⻚⾯时是动态的我们是⽆法预知每个⻚⾯在「下⼀次」访问前的等待时间，因此作为实际算法效率衡量标准。</p><p>时钟⻚⾯置换算法：把所有的⻚⾯都保存在⼀个类似钟⾯的「环形链表」中，⻚⾯包含⼀个访问位。当发⽣缺⻚中断时，顺时针遍历⻚⾯，如果访问位为1，将其改为0，继续遍历，直到访问到访问位为0⻚⾯，进⾏置换。</p><p>最不常⽤算法 ：记录每个⻚⾯访问次数，当发⽣缺⻚中断时候，将访问次数最少的⻚⾯置换出去，此⽅法需要对每个⻚⾯访问次数统计，额外开销。</p>"},{"title":"IO多路复⽤","content":"<p>I/O多路复⽤通常通过select、poll、epoll等系统调⽤来实现。</p><p>select： select是⼀个最古⽼的I/O多路复⽤机制，它可以监视多个⽂件描述符的可读、可写和错误状态。然⽽，但是它的效率可能随着监视的⽂件描述符数量的增加⽽降低。</p><p>poll： poll是select的⼀种改进，它使⽤轮询⽅式来检查多个⽂件描述符的状态，避免了select中⽂件描述符数量有限的问题。但对于⼤量的⽂件描述符，poll的性能也可能变得不⾜够⾼效。</p><p>epoll： epoll是Linux特有的I/O多路复⽤机制，相较于select和poll，它在处理⼤量⽂件描述符时更加⾼效。epoll使⽤事件通知的⽅式，只有在⽂件描述符就绪时才会通知应⽤程序，⽽不需要应⽤程序轮询。</p><p>I/O多路复⽤允许在⼀个线程中处理多个I/O操作，避免了创建多个线程或进程的开销，允许在⼀个线程中处理多个I/O操作，避免了创建多个线程或进程的开销。</p>"},{"title":"计算机系统&Linux","content":"<p>计算机体系结构内容较难，考察也较少，可以仅做了解，重点关注 Linux 相关的⼀些⾯试题</p>"},{"title":"字符编码","content":"<p>我们知道⼀个字节有8位，8位在不考虑正负的情况下，能够表示256个数字。同理2个字节就能表示出65536个数字。那么对于字符该如何表示？</p><p>二进制</p><table><tr><td>0</td><td>1</td><td>1</td><td>1</td><td>0</td><td>1</td><td>1</td><td>1</td></tr></table><p>通过计算机领域的⾄理名⾔：计算机科学领域的任何问题都可以通过增加⼀个间接的中间层来解决。</p><p>我们通过在字符和⼆进制编码之间嵌套⼀个数字编号，通过数字编号，就能实现字符、⼆进制编码之间的关系绑定。</p><p>像这样收录了很多的字符并⾏⼀⼀编号得到的⼀个对照表，我们称之为字符集。从⼆进制 -&gt; 字符 称为解码，从字符 -&gt; ⼆进制 称为编码</p><p>从ASCII字符集表示英⽂、控制符号这些，再到GB2312能表示出中⽂，⽬前存在着很多的字符集，这也就出现了⼀个问题，同⼀个⼆进制，在不同的字符集可能对应的字符不同，这也就导致了同⼀个⽂件，通过不同的字符集进⾏解码，呈现的结果不同（也就是我们所说的乱码）。如果有⼀种统⼀的编码形式（很全的字符集），对所有的字符都能提供唯⼀的⼆进制编码，那么就能解决上述的问题。Unicode就是这个很全的字符集。</p><p>虽然通过Unicode我们实现了对字符的唯⼀表示，但是随之⽽来的还有另⼀个问题，这些⼆进制编码该如何存储？</p><table><tr><td>字符</td><td>编码</td><td>二进制</td></tr><tr><td>代</td><td>20195</td><td>01001110 11100011</td></tr><tr><td>码</td><td>30721</td><td>01111000 00000001</td></tr><tr><td>w</td><td>119</td><td>00000000 01110111</td></tr><tr><td>o</td><td>111</td><td>00000000 01101111</td></tr><tr><td>r</td><td>114</td><td>00000000 01110010</td></tr><tr><td>l</td><td>108</td><td>00000000 01101100</td></tr><tr><td>d</td><td>100</td><td>00000000 01100100</td></tr></table><p>以代码world为例，将⼆进制直接照搬成⼀⾏，按照不同的步⻓进⾏解析，则会得出不同的结果，如何解决？</p>"},{"title":"固定⻓度编码","content":"<p>最直接思路，就是固定⻓度，不管编号多⼤多⼩，统⼀根据最⻓位数来，位数不够，⾼位补零。</p><table><tr><td>字符</td><td>编码</td><td>二进制</td></tr><tr><td>代</td><td>20195</td><td>00000000 00000000 01001110 11100011</td></tr><tr><td>码</td><td>30721</td><td>00000000 00000000 01111000 00000001</td></tr><tr><td>w</td><td>119</td><td>00000000 00000000 00000000 01110111</td></tr><tr><td>o</td><td>111</td><td>00000000 00000000 00000000 01101111</td></tr><tr><td>r</td><td>114</td><td>00000000 00000000 00000000 01110010</td></tr><tr><td>l</td><td>108</td><td>00000000 00000000 00000000 01101100</td></tr><tr><td>d</td><td>100</td><td>00000000 00000000 00000000 01100100</td></tr></table><p>优点：⾼效、快速进⾏编码、解码</p><p>缺点：固定⻓度的形式，会导致内存的浪费，并且随着编码越来越⼤，编码之间的跨度也就越⼤，这样定⻓编码造成的浪费就更加显著</p>"},{"title":"可变⻓度编码","content":"<p>根据固定⻓度编码的缺点，可以采⽤变⻓的形式进⾏解决，⼩编号少占⽤字节，⼤编号多占字节。不过如何划分边界是⼀个问题</p><p>⼀种解决⽅案：</p><table><tr><td>编号</td><td>编码模板</td></tr><tr><td>[0, 127]</td><td>0XXXXXXXX</td></tr><tr><td>[128, 2047]</td><td>110XXXXX 10XXXXXX</td></tr><tr><td>[2048, 65535]</td><td>1110XXXX 10XXXXXX 10XXXXXXXX</td></tr></table><p>可以采⽤类似IPV4中的分类编制的形式，在⼆进制中占⽤⼏位作为标识。</p><p>W 119 01110111</p><p>代 228 11000011 10100100</p><p>码 30721 11100111 10100000 10000001</p><p>上述的解决⽅案，其实就是我们所熟知的UTF-8编码，同时也是Go默认的编码⽅式</p>"},{"title":"冯诺依曼模型","content":"<p>冯诺依曼模型分为 5 ⼤部件：内存、CPU、总线、输⼊设备、输出设备</p><p>posper</p><p>PC 实质上是⼀个⼤⼩为⼀个字的存储区域。对于32位的机器，⼀个字是4个字节；对于64位的机器，⼀I/O设备个字就是8个字节。说⽩了，PC就是⼀个4字节或是8字节的存储空间，⾥⾯存放的是某⼀条指令的地址。</p><p>从系统上电的那⼀瞬间，直到系统断电，处理器就不断地在执⾏ PC 指向的指令，然后更新 PC，使其指向下⼀条要执⾏的指令（注意：这个下⼀条指令与刚刚执⾏的指令不⼀定是相邻的）</p>"},{"title":"内存","content":"<p>从 0 开始编号，最先存储单位是字节（byte）</p><p>处理器在执⾏程序时，内存主要存放程序指令以及数据</p><p>内存和处理器之间通过总线来进⾏数据传递。实际上，总线贯穿了整个计算机系统，它负责将信息从⼀个部件传递到另外⼀个部件。</p>"},{"title":"CPU","content":"<p>CPU 位宽： CPU ⼀次能处理多少字节的数据</p><p>32位CPU⼀次可以计算4个字节;</p><p>64位CPU⼀次可以计算8个字节;</p><p>为了能⼀次计算⼤数的运算，CPU需要⽀持多个byte⼀起计算，所以CPU位宽越⼤，可以计算的数值就越⼤。⽐如说32位CPU能计算的最⼤整数是4294967295。</p><p>CPU内部还有⼀些组件，常⻅的有寄存器、控制单元和逻辑运算单元等</p><p>控制单元： 控制CPU⼯作；</p><p>逻辑运算单元： 负责计算；</p><p>寄存器： 在 CPU 中，计算速度快</p><p>通俗的讲，寄存器可以理解为⼀个临时存放数据的空间。</p><p>例如我们计算两个变量 a+b 的和，处理器从内存中读取 a 的值暂存在寄存器 X 中，读取 B 的值暂存在寄存器 Y中，这个操作会覆盖寄存器中原来的数值，处理器完成加载的操作后，ALU（Arithmatic/logic Unit）会从复制寄存器 X 和 Y 中保存的数值，然后进⾏算术运算，得到的结果会保存到寄存器 X 或者寄存器 Y 中，此时寄存器中原来的数值会被新的数值覆盖</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">常⻅寄存器类型：</p><p>通⽤寄存器：放运算数据</p><p>程序记数器（PC）：⽤来存放 CPU 下⼀条要执⾏指令的 内存地址；</p><p>指令寄存器：⽤来存放 PC 执⾏的指令，即 指令本身（取值后放⼊到 指令寄存器中）</p></div>"},{"title":"总线","content":"<p>⽤于 CPU 和内存以及其他设备之间的通信，总线可分为 3 种:</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">地址总线：</p><p>⽤于指定CPU将要操作的内存地址;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">数据总线：</p><p>⽤于读写内存的数据;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">控制总线：</p><p>⽤于发送和接收信号，⽐如中断、设备复位等信号，CPU收到信号后⾃然进⾏响应，这时也需要控制总线;</p><p>当CPU要读写内存数据的时候．⼀般需要通过两个总线:</p><p>⾸先要通过「地址总线」来指定内存的地址;</p><p>再通过「数据总线」来传输数据;</p></div>"},{"title":"程序的执⾏过程","content":"<p>现代⼤多数 CPU 都使⽤来流⽔线的⽅式来执⾏指令，</p><p>所谓的流⽔线就是把⼀个任务拆分成多个⼩任务，于是⼀条指令通常分为 4 个阶段，称为 4 级流⽔线</p><ul><li>取指令</li></ul><ul><li>CPU 的 控制单元向 地址总线 发送 PC 中的地址，从内存中找到 待执⾏指令；</li></ul><ul><li>并将 待执⾏指令 通过 数据总线 传⼊到 CPU 中的 指令寄存器 中</li></ul><ul><li>⾃动更新 PC，指向下⼀条待执⾏指令的地址</li></ul><ul><li>译指（分析指令）</li></ul><ul><li>CPU分析「指令寄存器」中的指令，确定指令的类型和参数：</li></ul><ul><li>如果是计算类型的指令，就把指令交给「逻辑运算单元」运算;</li></ul><ul><li>如果是存储类型的指令，则交由「控制单元」执⾏</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7. 执⾏指令</p><ul><li>根据 译指的结果，把指令交给 CPU 中响应的控件（逻辑运算单元/控制单元）执⾏</li></ul><ul><li>数据回写</li></ul><ul><li>CPU 将计算结果存回寄存器或者将寄存器的值存⼊内存</li></ul><p>不同的阶段其实是由计算机中的不同组件完成的：</p><p>取指令、译指令：由 控制器 进⾏；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">指令执⾏：</p><ul><li>算术操作、逻辑操作、数据传输、条件分⽀都是由 逻辑运算单元（运算器)完成</li></ul><ul><li>跳转语句：由 控制器（控制单元）完成</li></ul></div>"},{"title":"输⼊/输出设备","content":"<p>除了处理器，内存以及总线，计算机系统还包含各种输⼊输出设备，如键盘、⿏标、显示器以及磁盘等等。</p><p>每一个输入输出设备都通过一个控制器或者适配器与I0总线相连</p><p>青</p><p>控制器与适配器主要区别是在于它们的封装⽅式，⽆论是控制器还是适配器，它们的功能都是在 IO 设备与 IO 总线之间传递数据</p>"},{"title":"编译系统如何⼯作","content":"<p>1|linux&gt; gcc -o hello hell.c</p><ul><li>理解编译系统可以优化程序的性能。</li></ul><p>例如：⼀个switch语句是不是要⽐⼀连串的if-else要⾼效得多？函数调⽤的开销有多⼤？while循环⽐for循环更⾼效么？</p><ul><li>理解编译系统可以帮助我们理解链接过程中出现的错误</li></ul><p>例如：静态变量和全局变量的区别是什么？静态库和动态库的区别是什么？</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、避免安全漏洞</p><p>例如：缓冲区溢出（buffer overflow）是导致互联⽹安全漏洞的主要原因，如何避免写出的代码存在安全漏洞，第⼀步就是要理解数据和控制信息在程序栈上是如何存储的，了解不严谨不规范的书写⽅式会引起什么样的后果</p></div>"},{"title":"处理器解释指令","content":"<p>处理器读并解释储存在内存中的指令</p>"},{"title":"运⾏hello程序","content":"<p>hello.c 经过编译系统得到可执⾏⽬标⽂件 hello，此时可执⾏⽬标⽂件 hello 已经存放在系统的磁盘上，那么，如何运⾏这个可执⾏⽂件呢？</p><p>在 linux 系统上运⾏可执⾏程序：打开⼀个 shell 程序，然后在 shell 中输⼊相应可执⾏程序的⽂件名。</p><pre><code class=\"language-txt\">linux&gt; ./hello </code></pre><p>shell 是⼀个命令解释程序，它输出⼀个提示符 &gt; 来等待⼀个命令⾏的输⼊，然后执⾏这个命令，如果该命令⾏的第⼀个单词不是内置的 shell 命令，那么 shell 就会假设这是⼀个可执⾏⽂件的名字，对这个⽂件进⾏加载并运⾏。</p><p>在这个例⼦中，shell 加载并且运⾏ hello 程序，屏幕上显示 hello,world 内容，hello 程序运⾏结束并退出，shell继续等待下⼀个命令的输⼊。</p>"},{"title":"程序执⾏流程","content":"<p>⾸先我们通过键盘输⼊&quot;./hello&quot; 的字符串，shell 程序会将输⼊的字符逐⼀读⼊寄存器，处理器会把 hello 这个字符串放⼊内存中。</p><p>当我们完成输⼊，按下回⻋键时，shell 程序就知道我们已经完成了命令的输⼊，然后执⾏⼀系列的指令来来加载可执⾏⽂件 hello ，这些指令将 hello 中的数据和代码从磁盘复制到内存。</p><p>数据就是我们要显示输出的 &quot;hello , world\\n&quot; ，这个复制的过程将利⽤DMA（Direct Memory Access）技术，数据可以不经过处理器，从磁盘直接到达内存。当可执⾏⽂件 hello 中的代码和数据被加载到内存中，处理器就开始执⾏ main 函数中的代码，main 函数⾮常简单，只有⼀个打印功能。</p><p>CPU会将 &quot;hello , world\\n&quot; 这个字符串从内存复制到寄存器⽂件。然后再从寄存器⽂件复制到显示设备，最终hello, world显示在屏幕上。</p><p>从 hello 程序执⾏的过程来看，系统即使执⾏如此简单的程序，数据信息仍旧需要在磁盘、内存、处理器以及 IO设备之间进⾏搬运。</p><p>数据从⼀个地⽅搬运到另外⼀个地⽅需要花费时间，系统设计⼈员的⼀个主要任务就是缩短信息搬运所花费的时间。</p>"}];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof sidebarMgr !== 'undefined') sidebarMgr.save();
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'operating-system',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
