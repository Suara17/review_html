<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>操作系统知识点动态展示 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 内容操作 ===== */
.content-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}

.edit-btn,
.edit-modal-close,
.edit-modal-btn {
  border: 1px solid rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.12);
  color: #00ffff;
}

.edit-btn,
.edit-modal-btn {
  min-width: 72px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.25s ease;
}

.edit-btn:hover,
.edit-modal-btn:hover {
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.edit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#click-hint {
  margin-top: 12px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}

.edit-modal[hidden] {
  display: none;
}

.edit-modal.open {
  display: flex;
}

.edit-modal-panel {
  width: min(860px, 100%);
  max-height: min(80vh, 760px);
  display: flex;
  flex-direction: column;
  background: rgba(0,12,24,0.96);
  border: 1px solid rgba(0,255,255,0.24);
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.45);
  overflow: hidden;
}

.edit-modal-header,
.edit-modal-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(0,255,255,0.06);
}

.edit-modal-header h3 {
  margin: 0;
  font-size: 1em;
  color: #9fffe7;
}

.edit-modal-close {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  font-size: 1.2em;
  cursor: pointer;
}

.edit-modal-body {
  padding: 18px;
  overflow: auto;
}

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 14px;
  background: rgba(0,0,0,0.38);
  color: #ffffff;
  line-height: 1.8;
  outline: none;
}

.edit-modal-editor:focus {
  border-color: rgba(0,255,255,0.45);
  box-shadow: 0 0 20px rgba(0,255,255,0.16);
}

.edit-modal-editor strong {
  color: #00ffcc;
}

.edit-modal-editor p {
  margin: 0 0 1em;
}

.edit-modal-editor ul,
.edit-modal-editor ol {
  margin: 0 0 1.2em 1.4em;
}

.edit-modal-editor li {
  margin-bottom: 0.45em;
}

.edit-modal-editor .embedded-entry {
  margin: 0 0 1.1em;
}

.edit-modal-editor .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}

.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}

.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}

.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}

.edit-modal-editor th,
.edit-modal-editor td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}

.edit-modal-editor th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}

.edit-modal-actions {
  justify-content: flex-end;
}

body.modal-open {
  overflow: hidden;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从右侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    right: -320px;
    left: auto;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-right: none;
    border-left: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: right 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    right: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  /* 右侧滑出的侧边栏：从右侧边缘向左滑打开 */
  .sidebar-swipe-area {
    position: fixed;
    top: 0;
    right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }

  
#click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}

.content p { margin: 0 0 1em; }
.content ul, .content ol { margin: 0 0 1.2em 1.4em; }
.content li { margin-bottom: 0.45em; }
.content .embedded-entry { margin: 0 0 1.1em; }
.content .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}
.content pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}
.content code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.content th, .content td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}
.content th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}
</style>
</head>
<body>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>
<!-- 扫描线叠层 -->
<div class="scanlines"></div>

<div class="main-content">
  <!-- 粘性头部：进度条 + 标题 -->
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <!-- 倒计时（固定在头部右上角） -->
  <div class="countdown" id="countdown">30</div>

  <!-- 卡片（滚动区域） -->
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div class="content-toolbar">
      <button class="edit-btn" id="edit-btn" type="button">修改</button>
    </div>
    <div id="click-hint">点标题展开，点修改编辑</div>
  </div>

  <button class="next-btn" id="next-btn">下一个 →</button>
</div>


<div class="edit-modal" id="edit-modal" hidden>
  <div class="edit-modal-panel" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal-header">
      <h3 id="edit-modal-title">修改内容</h3>
      <button class="edit-modal-close" id="edit-modal-close" type="button">✕</button>
    </div>
    <div class="edit-modal-body">
      <div class="edit-modal-editor" id="edit-modal-editor" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="edit-modal-actions">
      <button class="edit-modal-btn" id="edit-cancel-btn" type="button">取消</button>
      <button class="edit-modal-btn" id="edit-save-btn" type="button">保存</button>
    </div>
  </div>
</div>

<!-- 侧边栏（桌面端侧栏 / 手机端滑动抽屉） -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>操作系统高频知识点</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<!-- 侧边栏切换按钮（手机端） -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<div class="sidebar-swipe-area" id="sidebar-swipe-area" aria-hidden="true"></div>

<script src="./tts-player.js"></script>
<script src="./sidebar-manager.js"></script>
<script src="./gist-sync.js"></script>
<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
let knowledgePoints = [{"title":"操作系统基础","content":"<p>本部分是⼀些基础的概念，仅做了解使⽤。</p>"},{"title":"什么是操作系统","content":"<p>操作系统(Operating System)，是介于硬件资源和应⽤程序之间的⼀个系统软件 ，能控制和管理整个计算机系统的硬件和软件资源，调度计算机的⼯作与资源的分配，进⽽为⽤户和其他软件提供服务，操作系统是计算机系统中最基本的系统软件。</p><p>如果将它理解为“掌控计算机的系统”是否更能精确的描述OS所做的事情呢？</p><p>如果要更深⼊的掌握这个问题，可以问⼀问：如果没有了操作系统，你使⽤的PC机还能⼲什么？或者说，你能够使⽤你的PC机做什么呢？</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">操作系统的特征：</p><p>并发：并发指的是两个或多个事件在同⼀时间间隔内发⽣，计算机系统中同时存在多个运⾏的程序，因此具有处理和调度多个程序同时执⾏的能⼒。</p><p>注意：并⾏和并发的区别：并发指的是同⼀时间间隔，并⾏指的是同⼀时刻。</p><p>共享：系统中的资源可以供内存中多个并发执⾏的进程共同使⽤。</p><p>互斥共享：⼀段时间内只允许⼀个进程访问该资源。⼀段时间内只允许⼀个进程访问的资源称为临界资源。</p><p>同时访问：⼀段时间内允许多个进程“同时”访问，“同时”通常是宏观的，实际上是交替的对该资源进⾏访问。</p><p>虚拟：把⼀个物理上的实体变为若⼲逻辑上的对应物。</p><p>异步：进程的执⾏并不是⼀贯到底的，⽽是以不可预知的速度向前推进。</p></div>"},{"title":"操作系统的功能","content":"<p>操作系统位于硬件资源之上，管理硬件资源; 应⽤程序之下，为应⽤程序提供服务，同时管理应⽤程序</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、资源分配，资源回收</p><p>计算机必要重要的硬件资源⽆⾮就是 CPU、内存、硬盘、I/O设备。</p><p>⽽这些资源总是有限的，因此需要有效管理，资源管理最终只有两个问题：资源分配、资源回收。</p><p>资源分配： 体现在CPU上，⽐如进程调度，多个进程同时请求CPU下，应该给哪⼀个进程呢？再⽐如内存分配，内存不够了怎么办？A进程⾮法访问了B进程的内存地址怎么办？内存内、外碎⽚问题等。</p><p>资源回收： 考虑内存回收后的合并等等。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、为应⽤程序提供服务</p><p>操作系统将硬件资源的操作封装起来，提供相对统⼀的接⼝（系统调⽤）供开发者调⽤。</p><p>如果没有操作系统，应⽤程序将直接⾯对硬件，除去给开发者带来的编程困难不说，直接访问硬件，使⽤不当极有可能直接损坏硬件资源。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、管理应⽤程序</p><p>即控制进程的⽣命周期：进程开始时的环境配置和资源分配、进程结束后的资源回收、进程调度等。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、操作系统内核的功能</p><ul><li>进程调度能⼒： 管理进程、线程，决定哪个进程、线程使⽤CPU。</li></ul><ul><li>内存管理能⼒： 决定内存的分配和回收。</li></ul><ul><li>硬件通信能⼒： 管理硬件，为进程和硬件之间提供通信。</li></ul><ul><li>系统调⽤能⼒： 应⽤程序进⾏更⾼限权运⾏的服务，需要系统调⽤，⽤户程序和操作系统之间的接⼝。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、管理者</p><p>主要分为：CPU管理、内存管理、外存管理、IO管理；以及⾃⼰的健壮性和安全性管理。</p><p>健壮性，⼜称鲁棒性，即使很粗鲁的对待程序，它还是可以很好的运⾏。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、魔术师:</p><p>⽐如操作系统会让每个进程都觉得⾃⼰独占CPU、独占整⽚物理内存，⽽实际上每个进程都只是在某⼀时间段内占⽤CPU，仅仅只是占⽤实际⼀点点物理内存。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">⽤户程序与操作系统的关系</p><p>⽤户程序和操作系统之间是相互调⽤的关系</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、操作系统的⻆度</p><p>计算机启动后启动的第⼀个软件就是操作系统，随后启动的所有进程都运⾏在操作系统之上，使⽤操作系统提供的服务，同时被操作系统监控，进程结束后也由操作系统回收。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、进程⻆度</p><p>调⽤操作系统提供的服务，实现⾃⼰的功能。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、进程的概念</p><p>我们编写的代码只是⼀个存储在硬盘的静态⽂件，通过编译后就会⽣成⼆进制可执⾏⽂件，当我们运⾏这个可执⾏⽂件后，它会被装载到内存中，接着 CPU 会执⾏程序中的每⼀条指令，那么这个运⾏中的程序，就被称为「进程」（Process）。</p><p>根据上⾯的过程，我们可以得到进程的其中⼀个定义：进程是具有独⽴功能的程序在⼀个数据集合上运⾏的过程，是系统进⾏资源分配和调度的⼀个独⽴单位。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、进程控制块（PCB）</p><p>系统通过进程控制块PCB来描述进程的基本情况和运⾏状态，就进⽽控制和管理进程，它是进程存在的唯⼀标识，其包括以下信息：</p><ul><li>进程描述信息： 进程标识符、⽤户标识符</li></ul><ul><li>进程控制和管理信息： 进程当前状态，进程优先级</li></ul><ul><li>进程资源分配清单： 有关内存地址空间或虚拟地址空间的信息，所打开⽂件的列表和所使⽤的 I/O 设备信息。</li></ul><ul><li>CPU相关信息： 当进程切换时，CPU寄存器的值都被保存在相应PCB中，以便CPU重新执⾏该进程时能从断点处继续执⾏;</li></ul><p>PCB 通常是通过链表的⽅式进⾏组织，把具有相同状态的进程链在⼀起，组成各种队列。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、并发与并⾏</p><ul><li>单个处理核在很短时间内分别执⾏多个进程，称为并发</li></ul><ul><li>多个处理核同时执⾏多个进程称为并⾏</li></ul><ul><li>对于并发来说，CPU需要从⼀个进程切换到另⼀个进程，在切换前必须要记录当前进程中运⾏的状态信息，以备下次切换回来的时候可以恢复执⾏。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、进程的状态切换</p><p>我们知道了并发会执⾏进程的切换，这就需要进程有运⾏状态和停⽌状态，实际上某个进程在某个时刻所处的状态分为以下⼏种状态：</p><p>运⾏态： 该时刻进程占⽤CPU</p><p>就绪态：可运⾏，由于其他进程处于运⾏状态⽽暂时停⽌运⾏</p><p>阻塞态：该进程正在等待某⼀事件发⽣（如等待输⼊/输出操作的完成）⽽暂时停⽌运⾏</p><p>当然，进程还有另外两个基本状态：</p><p>创建状态（new）：进程正在被创建时的状态；</p><p>结束状态（Exit）：进程正在从系统中消失时的状态；</p><p>1．进程为等待事件而阻塞</p><p>选择另一个进程</p><p>选择这个进程</p><p>如果有⼤量处于阻塞状态的进程，进程可能会占⽤着物理内存空间，所以系统通常会把阻塞状态的进程的物理内存空间换出到硬盘，等需要再次运⾏的时候，再从硬盘换⼊到物理内存，那么，就需要⼀个新的状态，来描述进程没有占⽤实际的物理内存空间的情况，这个状态就是挂起状态。这跟阻塞状态是不⼀样，阻塞状态是等待某个事件的返回。</p><p>挂起状态可以分为两种：</p><p>阻塞挂起状态：进程在外存（硬盘）并等待某个事件的出现；</p><p>就绪挂起状态：进程在外存（硬盘），但只要进⼊内存，即刻⽴刻运⾏；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">特点：</p><ul><li>只有就绪态和运⾏态可以相互转换，其它的都是单向转换。就绪态的进程通过调度算法从⽽获得CPU 时间，转为运⾏状态；</li></ul><ul><li>运⾏态的进程，在分配给它的 CPU 时间⽚⽤完之后就会转为就绪状态，等待下⼀次调度。</li></ul><ul><li>阻塞态是因缺少需要的资源从⽽由运⾏态转换⽽来，但是该资源不包括 CPU 时间，缺少 CPU 时间会从运⾏态转换为就绪态。</li></ul><ul><li>当进程等待的外部事件发⽣时（如⼀些输⼊到达），则由阻塞态转换为就绪态，如果此时没有其他进程运⾏，则转换为运⾏态，否则该进程将处于就绪态，等待CPU空闲轮到它运⾏。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、进程的上下⽂切换</p><p>⼀个进程切换到另⼀个进程运⾏，称为进程的上下⽂切换, 进程的上下⽂切换不仅包含了虚拟内存、栈、全局变量等⽤户空间的资源，还包括了内核堆栈、寄存器等内核空间的资源。</p><p>发⽣进程上下⽂切换有哪些场景？</p><p>进程的时间⽚耗尽</p><p>阻塞等待</p><p>⾼优先级进程运⾏</p><p>中断处理</p><p>进程通过睡眠函数 sleep 这样的⽅法将⾃⼰主动挂起</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、进程的创建</p><p>⼀个进程可以创建另⼀个进程，此时创建者为⽗进程，被创建的进程为⼦进程，操作系统创建⼀个新进程的过程如下：</p><p>为新进程分配⼀个独特的进程控制块（PCB）</p><p>为新进程分配所需要的资源，⽐如内存、CPU时间</p><p>初始化进程控制块（PCB）的各种字段，包括状态、优先级、寄存器初始值等。</p><p>将其状态设置为就绪状态，使其能够被调度执⾏。进程进⼊就绪队列，等待分配处理器时间。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、进程的终⽌</p><p>根据标识符，查找需要终⽌的进程的 PCB；</p><p>如果进程处于执⾏状态，则⽴即终⽌该进程的执⾏，然后将处理器资源分配给其他进程；</p><p>如果其还有⼦进程，则应将该进程的⼦进程交给 1 号进程接管；</p><p>将该进程所拥有的全部资源都归还给操作系统；</p><p>将其从 PCB 所在队列中删除；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">8、进程的阻塞</p><p>找到被阻塞进程的标识符对应的PCB</p><p>如果该进程为运⾏状态，则保护其现场，将其状态转为阻塞状态，停⽌运⾏；</p><p>将该 PCB 插⼊到等待队列中，将处理机资源调度给其他就绪进程</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">9、进程的唤醒</p><p>在该事件的阻塞队列中找到相应进程的 PCB；</p><p>将其从阻塞队列中移出，并置其状态为就绪状态；</p><p>把该 PCB 插⼊到就绪队列中，等待调度程序调度；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、什么是线程？</p><p>线程是“轻量级线程”，是进程中的⼀个实体，是程序执⾏的最⼩单元，也是被系统独⽴调度和分配的基本单位。</p><p>线程是进程当中的⼀条执⾏流程，同⼀个进程内多个线程之间可以共享代码段、数据段、打开的⽂件等资源，但每个线程各⾃都有⼀套独⽴的寄存器和栈，这样可以确保线程的控制流是相对独⽴的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、线程的特点</p><p>线程是⼀个“轻量级线程”，⼀个进程中可以有多个线程，线程不拥有系统资源，但是也有PCB，创建线程使⽤的底层函数和进程⼀样，都是clone</p><p>各个线程之间可以并发执⾏</p><p>同⼀个进程中的各个线程共享该进程所拥有的资源。</p><p>进程可以蜕变成线程;</p><p>实际上，⽆论是创建进程的fork，还是创建线程的 pthread_create ，底层实现都是调⽤同⼀个内核函数 clone 。</p><ul><li>如果复制对⽅的地址空间，那么就产出⼀个“进程”;</li></ul><ul><li>如果共享对⽅的地址空间，就产⽣⼀个“线程”。</li></ul><p>Linux内核是不区分进程和线程的, 只在⽤户层⾯上进⾏区分。所以，线程所有操作函数 pthread_*是库函数，⽽⾮系统调⽤。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、进程和线程的⽐较</p><p>进程是资源（包括内存、打开的⽂件等）分配的单位，线程是 CPU 调度的单位；</p><p>资源：进程是系统中拥有资源的基本单位，⽽线程不拥有系统资源（仅有⼀点必不可少的能保证运⾏的资源，⽐如寄存器和栈），但线程可以访问⾪属进程的系统资源。</p><p>调度：线程切换的代价远低于进程，在同⼀个进程中，线程的切换不会引起进程切换，⽽从⼀个进程中的线程切换到另⼀个进程中的线程中，会引起进程切换。</p><p>并发：进程可以并发执⾏，⽽⼀个进程中的多个线程之间也能并发执⾏，甚⾄不同进程中的线程也能并发执⾏，从⽽使得操作系统拥有更好的并发性，提⾼了系统资源的利⽤率和系统的吞吐量。</p><p>独⽴性：每个进程都拥有独⽴的地址空间和资源、除了共享全局变量，不允许其他进程访问。某进程中的线程对其他进程都不可⻅，同⼀进程中的不同线程是为了提⾼并发性以及进⾏相互之间的合作⽽创建的，它们共享进程的地址空间和资源。</p><p>系统开销：线程所需要的开销⽐进程⼩</p><p>线程的创建时间⽐进程快，因为进程在创建的过程中，还需要资源管理信息，⽐如内存管理信息、⽂件管理信息，⽽线程在创建的过程中，不会涉及这些资源管理信息，⽽是共享它们；</p><p>线程的终⽌时间⽐进程快，因为线程释放的资源相⽐进程少很多；</p><p>同⼀个进程内的线程切换⽐进程切换快，因为线程具有相同的地址空间（虚拟内存共享），这意味着同⼀个进程的线程都具有同⼀个⻚表，那么在切换的时候不需要切换⻚表。⽽对于进程之间的切换，切换的时候要把⻚表给切换掉，⽽⻚表的切换过程开销是⽐较⼤的；</p><p>由于同⼀进程的各线程间共享内存和⽂件资源，那么在线程之间数据传递的时候，就不需要经过内核了，这就使得线程之间的数据交互效率更⾼了；</p><p>所以，不管是时间效率，还是空间效率线程⽐进程都要⾼。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、线程的状态：</p><p>执⾏状态：线程获得处理机正在执⾏</p><p>就绪状态：线程已经具备执⾏条件，只需要获得CPU就可以执⾏</p><p>阻塞状态：线程在执⾏中因事件受阻⽽处于暂停状态</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）⽤户线程 （ULT）</p><p>⽤户线程是在⽤户空间实现的线程，不是由内核管理的线程，整个线程管理和调度，操作系统是不直接参与的，⽽是由⽤户级线程库函数来完成线程的管理，包括线程的创建、终⽌、同步和调度等。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><ul><li>线程切换不需要切换到内核空间中，节省了模式切换的开销。</li></ul><ul><li>调度算法可以是进程专⽤的，不同的进程可根据⾃身的需要，对⾃⼰的线程选择不同的调度算法。</li></ul><ul><li>⽤户级线程的实现与操作系统平台⽆关，对线程管理的代码是属于⽤户程序的⼀部分。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><ul><li>由于不由操作系统调度，⼀旦⽤户线程发起系统调⽤⽽阻塞，那么此进程下⽤户线程都⽆法运⾏;</li></ul><ul><li>⼀旦某个⽤户线程正在运⾏，只有当其交出CPU执⾏权，其他⽤户线程才可以运⾏，⽆法被打断，因为只有操作系统才有权限打断运⾏，但是操作系统不直接参与调度;</li></ul><ul><li>由于时间⽚分配给进程，故与其他进程⽐，在多线程执⾏时，每个线程得到的时间⽚较少，执⾏会⽐较慢；</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）内核线程（KLT）</p><p>由操作系统管理、调度，其对应的TCB是存放在内核中，这样线程的创建、终⽌和管理都是由操作系统负责。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><ul><li>当⼀个内核线程发起系统调⽤阻塞时不会影响其它内核线程的执⾏;</li></ul><ul><li>分配给线程，多线程的进程获得更多的 CPU 运⾏时间；</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><ul><li>在⽀持内核线程的操作系统中，由内核来维护进程和线程的上下⽂信息，如 PCB 和 TCB；</li></ul><ul><li>线程的创建、终⽌和切换都是通过系统调⽤的⽅式来进⾏，因此对于系统来说，系统开销⽐较⼤；</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）轻量级线程 (LWP)：</p><p>轻量级进程是内核⽀持的⽤户线程，⼀个进程可有⼀个或多个 LWP，每个 LWP 是跟内核线程⼀对⼀映射的，也就是 LWP 都是由⼀个内核线程⽀持，⽽且 LWP 是由内核管理并像普通进程⼀样被调度。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、线程共享资源</p><p>⽂件描述符表</p><p>每种信号的处理⽅式</p><p>当前⼯作⽬录</p><p>⽤户ID和组ID</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、 线程⾮共享资源</p><p>线程id</p><p>处理器现场和栈指针(内核栈)</p><p>独⽴的栈空间(⽤户空间栈)</p><p>errno变量</p><p>信号屏蔽字</p><p>调度优先级</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>提⾼程序并发性</p><p>开销⼩</p><p>数据通信、共享数据⽅便</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>库函数，不稳定</p><p>调试、编写困难、gdb不⽀持</p><p>对信号⽀持不好</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">9、线程如何减少开销</p><ul><li>线程创建快，进程创建需要资源管理信息，⽐如内存管理信息和⽂件管理信息，⽽线程创建后是共享其所属进程的资源管理信息;</li></ul><ul><li>线程终⽌时间快，需要回收的仅有少量寄存器和私有的栈区;</li></ul><ul><li>线程切换快，因为线程切换仅涉及到少量寄存器和栈区，⽽进程上下⽂切换有CPU寄存器和程序计数器(CPU上下⽂)、虚拟内存空间、⻚表切换等;</li></ul><ul><li>线程因为创建时共享了其所属进程绝⼤多数资源，因此天⽣具有很好的线程间通信交互效率。</li></ul></div>"},{"title":"进程调度","content":"<p>当⼀个进程的状态发⽣改变时，操作系统需要考虑是否要换⼀个进程执⾏，这就需要⽤到“进程调度算法”</p>"},{"title":"调度⽬标","content":"<p>不同的调度算法具有不同的特性，因为使⽤以下标准⽐较处理机调度算法的性能：</p><p>CPU利⽤率：CPU是计算机系统中最重要和昂贵的资源之⼀，应该使CPU保持“忙碌”状态</p><p>系统吞吐量：单位时间内CPU完成作业的数量。</p><p>周转时间：作业从提交到作业完成所需要的时间，是作业等待、在就绪队列中排队、在处理机上运⾏及输⼊输出操作所花费时间的总和。</p><p>等待时间：进程处于等处理机（处于就绪队列）的时间之和，等待时间越⻓，⽤户满意度越低。</p><p>响应时间：⽤户提交请求到系统⾸次产⽣响应所需要的时间。</p>"},{"title":"进程调度⽅式","content":"<p>⾮抢占调度⽅式：当⼀个进程正在处理中，即使有更为重要的进程进⼊到就绪队列中，仍然让正在执⾏的进程继续执⾏。</p><p>抢占调度⽅式：当⼀个进程正在处理中，如果有更为重要的进程进⼊到就绪队列中，则允许调度程序根据某种原则去暂停正在执⾏的进程，将处理机分配给这个更为重要或紧迫的进程。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 先来先服务调度算法(FCFS)</p><p>每次从就绪队列选择最先进⼊队列的进程，然后⼀直运⾏，直到进程退出或被阻塞，才会继续从队列中选择第⼀个进程接着运⾏。</p><p>这种算法虽然看上去公平，但是如果有⼀个⻓作业需要处理，则后⾯的短作业需要处理很⻓时间。</p><p>先来先调度算法的特点是算法简单，对⻓作业⽐较有利，对短作业不利，适⽤于 CPU 繁忙型作业的系统，⽽不适⽤于 I/O 繁忙型作业的系统。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 最短作业优先调度算法（SJF）</p><p>最短作业优先调度算法从就绪队列中选择⼀个估计运⾏时间最短的作业，将之调⼊到内存中运⾏，这有利于提⾼系统的吞吐量。</p><p>但是这对⻓作业⼗分不利，由于调度程序总是优先调度短作业，将会导致⻓作业⻓期不被调度，此外该算法也没有考虑到作业的紧迫程度，因此不能保证紧迫性作业会被及时处理。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. ⾼响应⽐优先调度算法</p><p>每次进⾏进程调度时，先计算「响应⽐优先级」，然后把「响应⽐优先级」最⾼的进程投⼊运⾏</p><p>等待时间+要求服务时间优先权 =要求服务时间</p><p>根据公式可以知道：</p><p>作业的等待时间相同时，如果要求服务时间越短，则响应⽐更⾼，有利于短作业执⾏</p><p>当要求服务时间相同时，响应⽐由等待时间决定，如果等待时间越⻓，则响应⽐越⾼</p><p>对于⻓作业，作业的响应⽐可以随着等待时间的增加⽽提⾼</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 时间⽚轮转调度算法</p><p>每个进程被分配⼀个时间段，称为时间⽚（Quantum），即允许该进程在该时间段中运⾏。</p><p>如果时间⽚⽤完，进程还在运⾏，那么将会把此进程从 CPU 释放出来，并把 CPU 分配给另外⼀个进程；</p><p>如果该进程在时间⽚结束前阻塞或结束，则 CPU ⽴即进⾏切换；</p><p>另外，时间⽚的⻓度就是⼀个很关键的点：</p><p>如果时间⽚设得太短会导致过多的进程上下⽂切换，降低了 CPU 效率；</p><p>如果设得太⻓⼜可能引起对短作业进程的响应时间变⻓。将</p><p>⼀般来说，时间⽚设为 20ms~50ms 通常是⼀个⽐较合理的折中值。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 最⾼优先级调度算法</p><p>从就绪队列中选择最⾼优先级的进程进⾏运⾏，但进程的优先级可以分为静态优先级和动态优先级</p><p>静态优先级：优先级在创建进程时已经确定，在进程运⾏期间保持不变，确定静态优先级的主要依据有进程类型，对资源的要求，⽤户要求。</p><p>动态优先级：进程运⾏过程中，根据进程运⾏时间和等待时间等因素调整进程的优先级</p><p>但是这种算法可能会导致低优先级的进程永远不被执⾏。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6. 多级队列调度算法</p><p>上⾯的各种调度算法是固定且单⼀的，⽆法满⾜系统中不同⽤户对进程调度策略的不同要求，多级队列调度算法在系统中设置多个就绪队列，将不同类型或性质的进程固定分配到不同的就绪队列，每个队列可以实施不同的调度算法。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7. 多级反馈队列调度算法</p><p>多级反馈队列调度算法融合了时间⽚轮转调度算法和优先级调度算法，通过动态调整进程的优先级和时间⽚⼤⼩，多级反馈队列调度算法可以兼顾多⽅⾯的系统⽬标</p><p>多级反馈队列调度算法的实现思想如下：</p><p>设置多个就绪队列，并为每个队列赋予不同的优先级。第1级队列的优先级最⾼，第2级队列的优先级次之，其余队列的优先级逐个降低。</p><p>赋予各个队列的进程运⾏时间⽚的⼤⼩各不相同。在优先级越⾼的队列中，每个进程的时间⽚就越⼩。例如，第i+1级队列的时间⽚要⽐第i级队列的时间⽚⻓1倍。</p><p>每个队列都采⽤FCFS算法。当新进程进⼊内存后，⾸先将它放⼊第1级队列的末尾，按FCFS原则等待调度。当轮到该进程执⾏时，如它能在该时间⽚内完成，便可撤离系统。若它在⼀个时间⽚结束时尚未完成，调度程序将其转⼊第2级队列的末尾等待调度：若它在第2级队列中运⾏⼀个时间⽚后仍未完成，再将它放⼊第3级队列…，依此类推。当进程最后被降到第n级队列后，在第n级队列中便采⽤时间⽚轮转⽅式运⾏。</p><p>按队列优先级调度。仅当第1级队列为空时，才调度第2级队列中的进程运⾏；仅当第 1~i-1 级队列均为空时，才会调度第i级队列中的进程运⾏。若处理机正在执⾏第i级队列中的某进程时，⼜有新进程进⼊任⼀优先级较⾼的队列，此时须⽴即把正在运⾏的进程放回到第级队列的末尾，⽽把处理机分配给新到的⾼优先级进程。</p><p>多级反馈队列的优势有以下⼏点：</p><p>终端型作业⽤户：短作业优先。</p><p>短批处理作业⽤户：周转时间较短。</p><p>⻓批处理作业⽤户：经过前⾯⼏个队列得到部分执⾏，不会⻓期得不到处理。</p></div>"},{"title":"进程通信","content":"<p>进程通信指的是进程之间的信息交换，进程之间⼀般是相互独⽴的，但内核空间是每个进程都共享的，所以进程之间要通信必须通过内核。</p><p>共享存储</p><p>在通信的进程之间存在⼀块可直接访问的共享空间，通过对这⽚共享空间进⾏写/读操作实现进程之间的信息交换。</p>"},{"title":"消息传递（消息队列）","content":"<p>若通信的进程之间不存在可直接访问的共享空间，则必须利⽤操作系统提供的消息传递⽅法进⾏进程通信，进程通过系统提供的发送消息和接收消息两个原语进⾏数据交换。</p><p>直接通信⽅式：发送进程直接把消息发送给接收进程，并将它挂在接收进程的消息缓冲队列上，接收进程从消息缓冲队列中取得消息。</p><p>间接通信⽅式：发送进程把消息发送到某个中间实体，接收进程从中间实体取得消息。这种中间实体⼀般称为信箱。</p><p>因为在内核中每个消息体都有⼀个最⼤⻓度的限制，所以消息队列不适合⽐较⼤数据的传输，⽽且通信也不是很及时。</p>"},{"title":"管道","content":"<p>管道是指⽤于连接⼀个读进程和⼀个写进程以实现它们之间的通信的⼀个共享⽂件，⼜名pipe⽂件，向管道（共享⽂件）提供输⼊的发送进程（写进程），以字符流形式将⼤量的数据送⼊（写）管道：⽽接收管道输出的接收进程（即读进程）则从管道中接收（读）数据。</p><p>管道传输数据是半双⼯通信，某⼀时刻只能单向传输。</p><p>写⼊管道中的数据遵循先⼊先出的规则</p><p>管道所传送的数据是⽆格式的，这要求管道的读出⽅与写⼊⽅必须事先约定好数据的格式，如多少字节算⼀个消息等</p><p>管道不是普通的⽂件，不属于某个⽂件系统，其只存在于内存中</p><p>管道在内存中对应⼀个缓冲区, 不同的系统其⼤⼩不⼀定相同</p><p>从管道读数据是⼀次性操作，数据⼀旦被读⾛，它就从管道中被抛弃，释放空间以便写更多的数据</p><p>通信效率低，不适合进程间频繁地交换数据。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">(1) 匿名管道和命名管道之间的区别</p><p>匿名管道：没有名字的管道，⽤完就销毁， Linux 中的 | 就是⼀个匿名管道，只适⽤于⽗⼦进程之间的通信。</p><p>命名管道：提前创建了⼀个类型为管道的设备⽂件，在进程⾥只要使⽤这个设备⽂件，就可以相互通信，所以它可以在不相关的进程间进⾏通信。</p></div>"},{"title":"(2 ) pipe函数","content":"<pre><code class=\"language-c\">#include &lt;unistd.h&gt;\n/**\n * 创建无名管道。\n * @param pipefd 为int型数组的首地址，其存放了管道的文件描述符\n * pipefd[0]、pipefd[1].\n * @return 创建成功返回0，创建失败返回-1.\n */\nint pipe(int pipefd[2]);\n/**\n * 当一个管道建立时，它会创建两个文件描述符 fd[0] 和 fd[1]。其中\n * fd[0] 固定用于读管道，而 fd[1] 固定用于写管道。\n * 一般文件 I/O的函数都可以用来操作管道(lseek() 除外。)\n */</code></pre><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）命名管道</p><p>命名管道（FIFO）不同于匿名管道之处在于它提供了⼀个路径名与之关联，以 FIFO 的⽂件形式存在于⽂件系统中，这样，即使与 FIFO 的创建进程不存在亲缘关系的进程，只要可以访问该路径，就能够彼此通过 FIFO 相互通信，因此，通过 FIFO 不相关的进程也能交换数据.</p><p>与⽆名管道(pipe)不同之处：</p><ul><li>FIFO 在⽂件系统中作为⼀个特殊的⽂件⽽存在，但 FIFO 中的内容却存放在内存中;</li></ul><ul><li>当使⽤ FIFO 的进程退出后，FIFO ⽂件将继续保存在⽂件系统中以便以后使⽤;</li></ul><ul><li>FIFO 有名字，不相关的进程可以通过打开命名管道进⾏通信.</li></ul><p>通过命令创建有名管道 mkfifo myPipe</p><p>通过函数创建有名管道</p><pre><code class=\"language-c\">#include &lt;sys/types.h&gt;\n#include &lt;sys/stat.h&gt;\n\n/**\n * 命名管道的创建。\n * @param pathname 普通的路径名，也就是创建后 FIFO 的名字。\n * @param mode 文件的权限，\n * 与打开普通文件的 open() 函数中的 mode 参数相同。(0666)。\n * @return 成功：0 状态码；\n *\n * 失败：如果文件已经存在，则会出错且返回 -1。\n */\nint mkfifo(const char *pathname, mode_t mode);</code></pre></div>"},{"title":"信号量","content":"<p>信号量⽤于控制多个进程对共享资源的访问，⽐如避免因为多个进程同时修改同⼀个共享内存造成冲突，信号量可以使共享的资源在任意时刻只能被⼀个进程访问。</p><p>信号量其实是⼀个整型的计数器，主要⽤于实现进程间的互斥与同步，⽽不是⽤于缓存进程间通信的数据。</p><p>信号量维护⼀个整数值，通常称为计数器。进程可以执⾏两种基本操作来操作信号量：</p><p>P（Wait）操作：这个操作会把信号量减去 1，相减后如果信号量 &lt; 0，则表明资源已被占⽤，进程需阻塞等待；相减后如果信号量 &gt;= 0，则表明还有资源可使⽤，进程可正常继续执⾏。</p><p>V（Signal）操作：这个操作会把信号量加上 1，相加后如果信号量 &lt;= 0，则表明当前有阻塞中的进程，于是会将该进程唤醒运⾏；相加后如果信号量 &gt; 0，则表明当前没有阻塞中的进程；</p><p>如果两个进程访问共享内存，我们可以初始化信号量为1</p><p>进程 A 在访问共享内存前，先执⾏了 P 操作，由于信号量的初始值为 1，故在进程 A 执⾏ P 操作后信号量变为 0，表示共享资源可⽤，于是进程 A 就可以访问共享内存。</p><p>若此时，进程 B 也想访问共享内存，执⾏了 P 操作，结果信号量变为了 -1，这就意味着临界资源已被占⽤，因此进程 B 被阻塞。</p><p>直到进程 A 访问完共享内存，才会执⾏ V 操作，使得信号量恢复为 0，接着就会唤醒阻塞中的线程 B，使得进程 B 可以访问共享内存，最后完成共享内存的访问后，执⾏ V 操作，使信号量恢复到初始值 1。</p><p>可以发现，信号初始化为 1 ，就代表着是互斥信号量，它可以保证共享内存在任何时刻只有⼀个进程在访问，这就很好的保护了共享内存。</p><p>还可以使⽤信号量实现多进程同步，⽐如可以初始化信号量为0</p><p>具体过程：</p><p>如果进程 B ⽐进程 A 先执⾏了，那么执⾏到 P 操作时，由于信号量初始值为 0，故信号量会变为 -1，表示进程 A 还没⽣产数据，于是进程 B 就阻塞等待；</p><p>接着，当进程 A ⽣产完数据后，执⾏了 V 操作，就会使得信号量变为 0，于是就会唤醒阻塞在 P 操作的进程B；</p><p>最后，进程 B 被唤醒后，意味着进程 A 已经⽣产了数据，于是进程 B 就可以正常读取数据了。</p><p>可以发现，信号初始化为 0 ，就代表着是同步信号量，它可以保证进程 A 应在进程 B 之前执⾏。</p>"},{"title":"信号","content":"<p>在 Linux 操作系统中， 为了响应各种各样的事件，提供了⼏⼗种信号，分别代表不同的意义。我们可以通过 kill-l 命令，查看所有的信号。</p><p>信号事件的来源主要有硬件来源（如键盘 Cltr+C ）和软件来源（如 kill 命令）。</p><p>信号是进程间通信机制中唯⼀的异步通信机制，它可以在⼀个进程中通知另⼀个进程发⽣了某种事件从⽽实现进程通信。</p>"},{"title":"Socket通信","content":"<p>Socket 通信是⼀种⽹络编程中常⻅的通信⽅式，但它也可以在同⼀台机器上的不同进程之间进⾏通信。</p><p>创建 socket 的系统调⽤：</p><pre><code class=\"language-txt\">int socket(int domain, int type, int protocol) </code></pre><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">三个参数分别代表：</p><p>domain 参数⽤来指定协议族，⽐如 AF_INET ⽤于 IPV4、AF_INET6 ⽤于 IPV6、AF_LOCAL/AF_UNIX ⽤于本</p><p>机；</p><p>type 参数⽤来指定通信特性，⽐如 SOCK_STREAM 表示的是字节流，对应 TCP、SOCK_DGRAM 表示的是数据报，对应 UDP、SOCK_RAW 表示的是原始套接字；</p><p>protocal 参数原本是⽤来指定通信协议的，但现在基本废弃。因为协议已经通过前⾯两个参数指定完成，protocol ⽬前⼀般写成 0 即可；</p><p>根据创建 socket 类型的不同，通信的⽅式也就不同：</p><p>实现 TCP 字节流通信： socket 类型是 AF_INET 和 SOCK_STREAM；</p><p>实现 UDP 数据报通信：socket 类型是 AF_INET 和 SOCK_DGRAM；</p><p>实现本地进程间通信： 「本地字节流 socket 」类型是 AF_LOCAL 和 SOCK_STREAM，「本地数据报 socket」类型是 AF_LOCAL 和 SOCK_DGRAM。另外，AF_UNIX 和 AF_LOCAL 是等价的，所以 AF_UNIX 也属于本地socket；</p></div>"},{"title":"线程通信","content":"<p>线程间的通信⽬的主要是⽤于线程同步。所以线程没有像进程通信中的⽤于数据交换的通信机制。</p><p>同⼀进程的不同线程共享同⼀份内存区域，所以线程之间可以⽅便、快速地共享信息。只需要将数据复制到共享（全局或堆）变量中即可。但是需要避免出现多个线程试图同时修改同⼀份信息。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、线程属性初始化和销毁</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 初始化线程属性函数，注意：应先初始化线程属性，再pthread_create创建线程。\n * @param attr 线程属性结构体。\n * @return 成功：0；失败：错误号。\n */\nint pthread_attr_init(pthread_attr_t *attr);\n/**\n * 销毁线程属性所占用的资源函数。\n * @param attr 线程属性结构体。\n * @return 成功：0；失败：错误号。\n */\nint pthread_attr_destroy(pthread_attr_t *attr);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）⾮分离状态：</p><p>线程的默认属性是⾮分离状态，这种情况下，原有的线程等待创建的线程结束。只有当pthread_join()函数返回时，创建的线程才算终⽌，才能释放⾃⼰占⽤的系统资源。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）分离状态：</p><p>分离线程没有被其他的线程所等待，⾃⼰运⾏结束了，线程也就终⽌了，⻢上释放系统资源。应该根据⾃⼰的需要，选择适当的分离状态。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">注意：</p><ul><li>如果设置⼀个线程为分离线程，⽽这个线程运⾏⼜⾮常快，它很可能在pthread_create函数返回之前就终⽌了，它终⽌以后就可能将线程号和系统资源移交给其他的线程使⽤，这样调⽤pthread_create的线程就得到了错误的线程号。</li></ul><ul><li>要避免这种情况可以采取⼀定的同步措施，最简单的⽅法之⼀是可以在被创建的线程⾥调⽤pthread_cond_timedwait函数，让这个线程等待⼀会⼉，留出⾜够的时间让函数pthread_create返回。</li></ul><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n\n/**\n * 设置线程分离状态。\n * @param attr 已初始化的线程属性。\n * @detachstate(分离状态)\n *    1. PTHREAD_CREATE_DETACHED（分离线程）；\n *    2. PTHREAD_CREATE_JOINABLE（非分离线程）。\n * @return 成功：0；失败：非0。\n */\n/**\n * 获取线程分离状态。\n * @param attr 已初始化的线程属性。\n * @detachstate(分离状态)\n *    1. PTHREAD_CREATE_DETACHED（分离线程）；\n *    2. PTHREAD_CREATE_JOINABLE（非分离线程）。\n * @return 成功：0；失败：非0。\n */\nint pthread_attr_getdetachstate(const pthread_attr_t *attr, int *detachstate);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、线程栈地址</p><p>当进程栈地址空间不够⽤时，指定新建线程使⽤由malloc分配的空间作为⾃⼰的栈空间。</p><p>通过pthread_attr_setstack和pthread_attr_getstack两个函数分别设置和获取线程的栈地址。</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 设置线程的栈地址。\n * @param attr 指向一个线程属性的指针。\n * @param stackaddr 内存首地址。\n * @param stacksize 返回线程的堆栈大小。\n * @return 成功：0；失败：错误号。\n */\nint pthread_attr_setstack(pthread_attr_t *attr, void *stackaddr, size_t stacksize);\n/**\n * 获取线程的栈地址。\n * @param attr 指向一个线程属性的指针。\n * @param stackaddr 返回获取的栈地址。\n * @param stacksize 返回获取的栈大小。</code></pre><pre><code class=\"language-c\">* @return 成功：0；失败：错误号.\n*/\nint pthread_attr_getstack(const pthread_attr_t *attr, void **stackaddr, size_t *stacksize);-</code></pre><ul><li>线程栈⼤⼩</li></ul><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 设置线程的栈大小。\n * @param attr 指向一个线程属性的指针。\n * @param stacksize 线程的堆栈大小。\n * @return 成功：0；失败：错误号。\n */\nint pthread_attr_setstacksize(pthread_attr_t *attr, size_t stacksize);\n/**\n * 获取线程的栈大小。\n * @param attr 指向一个线程属性的指针。\n * @param stacksize 返回线程的堆栈大小。\n * @return 成功：0；失败：错误号。\n */\nint pthread_attr_getstacksize(const pthread_attr_t *attr, size_t *stacksize);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、线程使⽤注意事项</p><ul><li>主线程退出其他线程不退出，主线程应调⽤pthread_exit</li></ul><ul><li>避免僵⼫线程</li></ul><ul><li>pthread_join</li></ul><ul><li>pthread_detach</li></ul><ul><li>pthread_create指定分离属性</li></ul><p>被join线程可能在join函数返回前就释放完⾃⼰的所有内存资源，所以不应当返回被回收线程栈中的值</p><ul><li>malloc和mmap申请的内存可以被其他线程释放</li></ul><ul><li>应避免在多线程模型中调⽤fork，除⾮⻢上exec，⼦进程中只有调⽤fork的线程存在，其他线程t在⼦进程中均pthread_exit</li></ul><ul><li>信号的复杂语义很难和多线程共存，应避免在多线程引⼊信号机制</li></ul><ul><li>Cache伪共享：</li></ul><p>这种因为多个线程同时读写同⼀个 Cache Line 的不同变量时，⽽导致 CPU Cache 失效的现象。避免的⽅式⼀般有Cache Line ⼤⼩字节对⻬，以及字节填充等⽅法。在 Linux 内核中存在cachelinealignedin_smp 宏定义，是⽤于解决伪共享的问题。</p></div>"},{"title":"多线程","content":"<p>⽤户态的多线程模型，同⼀个进程内部有多个线程，所有的线程共享同⼀个进程的内存空间，进程中定义的全局变量会被所有的线程共享；</p><p>i++在计算机中并不是原⼦操作，涉及内存取数，计算和写⼊内存⼏个环节，⽽线程的切换有可能发⽣在上述任何⼀个环节中间，所以不同的操作顺序很有可能带来意想不到的结果。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">多线程的好处：</p><p>主要原因是许多应⽤中同时发⽣多个活动，某些活动随着时间推移⽽阻塞，将这些应⽤程序分解成并发运⾏的多个线程，简化设计模型。同时多线程有共享同⼀地址空间和可⽤数据的能⼒，这是多进程没有的。</p><p>线程⽐进程开销⼩，更容易创建和释放。</p><p>多个线程是IO密集型时，多线程可以使这些活动彼此重叠运⾏，可以加快程序执⾏的速度。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">对于线程需要考虑：</p><p>线程之间有⽆先后访问顺序（线程依赖关系）</p><p>多个线程共享访问同⼀变量（同步互斥问题）</p><p>同⼀进程的多个线程共享进程的资源，除了标识线程的tid，每个线程还有⾃⼰独⽴的栈空间，线程彼此之间是⽆法访问其他线程栈上内容的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">进程表：</p><p>为了实现进程模型，操作系统维护着⼀张表格(⼀个结构数组)，即进程表。</p><p>每个进程占有⼀个进程表项。(有些著作称这些为进程控制块)</p><p>该表项包含了⼀个进程状态的重要信息</p><p>包括程序计数器、堆栈指针、内存分配状况、所打开⽂件的状态、账号的调度信息，以及其他在进程由运⾏态转换到就绪态或阻塞态时必须保存的信息，从⽽保证该进程随后能再次启动，就像从未中断过⼀样</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、进程切换为何⽐线程慢</p><p>涉及到虚拟内存的问题，进程切换涉及虚拟地址空间的切换⽽线程不会。</p><p>因为每个进程都有⾃⼰的虚拟地址空间，⽽线程是共享所在进程的虚拟地址空间的，所以同⼀个进程中的线程进⾏线程切换时不涉及虚拟地址空间的转换。</p><p>把虚拟地址转换为物理地址需要查找⻚表，⻚表查找是⼀个很慢的过程（⾄少访问2次内存），因此通常使⽤Cache来缓存常⽤的地址映射，这样可以加速⻚表查找，这个cache就是TLB（快表）。</p><p>由于每个进程都有⾃⼰的虚拟地址空间，那么显然每个进程都有⾃⼰的⻚表，那么当进程切换后⻚表也要进⾏切换，⻚表切换后TLB就失效了，cache失效导致命中率降低，那么虚拟地址转换为物理地址就会变慢，表现出来的就是程序运⾏会变慢，⽽线程切换则不会导致TLB失效，因为线程线程⽆需切换地址空间，这也就是进程切换要⽐同进程下线程切换慢的原因。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">10、守护进程</p><p>守护进程是指在后台运⾏的，没有控制终端与它相连的进程。它独⽴于控制终端，周期性地执⾏某种任务。</p><p>Linux的⼤多数服务器就是⽤守护进程的⽅式实现的，如web服务器进程http等。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）让程序在后台执⾏。</p><p>⽅法是调⽤fork()产⽣⼀个⼦进程，然后使⽗进程退出。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）调⽤setsid()创建⼀个新对话期。</p><p>守护进程需要摆脱⽗进程的影响，⽅法是调⽤setsid()使进程成为⼀个会话组⻓。setsid()调⽤成功后，进程成为新的会话组⻓和进程组⻓，并与原来的登录会话、进程组和控制终端脱离。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）禁⽌进程重新打开控制终端。</p><p>经过1和2，进程已经成为⼀个⽆终端的会话组⻓，但是它可以重新申请打开⼀个终端。为了避免这种情况发⽣，可以通过使进程不再是会话组⻓来实现。再⼀次通过fork（）创建新的⼦进程，使调⽤fork的进程退出。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）关闭不再需要的⽂件描述符。</p><p>⼦进程从⽗进程继承打开的⽂件描述符。如不关闭，将会浪费系统资源，造成进程所在的⽂件系统⽆法卸下以及引起⽆法预料的错误。⾸先获得最⾼⽂件描述符值，然后⽤⼀个循环程序，关闭0到最⾼⽂件描述符值的所有⽂件描述符。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（5）将当前⽬录更改为根⽬录。</p><ul><li>⼦进程从⽗进程继承的⽂件创建屏蔽字可能会拒绝某些许可权。</li></ul><p>为防⽌这⼀点，使⽤unmask(0)将屏蔽字清零。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（7）处理SIGCHLD信号。</p><p>对于服务器进程，在请求到来时往往⽣成⼦进程处理请求。如果⼦进程等待⽗进程捕获状态，则⼦进程将成为僵⼫进程（zombie），从⽽占⽤系统资源。如果⽗进程等待⼦进程结束，将增加⽗进程的负担，影响服务器进程的并发性能。在Linux下可以简单地将SIGCHLD信号的操作设为SIG_IGN。这样，⼦进程结束时不会产⽣僵⼫进程。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">11、僵⼫进程</p><p>多进程程序，⽗进程⼀般需要跟踪⼦进程的退出状态，当⼦进程退出，⽗进程在运⾏，⼦进程必须等到⽗进程捕获到了⼦进程的退出状态才真正结束。在⼦进程结束后，⽗进程读取状态前，此时⼦进程为僵⼫进程。</p><p>设置僵⼫进程的⽬的是维护⼦进程的信息，以便⽗进程在以后某个时候获取。这些信息⾄少包括进程ID，进程的终⽌状态，以及该进程使⽤的CPU时间。所以当终⽌⼦进程的⽗进程调⽤wait或waitpid时就可以得到这些信息。</p><p>但是⼦进程停⽌在僵⼫态会占据内核资源，所以需要避免僵⼫进程的产⽣或⽴即结束⼦进程的僵⼫态。</p><ul><li>⽗进程调⽤wait/waitpid等函数等待⼦进程结束，如果尚⽆⼦进程退出wait会导致⽗进程阻塞。waitpid只会等待由pid参数指定的⼦进程，同时也是⾮阻塞，⽬标进程正常退出返回⼦进程PID，还没结束返回0。</li></ul><ul><li>在事件已经发⽣情况下执⾏⾮阻塞调⽤可以提⾼程序效率。对waitpid，最好在⼦进程退出后调⽤。使⽤SIGCHLD信号通知⽗进程，⼦进程结束。</li></ul><p>⽗进程中捕获信号，然后在信号处理函数中调⽤waitpid以彻底结束⼦进程</p><pre><code class=\"language-c\">static void handle_child(int sig)\n{\n    pid_t pid;\n    int stat;\n    while((pid = waitpid(-1, &amp;stat, WNOHANG)) &gt; 0)\n    {\n    //结束子进程的处理；\n    }\n}</code></pre><ul><li>通过signal(SIGCHLD, SIG_IGN)通知内核对⼦进程的结束不关⼼，由内核回收。如果不想让⽗进程挂起，可以在⽗进程中加⼊⼀条语句：signal(SIGCHLD,SIG_IGN);表示⽗进程忽略SIGCHLD信号，该信号是⼦进程退出的时候向⽗进程发送的。</li></ul><ul><li>忽略SIGCHLD信号，这常⽤于并发服务器的性能的⼀个技巧因为并发服务器常常fork很多⼦进程，⼦进程终结之后需要服务器进程去wait清理资源。如果将此信号的处理⽅式设为忽略，可让内核把僵⼫⼦进程转交给init进程去处理，省去了⼤量僵⼫进程占⽤系统资源。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">12、多进程</p><p>进程结构由以下⼏个部分组成：代码段、堆栈段、数据段。代码段是静态的⼆进制代码，多个程序可以共享。</p><p>⽗进程创建⼦进程之后，⽗、⼦进程除了pid外，⼏乎所有的部分⼏乎⼀样。</p><p>⽗、⼦进程共享全部数据，⼦进程在写数据时会使⽤写时复制技术将公共的数据重新拷⻉⼀份，之后在拷⻉出的数据上进⾏操作；不是对同⼀块数据进⾏操作；</p><p>如果⼦进程想要运⾏⾃⼰的代码段，还可以通过调⽤execv()函数重新加载新的代码段，之后就和⽗进程独⽴开了。</p></div>"},{"title":"共享存储映射","content":"<p>存储映射I/O (Memory-mapped I/O) 使⼀个磁盘⽂件与存储空间中的⼀个缓冲区相映射.</p><p>于是当从缓冲区中取数据，就相当于读⽂件中的相应字节。于此类似，将数据存⼊缓冲区，则相应的字节就⾃动写⼊⽂件。</p><p>这样，就可在不适⽤read和write函数的情况下，使⽤地址（指针）完成I/O操作，进程就可以直接通过读写内存来操作⽂件.</p><p>共享内存可以说是最有⽤的进程间通信⽅式，也是最快的IPC形式, 因为进程可以直接读写内存，⽽不需要任何数据的拷⻉.</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）mmap函数</p><pre><code class=\"language-c\">#include &lt;sys/mman.h&gt;\n/**\n * 一个文件或者其它对象映射进内存。\n * @param addr 指定映射的起始地址，通常设为NULL，由系统指定。\n * @param length 映射到内存的文件长度。\n * @param prot 映射区的保护方式，最常用的：\n *\n *    (1) 读：PROT_READ;\n *\n *    (2) 写：PROT_WRITE;\n *\n *    (3) 读写：PROT_READ | PROT_WRITE.\n * @param flags 映射区的特性，可以是：\n *\n *    (1) MAP_SHARED：写入映射区的数据会复制回文件，\n *\n *    且允许其他映射该文件的进程共享。\n *\n *    (2) MAP_PRIVATE：对映射区的写入操作\n *\n *    会产生一个映射区的复制(copy - on - write),\n *\n *    对此区域所做的修改不会写回原文件。\n * @param fd 由open返回的文件描述符，代表要映射的文件。\n * @param offset 以文件开始处的偏移量，\n *\n *    必须是4k的整数倍，通常为0，表示从文件头开始映射。\n * @return 成功：返回创建的映射区首地址；失败：MAP_FAILED宏。\n */\nvoid *mmap(void *addr, size_t length,\n    int prot, int flags, int fd, off_t offset);</code></pre><p>内存是按照⻚来区别的，通常⼀⻚就是4K</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">总结：</p><ul><li>第⼀个参数写成NULL</li></ul><ul><li>第⼆个参数要映射的⽂件⼤⼩ &gt; 0</li></ul><ul><li>第三个参数：PROT_READ 、PROT_WRITE</li></ul><ul><li>第四个参数：MAP_SHARED 或者 MAP_PRIVATE</li></ul><ul><li>第五个参数：打开的⽂件对应的⽂件描述符</li></ul><ul><li>第六个参数：4k的整数倍，通常为0</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）munmap函数</p><pre><code class=\"language-c\">#include &lt;sys/mman.h&gt;\n/**\n * 释放内存映射区。\n * @param addr 使用mmap函数创建的映射区的首地址。\n * @param length 映射区的大小。\n * @return 成功返回0；失败返回-1。\n */\nint munmap(void *addr, size_t length);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、注意事项:</p><ul><li>创建映射区的过程中，隐含着⼀次对映射⽂件的读操作</li></ul><ul><li>当MAP_SHARED时，要求：映射区的权限应 &lt;=⽂件打开的权限(出于对映射区的保护)。⽽MAP_PRIVATE则⽆所谓，因为mmap中的权限是对内存的限制</li></ul><ul><li>映射区的释放与⽂件关闭⽆关。只要映射建⽴成功，⽂件可以⽴即关闭</li></ul><ul><li>特别注意，当映射⽂件⼤⼩为0时，不能创建映射区。所以，⽤于映射的⽂件必须要有实际⼤⼩。mmap使⽤时常常会出现总线错误，通常是由于共享⽂件存储空间⼤⼩引起的</li></ul><ul><li>munmap传⼊的地址⼀定是mmap的返回地址。坚决杜绝指针++操作</li></ul><ul><li>如果⽂件偏移量必须为4K的整数倍</li></ul><ul><li>mmap创建映射区出错概率⾮常⾼，⼀定要检查返回值，确保映射区建⽴成功再进⾏后续操作</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、匿名映射实现⽗⼦进⾏通信</p><ul><li>为什么使⽤匿名的⽅式实现通信？</li></ul><p>内存映射的需要依赖⽂件。⽽建⽴⽂件建⽴好了只会还要unlink close掉，⽐较麻烦;</p><ul><li>有什么好的不能办法进⾏解决？</li></ul><p>直接使⽤匿名映射来代替;</p><ul><li>Linux系统给我们提供了创建匿名映射区的⽅法，⽆需依赖⼀个⽂件即可创建映射区。同样需要借助标志位参数flags来指定;</li></ul><ul><li>使⽤MAP_ANONYMOUS (或MAP_ANON):</li></ul><pre><code class=\"language-c\">int *p = mmap(NULL, 4, PROT_READ | PROT_WRITE, MAP_SHARED | MAP_ANONYMOUS, -1, 0); </code></pre></div>"},{"title":"消息队列","content":"<p>基本原理：A 进程要给 B 进程发送消息，A 进程把数据放在对应的消息队列后就可以正常返回了，B 进程需要的时候再去读取数据就可以了。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">特点：</p><ul><li>消息队列是保存在内核中的消息链表，每个消息体都是固定⼤⼩的存储块。如果进程从消息队列中读取了消息体，内核就会把这个消息体删除。</li></ul><ul><li>如果没有释放消息队列或者没有关闭操作系统，消息队列会⼀直存在。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><ul><li>通信不及时，附件也有⼤⼩限制。</li></ul><ul><li>消息队列不适合⽐较⼤数据的传输，每个消息体都有⼀个最⼤⻓度的限制，同时所有队列所包含的全部消息体的总⻓度也是有上限</li></ul><ul><li>消息队列通信过程中，存在⽤户态与内核态之间的数据拷⻉开销</li></ul></div>"},{"title":"信号","content":"<p>信号是linux进程通信的最古⽼的⽅式;</p><p>信号是软件中断，它是在软件层次上对中断机制的⼀种模拟，是⼀种异步通信的⽅式 。信号可以导致⼀个正在运⾏的进程被另⼀个正在运⾏的异步进程中断，转⽽处理某⼀个突发事件;</p><p>信号可以直接进⾏⽤户空间进程和内核空间进程的交互，内核进程可以利⽤它来通知⽤户空间进程发⽣了哪些系统事件.</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、信号的特点</p><ul><li>简单</li></ul><ul><li>不能携带⼤量信息</li></ul><ul><li>满⾜某个特定条件才发送</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、⼀个完整的信号周期</p><ul><li>信号的产⽣</li></ul><ul><li>信号在进程种的注册，信号在进程种的注销</li></ul><ul><li>执⾏信号处理函数</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）不存在编号为0的信号</p><ul><li>其中1-31号信号称之为常规信号（也叫普通信号或标准信号）</li></ul><ul><li>34-64称之为实时信号，驱动编程与硬件相关。名字上区别不⼤。⽽前32个名字各不相同</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）⽐较重要的⼀些，需要记住的⼏个信号</p><ul><li>SIGINT 当⽤户按下了&lt;Ctrl+C&gt;组合键时，⽤户终端向正在运⾏中的由该终端启动的程序发出此信号，终⽌进程</li></ul><ul><li>SIGQUIT ⽤户按下&lt;ctrl+&gt;组合键时产⽣该信号，⽤户终端向正在运⾏中的由该终端启动的程序发出些信号,终⽌进程</li></ul><ul><li>SIGSEGV 指示进程进⾏了⽆效内存访问(段错误), 终⽌进程并产⽣core⽂件</li></ul><ul><li>SIGPIPE Broken pipe向⼀个没有读端的管道写数据,终⽌进程</li></ul><ul><li>SIGCHLD ⼦进程结束时，⽗进程会收到这个信号,忽略这个信号</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、信号四要素</p><ul><li>编号: man 7 signal 查看⽂档帮助</li></ul><ul><li>名称</li></ul><ul><li>事件</li></ul><ul><li>默认处理动作:</li></ul><ul><li>Term：终⽌进程</li></ul><ul><li>Ign： 忽略信号 (默认即时对该种信号忽略操作)</li></ul><ul><li>Core：终⽌进程，⽣成Core⽂件。(查验死亡原因，⽤于gdb调试)</li></ul><ul><li>Stop：停⽌（暂停）进程</li></ul><ul><li>Cont：继续运⾏进程</li></ul><p>特别强调: 9) SIGKILL 和19) SIGSTOP信号，不允许忽略和捕捉，只能执⾏默认动作。甚⾄不能将其设置为阻塞.</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）产⽣</p><ul><li>当⽤户按某些终端键时，将产⽣信号</li></ul><ul><li>硬件异常将产⽣信号</li></ul><ul><li>软件异常将产⽣信号</li></ul><ul><li>调⽤系统函数(如：kill、raise、abort)将发送信号</li></ul><ul><li>运⾏ kill /killall命令将发送信号</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）阻塞信号集</p><p>将某些信号加⼊集合，对他们设置屏蔽，当屏蔽x信号后，再收到该信号，该信号的处理将推后(处理发⽣在解除屏蔽后)</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）未决信号集合</p><p>信号产⽣，未决信号集中描述该信号的位⽴刻翻转为1，表示信号处于未决状态。当信号被处理对应位翻转回为0。这⼀时刻往往⾮常短暂.</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）kill函数：</p><pre><code class=\"language-c\">#include &lt;sys/types.h&gt;\n#include &lt;signal.h&gt;\n\n/**\n * 给指定进程发送指定信号(不一定杀死).\n * @param pid 取值有四种情况:\n *\n * pid &gt; 0: 将信号传送给进程 ID 为pid的进程.\n *\n * pid = 0: 将信号传送给当前进程所在进程组中的所有进程.\n *\n * pid = -1: 将信号传送给系统内所有的进程.\n *\n * pid &lt; -1: 将信号传给指定进程组的所有进程，这个进程组号等于 pid 的绝对值.\n * @param sig 信号的编号，这里可以填数字编号，也可以填信号的宏定义.\n *\n * 可以通过命令 kill - 1(&quot;1&quot; 为字母)进行相应查看.\n *\n * 不推荐直接使用数字，应使用宏名，因为不同操作系统信号编号可能不同，但名称一致.\n * @return 成功：0；失败：-1.\n * 普通用户基本规则是：发送者实际或有效用户ID == 接收者实际或有效用户ID.\n */\nint kill(pid_t pid, int sig);</code></pre><ul><li>raise函数</li></ul><pre><code class=\"language-c\">#include &lt;signal.h&gt;\n/**\n * 给当前进程发送指定信号(自己给自己发)，等价于 kill(getpid(), sig).\n * @param sig 信号编号.\n * @return 成功：0；失败：非0值.\n */\nint raise(int sig);</code></pre><ul><li>abort函数</li></ul><pre><code class=\"language-c\">#include &lt;stdlib.h&gt;\n/**\n * 给自己发送异常终止信号 6) SIGABRT，并产生core文件，等价于kill(getpid(), SIGABRT).\n */\nvoid abort(void);</code></pre><ul><li>alarm函数(闹钟)</li></ul><pre><code class=\"language-c\">#include &lt;unistd.h&gt;\n/**\n * 设置定时器(闹钟)。在指定seconds后，内核会给当前进程发送14）SIGALRM信号。进程收到该信号，默认动作终止。每个进程都有且只有唯一的一个定时器；\n * 取消定时器alarm(0)，返回旧闹钟余下秒数。\n * @param seconds 指定的时间，以秒为单位。\n * @return 返回0或剩余的秒数。\n */\nunsigned int alarm(unsigned int seconds);</code></pre><ul><li>setitimer函数（定时器）</li></ul><pre><code class=\"language-c\">#include &lt;sys/time.h&gt;\n\nstruct itimerval {\n    struct timerval it_interval; // 闹钟触发周期\n    struct timerval it_value; // 闹钟触发时间\n};\n\nstruct timeval {\n    long tv_sec;    // 秒\n    long tv_usec;    // 微秒\n}\n\n/**\n * 设置定时器(闹钟)。 可代替alarm函数。精度微秒us，可以实现周期定时。\n * @param which 指定定时方式：\n * (1) 自然定时：ITIMER_REAL → 14) SIGALRM计算自然时间；\n * (2) 虚拟空间计时(用户空间)：ITIMER_VIRTUAL → 26) SIGVTALRM 只计算进程占用cpu的时间；</code></pre><pre><code class=\"language-c\">* (3) 虚拟空间计时(用户空间): ITIMER_VIRTUAL → 26) SIGVTALRM 只计算进程占用cpu的时间。\n* @param new_value 负责设定timeout时间。\n* @param old_value 存放旧的timeout值，一般指定为NULL。\n* @return 成功：0；失败：-1。\n*/\nint setitimer(int which, const struct itimerval *new_value, struct itimerval *old_value);\n// itimerval.it_value: 设定第一次执行function所延迟的秒数\n// itimerval.it_interval: 设定以后每几秒执行function</code></pre><ul><li>⾃定义信号集函数</li></ul><pre><code class=\"language-c\">#include &lt;signal.h&gt;\nint sigemptyset(sigset_t *set);    // 将set集合置空\nint sigfillset(sigset_t *set);    // 将所有信号加入set集合\nint sigaddset(sigset_t *set, int signo);    // 将signo信号加入到set集合\nint sigdelset(sigset_t *set, int signo);    // 从set集合中移除signo信号\nint sigismember(const sigset_t *set, int signo);    // 判断信号是否存在</code></pre><p>除sigismember外，其余操作函数中的set均为传出参数。sigset_t类型的本质是位图;</p><ul><li>阻塞信号集</li></ul><ul><li>信号阻塞集也称信号屏蔽集、信号掩码;</li></ul><ul><li>信号阻塞集⽤来描述哪些信号递送到该进程的时候被阻塞;</li></ul><ul><li>sigprocmask函数</li></ul><pre><code class=\"language-c\">#include &lt;signal.h&gt;\n/**\n * 检查或修改信号阻塞集，根据 how 指定的方法对进程的阻塞集合进行修改，\n * 新的信号阻塞集由 set 指定，而原先的信号阻塞集合由 oldset 保存。\n *\n * @param how 信号阻塞集合的修改方法，有 3 种情况：\n *\n * (1) SIG_BLOCK: 向信号阻塞集合中添加 set 信号集，\n *\n * 新的信号掩码是set和旧信号掩码的并集。相当于 mask = mask|set;\n *\n * (2) SIG_UNBLOCK: 从信号阻塞集合中删除 set 信号集，\n *\n * 从当前信号掩码中去除 set 中的信号。相当于 mask = mask &amp; ~ set;\n *\n * (3) SIG_SETMASK: 将信号阻塞集合设为 set 信号集，\n *\n * 相当于原来信号阻塞集的内容清空，然后按照 set 中的信号重新设置信号阻塞集。相当于\nmask = set.\n *\n * @set 要操作的信号集地址，若 set 为 NULL，则不改变信号阻塞集合，函数只把当前信号阻塞集合保存到\noldset 中。\n * @oldset 保存原先信号阻塞集地址。\n * @return 成功：0；失败：-1，失败时错误代码只可能是 EINVAL，表示参数 how 不合法。\n */\nint sigprocmask(int how, const sigset_t *set, sigset_t *oldset);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）sigpending函数</p><pre><code class=\"language-c\">#include &lt;signal.h&gt;\n/**\n * 读取当前进程的未决信号集。\n * @param set 未决信号集。\n * @return 成功：0；失败：-1。\n */\nint sigpending(sigset_t *set);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">10、信号捕捉</p><p>注意: SIGKILL 和 SIGSTOP 不能更改信号的处理⽅式，因为它们向⽤户提供了⼀种使进程终⽌的可靠⽅法;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）sigaction函数</p><pre><code class=\"language-c\">#include &lt;signal.h&gt;\n/**\n * 检查或修改指定信号的设置（或同时执行这两种操作）。\n * @param signum 要操作的信号。\n * @param act 要设置的对信号的新处理方式（传入参数）。\n * @param oldact：原来对信号的处理方式（传出参数）。\n *\n * 如果 act 指针非空，则要改变指定信号的处理方式（设置），\n * 如果 oldact 指针非空，则系统将此前指定信号的处理方式存入 oldact。\n *\n * @return 成功：0；失败：-1。\n */\nint sigaction(int signum, const struct sigaction *act, struct sigaction *oldact);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）sa_handler、sa_sigaction：信号处理函数指针</p><p>和 signal() ⾥的函数指针⽤法⼀样，应根据情况给sa_sigaction、sa_handler 两者之⼀赋值</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">其取值如下：</p><ul><li>SIG_IGN：忽略该信号</li></ul><ul><li>SIG_DFL：执⾏系统默认动作</li></ul><ul><li>处理函数名：⾃定义信号处理函数</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）sa_mask：</p><p>信号阻塞集，在信号处理函数执⾏过程中，临时屏蔽指定的信号;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（4）sa_flags：</p><p>⽤于指定信号处理的⾏为，通常设置为0，表使⽤默认属性。它可以是⼀下值的“按位或”组合：</p><ul><li>A_RESTART：使被信号打断的系统调⽤⾃动重新发起（已经废弃）</li></ul><ul><li>SA_NOCLDSTOP：使⽗进程在它的⼦进程暂停或继续运⾏时不会收到 SIGCHLD 信号</li></ul><ul><li>SA_NOCLDWAIT：使⽗进程在它的⼦进程退出时不会收到 SIGCHLD 信号，这时⼦进程如果退出也不会成为僵⼫进程</li></ul><ul><li>SA_NODEFER：使对信号的屏蔽⽆效，即在信号处理函数执⾏期间仍能发出这个信号</li></ul><ul><li>SA_RESETHAND：信号处理之后重新设置为默认的处理⽅式</li></ul><ul><li>SA_SIGINFO：使⽤ sa_sigaction 成员⽽不是 sa_handler 作为信号处理函数</li></ul><ul><li>struct sigaction结构体</li></ul><pre><code class=\"language-c\">struct sigaction {\n    void(*sa_handler)(int); //旧的信号处理函数指针\n    void(*sa_sigaction)(int, siginfo_t *, void *); //新的信号处理函数指针\n    sigset_t sa_mask; //信号阻塞集\n    int sa_flags; //信号处理的方式\n    void(*sa_restorer)(void); //已弃用\n};</code></pre><ul><li>信号处理函数</li></ul><pre><code class=\"language-c\">/**\n * @param signum 信号的编号。\n * @param info 记录信号发送进程信息的结构体。\n * @param context 可以赋给指向 ucontext_t 类型的一个对象的指针\n * 以引用在传递信号时被中断的接收进程或线程的上下文。\n */\nvoid(*sa_sigaction)(int signum, siginfo_t *info, void *context);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">13、不可重⼊、可重⼊函数</p><p>如果有⼀个函数不幸被设计成为这样：那么不同任务调⽤这个函数时可能修改其他任务调⽤这个函数的数据，从⽽导致不可预料的后果。</p><p>这样的函数是不安全的函数，也叫不可重⼊函数;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）不可重⼊函数:</p><ul><li>函数体内使⽤了静态的数据结构;</li></ul><ul><li>函数体内调⽤了malloc() 或者 free() 函数(谨慎使⽤堆);</li></ul><ul><li>函数体内调⽤了标准 I/O 函数;</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）可重⼊函数:</p><ul><li>所谓可重⼊是指⼀个可以被多个任务调⽤的过程，任务在调⽤时不必担⼼数据是否会出错;</li></ul><ul><li>在写函数时候尽量使⽤局部变量（例如寄存器、栈中的变量）;</li></ul><ul><li>对于要使⽤的全局变量要加以保护（如采取关中断、信号量等互斥⽅法），这样构成的函数就⼀定是⼀个可重⼊的函数.</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">14、SIGCHLD信号</p><ul><li>⼦进程终⽌时;</li></ul><ul><li>⼦进程接收到SIGSTOP信号停⽌时;</li></ul><ul><li>⼦进程处在停⽌态，接受到SIGCONT后唤醒时。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）最简单的⽅法:</p><p>⽗进程通过 wait() 和 waitpid() 等函数等待⼦进程结束，但是，这会导致⽗进程挂起;</p><ul><li>如果⽗进程要处理的事情很多，不能够挂起，通过 signal() 函数⼈为处理信号 SIGCHLD:</li></ul><p>只要有⼦进程退出⾃动调⽤指定好的回调函数，因为⼦进程结束后， ⽗进程会收到该信号 SIGCHLD ，可以在其回调函数⾥调⽤ wait() 或 waitpid() 回收;</p><ul><li>如果⽗进程不关⼼⼦进程什么时候结束，那么可以⽤signal（SIGCHLD, SIG_IGN）通知内核:</li></ul><p>⾃⼰对⼦进程的结束不感兴趣，⽗进程忽略此信号，那么⼦进程结束后，内核会回收，并不再给⽗进程发送信号;</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、进程组概述</p><ul><li>代表⼀个或多个进程的集合;</li></ul><ul><li>每个进程都属于⼀个进程组;</li></ul><ul><li>是为了简化对多个进程的管理。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、会话</p><ul><li>⼀个会话可以有⼀个控制终端。这通常是终端设备或伪终端设备;</li></ul><ul><li>建⽴与控制终端连接的会话⾸进程被称为控制进程;</li></ul><ul><li>⼀个会话中的⼏个进程组可被分为⼀个前台进程组以及⼀个或多个后台进程组;</li></ul><ul><li>如果⼀个会话有⼀个控制终端，则它有⼀个前台进程组，其它进程组为后台进程组;</li></ul><ul><li>如果终端接⼝检测到断开连接，则将挂断信号发送⾄控制进程（会话⾸进程。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、创建会话注意事项</p><ul><li>调⽤进程不能是进程组组⻓，该进程变成新会话⾸进程(session header);</li></ul><ul><li>该调⽤进程是组⻓进程，则出错返回;</li></ul><ul><li>该进程成为⼀个新进程组的组⻓进程;</li></ul><ul><li>需有root权限(ubuntu不需要);</li></ul><ul><li>新会话丢弃原有的控制终端，该会话没有控制终端;</li></ul><ul><li>建⽴新会话时，先调⽤fork, ⽗进程终⽌，⼦进程调⽤setsid。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）getsid 函数</p><pre><code class=\"language-c\">#include &lt;unistd.h&gt;\n/**\n * 获取进程所属的会话ID.\n * @param pid 进程号，pid为0表示查看当前进程session ID.\n * @return 成功：返回调用进程的会话ID；失败：-1.\n */\npid_t getsid(pid_t pid);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）setsid函数</p><pre><code class=\"language-c\">#include &lt;unistd.h&gt;\n/**\n * 创建一个会话，并以自己的ID设置进程组ID，同时也是新会话的ID。\n * 调用了 setsid 函数的进程，既是新的会长，也是新的组长。\n *\n * @return 成功：返回调用进程的会话ID；失败：-1.\n */\npid_t setsid(void);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、守护进程</p><p>守护进程（Daemon Process），也就是通常说的 Daemon 进程（精灵进程），是 Linux 中的后台服务进程</p><ul><li>它是⼀个⽣存期较⻓的进程，通常独⽴于控制终端并且周期性地执⾏某种任务或等待处理某些发⽣的事件</li></ul><ul><li>⼀般采⽤以d结尾的名字</li></ul><ul><li>所有的服务存在于 etc/init.d</li></ul><ul><li>守护进程是个特殊的孤⼉进程</li></ul><ul><li>之所以脱离于终端是为了避免进程被任何终端所产⽣的信息所打断，其在执⾏过程中的信息也不在任何终端上显示</li></ul><ul><li>Linux 的⼤多数服务器就是⽤守护进程实现的</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、守护进程模型</p><ul><li>创建⼦进程，⽗进程退出(必须)</li></ul><p>所有⼯作在⼦进程中进⾏形式上脱离了控制终端</p><ul><li>在⼦进程中创建新会话(必须)</li></ul><ul><li>setsid()函数</li></ul><ul><li>使⼦进程完全独⽴出来，脱离控制</li></ul><ul><li>改变当前⽬录为根⽬录(不是必须)</li></ul><ul><li>chdir()函数</li></ul><ul><li>防⽌占⽤可卸载的⽂件系统</li></ul><ul><li>也可以换成其它路径</li></ul><ul><li>重设⽂件权限掩码(不是必须)</li></ul><ul><li>umask()函数</li></ul><ul><li>防⽌继承的⽂件创建屏蔽字拒绝某些权限</li></ul><ul><li>增加守护进程灵活性</li></ul><ul><li>关闭⽂件描述符(不是必须)</li></ul><p>继承的打开⽂件不会⽤到，浪费系统资源，⽆法卸载</p><ul><li>开始执⾏守护进程核⼼⼯作(必须)</li></ul><p>守护进程退出处理程序模型</p></div>"},{"title":"互斥锁Mutex","content":"<p>互斥锁（mutex）：</p><p>也叫互斥量，互斥锁是⼀种简单的加锁的⽅法来控制对共享资源的访问，互斥锁只有两种状态,即加锁( lock )和解锁( unlock )</p><ul><li>在访问共享资源后临界区域前，对互斥锁进⾏加锁。</li></ul><ul><li>在访问完成后释放互斥锁导上的锁。</li></ul><ul><li>对互斥锁进⾏加锁后，任何其他试图再次对互斥锁加锁的线程将会被阻塞，直到锁被释放。</li></ul><p>互斥锁的数据类型是： pthread_mutex_t</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 创建互斥锁</p><p>pthread_mutex_init()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 初始化一个互斥锁。\n * @param mutex 互斥锁地址。类型是 pthread_mutex_t。\n * @param attr 设置互斥量的属性，通常可采用默认属性，即可将 attr 设为 NULL。\n * @return 成功：0 成功申请的锁默认是打开的；失败：非0(错误码)。\n */\nint pthread_mutex_init(pthread_mutex_t *restrict mutex, const pthread_mutexattr_t *restrict attr);\n// 这种方法等价于使用 NULL 指定的 attr 参数调用 pthread_mutex_init() 来完成动态初始化，\n// 不同之处在于 PTHREAD_MUTEX_INITIALIZER 宏不进行错误检查。</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 销毁互斥锁</p><p>pthread_mutex_destroy()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 销毁指定的一个互斥锁。互斥锁在使用完毕后，必须要对互斥锁进行销毁，以释放资源。\n * @param mutex 互斥锁地址。类型是 pthread_mutex_t。\n * @return 成功：0；失败：非0(错误码)。\n */\nint pthread_mutex_destroy(pthread_mutex_t *mutex);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 互斥锁上锁</p><p>pthread_mutex_lock()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 对互斥锁上锁，若互斥锁已经上锁，则调用者阻塞，直到互斥锁解锁后再上锁。\n * @param mutex 互斥锁地址。\n * @return 成功：0；失败：非0(错误码)。\n */\nint pthread_mutex_lock(pthread_mutex_t *mutex);\n/**\n * 调用该函数时，若互斥锁未加锁，则上锁，返回 0；\n * 若互斥锁已加锁，则函数直接返回失败，即 EBUSY。\n */\nint pthread_mutex_trylock(pthread_mutex_t *mutex);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 互斥锁解锁</p><p>pthread_mutex_unlock()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 对指定的互斥锁解锁。\n * @param mutex 互斥锁地址。\n * @return 成功：0；失败：非0(错误码)\n */\nint pthread_mutex_unlock(pthread_mutex_t *mutex);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">死锁（DeadLock）</p><p>如果⼀个进程集合中的每⼀个进程都在等待只能由该进程集合中的其他进程才能引发的事件，那么，该进程集合就是死锁</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、可抢占资源</p><p>可以从拥有它的进程中抢占⽽不会产⽣任何副作⽤，存储器就是⼀类可抢占资源</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、不可抢占资源</p><p>是指在不引起相关计算失败的情况下，⽆法把它从占有它的进程处抢占过来</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、互斥</p><p>每个资源要么已经分配给⼀个进程，要么就是可⽤的</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、占有和等待</p><p>已经得到了某个资源的进程可以再请求新的资源</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、不可抢占</p><p>已经分配给⼀个进程的资源不能强制性地被抢占，它只能被占有它的进程显式地释放</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、环路等待</p><p>死锁发⽣时，系统中⼀定有由两个或两个以上的进程组成的⼀条环路，该环路中的每个进程都在等待着下⼀个进程所占有的资源。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、鸵⻦算法</p><p>把头埋在沙⼦⾥，假装根本没发⽣问题。</p><p>因为解决死锁问题的代价很⾼，因此鸵⻦算法这种不采取任务措施的⽅案会获得更⾼的性能。</p><p>当发⽣死锁时不会对⽤户造成多⼤影响，或发⽣死锁的概率很低，可以采⽤鸵⻦算法。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">检测算法：</p><p>通过检测有向图中是否存在环来实现，从⼀个节点出发进⾏深度优先搜索，对访问过的节点进⾏标记，如果访问了已经标记的节点，就表示有向图存在环，也就是检测到死锁发⽣</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">锁检测算法如下：</p><p>每个进程最开始时都不被标记，执⾏过程有可能被标记。当算法结束时，任何没有被标记的进程都是死锁进程。</p><ul><li>寻找⼀个没有标记的进程Pi，它所请求的资源⼩于或等于A</li></ul><ul><li>如果真找到这样⼀个进程，那么将C矩阵的第i⾏向量加到A中，标记该进程，并转回第1步</li></ul><ul><li>如果没有这样的进程，那么算法终⽌</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）利⽤抢占恢复</p><p>将进程挂起，强⾏取⾛资源给另⼀个进程使⽤，⽤完再放回</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）利⽤回滚恢复</p><p>复位到更早的状态，那时它还没有取得所需的资源</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）通过杀死进程恢复</p><p>杀掉环中的⼀个进程或多个，牺牲掉⼀个环外进程</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）破坏互斥条件</p><p>例如假脱机打印机技术允许若⼲个进程同时输出，唯⼀真正请求物理打印机的进程是打印机守护进程。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）破坏占有个等待条件</p><ul><li>规定所有进程在开始执⾏前请求所需要的全部资源。</li></ul><ul><li>要求当⼀个进程请求资源时，先暂时释放其当前占⽤的所有资源，然后在尝试⼀次获得所需的全部资源。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（3）破坏不可抢占条件</p><ul><li>保证每⼀个进程在任何时刻只能占⽤⼀个资源，如果请求另⼀个资源必须先释放第⼀个资源</li></ul><ul><li>将所有的资源统⼀编号，进程可以在任何时刻提出资源请求，但是所有请求必须按照资源编号的顺序(升序)提出</li></ul><ul><li>破坏环路等待</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（1）安全状态</p><p>如果没有死锁发⽣，并且即使所有进程突然请求对资源的最⼤需求，也仍然存在某种调度次序能够使得每⼀个进程运⾏完毕，则称该状态是安全的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">（2）单个资源的银⾏家算法</p><p>⼀个⼩城镇的银⾏家，他向⼀群客户分别承诺了⼀定的贷款额度，算法要做的是判断对请求的满⾜是否会进⼊不安全状态，如果是，就拒绝请求；否则予以分配。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">检查⼀个状态是否安全的算法</p><ul><li>查找右边的矩阵是否存在⼀⾏⼩于等于向量 A。如果不存在这样的⾏，那么系统将会发⽣死锁，状态是不安全的。</li></ul><ul><li>假若找到这样⼀⾏，将该进程标记为终⽌，并将其已分配资源加到 A 中。</li></ul><ul><li>重复以上两步，直到所有进程都标记为终⽌，则状态时安全的。</li></ul><p>如果⼀个状态不是安全的，需要拒绝进⼊这个状态。</p></div>"},{"title":"读写锁","content":"<p>在对数据的读写操作中，更多的是读操作，写操作较少，例如对数据库数据的读写应⽤。</p><p>为了满⾜当前能够允许多个读出，但只允许⼀个写⼊的需求，线程提供了读写锁来实现。</p>"},{"title":"读写锁的特点","content":"<ul><li>如果有其它线程读数据，则允许其它线程执⾏读操作，但不允许写操作</li></ul><ul><li>如果有其它线程写数据，则其它线程都不允许读、写操作</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">读写锁分为读锁和写锁，规则如下</p><ul><li>如果某线程申请了读锁，其它线程可以再申请读锁，但不能申请写锁。</li></ul><ul><li>如果某线程申请了写锁，其它线程不能申请读锁，也不能申请写锁。</li></ul><p>POSIX 定义的读写锁的数据类型是： pthread_rwlock_t。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 初始化读写锁</p><p>pthread_rwlock_init()</p><pre><code class=\"language-c\">/**\n * 用来初始化 rwlock 所指向的读写锁。\n * @param rwlock 指向要初始化的读写锁指针。\n * @param attr: 读写锁的属性指针。如果 attr 为 NULL 则会使用默认的属性初始化读写锁，否则使用指定的 attr 初始化读写锁。\n * 可以使用宏 PTHREAD_RWLOCK_INITIALIZER 静态初始化读写锁，比如：\n * pthread_rwlock_t my_rwlock = PTHREAD_RWLOCK_INITIALIZER;\n * 这种方法等价于使用 NULL 指定的 attr 参数调用 pthread_rwlock_init() 来完成动态初始化，\n * 不同之处在于 PTHREAD_RWLOCK_INITIALIZER 宏不进行错误检查。\n * @return 成功：0，读写锁的状态将成为已初始化和已解锁；失败：非 0 错误码。\n */\n#include &lt;pthread.h&gt;\nint pthread_rwlock_init(pthread_rwlock_t *restrict rwlock,\nconst pthread_rwlockattr_t *restrict attr);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 销毁读写锁</p><p>pthread_rwlock_destroy()</p><pre><code class=\"language-c\">/**\n * 用于销毁一个读写锁，并释放所有相关联的资源（所谓的所有指的是由 pthread_rwlock_init() 自动申请的资源。\n * @param rwlock 读写锁指针。\n * @return 成功：0；失败：非0错误码。\n */\n#include &lt;pthread.h&gt;\nint pthread_rwlock_destroy(pthread_rwlock_t *rwlock);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 读锁定</p><p>pthread_rwlock_rdlock()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n\n/**\n * 以阻塞方式在读写锁上获取读锁（读锁定）。\n * 如果没有写者持有该锁，并且没有写者阻塞在该锁上，则调用线程会获取读锁。\n * 如果调用线程未获取读锁，则它将阻塞直到它获取了该锁。一个线程可以在一个读写锁上多次执行读锁定。\n * 线程可以成功调用 pthread_rwlock_rdlock() 函数 n 次，但是之后该线程必须调用\npthread_rwlock_unlock() 函数 n 次才能解除锁定。\n * @param rwlock 读写锁指针。\n * @return 成功：0；失败：非0错误码。\n */\nint pthread_rwlock_rdlock(pthread_rwlock_t *rwlock);\n\n/**\n * 用于尝试以非阻塞的方式来在读写锁上获取读锁。\n * 如果有任何的写者持有该锁或有写者阻塞在该读写锁上，则立即失败返回。\n */\nint pthread_rwlock_tryrdlock(pthread_rwlock_t *rwlock);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 写锁定</p><p>pthread_rwlock_wrlock()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 在读写锁上获取写锁（写锁定）.\n * 如果没有写者持有该锁，并且没有写者读者持有该锁，则调用线程会获取写锁。\n * 如果调用线程未获取写锁，则它将阻塞直到它获取了该锁。\n * @param rwlock 读写锁指针。\n * @return 成功：0；失败：非0错误码。\n */\nint pthread_rwlock_wrlock(pthread_rwlock_t *rwlock);\n/**\n * 用于尝试以非阻塞的方式来在读写锁上获取写锁。\n * 如果有任何的读者或写者持有该锁，则立即失败返回。\n */\nint pthread_rwlock_trywrlock(pthread_rwlock_t *rwlock);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 解锁</p><p>pthread_rwlock_unlock()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 无论是读锁或写锁，都可以通过此函数解锁。\n * @param rwlock 读写锁指针。\n * @return 成功：0；失败：非0错误码。\n */\nint pthread_rwlock_unlock(pthread_rwlock_t *rwlock);</code></pre></div>"},{"title":"条件变量","content":"<p>与互斥锁不同，条件变量是⽤来等待⽽不是⽤来上锁的，条件变量本身不是锁！</p><p>条件变量⽤来⾃动阻塞⼀个线程，直到某特殊情况发⽣为⽌。通常条件变量和互斥锁同时使⽤。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">条件变量的两个动作：</p><ul><li>条件不满, 阻塞线程</li></ul><ul><li>当条件满⾜, 通知阻塞的线程开始⼯作</li></ul><p>条件变量的类型: pthread_cond_t</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 创建条件变量</p><p>pthread_cond_init()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 初始化一个条件变量。\n * @param cond 指向要初始化的条件变量指针。\n * @param attr 条件变量属性，通常为默认值，传NULL即可。\n *\n * 也可以使用静态初始化的方法，初始化条件变量；\n *\n * pthread_cond_t cond = PTHREAD_COND_INITIALIZER.\n * return 成功：0；失败：非0错误号。\n */\nint pthread_cond_init(pthread_cond_t *restrict cond, const pthread_condattr_t *restrict attr);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 删除条件变量</p><p>pthread_cond_destroy()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 销毁一个条件变量。\n * @param cond 指向要初始化的条件变量指针。\n * @return 成功：0；失败：非0错误号。\n */\nint pthread_cond_destroy(pthread_cond_t *cond);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 唤醒线程</p><p>pthread_cond_signal()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n/**\n * 唤醒至少一个阻塞在条件变量上的线程。\n * @param cond 指向要初始化的条件变量指针。\n * @return 成功：0；失败：非0错误号。\n */\nint pthread_cond_signal(pthread_cond_t *cond);\n/**\n * 唤醒全部阻塞在条件变量上的线程。\n * @param cond 指向要初始化的条件变量指针。\n * @return 成功：0；失败：非0错误号。\n */\nint pthread_cond_broadcast(pthread_cond_t *cond);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. 阻塞线程</p><p>pthread_cond_wait()</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n\nstruct timespec {\n    time_t tv_sec;    /* seconds */ // 秒\n    long tv_nsec; /* nanoseconds */ // 纳秒\n}\n\n// time_t cur = time(NULL);    // 获取当前时间。\n// struct timespec t;    // 定义timespec 结构体变量t\n// t.tv_sec = cur + 1;    // 定时1秒\n// pthread_cond_timedwait(&amp;cond, &amp;t);\n/**\n * 阻塞等待一个条件变量\n *    1. 阻塞等待条件变量cond（参1）满足\n *    2. 释放已掌握的互斥锁（解锁互斥量）相当于pthread_mutex_unlock(&amp;mutex);\n *    ((1), (2)两步为一个原子操作)\n *    3. 当被唤醒，pthread_cond_wait函数返回时，解除阻塞并重新申请获取互斥锁\npthread_mutex_lock(&amp;mutex);\n * @param cond 指向要初始化的条件变量指针.\n * @param mutex 互斥锁.\n * @return 成功：0；失败：非0错误号.\n */\nint pthread_cond_wait(pthread_cond_t *restrict cond,\n    pthread_mutex_t *restrict mutex);\n\n/**\n * 限时等待一个条件变量.\n * @param cond 指向要初始化的条件变量指针.\n * @param mutex 互斥锁.\n * @param abstime 绝对时间.\n * @return 成功：0；失败：非0错误号.\n */\nint pthread_cond_timedwait(pthread_cond_t *restrict cond,\n    pthread_mutex_t *restrict mutex,\n    const struct *restrict abstime);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、条件变量的优缺点</p><p>相较于mutex⽽⾔，条件变量可以减少竞争。</p><p>如直接使⽤mutex，除了⽣产者、消费者之间要竞争互斥量以外，消费者之间也需要竞争互斥量;</p><p>但如果汇聚（链表）中没有数据，消费者之间竞争互斥锁是⽆意义的。</p><p>有了条件变量机制以后，只有⽣产者完成⽣产，才会引起消费者之间的竞争。提⾼了程序效率。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、条件变量流程分析</p><p>场景: 你是个⽼板，招聘了三个员⼯，但是你不是有了活才去招聘员⼯，⽽是先把员⼯招来，没有活的时候员⼯需要在那⾥等着，⼀旦有了活，你要去通知他们，他们要去抢活⼲，⼲完了再等待，你再有活，再通知他们</p><p>代码如下：</p><pre><code class=\"language-c\">#include &lt;pthread.h&gt;\n#include &lt;stdio.h&gt;\n#include &lt;stdlib.h&gt;\n#define NUM_OF_TASKS 3\n#define MAX_TASK_QUEUE 11\n\nchar tasklist[MAX_TASK_QUEUE]=&quot;ABCDEFGHIJ&quot;;\nint head = 0;\nint tail = 0;\nint quit = 0;\npthread_mutex_t g_task_lock;\npthread_cond_t g_task_cv;\n\nvoid *coder(void *notused)\n{\n    pthread_t tid = pthread_self();\n    while(!quit){\n    pthread_mutex_lock(&amp;g_task_lock);\n    while(tail == head){\n    if(quit){\n    pthread_mutex_unlock(&amp;g_task_lock);\n    pthread_exit((void *)0);\n    }\n    printf(&quot;No task now! Thread %u is waiting!\\n&quot;, (unsigned int)tid);\n    pthread_cond_wait(&amp;g_task_cv, &amp;g_task_lock);\n    printf(&quot;Have task now! Thread %u is grabbing the task !\\n&quot;, (unsigned int)tid);\n    }\n    char task = tasklist[head++];\n    pthread_mutex_unlock(&amp;g_task_lock);\n    printf(&quot;Thread %u has a task %c now!\\n&quot;, (unsigned int)tid, task);\n    sleep(5);\n    printf(&quot;Thread %u finish the task %c!\\n&quot;, (unsigned int)tid, task);\n    }\n    pthread_exit((void *)0);\n}\n\nint main(int argc, char *argv[])\n{\n    pthread_t threads[NUM_OF_TASKS];\n    int rc;\n    int t;\n    pthread_mutex_init(&amp;g_task_lock, NULL);\n    pthread_cond_init(&amp;g_task_cv, NULL);\n    for(t=0;t&lt;NUM_OF_TASKS;t++) { </code></pre><pre><code class=\"language-c\">rc = pthread_create(&amp;threads[t], NULL, coder, NULL);\nif (rc){\n    printf(&quot;ERROR; return code from pthread_create() is %d\\n&quot;, rc);\n    exit(-1);\n}\nsleep(5);\nfor (t=1;t&lt;=4;t++) {\n    pthread_mutex_lock(&amp;g_task_lock);\n    tail+=t;\n    printf(&quot;I am Boss, I assigned %d tasks, I notify all coders!\\n&quot;, t);\n    pthread_cond_broadcast(&amp;g_task_cv);\n    pthread_mutex_unlock(&amp;g_task_lock);\n    sleep(20);\n}\npthread_mutex_lock(&amp;g_task_lock);\nquit = 1;\npthread_cond_broadcast(&amp;g_task_cv);\npthread_mutex_unlock(&amp;g_task_lock);\npthread_mutex_destroy(&amp;g_task_lock);\npthread_cond_destroy(&amp;g_task_cv);\npthread_exit(NULL);\n} </code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">下⾯是对于每个输出的分析：</p><pre><code class=\"language-txt\">No task now! Thread 1461831424 is waiting!\nNo task now! Thread 1453438720 is waiting!\nNo task now! Thread 1445046016 is waiting! </code></pre><p>这是主线程新建的三个⼯作线程，这时候⼯作线程都是先获得锁，判断tail==head，阻塞，cond_wait释放了锁，三个⼯作线程都等待信号来唤醒</p><pre><code class=\"language-txt\">I am Boss, I assigned 1 tasks, I notify all coders! </code></pre><p>主线程增加了⼀个任务，引起了head!=tail，这时候broadcast唤醒了所有⼯作线程，之后主线程释放锁，开始睡眠20s</p><pre><code class=\"language-txt\">Have task now! Thread 1453438720 is grabbing the task! </code></pre><p>1⼯作线程在竞争中抢到了锁，退出了while(tail==head)循环，并开始完成A任务，这时候把头加1，释放锁</p><pre><code class=\"language-txt\">Have task now! Thread 1445046016 is grabbing the task!\nNo task now! Thread 1445046016 is waiting! </code></pre><p>1⼯作线程时间⽚到了，2，3⼯作线程对锁进⾏竞争，2得到了锁，但是这时候已经没有⼯作了。while(tail==head)循环没有退出，因此释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1453438720 has a task A now! </code></pre><p>调度程序调度到1线程执⾏，打印了这句话，开始睡眠5s</p><pre><code class=\"language-txt\">Have task now! Thread 1461831424 is grabbing the task!\nNo task now! Thread 1461831424 is waiting! </code></pre><p>3⼯作线程抢到了锁（虽然这时候只有它在抢锁），3得到了锁，但是这时候已经没有⼯作了。while(tail==head)循环没有退出，因此释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1453438720 finish the task A!\nNo task now! Thread 1453438720 is waiting! </code></pre><p>20⼯作线程执⾏完任务，这时候还是没有⼯作。先上锁，后进⼊while(tail==head)循环没有退出，因此释放锁，等待唤醒</p><pre><code class=\"language-txt\">I am Boss, I assigned 2 tasks, I notify all coders! </code></pre><p>主线程醒了，⼜找了两个⼯作B,C，唤醒了所有⼯作线程去做</p><pre><code class=\"language-txt\">Have task now! Thread 1461831424 is grabbing the task!\nThread 1461831424 has a task B now! </code></pre><p>24号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1445046016 is grabbing the task!\nThread 1445046016 has a task C now! </code></pre><p>16号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1453438720 is grabbing the task!\nNo task now! Thread 1453438720 is waiting! </code></pre><p>20号线程抢到了锁，没任务了，就释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1445046016 finish the task C!\nNo task now! Thread 1445046016 is waiting! </code></pre><p>调度16号线程执⾏，16号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1461831424 finish the task B!\nNo task now! Thread 1461831424 is waiting! </code></pre><p>调度24号线程执⾏，24号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">I am Boss, I assigned 3 tasks, I notify all coders! </code></pre><p>主线程醒了，⼜找了三个个⼯作D,E,F，唤醒了所有⼯作线程去做</p><pre><code class=\"language-txt\">Have task now! Thread 1461831424 is grabbing the task!\nThread 1461831424 has a task D now! </code></pre><p>24号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1445046016 is grabbing the task!\nThread 1445046016 has a task E now! </code></pre><p>16号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1453438720 is grabbing the task!\nThread 1453438720 has a task F now! </code></pre><p>20号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Thread 1461831424 finish the task D!\nNo task now! Thread 1461831424 is waiting! </code></pre><p>调度24号线程执⾏，24号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1445046016 finish the task E!\nNo task now! Thread 1445046016 is waiting! </code></pre><p>调度16号线程执⾏，16号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1453438720 finish the task F!\nNo task now! Thread 1453438720 is waiting! </code></pre><p>调度20号线程执⾏，20号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">I am Boss, I assigned 4 tasks, I notify all coders! </code></pre><p>主线程醒了，⼜找了三个个⼯作G,H,I,J，唤醒了所有⼯作线程去做</p><pre><code class=\"language-txt\">Have task now! Thread 1453438720 is grabbing the task!\nThread 1453438720 has a task G now! </code></pre><p>20号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1461831424 is grabbing the task!\nThread 1461831424 has a task H now! </code></pre><p>24号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Have task now! Thread 1445046016 is grabbing the task!\nThread 1445046016 has a task I now! </code></pre><p>16号线程抢到了锁，执⾏头加1，释放锁，然后睡眠了</p><pre><code class=\"language-txt\">Thread 1453438720 finish the task G!\nThread 1453438720 has a task J now! </code></pre><p>20号线程执⾏完任务，下⼀轮while中，持有了锁，发现还有任务，就继续做J，执⾏头加1，释放了锁，开始睡眠5s</p><pre><code class=\"language-txt\">Thread 1461831424 finish the task H!\nNo task now! Thread 1461831424 is waiting! </code></pre><p>调度24号线程执⾏，24号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1445046016 finish the task I!\nNo task now! Thread 1445046016 is waiting! </code></pre><p>调度16号线程执⾏，16号线程完成任务，得到锁，发现没任务，释放锁，等待唤醒</p><pre><code class=\"language-txt\">Thread 1453438720 finish the task J!\nNo task now! Thread 1453438720 is waiting! </code></pre><p>20线程完成任务，下⼀轮while中持有锁，发现没任务了，释放锁，等待唤醒主线程抢锁，设置退出标志quit为1，并通知三个⼯作线程</p><pre><code class=\"language-txt\">Have task now! Thread 1461831424 is grabbing the task!\nHave task now! Thread 1445046016 is grabbing the task!\nHave task now! Thread 1453438720 is grabbing the task! </code></pre><p>三个⼯作线程分别抢到了锁，发现quit为1，就释放锁，然后终⽌各⾃的线程主线程销毁了锁和条件变量终⽌了main线程</p></div>"},{"title":"信号量","content":"<p>信号量⼴泛⽤于进程或线程间的同步和互斥，信号量本质上是⼀个⾮负的整数计数器，它被⽤来控制对公共资源的访问。</p><p>编程时可根据操作信号量值的结果判断是否对公共资源具有访问的权限，当信号量值⼤于 0 时，则可以访问，否则将阻塞。</p><p>PV 原语是对信号量的操作，⼀次 P 操作使信号量减1，⼀次 V 操作使信号量加1。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 创建信号量</p><p>sem_init()</p><pre><code class=\"language-c\">#include &lt;semaphore.h&gt;\n/**\n * 创建一个信号量并初始化它的值。一个无名信号量在被使用前必须先初始化。\n * @param sem 信号量的地址。\n * @param pshared 等于 0，信号量在线程间共享（常用）；不等于0，信号量在进程间共享。\n * @param value 信号量的初始值。\n * @return 成功：0；失败：-1。\n */\nint sem_init(sem_t *sem, int pshared, unsigned int value);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 删除信号量</p><p>sem_destroy()</p><pre><code class=\"language-c\">#include &lt;semaphore.h&gt;\n/**\n * 删除 sem 标识的信号量.\n * @return 成功：0；失败：-1.\n */\nint sem_destroy(sem_t *sem);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. P操作</p><p>sem_wait()(P操作)</p><pre><code class=\"language-c\">#include &lt;semaphore.h&gt;\n/**\n * 将信号量的值减 1。操作前，先检查信号量（sem）的值是否为 0；\n * 若信号量为 0，此函数会阻塞，直到信号量大于 0 时才进行减 1 操作。\n * @param sem 信号量的地址。\n * @return 成功：0；失败：-1.\n */\nint sem_wait(sem_t *sem);\n/**\n*/</code></pre><pre><code class=\"language-c\">* 以非阻塞的方式来对信号量进行减 1 操作。\n* 若操作前，信号量的值等于 0，则对信号量的操作失败，函数立即返回。\n*/\nint sem_trywait(sem_t *sem);\n\n/**\n * 限时尝试将信号量的值减 1\n * abs_timeout: 绝对时间\n */\nint sem_timedwait(sem_t *sem, const struct timespec *abs_timeout);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4. V操作</p><p>sem_post()(V操作)</p><pre><code class=\"language-c\">#include &lt;semaphore.h&gt;\n/**\n * 将信号量的值加 1 并发出信号唤醒等待线程(sem_wait());\n * @param sem 信号量的地址。\n * @return 成功：0；失败：-1。\n */\nint sem_post(sem_t *sem);</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5. 获取信号量的值</p><p>sem_getvalue()</p><pre><code class=\"language-c\">#include &lt;semaphore.h&gt;\n/**\n * 获取 sem 标识的信号量的值，保存在 sval 中。\n * @param sem 信号量的地址。\n * @param sval 保存信号量值的地址。\n * @return 成功：0；失败：-1。\n */\nint sem_getvalue(sem_t *sem, int *sval);</code></pre></div>"},{"title":"管程","content":"<p>使⽤信号量机制实现的⽣产者消费者问题需要客户端代码做很多控制，</p><p>⽽管程把控制的代码独⽴出来，不仅不容易出错，也使得客户端代码调⽤更容易。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 哲学家进餐问题</p><p>下⾯是⼀种错误的解法，如果所有哲学家同时拿起左⼿边的筷⼦，那么所有哲学家都在等待其它哲学家吃完并释放⾃⼰⼿中的筷⼦，导致死锁。</p><pre><code class=\"language-c\">#define N 5\nvoid philosopher(int i) {\n    while(TRUE) {\n    think();\n    take(i); // 拿起左边的筷子\n    take((i+1)%N); // 拿起右边的筷子\n    eat();\n    put(i);\n    put((i+1)%N);\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">为了防⽌死锁的发⽣，可以设置两个条件：</p><ul><li>必须同时拿起左右两根筷⼦</li></ul><ul><li>只有在两个邻居都没有进餐的情况下才允许进餐</li></ul><pre><code class=\"language-c\">#define N 5\n#define LEFT (i + N - 1) % N // 左邻居\n#define RIGHT (i + 1) % N // 右邻居\n#define THINKING 0\n#define HUNGRY 1\n#define EATING 2\ntypedef int semaphore;\nint state[N]; // 跟踪每个哲学家的状态\nsemaphore mutex = 1; // 临界区的互斥，临界区是 state 数组，对其修改需要互斥\nsemaphore s[N]; // 每个哲学家一个信号量\n\nvoid philosopher(int i) {\n    while(TRUE) {\n    think(i);\n    take_two(i);\n    eat(i);\n    put_two(i);\n    }\n}\n\nvoid take_two(int i) {\n    down(&amp;mutex);\n    state[i] = HUNGRY;\n    check(i);\n    up(&amp;mutex);\n    down(&amp;s[i]); // 只有收到通知之后才可以开始吃，否则会一直等下去\n}\n\nv
