<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>设计模式知识点动态展示 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 内容操作 ===== */
.content-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}

.edit-btn,
.edit-modal-close,
.edit-modal-btn {
  border: 1px solid rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.12);
  color: #00ffff;
}

.edit-btn,
.edit-modal-btn {
  min-width: 72px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.25s ease;
}

.edit-btn:hover,
.edit-modal-btn:hover {
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.edit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#click-hint {
  margin-top: 12px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}

.edit-modal[hidden] {
  display: none;
}

.edit-modal.open {
  display: flex;
}

.edit-modal-panel {
  width: min(860px, 100%);
  max-height: min(80vh, 760px);
  display: flex;
  flex-direction: column;
  background: rgba(0,12,24,0.96);
  border: 1px solid rgba(0,255,255,0.24);
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.45);
  overflow: hidden;
}

.edit-modal-header,
.edit-modal-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(0,255,255,0.06);
}

.edit-modal-header h3 {
  margin: 0;
  font-size: 1em;
  color: #9fffe7;
}

.edit-modal-close {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  font-size: 1.2em;
  cursor: pointer;
}

.edit-modal-body {
  padding: 18px;
  overflow: auto;
}

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 14px;
  background: rgba(0,0,0,0.38);
  color: #ffffff;
  line-height: 1.8;
  outline: none;
}

.edit-modal-editor:focus {
  border-color: rgba(0,255,255,0.45);
  box-shadow: 0 0 20px rgba(0,255,255,0.16);
}

.edit-modal-editor strong {
  color: #00ffcc;
}

.edit-modal-editor p {
  margin: 0 0 1em;
}

.edit-modal-editor ul,
.edit-modal-editor ol {
  margin: 0 0 1.2em 1.4em;
}

.edit-modal-editor li {
  margin-bottom: 0.45em;
}

.edit-modal-editor .embedded-entry {
  margin: 0 0 1.1em;
}

.edit-modal-editor .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}

.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}

.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}

.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}

.edit-modal-editor th,
.edit-modal-editor td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}

.edit-modal-editor th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}

.edit-modal-actions {
  justify-content: flex-end;
}

body.modal-open {
  overflow: hidden;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从右侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    right: -320px;
    left: auto;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-right: none;
    border-left: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: right 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    right: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  /* 右侧滑出的侧边栏：从右侧边缘向左滑打开 */
  .sidebar-swipe-area {
    position: fixed;
    top: 0;
    right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }

  
#click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}

.content p { margin: 0 0 1em; }
.content ul, .content ol { margin: 0 0 1.2em 1.4em; }
.content li { margin-bottom: 0.45em; }
.content .embedded-entry { margin: 0 0 1.1em; }
.content .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}
.content pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}
.content code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}
.content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}
.content th, .content td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}
.content th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}
</style>
</head>
<body>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>
<!-- 扫描线叠层 -->
<div class="scanlines"></div>

<div class="main-content">
  <!-- 粘性头部：进度条 + 标题 -->
  <div class="sticky-header">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <h2 id="knowledge-title" onclick="toggleContent(true)">加载中...</h2>
  </div>

  <!-- 倒计时（固定在头部右上角） -->
  <div class="countdown" id="countdown">30</div>

  <!-- 卡片（滚动区域） -->
  <div class="card" id="card">
    <div id="knowledge-container" class="content"></div>
    <div class="content-toolbar">
      <button class="edit-btn" id="edit-btn" type="button">修改</button>
    </div>
    <div id="click-hint">点标题展开，点修改编辑</div>
  </div>

  <button class="next-btn" id="next-btn">下一个 →</button>
</div>


<div class="edit-modal" id="edit-modal" hidden>
  <div class="edit-modal-panel" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div class="edit-modal-header">
      <h3 id="edit-modal-title">修改内容</h3>
      <button class="edit-modal-close" id="edit-modal-close" type="button">✕</button>
    </div>
    <div class="edit-modal-body">
      <div class="edit-modal-editor" id="edit-modal-editor" contenteditable="true" spellcheck="false"></div>
    </div>
    <div class="edit-modal-actions">
      <button class="edit-modal-btn" id="edit-cancel-btn" type="button">取消</button>
      <button class="edit-modal-btn" id="edit-save-btn" type="button">保存</button>
    </div>
  </div>
</div>

<!-- 侧边栏（桌面端侧栏 / 手机端滑动抽屉） -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>设计模式高频知识点</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>
  </div>
  <ul id="sidebar-list"></ul>
</div>

<!-- 侧边栏切换按钮（手机端） -->
<button class="sidebar-toggle" id="sidebar-toggle">☰</button>
<div class="sidebar-swipe-area" id="sidebar-swipe-area" aria-hidden="true"></div>

<script src="./tts-player.js"></script>
<script src="./sidebar-manager.js"></script>
<script src="./gist-sync.js"></script>
<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
let knowledgePoints = [{"title":"单例模式","content":"<p>单例设计模式是⼀种确保⼀个类只有⼀个实例，并提供⼀个全局访问点来访问该实例的创建模式。</p><p>单例模式（Singleton）结构图</p><p>优点：</p><p>有些实例，全局只需要⼀个就够了，使⽤单例模式就可以避免⼀个全局使⽤的类，频繁的创建与销毁，耗费系统资源。</p>"},{"title":"关键概念","content":"<ul><li>⼀个私有构造函数（确保只能单例类⾃⼰创建实例）：</li></ul><p>单例类通常会将其构造函数设为私有，以防⽌外部代码直接实例化对象。</p><ul><li>⼀个私有静态变量（确保只有⼀个实例）</li></ul><p>单例类通常包含⼀个私有的静态变量，⽤于保存该类的唯⼀实例。</p><ul><li>⼀个公有静态函数（给使⽤者提供调⽤⽅法）</li></ul><p>单例类提供⼀个公共的静态⽅法，⽤于获取该类的实例。如果实例不存在，则在该⽅法内部创建实例并返回。</p><p>简单来说就是，单例类的构造⽅法不让其他⼈修改和使⽤；并且单例类⾃⼰只创建⼀个实例，这个实例，其他⼈也⽆法修改和直接使⽤；然后单例类提供⼀个调⽤⽅法，想⽤这个实例，只能调⽤。这样就确保了全局只创建了⼀个实例。</p>"},{"title":"单例模式的6种实现","content":"<p>单例模式6种实现及各实现的优缺点</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、懒汉式（线程不安全）</p><pre><code class=\"language-java\">public class Singleton {\n    // 类加载时就创建实例\n    private static final Singleton instance = new Singleton();\n    // 私有构造函数\n    private Singleton() {}\n\n    // 公共静态方法，返回实例\n    public static Singleton getInstance() {\n    return instance;\n    }\n}</code></pre><p>说明：</p><p>先不创建实例，当第⼀次被调⽤时，再创建实例，所以被称为懒汉式。</p><p>优点：</p><p>延迟了实例化，如果不需要使⽤该类，就不会被实例化，只有在需要时才创建实例，避免了资源浪费。</p><p>缺点：</p><p>线程不安全，多线程环境下，如果多个线程同时进⼊了 if (uniqueInstance == null) ，若此时还未实例化，也就是uniqueInstance == null，那么就会有多个线程执⾏ uniqueInstance = new Singleton(); ，就会实例化多个实例；</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、饿汉式（线程安全）</p><p>实现：</p><pre><code class=\"language-java\">public class Singleton {\n    // 类加载时就创建实例\n    private static final Singleton instance = new Singleton();\n\n    // 私有构造函数\n    private Singleton() {}\n\n    // 公共静态方法，返回实例\n    public static Singleton getInstance() {\n    return instance;\n    }\n}</code></pre><p>说明：</p><p>先不管需不需要使⽤这个实例，直接先实例化好实例（饿死⻤⼀样，所以称为饿汉式），然后当需要使⽤的时候，直接调⽅法就可以使⽤了</p><p>优点：</p><p>提起实例化好了⼀个实例，避免了线程不安全问题的出现，</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>直接实例化了实例，不再延迟实例化；若系统没有使⽤这个实例，或者系统运⾏很久之后才需要使⽤这个实例，都会使操作系统的资源浪费。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现：</p><pre><code class=\"language-java\">public class Singleton {\n    private static Singleton uniqueInstance;\n    private static singleton() {}\n    private static synchronized Sing leton getUniqueInstance() {\n    if (uniqueInstance == null) {\n    uniqueInstance = new Singleton();\n    }\n    return uniqueInstance;\n    }\n} </code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说明：</p><p>实现和线程不安全的懒汉式 ⼏乎⼀样，唯⼀不同的点是，在get⽅法上 加了⼀把锁。如此⼀来，多个线程访问，每次只有拿到锁的的线程能够进⼊该⽅法，避免了多线程不安全问题的出现。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>延迟实例化，节约了资源，并且是线程安全的。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>虽然解决了线程安全问题，但是性能降低了。因为，即使实例已经实例化了，既后续不会再出现线程安全问题了，但是锁还在，每次还是只能拿到锁的线程进⼊该⽅法使线程阻塞，等待时间过⻓。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现：</p><pre><code class=\"language-java\">public class Singleton {\n    private volatile static Singleton uniqueInstance;\n\n    private Singleton() {}\n    // 使用双重检查锁定保证线程安全\n    public static Singleton getUniqueInstance() {\n    if (uniqueInstance == null) {\n    synchronized (Singleton.class) {\n    if (uniqueInstance == null) {\n    uniqueInstance = new Singleton();\n    }\n    }\n    }\n    return uniqueInstance;</code></pre><pre><code class=\"language-txt\">}\n} </code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说明：</p><p>双重检查锁相当于是改进了线程安全的懒汉式。线程安全的懒汉式的缺点是性能降低了，造成的原因是因为即使实例已经实例化，依然每次都会有锁。</p><p>⽽现在，我们将锁的位置变了，并且多加了⼀个检查。也就是，先判断实例是否已经存在，若已经存在了，则不会执⾏判断⽅法内的有锁⽅法了。 ⽽如果，还没有实例化的时候，多个线程进去了，也没有事，因为⾥⾯的⽅法有锁，只会让⼀个线程进⼊最内层⽅法并实例化实例。如此⼀来，最多最多，也就是第⼀次实例化的时候，会有线程阻塞的情况，后续便不会再有线程阻塞的问题。</p><p>为什么使⽤ volatile 关键字修饰了 uniqueInstance 实例变量？</p><pre><code class=\"language-txt\">uniqueInstance = new Singleton(); </code></pre><p>这段代码执⾏时分为三步：</p><ul><li>为 uniqueInstance 分配内存空间</li></ul><ul><li>初始化 uniqueInstance</li></ul><ul><li>将 uniqueInstance 指向分配的内存地址</li></ul><p>正常的执⾏顺序当然是 1&gt;2&gt;3 ，但是由于 JVM 具有指令重排的特性，执⾏顺序有可能变成 1&gt;3&gt;2。</p><p>单线程环境时，指令重排并没有什么问题；多线程环境时，会导致有些线程可能会获取到还没初始化的实例。</p><p>例如：线程A 只执⾏了 1 和 3 ，此时线程B来调⽤ getUniqueInstance() ，发现 uniqueInstance 不为空，便获取 uniqueInstance 实例，但是其实此时的 uniqueInstance 还没有初始化。</p><p>解决办法就是加⼀个 volatile 关键字修饰 uniqueInstance ， volatile 会禁⽌ JVM 的指令重排，就可以保证多线程环境下的安全运⾏。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>延迟实例化，节约了资源；线程安全；并且相对于线程安全的懒汉式，性能提⾼了。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>volatile 关键字，对性能也有⼀些影响。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现：</p><pre><code class=\"language-java\">public class Singleton {\n    private Singleton() {}\n\n    // 静态内部类持有实例\n    private static class SingletonHolder {\n    private static final Singleton instance = new Singleton();\n    }\n\n    // 公共静态方法，返回实例\n    public static Singleton getInstance() {\n    return SingletonHolder.instance;\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说明：</p><p>⾸先，当外部类 Singleton 被加载时，静态内部类 SingletonHolder 并没有被加载进内存。当调⽤getUniqueInstance() ⽅法时，会运⾏ return SingletonHolder.INSTANCE;</p><p>触发了 SingletonHolder.INSTANCE ，此时静态内部类 SingletonHolder 才会被加载进内存，并且初始化INSTANCE 实例，⽽且 JVM 会确保 INSTANCE 只被实例化⼀次。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>延迟实例化，节约了资源，且线程安全，性能也提⾼了。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现：</p><pre><code class=\"language-txt\">public enum Singleton {\n    INSTANCE;\n\n    // 可以添加其他方法和属性\n    public void doSomething() {\n    // 实现\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说明：</p><p>默认枚举实例的创建就是线程安全的，且在任何情况下都是单例。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>写法简单，线程安全，天然防⽌反射和反序列化调⽤。</p><p>防⽌反序列化</p><p>序列化：</p><p>把java对象转换为字节序列的过程；</p><p>反序列化：</p><p>通过这些字节序列在内存中新建java对象的过程；</p><p>说明：</p><p>反序列化将⼀个单例实例对象写到磁盘再读回来，从⽽获得了⼀个新的实例。</p><p>我们要防⽌反序列化，避免得到多个实例，枚举类天然防⽌反序列化。</p><p>其他单例模式 可以通过 重写 readResolve() ⽅法，从⽽防⽌反序列化，使实例唯⼀重写</p><pre><code class=\"language-java\">readResolve();\nprivate Object readResolve();\nthrows\nObjectStreamException {\n    return singleton;\n} </code></pre></div>"},{"title":"单例模式的应⽤场景","content":"<p>单例设计模式适⽤于以下⼀些场景</p><p>资源共享：当多个模块或系统需要共享某⼀资源时，可以使⽤单例模式确保该资源只被创建⼀次，避免重复创建和浪费资源。</p><p>控制资源访问：单例模式可以⽤于控制对特定资源的访问，例如数据库连接池、线程池等。</p><p>配置管理器：当整个应⽤程序需要共享⼀些配置信息时，可以使⽤单例模式将配置信息存储在单例类中，⽅便全局访问和管理。</p><p>⽇志记录器：单例模式可以⽤于创建⼀个全局的⽇志记录器，⽤于记录系统中的⽇志信息。</p><p>线程池：在多线程环境下，使⽤单例模式管理线程池，确保线程池只被创建⼀次，提⾼线程池的利⽤率。</p><p>缓存：单例模式可以⽤于实现缓存系统，确保缓存只有⼀个实例，避免数据不⼀致性和内存浪费。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">应⽤场景举例：</p><ul><li>⽹站计数器</li></ul><ul><li>应⽤程序的⽇志应⽤</li></ul><ul><li>Web项⽬中的配置对象的读取</li></ul><ul><li>数据库连接池</li></ul><ul><li>多线程池</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">使⽤场景总结：</p><ul><li>频繁实例化然后⼜销毁的对象，使⽤单例模式可以提⾼性能</li></ul><ul><li>经常使⽤的对象，但实例化时耗费时间或者资源多，如数据库连接池，使⽤单例模式，可以提⾼性能，降低资源损坏</li></ul><ul><li>使⽤线程池之类的控制资源时，使⽤单例模式，可以⽅便资源之间的通信</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">概述：</p><p>⼯⼚模式是⼀种⾮常常⽤的创建型设计模式，其提供了创建对象的最佳⽅式。在创建对象时，不会对客户端暴露对象的创建逻辑，⽽是通过使⽤共同的接⼝来创建对象。其⽤来封装和管理类的创建，本质是对获取对象过程的抽象。</p><p>⼀般情况下，⼯⼚模式分为三种更加细分的类型：简单⼯⼚、⼯⼚⽅法和抽象⼯⼚。</p><p>不过，在 GoF 的《设计模式》⼀书中，它将简单⼯⼚模式看作是⼯⼚⽅法模式的⼀种特例，所以⼯⼚模式只被分成了⼯⼚⽅法和抽象⼯⼚两类</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>解耦：将对象的创建和使⽤进⾏分离，客户端代码与具体产品类的实例化过程解耦，客户端只需要知道⼯⼚的接⼝和抽象产品的接⼝，⽽不需要关⼼具体的实现类。</p><p>可复⽤：对于创建过程⽐较复杂且在很多地⽅都使⽤到的对象，通过⼯⼚模式可以提⾼对象创建的代码的复⽤性。</p><p>易于扩展：添加新的产品类时，只需要扩展相应的具体产品和具体⼯⼚，⽽不需要修改已有的代码，符合开闭原则。</p><p>更符合⾯向对象的设计原则：通过⼯⼚模式，将对象的创建封装在⼯⼚类中，使得系统更符合单⼀职责原则。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">概念</p><p>简单⼯⼚模式也被称为静态⼯⼚⽅法模式。</p><p>简单⼯⼚模式并不是⼀个标准的设计模式，更像是⼀种编程习惯。在简单⼯⼚模式中，⼀个⼯⼚类负责创建多个产品类的实例，通过传⼊不同的参数来决定创建哪种产品。</p><p>同时在简单⼯⼚模式中会定义⼀个类负责创建其他类的实例，被创建的实例也通常具有共同的⽗类。</p><p>虽然实现了对象的创建和使⽤的分离，但是不够灵活，⼯⼚类集合了所有产品的创建逻辑，职责过重，同时新增⼀个产品就需要在原⼯⼚类内部添加⼀个分⽀，违反了开闭原则。并且若是有多个判断条件共同决定创建对象，则后期修改会越来越复杂。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实际应⽤</p><p>JDK中的DateFormate、Calendar类都有使⽤，通过不同参数返回我们需要的对象。</p></div></div>"},{"title":"⼯⼚⽅法模式","content":"<p>UML</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">概念</p><p>⼯⼚⽅法模式中，将简单⼯⼚中的⼯⼚类变为⼀个抽象接⼝。负责给出不同⼯⼚应该实现的⽅法，⾃身不再负责创建各种产品，⽽是将具体的创建操作交给实现该接⼝的⼦⼯⼚类来做。</p><p>通过多态的形式解决了简单⼯⼚模式过多的分⽀问题。虽然在新增产品时不仅要新增⼀个产品类还要实现与之对应的⼦⼯⼚，但是相较于简单⼯⼚模式更符合开闭原则</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实际应⽤</p><p>JDK中的Collection接⼝中Iterator的实现。Collection中不同的实现类⽣产适合于⾃⼰的迭代器对象</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、Factory：Collection</p><ul><li>SubFactoryA：LinkedList</li></ul><ul><li>SubFactoryB：ArrayList</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、Product：Iterator</p><ul><li>ProductA：ListItr</li></ul><ul><li>ProductB：Itr</li></ul></div></div>"},{"title":"抽象⼯⼚模式","content":"<p>抽象⼯⼚模式提供⼀个创建⼀系列相关或相互依赖对象的接⼝，⽽⽆需指定它们的具体类。抽象⼯⼚模式通常涉及多个抽象产品、多个具体产品和多个具体⼯⼚。</p><p>UML</p><p>产品族：构成一个产品的一系列附件的集合</p><p>如果将一台电脑比作一个产品族，那么CPU、主板、硬盘、内存这些内容构成一台电脑</p><p>产品等级结构</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">概念</p><p>⼯⼚⽅法模式通过引⼊⼯⼚等级结构，解决了简单⼯⼚模式中⼯⼚类职责太重的问题，但由于⼯⼚⽅法模式中的每个⼯⼚只⽣产⼀类产品，可能会导致系统中存在⼤量的⼯⼚类，势必会增加系统的开销。抽象⼯⼚模式为⼯⼚⽅法模式的进⼀步延伸，其将⼀些相关的产品组成⼀个“产品族”，由同⼀个⼯⼚来统⼀⽣产。虽然对于新增⼀个产品族很⽅⾯，并且也符合开闭原则，但是新增⼀个产品等级结构，会对整个⼯⼚结构进⾏⼤改</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">应⽤</p><p>Spring中的BeanFactory</p></div></div>"},{"title":"⼯⼚设计模式的应⽤场景","content":"<p>当⼀个类不知道它所需要的类的时候。</p><p>当⼀个类希望通过其⼦类来指定创建对象的时候。</p><p>当类将创建对象的职责委托给多个帮助⼦类中的某⼀个，并且希望将哪⼀个帮助⼦类是代理者的信息局部化时。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">举例来说：</p><p>在数据库操作中，通过⼯⼚模式可以根据不同的数据库类型（MySQL、Oracle等）创建对应的数据库连接对象</p><p>通过⼯⼚模式可以根据配置⽂件或其他条件选择不同类型的⽇志记录器，如⽂件⽇志记录器、数据库⽇志记录器等。</p><p>在图形⽤户界⾯（GUI）库中，可以使⽤⼯⼚模式创建不同⻛格或主题的界⾯元素，如按钮、⽂本框等。</p><p>在加密算法库中，可以使⽤⼯⼚模式根据需要选择不同的加密算法，例如对称加密、⾮对称加密等。</p><p>在⽂件解析过程中，可以使⽤⼯⼚模式根据⽂件类型选择不同的解析器，如XML解析器、JSON解析器等。</p><p>在⽹络通信库中，可以使⽤⼯⼚模式创建不同类型的⽹络连接对象，如TCP连接、UDP连接等。</p></div>"},{"title":"观察者模式","content":"<p>属于⾏为型模式的⼀种，它定义了⼀种⼀对多的依赖关系，让多个观察者对象同时监听某⼀个主题对象。这个主题对象在状态变化时，会通知所有的观察者对象，使他们能够⾃动更新⾃⼰。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">Subject（主题）：</p><p>主题是被观察的对象，它包含了⼀组观察者对象，并提供了添加、删除和通知观察者的⽅法。主题通常有⼀个状态，当状态改变时，通知所有观察者。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">Observer（观察者）：</p><p>观察者是依赖于主题的对象，当主题的状态发⽣改变时，观察者得到通知并进⾏相应的更新。观察者的具体实现类需要实现更新的⽅法。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">ConcreteSubject（具体主题）：</p><p>具体主题是主题的具体实现类，它维护了⼀个状态，并在状态改变时通知观察者。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">ConcreteObserver（具体观察者）：</p><p>具体观察者是观察者的具体实现类，实现了更新的⽅法，以便在接收到通知时进⾏相应的处理。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">案例：</p><p>Carl哥的微信公众号 是被观察者，微信⽤户 是观察者，有多个微信⽤户关注了Carl哥的公众号，当Carl哥的公众号更新订阅时就会通知这些订阅了的微信⽤户。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优点：</p><p>解除耦合，让耦合的双⽅都依赖于抽象，从⽽使得各⾃的变换都不会影响另⼀边的变换</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">缺点：</p><p>调试复杂，⽽且在Java中消息的通知⼀般是顺序执⾏，那么⼀个观察者卡顿，会影响整体的执⾏效率，在这种情况下，⼀般会采⽤异步实现。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现步骤</p><ul><li>定义主题接⼝（Subject），包括注册、移除和通知观察者的⽅法。</li></ul><ul><li>定义观察者接⼝（Observer），包括更新的⽅法。</li></ul><ul><li>创建具体主题类（Concrete Subject），维护⼀组观察者对象，并在状态改变时通知观察者。</li></ul><ul><li>创建具体观察者类（Concrete Observer），实现更新的⽅法。</li></ul><ul><li>客户端代码中创建主题对象和观察者对象，注册观察者到主题中，然后通过主题改变状态，观察者得到通知并进⾏更新。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">使⽤场景</p><ul><li>事件处理：当⼀个对象的状态发⽣改变时，观察者模式可以⽤于通知和处理与该对象相关的事件。这在图形⽤户界⾯（GUI）开发中是很常⻅的，例如按钮点击事件、⿏标移动事件等。</li></ul><ul><li>发布订阅：观察者模式可以⽤于实现发布-订阅模型，其中⼀个主题（发布者）负责发送通知，⽽多个观察者（订阅者）监听并响应这些通知。这种模型在消息队列系统、事件总线等场景中经常使⽤。</li></ul><ul><li>MVC架构：观察者模式常被⽤于实现MVC架构中的模型和视图之间的通信。当模型的状态发⽣改变时，所有相关的视图都会得到通知并更新显示。</li></ul><ul><li>异步编程：观察者模式可以⽤于处理异步任务的完成事件。任务完成时，通知所有相关的观察者进⾏后续处理。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">结构图：</p><ul><li>2没有代理的代码</li></ul><ul><li>3只有代理的代码</li></ul><ul><li>4符合实际的代码</li></ul><ul><li>5代理模式</li></ul><ul><li>6代理模式应用</li></ul><ul><li>7秀才让小六代其求婚</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">定义</p><p>代理模式（Proxy Pattern）是⼀种结构型设计模式，其主要⽬的是在访问某个对象时引⼊⼀种代理对象，通过代理对象控制对原始对象的访问。代理模式可以⽤于实现懒加载、控制访问、监控对象等场景。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">主要⻆⾊</p><ul><li>抽象主题（ Subject ): 定义了代理对象和真实对象的共同接⼝，使得代理对象能够替代真实对象。</li></ul><ul><li>真实主题 Real Subject : 是实际执⾏业务逻辑的对象，是代理模式中的被代理对象。</li></ul><ul><li>代理Proxy: 包含⼀个指向真实主题的引⽤，提供与真实主题相同的接⼝，可以控制对真实主题的访问，并在需要时负责创建或删除真实主题的实例。</li></ul></div></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">代理模式结构图</p><p>代理模式（Proxy）结构图</p><pre><code class=\"language-cs\">abstract class Subject\n{\n    public abstract void Request();\n} </code></pre><p>定义Proxy 所代表的真实实体</p><pre><code class=\"language-txt\">static void Main (string[] args)\n{\n    Proxy proxy = new Proxy();\n    proxy.Request();\n    Console.Read();\n} </code></pre><p>保存⼀个引⽤使得代理可以访问实体，并提供⼀个与Subject的接⼝相同的接⼝，这样代理就可以⽤来替代实体。</p><pre><code class=\"language-cs\">class RealSubject : Subject\n{\n    public override void Request ()\n    {\n    Console.WriteLine(&quot;真实的请求&quot;);\n    }\n}</code></pre><pre><code class=\"language-txt\">class Proxy : Subject\n{\n    RealSubject realSubject;\n    public override void Request ()\n    {\n    if (realSubject == null)\n    {\n    realSubject = new RealSubject();\n    }\n    realSubject.Request ();\n    } </code></pre><p>⼀个对象在不同的地址空间提供局部代表。这样可以隐藏⼀个对象存在于不同地址空间的事实。</p><p>根据需要创建开销很⼤的对象。通过它来存放实例化需要很⻓时间的真实对象，这样就可以达到性能的最优化。⽐如说你打开⼀个很⼤的HTML⽹⻚时，⾥⾯可能有很多的⽂字和图⽚，但你还是可以很快打开它，此时你所看到的是所有的⽂字，但图⽚却是⼀张⼀张地下载后才能看到。那些未打开的图⽚框，就是通过虚拟代理来替代了真实的图⽚，此时代理存储了真实图⽚的路径和尺⼨。</p><p>⽤来控制真实对象访问时的权限。⼀般⽤于对象应该有不同的访问权限的时候。</p><p>是指当调⽤真实的对象时，代理处理另外⼀些事。如计算真实对象的引⽤次数，这样当该对象没有引⽤时，可以⾃动释放它；或当第⼀次引⽤⼀个持久对象时，将它装⼊内存；或在访问⼀个实际对象前，检查是否已经锁定它，以确保其他对象不能改变它。它们都是通过代理在访问⼀个对象时附加⼀些内务处理。</p></div>"},{"title":"策略模式","content":"<p>策略模式（Strategy Pattern）是⼀种⾏为设计模式，它定义了⼀系列算法，，把它们单独封装起来，并且使它们可以互相替换，使得算法可以独⽴于使⽤它的客户端⽽变化，也是说这些算法所完成的功能类型是⼀样的，对外接⼝也是⼀样的，只是不同的策略为引起环境⻆⾊表现出不同的⾏为。</p><p>相⽐于使⽤⼤量的if...else，使⽤策略模式可以降低复杂度，使得代码更容易维护。</p><p>缺点：可能需要定义⼤量的策略类，并且这些策略类都要提供给客户端。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">主要构成</p><p>策略接⼝（Stragety）： 策略接⼝定义了算法的抽象，具体的策略类实现了这个接⼝。</p><p>具体策略类（ConcreteStragety）： 具体策略类实现了策略接⼝，封装了具体的算法。</p><p>环境类（Context): ⽤来操作策略的上下⽂环境类,环境类的构造函数包含了Strategy类，通过多态传进来不同的具体策略（ConcreteStrategyA。ConcreteStrategyB）来调⽤不同策略的⽅法</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">实现步骤：</p><ul><li>定义⼀个策略接⼝，声明算法的抽象⽅法。</li></ul><ul><li>创建具体的策略类，实现策略接⼝，封装具体的算法。</li></ul><ul><li>创建环境类，包含对策略接⼝的引⽤，以及⼀个⽤于设置具体策略对象的⽅法。</li></ul><ul><li>在客户端中创建环境类的对象，并调⽤其⽅法来执⾏具体的算法。</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">优缺点：</p><p>优点：</p><p>使⽤策略模式可以避免使⽤多重条件转移语句。多重转移语句将算法或⾏为的逻辑混合在⼀起，不易维护</p><p>缺点：</p><p>客户端必须知道所有的策略类，并⾃⾏决定使⽤哪⼀个策略类，策略模式只适⽤于客户端知道所有的算法或⾏为的情况。</p><p>下⾯是⼀个简单的策略模式的示例，假设有⼀个商场销售系统，根据不同的促销策略计算最终价格：</p><p>// 策略接⼝</p><pre><code class=\"language-txt\">public interface PricingStrategy {\n    double calculatePrice(double price);\n} </code></pre><p>// 具体策略类：⽆折扣</p><pre><code class=\"language-java\">public class NoDiscountStrategy implements PricingStrategy {\n    @Override\n    public double calculatePrice(double price) {\n    return price;\n    }\n} </code></pre><p>// 具体策略类：打九折</p><pre><code class=\"language-java\">public class DiscountStrategy implements PricingStrategy {\n    @Override\n    public double calculatePrice(double price) {\n    return price * 0.9;\n    }\n} </code></pre><p>// 具体策略类：满减</p><pre><code class=\"language-java\">public class CashbackStrategy implements PricingStrategy {\n    @Override\n    public double calculatePrice(double price) {\n    if (price &gt;= 200) {\n    return price - 50;\n    } else {\n    return price;\n    }\n    }\n} </code></pre><p>// 环境类</p><pre><code class=\"language-java\">public class ShoppingCart {\n    private PricingStrategy pricingStrategy;\n\n    public void setPricingStrategy(PricingStrategy pricingStrategy) {\n    this.pricingStrategy = pricingStrategy;\n    }\n\n    public double checkout(double totalPrice) {\n    return pricingStrategy.calculatePrice(totalPrice);\n    }\n} </code></pre><p>// 客户端代码</p><pre><code class=\"language-java\">public class Client {\n    public static void main(String[] args) {\n    ShoppingCart cart = new ShoppingCart();\n\n    // 选择无折扣策略\n    cart.setPricingStrategy(new NoDiscountStrategy());\n    double price1 = cart.checkout(100);\n    System.out.println(&quot;Total Price: &quot; + price1); // 输出: Total Price: 100.0\n\n    // 选择打九折策略\n    cart.setPricingStrategy(new DiscountStrategy());\n    double price2 = cart.checkout(100);\n    System.out.println(&quot;Total Price: &quot; + price2); // 输出: Total Price: 90.0\n\n    // 选择满减策略\n    cart.setPricingStrategy(new CashbackStrategy());\n    double price3 = cart.checkout(200);\n    System.out.println(&quot;Total Price: &quot; + price3); // 输出: Total Price: 150.0\n    }\n}</code></pre></div></div>"},{"title":"装饰模式","content":"<p>结构图</p><p>第6章穿什么有这么重要？—装饰模式</p><ul><li>1穿什么有这么重要？</li></ul><ul><li>2小菜扮靓第一版</li></ul><ul><li>3小菜扮靓第二版</li></ul><ul><li>4装饰模式</li></ul><ul><li>5小菜扮靓第三版</li></ul><ul><li>6装饰模式总结</li></ul><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">定义</p><p>装饰模式（Decorator Pattern）是⼀种结构型设计模式，它允许在不改变原始类接⼝的情况下，动态地添加功能或责任。装饰模式通过创建⼀个装饰类，包裹原始类的实例，并在保持原始类接⼝不变的情况下，提供额外的功能。，就增加功能来说，装饰模式⽐⽣成⼦类更为灵活。</p><ul><li>组件接⼝：定义了具体组件和装饰器共同的接⼝，确保它们可以互相替换。</li></ul><ul><li>具体组件：实现了组件接⼝，是被装饰的具体对象。</li></ul><ul><li>装饰器：持有⼀个组件对象的引⽤，并实现了组件接⼝。装饰器通常是⼀个抽象类，它的具体⼦类实现具体的装饰逻辑。</li></ul><ul><li>具体装饰器：继承⾃装饰器，实现了具体的装饰逻辑，并调⽤⽗类的⽅法以保持接⼝⼀致。</li></ul><p>装饰模式（Decorator）结构图</p></div>"},{"title":"基本代码实现","content":"<ul><li>Component类</li></ul><pre><code class=\"language-cs\">abstract class Component\n{\n    public abstract void Operation();\n} </code></pre><ul><li>ConcreteComponent类</li></ul><pre><code class=\"language-cs\">class ConcreteComponent : Component\n{\n    public override void Operation ()\n    {\n    Console.WriteLine(&quot;具体对象的操作&quot;);\n    }\n}</code></pre><ul><li>Decorator类</li></ul><pre><code class=\"language-cs\">abstract class Decorator : Component\n{\n    protected Component component;\n\n    public void SetComponent(Component component)\n    {\n    this.component = component;\n    }\n\n    public override void Operation()\n    {\n    if (component != null)\n    {\n    component.Operation();\n    }\n    }\n} </code></pre><ul><li>ConcreteDecoratorA类 和 ConcreteDecoratorB类</li></ul><pre><code class=\"language-cs\">class ConcreteDecoratorA : Decorator\n{\n    private string addedState;\n\n    public override void Operation()\n    {\n    base.Operation();\n    addedState = &quot;New State&quot;;\n    Console.WriteLine(&quot;具体装饰对象 A 的操作&quot;);\n    }\n}\n\nclass ConcreteDecoratorB : Decorator\n{\n    public override void Operation()\n    {\n    base.Operation();\n    AddedBehavior();\n    Console.WriteLine(&quot;具体装饰对象 B 的操作&quot;);\n    }\n\n    private void AddAddedBehavior()\n    {\n    }\n}</code></pre><ul><li>客户端代码</li></ul><pre><code class=\"language-cs\">static void Main(string[] args)\n{\n    ConcreteComponent c = new ConcreteComponent();\n    ConcreteDecoratorA d1 = new ConcreteDecoratorA();\n    ConcreteDecoratorB d2 = new ConcreteDecoratorB();\n\n    d1.SetComponent(c);\n    d2.SetComponent(d1);\n    d2.Operation();\n    Console.Read();\n} </code></pre><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、装饰模式在什么情况下使⽤</p><p>装饰模式把每个要装饰的功能放在单独的类中，并让这个类包装它所要装饰的对象。因此，当需要执⾏特殊⾏为时，客户代码就可以在运⾏时根据需要有选择地、按顺序地使⽤装饰功能包装对象了。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、⼯⼚⽅法(factory method)模式：</p><p>定义⼀个创建对象的接⼝，但由⼦类决定需要实例化哪⼀个类。⼯⼚⽅法使得⼦类实例化的过程推迟</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、抽象⼯⼚(abstract factory)模式：</p><p>提供⼀个接⼝，可以创建⼀系列相关或相互依赖的对象，⽽⽆需指定他们具体的类</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、原型(prototype)模式：</p><p>⽤原型实例指定创建对象的类型，并且通过拷⻉这个原型来创建新的对象</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、单例(singleton)模式：</p><p>保证⼀个类只有⼀个实例，并提供⼀个访问它的全局访问点</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、构建器(builder)模式：</p><p>将⼀个复杂类的表示与其构造相分离，使得相同的构建过程能够得出不同的表示</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、适配器(adapter)模式：</p><p>将⼀个类的接⼝转换成⽤户希望得到的另⼀个接⼝。它使原本不相容的接⼝得以协同⼯作——速记关键字:转换接⼝</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、桥接(bridge)模式：</p><p>将类的抽象部分和它的实现部分分离开来，使它们可以独⽴地变化——速记关键字：继承树拆分</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、组合(composite)模式：</p><p>将对象组合成树型结构以表示“整体-部分”的层次结构，使得⽤户对单个对象和组合对象的使⽤具有⼀致性——速记关键字：树形⽬录结构</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、装饰(decorator)模式：</p><p>动态地给⼀个对象添加⼀些额外的职责。它提供了⽤⼦类扩展功能的⼀个灵活的替代，⽐派⽣⼀个⼦类更加灵活速记关键字：附加职责</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、外观(facade)模式：</p><p>定义⼀个⾼层接⼝，为⼦系统中的⼀组接⼝提供⼀个⼀致的外观，从⽽简化了该⼦系统的使⽤——速记关键字：对外统⼀接⼝</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、享元(flyweight)模式：</p><p>提供⽀持⼤量细粒度对象共享的有效⽅法</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、代理(proxy)模式：</p><p>为其他对象提供⼀种代理以控制这个对象的访问</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、职责链(chain of responsibility)模式：</p><p>通过给多个对象处理请求的机会，减少请求的发送者与接收者之间的耦合。将接收对象链接起来，在链中传递请求，直到有⼀个对象处理这个请求——速记关键字：传递职责</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、命令(command)模式：</p><p>将⼀个请求封装为⼀个对象，从⽽可⽤不同的请求对客户进⾏参数化，将请求排队或记录请求⽇志，⽀持可撤销的操作——速记关键字：⽇志记录，可撤销</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、解释器(interpreter)模式：</p><p>给定⼀种语⾔，定义它的⽂法表示，并定义⼀个解释器，该解释器⽤来根据⽂法表示来解释语⾔中的句⼦</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、迭代器(iterator)模式：</p><p>提供⼀种⽅法来顺序访问⼀个聚合对象中的各个元素⽽不需要暴露该对象的内部表示</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">5、中介者(mediator)模式：</p><p>⽤⼀个中介对象来封装⼀系列的对象交互。它使各对象不需要显式地相互调⽤，从⽽达到低耦合，还可以独⽴地改变对象间的交互——速记关键字：不直接引⽤</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">6、备忘录(memento)模式：</p><p>在不破坏封装性的前提下，捕获⼀个对象的内部状态，并在该对象之外保存这个状态，从⽽可⽤在以后将该对象恢复到原先保存的状态</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">7、观察者(observer)模式：</p><p>定义对象间的⼀种⼀对多的依赖关系，当⼀个对象的状态发⽣改变时，所有依赖于它的对象都得到通知并⾃动更新</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">8、状态(state)模式：</p><p>允许⼀个对象在其内部状态改变时改变它的⾏为——速记关键字：状态变成类</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">9、策略(strategy)模式：</p><p>定义⼀系列算法，把它们⼀个个封装起来，并且使它们之间可互相替换，从⽽让算法可以独⽴于使⽤它的⽤户⽽变化</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">10、模板⽅法(template method)模式：</p><p>定义⼀个操作中的算法⻣架，⽽将⼀些步骤延迟到⼦类中，使得⼦类可以不改变⼀个算法的结构即可重新定义算法的某些特定步骤</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">11、访问者(visitor)模式：</p><p>表示⼀个作⽤于某对象结构中的各元素的操作，使得在不改变各元素的类的前提下定义作⽤于这些元素的新操作</p></div>"},{"title":"单⼀职责","content":"<p>在设计类的时候要尽量缩⼩粒度，使功能明确、单⼀，不要做多余的事情（⾼内聚，低耦合）</p>"},{"title":"开闭原则","content":"<p>软件实体（类、模块、函数等）应该对扩展开放，对修改关闭。这意味着可以通过扩展来添加新功能，⽽不必修改现有代码。</p>"},{"title":"⾥⽒替换","content":"<p>⼦类型必须能够替换掉它们的基类型。在程序中，如果有⼀个基类和⼀个⼦类，那么可以⽤⼦类对象替换基类对象，⽽程序的⾏为仍然是正确的。</p>"},{"title":"接⼝隔离","content":"<p>不应该强迫⼀个类实现它不需要的接⼝。⼀个类不应该对它⽤不到的⽅法负责。</p>"},{"title":"依赖倒置","content":"<p>⾼层模块不应该依赖于低层模块，⽽是应该依赖于抽象。抽象不应该依赖于具体实现，具体实现应该依赖于抽象。⽐如Java的操作数据库，Java定义了⼀组接⼝，由各个数据库去实现它，Java不依赖于他们，数据库依赖于Java</p>"},{"title":"组合优于继承","content":"<p>继承耦合度⾼，组合耦合度低</p><p>继承基类是固定好的，但是组合通过组合类的指针，可以传⼊不同的类，避免⾼耦合</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、概念：</p><p>优先使⽤组合 contains a（聚合 has a），⽽不是继承 is a 来达到⽬的</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、原因：</p><p>继承会将实现细节暴露给⼦类，继承复⽤破坏了封装性，是⽩箱复⽤使⽤继承时需要考虑⾥⽒替换原则</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、优点：</p><p>新类对象存取成员对象只通过成员对象的接⼝，是⿊箱复⽤，系统更灵活，降低耦合度，可以在运⾏时动态进⾏，新对象可动态引⽤与成员对象类型相同的对象</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">4、缺点：</p><p>需要管理较多对象</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">概念：</p><p>⼀个对象应当对其他对象有尽可能少的了解，即不和陌⽣⼈说话</p><p>“朋友圈”概念（以下情况是该对象朋友）：</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1、this：</p><ul><li>该对象⽅法中的参数</li></ul><ul><li>实例变量直接引⽤的对象</li></ul><ul><li>实例变量如果是⼀个聚集（聚合对象），聚集中的元素</li></ul><ul><li>该对象⽅法中创建的变量</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2、要求：</p><ul><li>优先考虑将⼀个类设计成不变类</li></ul><ul><li>尽量降低⼀个类的访问权限</li></ul><ul><li>谨慎使⽤ Serializable（持久化，通过序列化⼀个对象，将其写⼊磁4. 盘，以后程序调⽤时重新恢复该对象）</li></ul><ul><li>尽量降低成员的访问权限</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3、优点： 降低类之间的耦合</p><ul><li>缺点： 过多使⽤迪⽶特法则，会产⽣⼤量中介类，设计变复杂</li></ul></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. 饿汉式</p><pre><code class=\"language-java\">public class EagerSingleton {\n\n    // 类加载时就创建唯一实例\n    private static final EagerSingleton instance = new EagerSingleton();\n\n    // 私有构造方法\n    private EagerSingleton() {\n    }\n\n    // 公有静态方法，获取唯一实例\n    public static EagerSingleton getInstance() {\n    return instance;\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. 懒汉式</p><pre><code class=\"language-txt\">public class Singleton { </code></pre><pre><code class=\"language-java\">// 私有静态成员变量，用于保存唯一的实例\nprivate static Singleton instance;\n\n// 私有构造方法，防止外部通过 new 创建实例\nprivate Singleton() {\n}\n\n// 公有静态方法，获取唯一的实例\npublic static Singleton getInstance() {\n    // 使用双重检查锁定，确保在多线程环境下也能正常工作，并且提高了性能\n    if (instance == null) {\n    synchronized (Singleton.class) {\n    if (instance == null) {\n    instance = new Singleton();\n    }\n    }\n    }\n    return instance;\n}</code></pre><ul><li>静态内部类单例模式</li></ul><pre><code class=\"language-java\">public class InnerStaticSingleton {\n\n    // 私有静态内部类\n    private static class SingletonHolder {\n    private static final InnerStaticSingleton instance = new InnerStaticSingleton();\n    }\n\n    // 私有构造方法\n    private InnerStaticSingleton() {\n    }\n\n    // 公有静态方法，获取唯一实例\n    public static InnerStaticSingleton getInstance() {\n    return SingletonHolder.instance;\n    }\n}</code></pre><ul><li>枚举单例模式</li></ul><pre><code class=\"language-java\">public enum EnumSingleton {\n\n    // 定义一个枚举元素，它就是 Singleton 的唯一实例\n    INSTANCE;\n\n    // 其他业务方法\n    public void doSomething() {\n    }\n}</code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">你在实际开发中⽤过哪些设计模式</p><ul><li>单例模式： ⽤于确保系统中某个类只有⼀个实例。在数据库连接、⽇志管理等场景中使⽤过。</li></ul><ul><li>⼯⼚模式： ⽤于创建对象，将对象的创建过程封装在⼀个⼯⼚类中。在创建复杂对象、实现类的选择时使⽤过。</li></ul><ul><li>观察者模式： ⽤于实现对象之间的⼀对多依赖关系，当⼀个对象的状态发⽣变化时，其所有依赖对象都会得到通知。在实现⽤户界⾯和数据模型之间的通信、事件处理等场景中使⽤过。</li></ul></div>"},{"title":"单⼀职责","content":"<p>在设计类的时候要尽量缩⼩粒度，使功能明确、单⼀，不要做多余的事情（⾼内聚，低耦合）</p><p>单⼀职责下的类会⽐较⼩⽽精悍，需要使⽤结构性模式组合复⽤他们</p>"},{"title":"开闭原则","content":"<p>⼀个类应该对扩展开发，对修改关闭</p><p>关键是要做好封装，隐藏内部的实现细节，开发⾜够的接⼝，这样⼦外部的代码就只能通过接⼝去扩展功能，不需要侵⼊到类的内部</p><p>final关键字</p><p>不能说要实现某个功能必要要修改类内部的代码才能实现，需要能够通过扩展实现新的功能（低耦合）</p>"},{"title":"⾥⽒替换","content":"<p>⼦类能够完全替换⽗类，不会改变⽗类定义的⾏为</p><p>⽐如⼀个基类⻦类中有⼀个⽅法，能够⻜⾏，所有的⻦类都必须继承它，但是企鹅、鸵⻦这些没办法⻜⾏（使⽤接⼝代替继承）</p>"},{"title":"接⼝隔离","content":"<p>不应该强迫客户依赖于它们不需要的接⼝</p><p>建⽴单⼀接⼝，不要建⽴庞⼤的接⼝，尽量细化，接⼝中的⽅法要建⽴少类“⽝科”依赖接⼝I中的⽅法：捕⻝（），⾏⾛（），奔跑（）， 宠物狗类是对类“⽝科”的实现。 对于具体的类：宠物狗来说，虽然存在着⽤不到的⽅法，但由于继承了接⼝，所以也必须要实现这些⽤不到的⽅法</p>"},{"title":"依赖倒置","content":"<p>上层要避免依赖下层的实现细节，两者都应该依赖于抽象</p><p>⽐如Java的操作数据库，Java定义了⼀组接⼝，由各个数据库去实现它，Java不依赖于他们，数据库依赖于Java</p>"},{"title":"组合优于继承","content":"<p>继承耦合度⾼，组合耦合度低</p><p>继承基类是固定好的，但是组合通过组合类的指针，可以传⼊不同的类，避免⾼耦合</p>"},{"title":"说⼀说你了解的⼯⼚模式","content":"<p>⼯⼚模式提供了⼀种创建对象的接⼝，但由⼦类决定实例化的类是哪⼀个。⼯⼚模式可以将复杂的对象创建过程封装在具体⼯⼚类中，客户端只需关⼼使⽤⼯⼚接⼝创建产品即可，适⽤于需要将对象创建过程进⾏解耦，或者在⼀个系统中有多个产品族、产品等级结构，需要统⼀管理的情况。</p><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">说⼀说你了解的观察者模式</p><p>定义了⼀种⼀对多的依赖关系，让多个观察者对象同时监听某⼀个主题对象，当主题对象状态发⽣变化时，会通知所有的观察者对象，使得它们能够⾃动更新。</p><p>考虑⼀个简单的⽓象站示例，⽓象站可以测量温度、湿度和⽓压，并在这些数据发⽣变化时通知观察者更新。</p><pre><code class=\"language-java\">import java.util.ArrayList;\nimport java.util.List; </code></pre><p>// 主题接⼝</p><pre><code class=\"language-txt\">interface Subject {\n    void addObserver(Observer observer);\n    void removeObserver(Observer observer);\n    void notifyObservers();\n} </code></pre><p>// 具体主题类</p><pre><code class=\"language-java\">class WeatherStation implements Subject {\n    private List&lt;Observer&gt; observers = new ArrayList&lt;&gt;();\n    private float temperature;\n\n    public void setTemperature(float temperature) {\n    this.temperature = temperature;\n    notifyObservers();\n    }\n\n    @Override\n    public void addObserver(Observer observer) {\n    observers.add(observer);\n    }\n} </code></pre><pre><code class=\"language-java\">}\n@Override\npublic void removeObserver(Observer observer) {\n    observers.remove(observer);\n}\n@Override\npublic void notifyObservers() {\n    for (Observer observer : observers) {\n    observer.update(temperature);\n    }\n}\n} </code></pre><p>// 观察者接⼝</p><pre><code class=\"language-txt\">interface Observer {\n    void update(float temperature);\n} </code></pre><p>// 具体观察者类</p><pre><code class=\"language-dart\">class Display implements Observer {\n    @Override\n    public void update(float temperature) {\n    System.out.println(&quot;Display: Temperature is &quot; + temperature);\n    }\n}\n\nclass Logger implements Observer {\n    @Override\n    public void update(float temperature) {\n    System.out.println(&quot;Logger: Logging temperature data - &quot; + temperature);\n    }\n} </code></pre><p>// 客户端代码</p><pre><code class=\"language-java\">public class Client {\n    public static void main(String[] args) {\n    WeatherStation weatherStation = new WeatherStation();\n\n    Observer display = new Display();\n    Observer logger = new Logger();\n\n    weatherStation.addObserver(display);\n    weatherStation.addObserver(logger); </code></pre><p>// 模拟温度变化</p><pre><code class=\"language-javascript\">weatherStation.setTemperature(25.5f); </code></pre><p>// 输出：</p><pre><code class=\"language-scss\">// Display: Temperature is 25.5\n// Logger: Logging temperature data - 25.5\n} </code></pre></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">代理模式和适配器模式有什么区别</p><p>代理模式（Proxy Pattern）和适配器模式（Adapter Pattern）都属于结构型设计模式</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">1. ⽬的不同</p><p>代理模式的主要⽬的是控制对对象的访问，可以添加额外的操作，⽽不改变原始对象的结构。</p><p>适配器模式的主要⽬的是使得原本由于接⼝不兼容⽽不能⼀起⼯作的类可以⼀起⼯作。</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">2. ⻆⾊不同</p><p>代理模式包含抽象主题、真实主题和代理。</p><p>适配器模式包含⽬标接⼝、适配器和被适配者</p></div><div class=\"embedded-entry\"><p class=\"embedded-entry-title\">3. 应⽤场景不同</p><p>代理模式适⽤于控制对对象的访问、延迟加载、实现权限控制等场景。</p><p>适配器模式适⽤于解决两个已有接⼝不兼容的情况，使它们能够⼀起⼯作。</p></div>"}];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof sidebarMgr !== 'undefined') sidebarMgr.save();
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'design-patterns-topics',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
