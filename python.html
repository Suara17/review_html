<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Python知识点动态展示 - 精讲版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* ===== 数字雨背景 ===== */
#matrix-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  opacity: 0.3;
}

/* ===== 扫描线覆盖 ===== */
.scanlines {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,255,255,0.02) 2px,
    rgba(0,255,255,0.02) 4px
  );
}

/* ===== 主内容 & 侧边栏 ===== */
.main-content, .sidebar { position: relative; z-index: 2; }

/* ----- 桌面端主区域 ----- */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* 粘性头部：进度条 + 标题 */
.sticky-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(0,8,16,0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 16px 20px 12px;
  border-bottom: 1px solid rgba(0,255,255,0.2);
}

.sticky-header .progress-bar-container {
  width: 100%;
  height: 5px;
  background: rgba(0,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.sticky-header .progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ffff, #00ccff, #00ffff);
  box-shadow: 0 0 12px #00ffff, 0 0 24px rgba(0,255,255,0.4);
  transition: width 1s linear;
  background-size: 200% 100%;
  animation: progressGlow 2s ease infinite;
  border-radius: 3px;
}
@keyframes progressGlow {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

#knowledge-title {
  font-size: 1.1em;
  color: #00ffff;
  text-shadow: 0 0 8px rgba(0,255,255,0.4);
  cursor: pointer;
  padding-right: 60px;
  line-height: 1.4;
  min-height: 1.6em;
}
#knowledge-title:hover {
  text-shadow: 0 0 15px #00ffff, 0 0 30px rgba(0,255,255,0.3);
}

/* 卡片（滚动区域） */
.card {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 80px;
  background: rgba(0,10,20,0.35);
  margin: 0;
  position: relative;
}

.card .content {
  font-size: 1.18em;
  line-height: 1.85em;
}
.card .content strong {
  color: #00ffcc;
  text-shadow: 0 0 8px rgba(0,255,204,0.4);
}

/* 倒计时（固定在头部右侧） */
.countdown {
  position: absolute;
  top: 14px;
  right: 20px;
  font-size: 1.3em;
  background: rgba(0,255,255,0.12);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  padding: 6px 16px;
  border-radius: 10px;
  color: #00ffff;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.5);
  font-weight: bold;
  border: 1px solid rgba(0,255,255,0.4);
  letter-spacing: 1px;
  z-index: 11;
}

/* ===== 下一个按钮 ===== */
.next-btn {
  position: fixed;
  bottom: 24px;
  right: 30px;
  z-index: 20;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  padding: 12px 28px;
  border-radius: 12px;
  font-size: 1.05em;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  text-shadow: 0 0 8px rgba(0,255,255,0.5);
  letter-spacing: 1px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.next-btn:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.3), 0 4px 20px rgba(0,0,0,0.5);
  transform: scale(1.05);
}
.next-btn:active {
  transform: scale(0.95);
}

/* ===== 侧边栏 ===== */
.sidebar {
  width: 340px;
  background: rgba(0,10,20,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding: 20px;
  overflow-y: auto;
  border-left: 2px solid rgba(0,255,255,0.3);
  position: relative;
  z-index: 2;
}
.sidebar h3 {
  color: #00ffff;
  text-align: center;
  margin-top: 0;
  text-shadow: 0 0 10px #00ffff, 0 0 20px rgba(0,255,255,0.3);
  font-size: 1.15em;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  letter-spacing: 2px;
}

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  border-bottom: 1px solid rgba(0,255,255,0.15);
  padding-bottom: 12px;
}
.sidebar-header h3 {
  text-align: left;
  border-bottom: none;
  padding-bottom: 0;
  margin-bottom: 0;
}

.sidebar-close {
  display: none;
  background: none;
  border: none;
  color: #00ffff;
  font-size: 1.4em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.3s;
}
.sidebar-close:hover {
  background: rgba(0,255,255,0.15);
}

.sidebar ul {
  list-style: none;
}
.sidebar li {
  padding: 12px 16px;
  margin: 5px 0;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s;
  font-size: 1em;
  border: 1px solid transparent;
  position: relative;
  overflow: hidden;
}
.sidebar li::before {
  content: '>';
  position: absolute;
  left: -20px;
  color: #00ffff;
  opacity: 0;
  transition: all 0.3s;
}
.sidebar li:hover {
  background: rgba(0,255,255,0.15);
  border-color: rgba(0,255,255,0.3);
  transform: translateX(12px);
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}
.sidebar li:hover::before {
  left: 6px;
  opacity: 1;
}
.sidebar li.active {
  background: rgba(0,255,255,0.12);
  border-color: rgba(0,255,255,0.4);
}

/* ===== 侧边栏切换按钮（手机端显示） ===== */
.sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 24px;
  left: 24px;
  z-index: 30;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: rgba(0,255,255,0.15);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(0,255,255,0.4);
  color: #00ffff;
  font-size: 1.5em;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
}
.sidebar-toggle:hover {
  background: rgba(0,255,255,0.25);
  box-shadow: 0 0 30px rgba(0,255,255,0.2), 0 4px 20px rgba(0,0,0,0.5);
}
.sidebar-toggle:active {
  transform: scale(0.9);
}

/* 侧边栏遮罩 */
.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: rgba(0,0,0,0.6);
  z-index: 25;
  opacity: 0;
  transition: opacity 0.3s;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: rgba(0,255,255,0.3); border-radius: 3px; }

/* ===== 内容操作 ===== */
.content-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}

.edit-btn,
.edit-modal-close,
.edit-modal-btn {
  border: 1px solid rgba(0,255,255,0.35);
  background: rgba(0,255,255,0.12);
  color: #00ffff;
}

.edit-btn,
.edit-modal-btn {
  min-width: 72px;
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.92em;
  cursor: pointer;
  transition: all 0.25s ease;
}

.edit-btn:hover,
.edit-modal-btn:hover {
  background: rgba(0,255,255,0.2);
  box-shadow: 0 0 18px rgba(0,255,255,0.18);
}

.edit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  box-shadow: none;
}

#click-hint {
  margin-top: 12px;
  font-size: 0.85em;
  opacity: 0.35;
  color: #00ffff;
}

.edit-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(0,0,0,0.72);
}

.edit-modal[hidden] {
  display: none;
}

.edit-modal.open {
  display: flex;
}

.edit-modal-panel {
  width: min(860px, 100%);
  max-height: min(80vh, 760px);
  display: flex;
  flex-direction: column;
  background: rgba(0,12,24,0.96);
  border: 1px solid rgba(0,255,255,0.24);
  border-radius: 18px;
  box-shadow: 0 18px 45px rgba(0,0,0,0.45);
  overflow: hidden;
}

.edit-modal-header,
.edit-modal-actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: rgba(0,255,255,0.06);
}

.edit-modal-header h3 {
  margin: 0;
  font-size: 1em;
  color: #9fffe7;
}

.edit-modal-close {
  width: 40px;
  height: 40px;
  border-radius: 999px;
  font-size: 1.2em;
  cursor: pointer;
}

.edit-modal-body {
  padding: 18px;
  overflow: auto;
}

.edit-modal-editor {
  min-height: 280px;
  padding: 18px;
  border: 1px solid rgba(0,255,255,0.18);
  border-radius: 14px;
  background: rgba(0,0,0,0.38);
  color: #ffffff;
  line-height: 1.8;
  outline: none;
}

.edit-modal-editor:focus {
  border-color: rgba(0,255,255,0.45);
  box-shadow: 0 0 20px rgba(0,255,255,0.16);
}

.edit-modal-editor strong {
  color: #00ffcc;
}

.edit-modal-editor p {
  margin: 0 0 1em;
}

.edit-modal-editor ul,
.edit-modal-editor ol {
  margin: 0 0 1.2em 1.4em;
}

.edit-modal-editor li {
  margin-bottom: 0.45em;
}

.edit-modal-editor .embedded-entry {
  margin: 0 0 1.1em;
}

.edit-modal-editor .embedded-entry-title {
  margin: 0 0 0.55em;
  color: #9fffe7;
  font-weight: 700;
}

.edit-modal-editor pre {
  margin: 0 0 1.2em;
  padding: 14px 16px;
  border-radius: 12px;
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid rgba(0,255,255,0.16);
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 0.92em;
  line-height: 1.7;
}

.edit-modal-editor code {
  font-family: 'Consolas', 'SFMono-Regular', monospace;
  color: #9fffe7;
}

.edit-modal-editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 0 0 1.2em;
  font-size: 0.92em;
  display: block;
  overflow-x: auto;
}

.edit-modal-editor th,
.edit-modal-editor td {
  border: 1px solid rgba(0,255,255,0.18);
  padding: 8px 10px;
  text-align: left;
}

.edit-modal-editor th {
  background: rgba(0,255,255,0.08);
  color: #9fffe7;
}

.edit-modal-actions {
  justify-content: flex-end;
}

body.modal-open {
  overflow: hidden;
}

/* ===== 手机适配 ===== */
@media (max-width: 768px) {
  body {
    flex-direction: column;
    overflow: hidden;
  }
  #matrix-canvas { opacity: 0.15; }

  .main-content {
    flex: 1;
    height: 100vh;
  }

  .sticky-header {
    padding: 10px 14px 10px;
  }
  .sticky-header .progress-bar-container {
    height: 4px;
    margin-bottom: 8px;
  }
  #knowledge-title {
    font-size: 0.95em;
    padding-right: 50px;
  }

  .card {
    padding: 14px 14px 90px;
  }
  .card .content {
    font-size: 0.95em;
    line-height: 1.6em;
  }

  .countdown {
    top: 10px;
    right: 14px;
    font-size: 1.05em;
    padding: 4px 12px;
  }

  .next-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 22px;
    font-size: 0.9em;
  }

  /* 侧边栏切换按钮始终显示（手机端） */
  .sidebar-toggle {
    display: flex;
    pointer-events: auto;
    opacity: 1;
  }

  /* 侧边栏：从左侧滑入覆盖 */
  .sidebar {
    position: fixed;
    top: 0;
    right: -320px;
    left: auto;
    width: 300px;
    height: 100vh;
    z-index: 30;
    border-right: none;
    border-left: 2px solid rgba(0,255,255,0.3);
    padding: 16px;
    transition: right 0.3s ease;
    background: rgba(0,8,16,0.92);
  }
  .sidebar.open {
    right: 0;
  }
  .sidebar-close {
    display: block;
  }
  .sidebar ul {
    padding-bottom: 60px;
  }
  .sidebar li {
    padding: 10px 14px;
    font-size: 0.92em;
    margin: 3px 0;
  }

  .sidebar-overlay.show {
    display: block;
    opacity: 1;
  }

  /* 右侧滑出的侧边栏：从右侧边缘向左滑打开 */
  .sidebar-swipe-area {
    position: fixed;
    top: 0;
    right: 0;
    width: 20px;
    height: 100vh;
    z-index: 5;
  }

  
#click-hint {
    font-size: 0.78em;
    margin-top: 14px;
  }
}
</style>

<!-- 数字雨 Canvas -->
<canvas id="matrix-canvas"></canvas>

<div class="main-content">

</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h3>Python 高频知识点精讲</h3>
    <button class="sidebar-close" id="sidebar-close">✕</button>

<script>
// ===== 数字雨背景动画 =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
const fontSize = 14;
const columns = Math.floor(canvas.width / fontSize);
const drops = [];
for (let i = 0; i < columns; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ffff';
  ctx.shadowBlur = 8;
  ctx.shadowColor = '#00ffff';
  ctx.font = fontSize + 'px monospace';
  for (let i = 0; i < drops.length; i++) {
    const text = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillStyle = i % 3 === 0 ? '#00ffaa' : '#00ffff';
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  }
}

let matrixInterval = setInterval(drawMatrix, 35);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops.length = 0;
  const newCols = Math.floor(canvas.width / fontSize);
  for (let i = 0; i < newCols; i++) drops[i] = Math.floor(Math.random() * -canvas.height / fontSize);
});

// ===== 知识点展示逻辑 =====
let knowledgePoints = [
{title:"1. Python中的==和is有什么区别？", content:`<strong>本质差异：</strong>== 是"值相等"运算符，用于比较两个对象所代表的数据或内容是否相同。is 是"身份相同"运算符，用于判断两个变量是否指向内存中的同一个对象。<br><br>
<strong>通俗比喻：</strong>比较两本书，== 关心的是两本书的文字内容是否一模一样；is 关心的是它们是否是同一个物理实体（即同一本书）。<br><br>
<strong>示例：</strong>创建两个内容完全相同的列表a = [1, 2]和b = [1, 2]。a == b会返回True，因为内容相同。但a is b会返回False，因为它们是内存中两个不同的列表对象。`},
{title:"2. 什么是Python的GIL？它主要限制了哪方面的性能？", content:`<strong>定义：</strong>GIL是CPython（Python最常用的解释器）中的一个互斥锁，它确保在任何时刻，只有一个线程在解释器中执行Python字节码。<br><br>
<strong>影响范围：</strong><br>
• CPU密集型任务受限：对于计算密集的任务（如科学计算、大规模循环），多线程无法利用多核CPU的并行优势，因为同一时间只有一个线程在跑，性能反而可能因线程切换开销而下降。<br>
• I/O密集型任务影响小：对于网络请求、文件读写等I/O操作，线程在等待I/O时会释放GIL，其他线程可以运行，因此多线程仍能有效提升吞吐量。<br><br>
<strong>绕过GIL方案：</strong><br>
1. CPU密集型：使用多进程（每个进程有独立的Python解释器和内存空间，从而绕开GIL）或使用C扩展（在C代码中释放GIL）。<br>
2. I/O密集型：使用异步编程（如asyncio）或多线程。<br>
3. 混合型：结合多进程处理计算，内部用多线程处理I/O。<br>
4. 大数据量：考虑分布式计算框架（如Dask, Spark）。<br><br>
<strong>多线程线程安全问题：</strong><br>
• 多个线程同时访问共享变量可能导致数据竞争（如一个线程在读取，另一个在写入）。<br>
• 解决方案：用 threading.Lock 加锁保护临界区，或用 threading.Semaphore 控制并发数量。<br>
• 也可以用 queue.Queue 替代共享列表——它内部自带锁，是线程安全的。<br>
• GIL 虽然保证字节码级别的原子性，但不保证 Python 语句级别的原子性（如 balance += 1 不是原子操作）。`},
{title:"3. 常用的Python库有哪些？（面试向分类速记）", content:`<strong>📊 数据处理 &amp; 科学计算</strong><br>
• <strong>NumPy</strong>：多维数组运算，广播机制，科学计算基石。<br>
• <strong>Pandas</strong>：DataFrame/Series，数据清洗、分组聚合、读写CSV/Excel。<br>
• <strong>Matplotlib</strong>：基础可视化，折线图/柱状图/散点图。<br>
• <strong>Seaborn</strong>：统计图表美化，热力图、箱线图一行生成。<br><br>

<strong>🤖 机器学习 &amp; 深度学习</strong><br>
• <strong>Scikit-learn</strong>：经典ML算法统一API，分类/回归/聚类/降维/模型选择。<br>
• <strong>TensorFlow / PyTorch</strong>：深度学习框架，前者工业级部署，后者动态图学术首选。<br>
• <strong>XGBoost / LightGBM</strong>：梯度提升树，表格数据竞赛冠军。<br>
• <strong>Transformers（HuggingFace）</strong>：预训练模型加载，NLP/CV多模态统一。<br><br>

<strong>🌐 Web 开发</strong><br>
• <strong>Flask</strong>：轻量级微框架，路由/请求上下文/Jinja2模板。<br>
• <strong>Django</strong>：全栈框架，自带ORM/Admin/认证/REST Framework。<br>
• <strong>FastAPI</strong>：高性能异步框架，Pydantic校验+自动Swagger文档。<br><br>

<strong>🕷️ 爬虫 &amp; HTTP</strong><br>
• <strong>Requests</strong>：HTTP请求库，Session会话保持。<br>
• <strong>Scrapy</strong>：异步爬虫框架，Spider+Middleware+Pipeline架构。<br>
• <strong>Selenium / Playwright</strong>：浏览器自动化，处理JS动态渲染。<br><br>

<strong>🗄️ 数据库</strong><br>
• <strong>SQLAlchemy</strong>：ORM，声明式映射+会话管理+原生SQL回退。<br>
• <strong>redis-py</strong>：Redis客户端，缓存/分布式锁/发布订阅。<br><br>

<strong>🔧 工程 &amp; 工具链</strong><br>
• <strong>pytest</strong>：测试框架，fixture+parametrize参数化。<br>
• <strong>logging</strong>：日志分级，Handler/Formatter可配置。<br>
• <strong>argparse / click</strong>：命令行参数解析。<br>
• <strong>tqdm</strong>：迭代进度条。<br>
• <strong>pathlib</strong>：面向对象路径操作，替代os.path。<br><br>

<strong>⚡ 并发 &amp; 性能</strong><br>
• <strong>threading</strong>：多线程，IO密集型（受GIL限制）。<br>
• <strong>multiprocessing</strong>：多进程，CPU密集型（绕过GIL）。<br>
• <strong>asyncio</strong>：协程异步，async/await高并发IO。<br>
• <strong>Celery</strong>：分布式任务队列，异步/定时任务。`},
{title:"4. list和tuple的核心区别是什么？", content:`<strong>可变性：</strong>列表(list)是可变的，创建后可以任意添加、删除、修改其中的元素。元组(tuple)是不可变的，一旦创建，其元素数量和值都不能改变。<br><br>
<strong>应用与特性：</strong><br>
• 由于不可变性，元组更安全、更轻量（内存占用稍小），并且可以作为字典的键（字典要求键是不可变对象）。<br>
• 列表适用于需要动态变化的数据集合。`},
{title:"5. 列表和字典的常用方法核心要点", content:`<strong>列表：</strong>围绕"有序集合"展开。<br>
• 增删改查：包括append, remove, pop, insert, index, count等方法。<br>
• 排序反转：sort()是原地排序；sorted()返回新列表。reverse()原地反转；reversed()返回迭代器。<br>
• 列表操作：copy()是浅拷贝（只拷贝外层，嵌套对象是引用）；deepcopy()是深拷贝（完全独立副本）。切片是获取子列表的利器。列表推导式是快速创建列表的简洁语法。<br>
• 迭代：可用for循环；enumerate()获取索引和值；zip()并行迭代多个列表。<br><br>
<strong>字典：</strong>围绕"键值对映射"展开。<br>
• 基本操作：get()安全获取值（可设默认值）；setdefault()有键返回值，无键则设置默认值；update()批量更新；pop()删除并返回值；in判断键是否存在。<br>
• 遍历：keys()遍历键，values()遍历值，items()遍历键值对。<br>
• 高级工具：collections.defaultdict访问不存在的键时自动创建默认值（如int默认为0，list默认为空列表）。collections.Counter专门用于计数的字典子类，most_common(n)可返回出现次数最多的前n项。<br>
• 实用技巧：字典推导式快速创建字典；按键或值排序；多个字典的合并与冲突处理（Python 3.9+可用|运算符）。<br><br>
<strong>一句话总结：</strong>列表是有序可变序列，适合存储有顺序、需索引访问的数据。字典是键值映射，适合快速查找、分组和配置管理。`},
{title:"6. 浅拷贝 (copy.copy()) vs 深拷贝 (copy.deepcopy())", content:`<strong>浅拷贝：</strong>只复制对象本身和其内部对象的引用。如果原对象包含嵌套的可变对象（如列表中的列表），那么拷贝对象和原对象会共享这些嵌套对象。修改嵌套对象的内容会互相影响。<br><br>
<strong>深拷贝：</strong>递归地复制对象及其包含的所有子对象，创建一个完全独立的新对象。新旧对象之间没有任何关联，互不影响。<br><br>
<strong>特例：</strong>对于不可变对象（如整数、字符串、仅包含不可变对象的元组），浅拷贝和深拷贝几乎没有区别，因为不可变对象本身无法被修改。<br><br><strong>完整示例对比：</strong><br>
import copy<br>
a = [1, 2, 3, 4, ['a', 'b']]  # 原始对象<br>
b = a  # 赋值，传对象的引用<br>
c = copy.copy(a)  # 浅拷贝<br>
d = copy.deepcopy(a)  # 深拷贝<br><br>
a.append(5)  # 修改外层<br>
a[4].append('c')  # 修改内层<br><br>
• b 跟着变（因为 b 就是 a 本身）→ [1,2,3,4,['a','b','c'],5]<br>
• c 外层不变但内层跟着变（浅拷贝只复制引用）→ [1,2,3,4,['a','b','c']]<br>
• d 完全独立，什么都不变 → [1,2,3,4,['a','b']]<br><br>
<strong>一句话记忆：</strong>赋值是起别名，浅拷贝只剥一层皮，深拷贝完全克隆。`},
{title:"7. 装饰器定义", content:`<strong>作用：</strong>一种在不修改原函数代码的情况下，为函数动态添加功能（如日志、计时、权限检查）的强大语法。<br><br>
<strong>AOP（面向切面编程）：</strong>装饰器是Python实现AOP的方式。AOP将日志、性能测试、事务等"横切关注点"从业务逻辑中抽离出来，避免代码重复和侵入。装饰器就是为已经存在的对象动态添加额外功能的绝佳设计。<br><br>
<strong>结构：</strong>装饰器本身是一个函数，它接收一个函数作为参数，并返回一个新的函数（通常是一个内部包装函数）。在包装函数内部，可以添加新功能，并调用原函数。<br><br>
<strong>计时装饰器讲解：</strong>可以创建一个timer装饰器。在其内部包装函数wrapper中，在调用被装饰的原函数func之前记录开始时间，在调用之后记录结束时间，然后计算并打印时间差。最后返回原函数的结果。`},
{title:"8. 迭代器和生成器", content:`<strong>迭代器：</strong>一个实现了__iter__()和__next__()方法的对象，可以逐个产出元素，直到没有元素时抛出StopIteration异常。它一次只处理一个元素，节省内存。<br><br>
<strong>生成器：</strong>一种用yield关键字实现的、更简洁的迭代器。函数执行到yield时暂停，返回一个值，下次调用next()时从暂停处继续。它无需一次性生成所有数据，特别适合处理大数据流或无限序列。<br><br>
<strong>生成器表达式：</strong>将列表推导式中的 [ ] 改成 ( ) 会得到一个生成器对象而非列表。<br>
• L = [x*x for x in range(10)] → L 是列表，一次性创建所有元素<br>
• g = (x*x for x in range(10)) → g 是生成器，边循环边计算<br>
• 用生成器可以节省大量内存，尤其适合大数据场景（只需要访问前几个元素时）<br><br>
<strong>斐波那契生成器讲解：</strong>可以写一个fib函数，内部用while True循环。初始化前两个数a, b = 0, 1。在循环中，用yield a产出当前数，然后更新a, b = b, a+b为下一个数。调用这个函数会得到一个生成器对象，每次next()它都会计算出下一个斐波那契数。<br><br>
<strong>生成器 vs 迭代器对比：</strong><br>
• 迭代器需要手动实现 __iter__() 和 __next__() 方法；生成器用 yield 自动创建，代码更简洁。<br>
• 生成器天生支持惰性计算（延迟求值），每次只生成一个值；迭代器需手动管理状态和遍历逻辑。<br>
• 生成器可以通过 yield 暂停/恢复，维护内部状态；迭代器需自行维护位置指针。<br>
• 两者都可以用 for 循环遍历，都遵循迭代器协议。<br><br>
<strong>可迭代对象（Iterable）vs 迭代器（Iterator）：</strong><br>
• 可迭代对象：实现了 __iter__() 方法的对象（如列表、元组、字符串、字典），可用 for 遍历。iter(obj) 返回一个迭代器。<br>
• 迭代器：同时实现 __iter__() 和 __next__() 的对象，每次 next(it) 返回一个元素，耗尽时抛 StopIteration。<br>
• 关系：可迭代对象 ≠ 迭代器。iter() 将可迭代对象转为迭代器；迭代器本身也是可迭代的（其 __iter__() 返回自身）。`},
{title:"9. 可变对象作为默认参数的陷阱与修复", content:`<strong>陷阱原因：</strong>函数的默认参数值在函数定义时就被创建并绑定，之后每次调用函数时，如果不显式提供该参数，使用的都是同一个默认对象。如果这个默认对象是可变对象（如列表、字典），多次调用会修改同一个对象，导致意料之外的"记忆"效果。<br><br>
<strong>修复方法：</strong>将默认值设为不可变对象None，在函数体内部进行判断。如果参数为None，则创建一个新的空列表（或字典等），这样就确保了每次调用都使用一个独立的新对象。`},
{title:"10. if __name__ == \"__main__\"的作用", content:`<strong>作用：</strong>判断当前模块是作为主程序运行，还是被导入到其他模块中。<br><br>
<strong>执行时机：</strong>当直接运行本脚本时，__name__的值为"__main__"，if块下的代码（通常是测试代码或程序入口）会执行。当本脚本被import到其他脚本时，__name__的值为模块名，if块下的代码不会执行。<br><br>
<strong>用途：</strong>将模块的可复用代码（函数、类定义）与执行代码分离，使得模块既能独立运行测试，又能被安全地导入而不触发不必要的执行。`},
{title:"11. __slots__的作用", content:`<strong>定义：</strong>__slots__是一个类级别的特殊变量，通过在类内定义一个元组或列表来声明该类实例只允许拥有的属性名称。例如 class A: __slots__ = ('name', 'age') 表示A的实例只能有name和age属性。<br><br>
<strong>作用与效果：</strong><br>
• <strong>节省内存：</strong>正常类的每个实例都自带一个__dict__字典来存储属性，字典本身有额外内存开销。使用__slots__后实例不再创建__dict__，属性按固定偏移量存储，对大量实例（如百万级）可节省显著内存。<br>
• <strong>属性锁定：</strong>实例不能动态添加__slots__声明之外的属性，避免因拼写错误而误增新属性，使代码更健壮。<br><br>
<strong>示例：</strong>class Person: __slots__ = ('name', 'age')。p = Person(); p.name = '张三'（✔允许）；p.age = 25（✔允许）；p.address = '北京'（✖ AttributeError，未在__slots__中声明）。`},
{title:"12. 上下文管理器与with语句", content:`<strong>作用：</strong>用于管理资源（如文件、网络连接、锁）的获取和释放，确保资源在使用完毕后被正确清理，即使发生异常也不例外。<br><br>
<strong>依赖方法：</strong>with语句依赖于对象的__enter__()和__exit__()两个魔术方法。<br>
• __enter__()：进入with代码块时调用，通常用于获取资源（如打开文件），其返回值可被as子句接收。<br>
• __exit__()：退出with代码块时一定会调用，用于释放资源（如关闭文件）和异常处理。`},
{title:"13. *args和**kwargs", content:`<strong>定义：</strong>用于函数定义中，接收可变数量的参数。<br><br>
• *args：将传入的所有位置参数打包成一个元组。<br>
• **kwargs：将传入的所有关键字参数打包成一个字典。<br><br>
<strong>示例函数讲解：</strong>可以定义一个demo函数，参数为*args, **kwargs。在函数体内，打印args会显示所有位置参数组成的元组，打印kwargs会显示所有关键字参数组成的字典。<br><br>
<strong>调用时的解包：</strong>在函数调用时也可以用 * 和 ** 将列表/字典解包为参数。<br>
def print_three(a, b, c):<br>
&nbsp;&nbsp;&nbsp;&nbsp;print(f'a={a}, b={b}, c={c}')<br>
mylist = ['apple', 'banana', 'cat']<br>
print_three(*mylist)  # * 将列表解包为三个位置参数<br><br>
<strong>顺序规则：</strong>定义时 *args 必须在 **kwargs 之前。调用时位置参数在前，关键字参数在后。`},
{title:"14. 闭包", content:`<strong>定义：</strong>在一个外层函数内部定义了一个内层函数，并且这个内层函数引用了外层函数的局部变量。当外层函数返回这个内层函数时，就形成了一个闭包。内层函数"记住"了外层函数的作用域。<br><br>
<strong>简单例子讲解：</strong>定义一个外层函数outer(x)，它接收一个参数x。在其内部定义一个内层函数inner(y)，它返回x + y。outer函数返回inner函数。调用add5 = outer(5)，此时add5就是一个闭包，它"记住"了x=5。再调用add5(3)，就会返回8。<br><br><strong>计时闭包（函数增强）：</strong><br>
import time<br>
def count_time_wrapper(func):<br>
&nbsp;&nbsp;&nbsp;&nbsp;def improved_func():<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;start = time.time()<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;func()<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;end = time.time()<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f'耗时{end-start:.2f}秒')<br>
&nbsp;&nbsp;&nbsp;&nbsp;return improved_func<br>
<strong>本质：</strong>闭包 = 内层函数 + 外层函数的变量环境。函数执行完后返回的内层函数仍然"记住"了外层作用域的变量，不会被销毁。<br><br>
<strong>作用和优势：</strong><br>
• <strong>函数工厂：</strong>闭包可以按需生成带不同预设参数的函数。如 outer(5) 生成一个加5的函数，outer(10) 生成加10的函数。<br>
• <strong>实现装饰器：</strong>装饰器的核心机制就是闭包——外层函数接收被装饰函数，内层 wrapper 函数"记住"原函数并在执行前后添加新逻辑。<br>
• <strong>延迟计算：</strong>闭包可以保存计算所需的环境，在需要时才真正执行，实现惰性求值。<br>
• <strong>保持状态：</strong>闭包中的变量不会被外界污染，可在多次调用间保持状态（如计数器、累加器）。<br>
• <strong>增加灵活性和可重用性：</strong>通过闭包可以在不修改原函数代码的前提下增强功能，代码更灵活、可复用。`},
{title:"15. and, or, not的返回值", content:`<strong>核心：</strong>and和or返回的是操作数本身，而不是强制转换为布尔值。<br><br>
<strong>规则：</strong><br>
• a and b：如果a为假（False, 0, 空字符串/列表等），返回a；否则返回b。<br>
• a or b：如果a为真，返回a；否则返回b。<br>
• not a：总是返回布尔值True或False。`},
{title:"16. @staticmethod与@classmethod的区别", content:`<strong>@classmethod（类方法）：</strong><br>
• 第一个参数：必须接受一个表示类本身的参数，通常命名为cls。<br>
• 功能：可以访问和修改类属性，但不能访问实例属性。常被用作工厂方法，根据不同参数创建并返回类的实例。<br>
• 调用：可以通过类或实例调用。<br><br>
<strong>@staticmethod（静态方法）：</strong><br>
• 第一个参数：没有约定必须有的参数（没有self或cls），就像普通函数。<br>
• 功能：不能访问类属性或实例属性。它只是一个放在类的命名空间下的普通函数，用于组织与类逻辑相关的工具代码。<br>
• 调用：可以通过类或实例调用。<br><br><strong>三者对比速查表：</strong><br>
• <strong>实例方法</strong>：第一个参数 self，可操作实例属性和类属性，必须通过实例调用。<br>
• <strong>类方法 @classmethod</strong>：第一个参数 cls，可操作类属性，可通过类或实例调用。<br>
• <strong>静态方法 @staticmethod</strong>：无特殊参数，不能访问类/实例属性，只是放在类命名空间下的普通函数，可通过类或实例调用。<br><br>
<strong>用 @ 还是不用？</strong>需要访问实例用 self → 实例方法；只需要访问类用 cls → @classmethod；纯工具函数不想四处放 → @staticmethod。`},
{title:"17. 实例方法、类方法、静态方法的详细对比", content:`<strong>实例方法：</strong><br>
• 第一个参数是self（实例自身）。可操作实例和类的所有属性和方法。必须通过实例调用。<br><br>
<strong>类方法：</strong><br>
• 第一个参数是cls（类自身）。可操作类属性和其他类方法。可通过类或实例调用。核心用途是工厂方法、替代构造函数、操作类级别状态。<br><br>
<strong>静态方法：</strong><br>
• 无特定参数。不能操作实例或类属性（除非通过类名硬编码）。可通过类或实例调用。核心用途是工具函数。`},
{title:"18. 装饰器链", content:`<strong>定义：</strong>多个装饰器可以按顺序堆叠在一起，修饰同一个函数，形成装饰链。<br><br>
<strong>执行顺序：</strong>装饰顺序是从下往上（最靠近函数的装饰器先应用），但执行时是从外往里（最外层的装饰器先执行其包装逻辑）。<br><br>
<strong>示例讲解：</strong>用@bold和@italic两个装饰器装饰greet()函数。bold装饰器给文本加&lt;b&gt;标签，italic加&lt;i&gt;标签。最终效果等价于greet = bold(italic(greet))，执行时先执行italic的包装逻辑，再执行bold的包装逻辑，最终输出类似&lt;b&gt;&lt;i&gt;hello&lt;/i&gt;&lt;/b&gt;。`},
{title:"19. try...except...else...finally 完整理解", content:`<strong>执行时机：</strong>else子句中的代码仅在try块中的代码没有引发任何异常，并正常执行完毕后才会执行。它是在try块之后、finally块之前执行。<br><br>
<strong>设计目的：</strong>将可能出错的代码放在try块，将依赖于try块成功执行、但本身不会引发异常的代码放在else块，让代码逻辑更清晰，与异常处理分离。<br><br>
<strong>finally 的作用：</strong><br>
• finally 块中的代码无论是否发生异常、无论 try/except 中是否有 return 语句，都一定会被执行。<br>
• 典型用途：释放资源（关闭文件、释放锁、关闭数据库连接、恢复状态等），确保清理工作一定执行。<br>
• 即使 try 中 return 了，也会先执行 finally 再返回。<br><br>
<strong>完整异常处理流程顺序：</strong>try（可能出错的代码）→ except（异常捕获处理，可选可多个）→ else（无异常时执行，可选）→ finally（无论如何都执行，可选）。`},
{title:"20. 自定义类的深拷贝行为", content:`<strong>方法：</strong>通过在自定义类中实现__deepcopy__魔术方法，可以控制copy.deepcopy()函数在拷贝该类的实例时的行为。<br><br>
<strong>过程：</strong>当调用deepcopy时，如果该类定义了__deepcopy__方法，则会调用此方法。该方法接收一个memo字典（用于处理循环引用），开发者需要在此方法中返回一个新的、深拷贝后的对象。可以精细控制每个属性的拷贝方式，例如跳过某些属性的深拷贝。`},
{title:"21. global和nonlocal关键字", content:`<strong>global：</strong>在函数内部声明，表示要修改的变量是全局作用域的变量。如果未声明，在函数内对变量赋值会被认为是创建新的局部变量。<br><br>
<strong>nonlocal：</strong>在嵌套函数的内部函数中声明，表示要修改的变量是其外层函数（非全局）作用域的变量。它使得内层函数可以修改外层函数的局部变量。<br><br>
<strong>示例讲解：</strong>在outer函数内部定义了变量y=200，其内层函数inner用nonlocal y声明要修改这个y。全局有变量x=100，inner用global x声明要修改这个x。调用inner后，外层函数的y和全局的x都被成功修改。`},
{title:"22. __new__ 和 __init__ 的区别？谁先执行？", content:`<strong>执行顺序：</strong>__new__ 先执行（创建实例），__init__ 后执行（初始化实例）。<br><br>
<strong>区别对比：</strong><br>
• __new__：第一个参数是 cls（类方法），负责创建并返回一个新实例。通常用 super().__new__(cls) 调用父类创建实例。<br>
• __init__：第一个参数是 self（实例方法），负责对已创建的实例做属性赋值等初始化工作。不能返回值（返回None）。<br><br>
<strong>通俗理解：</strong>__new__ 是"造房子"（砌出毛坯房），__init__ 是"搞装修"（摆家具刷墙）。必须先有房才能装修。<br><br>
<strong>常见用途：</strong>不可变类型（如 int、str、tuple）的定制创建、单例模式、缓存复用对象。`},
{title:"23. Python 中如何实现单例模式？（两种写法）", content:`<strong>定义：</strong>单例模式确保一个类在整个程序运行期间只有一个实例，不管被实例化多少次，返回的都是同一个对象。<br><br>
<strong>方式一：__new__ 控制（最推荐）</strong><br>
class Singleton:<br>
&nbsp;&nbsp;&nbsp;&nbsp;_instance = None<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __new__(cls, *args, **kwargs):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if not cls._instance:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;cls._instance = super().__new__(cls)<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return cls._instance<br>
<strong>解释：</strong>类变量 _instance 存唯一的实例。每次 new 时判断是否已存在，不存在才创建，存在则直接返回旧的。<br><br>
<strong>方式二：装饰器（通用性强）</strong><br>
def singleton(cls):<br>
&nbsp;&nbsp;&nbsp;&nbsp;instances = {}<br>
&nbsp;&nbsp;&nbsp;&nbsp;def getinstance(*args, **kwargs):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if cls not in instances:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;instances[cls] = cls(*args, **kwargs)<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return instances[cls]<br>
&nbsp;&nbsp;&nbsp;&nbsp;return getinstance<br>
<strong>解释：</strong>装饰器内部的 instances 字典以类名为键存实例。每次调用类时，如果该类没创建过实例就创建，否则直接返回缓存中的实例。可用于任意类。`},
{title:"24. 什么是 MRO？super() 的作用是什么？", content:`<strong>MRO（Method Resolution Order，方法解析顺序）：</strong>决定多继承时，子类调用方法或属性按照什么顺序在父类中查找。Python 使用 C3 线性化算法计算 MRO，可通过 类名.__mro__ 或 类名.mro() 查看。<br><br>
<strong>super() 的作用：</strong>按 MRO 顺序调用当前类的下一个类的方法。核心优势：<br>
• 避免硬编码父类名，父类改名时无需修改子类代码。<br>
• 在菱形继承（钻石继承）中，保证每个父类的方法只被调用一次且按正确顺序执行。<br><br>
<strong>通俗比喻：</strong>MRO 就像家族族谱的查询顺序——从自己出发，先查父亲，再查爷爷，最后查曾祖。super() 就是"找下一个长辈去办这件事"。<br><br>
<strong>单继承中：</strong>super().__init__() 就是调父类的 __init__，好记又安全。<br><br>
<strong>多重继承的使用与注意：</strong><br>
• 一个类可以继承多个父类：class D(B, C): pass，从而组合多个父类的功能。<br>
• <strong>方法冲突：</strong>当多个父类有同名方法时，MRO（C3 算法）决定调用顺序，遵循"从左到右、深度优先、最后子类"的原则。<br>
• <strong>菱形继承（钻石继承）：</strong>A 是基类，B 和 C 继承 A，D 继承 B 和 C。C3 算法保证每个父类只被调用一次，避免重复初始化。<br>
• <strong>设计建议：</strong>多重继承增加复杂度，建议用 Mixin 类（只提供方法、不持状态）来降低冲突风险。保持继承链简单清晰。`},
{title:"25. @property 装饰器的作用与好处", content:`<strong>作用：</strong>将一个方法"伪装"成属性来调用，访问时不用加 (), 就像访问实例变量一样自然。<br><br>
<strong>好处：</strong><br>
• 代码简洁：obj.area 比 obj.area() 更清爽。<br>
• 可附加逻辑：在获取/设置值时可以执行校验、计算、日志等操作。<br>
• 向后兼容：一开始用普通属性，后面想改成计算属性或用校验时，只需加 @property，调用方代码不需要改。<br>
• 配合 @xxx.setter 可实现"看起来是属性、实际有校验逻辑"的赋值控制。<br><br>
<strong>例子：Circle 类用 @property 计算面积</strong><br>
class Circle:<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, r):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self._r = r<br>
&nbsp;&nbsp;&nbsp;&nbsp;@property<br>
&nbsp;&nbsp;&nbsp;&nbsp;def area(self):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return 3.14 * self._r ** 2<br>
<strong>使用：</strong>c = Circle(5); print(c.area)  # 不用写 ()，直接像取属性一样。`},
{title:"26. 上下文管理器协议与自定义计时器", content:`<strong>协议定义：</strong>要实现 with 语句的支持，类必须实现两个魔术方法：<br>
• __enter__(self)：进入 with 代码块时调用，通常用于获取资源（打开文件/加锁/记录开始时间）。返回值可通过 as 子句捕获。<br>
• __exit__(self, exc_type, exc_val, exc_tb)：退出 with 块时一定会被调用（即使出现异常），用于释放资源和异常处理。三个参数分别是异常类型、异常值和 traceback。<br><br>
<strong>自定义计时器（统计代码块执行时间）：</strong><br>
import time<br>
class Timer:<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __enter__(self):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.start = time.time()<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return self  # as t 可以拿到这个对象<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __exit__(self, *args):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.elapsed = time.time() - self.start<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"代码块耗时：{self.elapsed:.3f}秒")<br>
<strong>使用方式：</strong><br>
with Timer() as t:<br>
&nbsp;&nbsp;&nbsp;&nbsp;time.sleep(1)  # 模拟耗时操作<br>
# 退出 with 后自动打印耗时<br><br>
<strong>关键词速记：</strong>"enter 准备 → with 代码执行 → exit 善后"。`},
{title:"27. 生成器的 .send() 方法——可接受外部输入的生成器", content:`<strong>定义：</strong>.send() 是生成器的一个方法，允许外部向生成器内部"发送"一个值，生成器内部通过 yield 表达式接收这个值并影响后续逻辑。<br><br>
<strong>关键注意：</strong><br>
• 首次调用必须用 next(g) 或 g.send(None) 让生成器执行到第一个 yield，之后才能用 send(具体值)。<br>
• yield 语句既向外产出值，又可以从外部接收值（赋值给变量）。<br><br>
<strong>累加器例子（外部 send 增量）：</strong><br>
def accumulator():<br>
&nbsp;&nbsp;&nbsp;&nbsp;total = 0<br>
&nbsp;&nbsp;&nbsp;&nbsp;while True:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;inc = yield total&nbsp;&nbsp;# yield 先产出当前 total，再接收外部发送的值<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;if inc is not None:<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;total += inc<br>
<strong>使用方式：</strong><br>
g = accumulator()<br>
next(g) &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# 启动生成器，执行到 yield total，产出 0<br>
print(g.send(10)) &nbsp;&nbsp;# 发送 10 → total 变成 10 → 产出 10<br>
print(g.send(20)) &nbsp;&nbsp;# 发送 20 → total 变成 30 → 产出 30<br>
print(g.send(-5)) &nbsp;&nbsp;&nbsp;# 发送 -5 → total 变成 25 → 产出 25<br><br>
<strong>通俗理解：</strong>普通的 yield 是"单向输出值"；有了 .send() 后变成"双向通道"——每次迭代时外部可以塞一个值进去影响内部计算。`},
{title:"28. 函数参数传递：可变对象 vs 不可变对象", content:`<strong>核心概念：</strong>Python 变量本质上是内存对象的"引用"。函数传参传递的是引用的副本（即"按引用传递"，但引用本身是按值传递的）。<br><br>
<strong>不可变对象传参（int、str、tuple）：</strong>函数内部重新赋值相当于让局部变量指向一个新对象，外部变量不受影响。<br>
a = 1<br>
def fun(a):<br>
&nbsp;&nbsp;&nbsp;&nbsp;a = 2  # 局部引用指向新对象<br>
fun(a)<br>
print(a)  # → 1（外部不变）<br><br>
<strong>可变对象传参（list、dict、set）：</strong>函数内部修改对象本身（如 append、赋值给 已有的元素），外部也能看到变化。<br>
a = []<br>
def fun(a):<br>
&nbsp;&nbsp;&nbsp;&nbsp;a.append(1)  # 修改引用指向的对象<br>
fun(a)<br>
print(a)  # → [1]（外部跟着变）<br><br>
<strong>一句话记忆：</strong>变量名是贴在对象上的标签。传参的"标签"可以撕下来贴到别的对象上（重新赋值），但也可以通过标签去修改那个对象本身。不可变对象无法被修改，所以只能换标签；可变对象可以原地修改，所以换不换标签都能动原对象。`},
{title:"29. 类变量和实例变量的区别", content:`<strong>定义：</strong><br>
• <strong>类变量</strong>：直接在类体中定义的变量，被该类的所有实例共享。<br>
• <strong>实例变量</strong>：在 __init__ 中通过 self.xxx 定义的变量，每个实例独有一份。<br><br>
<strong>示例：</strong><br>
class Person:<br>
&nbsp;&nbsp;&nbsp;&nbsp;name = "aaa"&nbsp;&nbsp;# 类变量<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, age):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.age = age&nbsp;&nbsp;# 实例变量（每个对象独立）<br><br>
p1, p2 = Person(20), Person(30)<br>
p1.name = "bbb"&nbsp;&nbsp;# 这会在 p1 上创建实例变量，不再影响类变量<br>
print(p1.name)  # bbb<br>
print(p2.name)  # aaa（类变量还在）<br>
print(Person.name)  # aaa<br><br>
<strong>注意：</strong>如果类变量是可变对象（如列表），修改它会影响所有实例。推荐用 self 定义实例变量，用类名访问类变量。`},
{title:"30. Python 自省（introspection）", content:`<strong>定义：</strong>自省是指程序在运行时能够获取对象的类型、属性、方法等内部信息的能力，是 Python 的强大特性之一。<br><br>
<strong>常用自省函数：</strong><br>
• type(obj)：获取对象类型<br>
• isinstance(obj, cls)：判断对象是否为某类型或其子类的实例<br>
• dir(obj)：列出对象的所有属性和方法<br>
• getattr(obj, name)：获取对象的某个属性<br>
• hasattr(obj, name)：判断对象是否有某个属性<br>
• id(obj)：获取对象的内存地址<br>
• callable(obj)：判断对象是否可调用<br><br>
<strong>示例：</strong><br>
a = [1, 2, 3]<br>
print(type(a))  # <class 'list'><br>
print(isinstance(a, list))  # True<br>
print(hasattr(a, 'append'))  # True`},
{title:"31. 字典推导式", content:`<strong>语法：</strong>{key_expr: value_expr for key, value in iterable}，从 Python 2.7+ 开始支持。<br><br>
<strong>作用：</strong>用简洁的语法快速创建字典，类似列表推导式，但生成的是字典而不是列表。<br><br>
<strong>示例：</strong><br>
# 将列表转为索引字典<br>
items = ['apple', 'banana', 'cat']<br>
d = {i: item for i, item in enumerate(items)}<br>
# → {0: 'apple', 1: 'banana', 2: 'cat'}<br><br>
# 带条件过滤<br>
squares = {x: x*x for x in range(10) if x % 2 == 0}<br>
# → {0: 0, 2: 4, 4: 16, 6: 36, 8: 64}`},
{title:"32. Python 中单下划线和双下划线的含义", content:`<strong>__xxx__（双下划线开头结尾）：</strong>Python 内部特殊方法（魔术方法），如 __init__、__str__、__call__。用户应避免自定义这类命名，以免与 Python 内部机制冲突。<br><br>
<strong>_xxx（单下划线开头）：</strong>约定俗成的"保护"成员，告诉其他程序员这个属性/方法是内部使用的。from module import * 时不会导入这类名称。<br><br>
<strong>__xxx（双下划线开头，无结尾）：</strong>名称修饰（name mangling）。Python 解释器会自动将其重命名为 _ClassName__xxx，防止子类意外覆盖父类属性。<br><br>
<strong>示例：</strong><br>
class MyClass:<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.__private = "秘密"  # 实际存为 _MyClass__private<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self._protected = "保护"<br>
mc = MyClass()<br>
print(mc._protected)  # 可以直接访问<br>
print(mc._MyClass__private)  # 必须这样访问`},
{title:"33. 字符串格式化：%、.format() 和 f-string", content:`<strong>三种格式化方式演变：</strong><br><br>
<strong>1. % 格式化（最老，Python 2 时代）：</strong><br>
"hello %s, age %d" % ("小明", 20)<br>
• 缺点：传入元组时容易出错，代码可读性差。<br><br>
<strong>2. .format()（Python 2.6+ 推荐）：</strong><br>
"hello {}, age {}".format("小明", 20)<br>
• 支持位置参数和关键字参数，比 % 更安全、更灵活。<br><br>
<strong>3. f-string（Python 3.6+，最推荐）：</strong><br>
name, age = "小明", 20<br>
f"hello {name}, age {age}"<br>
• 直接在字符串内嵌变量，语法最简洁，性能最好。<br><br>
<strong>面试建议：</strong>能用 f-string 就用 f-string（Python 3.6+），兼容旧版时用 .format()。`},
{title:"34. 鸭子类型（Duck Typing）", content:`<strong>定义：</strong>"当看到一只鸟走起来像鸭子、游泳起来像鸭子、叫起来也像鸭子，那么这只鸟就可以被称为鸭子。"——不关心对象的实际类型，只关心它是否有你想要的行为（方法）。<br><br>
<strong>Python 中的应用：</strong><br>
• file-like 对象：StringIO、GzipFile、socket 等都有 read()/write() 方法，可被统一当作文件处理。<br>
• list.extend() 不要求参数必须是列表，只要是可迭代对象即可（tuple/dict/字符串/生成器都行）。<br>
• 不需要像 Java 那样定义接口（Interface），靠"约定"而非"类型"工作。<br><br>
<strong>一句话：</strong>Python 看的是行为（方法），而不是类型（类名）。`},
{title:"35. Python 中为什么没有函数重载？", content:`<strong>重载的需求：</strong>函数重载指定义多个同名但参数类型或个数不同的函数。<br><br>
<strong>Python 不需要重载的原因：</strong><br>
• <strong>参数类型灵活：</strong>Python 是动态类型语言，函数可以接受任何类型的参数，无需为不同类型写多个版本。<br>
• <strong>默认参数：</strong>通过给参数设默认值来应对参数个数不同的场景。<br>
• <strong>*args 和 **kwargs：</strong>可以接收任意数量和种类的参数。<br><br>
<strong>示例：</strong><br>
def add(a, b=0, c=0):  # 默认参数取代多个重载<br>
&nbsp;&nbsp;&nbsp;&nbsp;return a + b + c<br>
print(add(1))&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;# 1<br>
print(add(1, 2))&nbsp;&nbsp;&nbsp;# 3<br>
print(add(1, 2, 3))&nbsp;# 6`},
{title:"36. 新式类和旧式类（经典类）的区别", content:`<strong>背景：</strong>Python 2.2 之前是旧式类（经典类），2.2 之后引入了新式类。Python 3 中所有类都是新式类，旧式类已移除。<br><br>
<strong>核心区别：</strong><br>
• <strong>继承 object：</strong>新式类默认继承 object，旧式类不继承。Python 2 中 class A: 是旧式类，class A(object): 是新式类。<br>
• <strong>MRO 算法不同：</strong>旧式类用深度优先（DFS），新式类用 C3 线性化算法。DFS 在菱形继承中可能遗漏重写的方法。<br><br>
<strong>旧式类 DFS 的陷阱：</strong><br>
class A: def foo(self): print("A")<br>
class B(A): pass<br>
class C(A): def foo(self): print("C")<br>
class D(B, C): pass<br>
d = D(); d.foo()  # 旧式类输出 A（跳过 C 的重写）；新式类输出 C`},
{title:"37. Python 中的作用域规则（LEGB）", content:`<strong>定义：</strong>Python 查找变量时按照 LEGB 顺序搜索四个作用域：<br>
1. <strong>L（Local）</strong>：当前函数内部<br>
2. <strong>E（Enclosing）</strong>：外层嵌套函数的作用域<br>
3. <strong>G（Global）</strong>：模块全局作用域<br>
4. <strong>B（Built-in）</strong>：Python 内置作用域（如 len, print）<br><br>
<strong>赋值规则：</strong>变量在何处被赋值就决定其作用域。函数内部直接赋值会创建局部变量；想改全局变量需用 global 声明；想改外层函数变量需用 nonlocal 声明。<br><br>
<strong>示例：</strong><br>
x = "global"<br>
def outer():<br>
&nbsp;&nbsp;&nbsp;&nbsp;x = "enclosing"<br>
&nbsp;&nbsp;&nbsp;&nbsp;def inner():<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;x = "local"  # LEGB 找到最近的 L<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(x)<br>
&nbsp;&nbsp;&nbsp;&nbsp;inner()<br>
outer()  # 输出 "local"`},
{title:"38. 协程（Coroutine）与 async/await", content:`<strong>定义：</strong>协程是一种用户态轻量级线程，协程的切换由程序自身控制（在 yield 或 await 处主动让出），不依赖操作系统内核调度，切换代价远低于线程。<br><br>
<strong>与线程的区别：</strong><br>
• 线程的切换由操作系统内核控制，耗时高；协程由程序主动让出控制权（协作式），没有上下文切换开销。<br>
• 多线程有 GIL 限制，协程本质上是单线程的，不受 GIL 影响。<br><br>
<strong>Python 协程演进：</strong><br>
• Python 2.x：生成器 yield 模拟协程<br>
• Python 3.3：yield from 支持委托<br>
• Python 3.5：async/await 关键字正式支持（推荐）<br><br>
<strong>示例：</strong><br>
import asyncio<br>
async def hello():<br>
&nbsp;&nbsp;&nbsp;&nbsp;print("开始")<br>
&nbsp;&nbsp;&nbsp;&nbsp;await asyncio.sleep(1)  # 让出控制权<br>
&nbsp;&nbsp;&nbsp;&nbsp;print("结束")<br>
asyncio.run(hello())`},
{title:"39. lambda 函数（匿名函数）", content:`<strong>定义：</strong>lambda 是一种创建小型匿名函数的语法，只能包含一个表达式，不能包含语句（如 if/for 等）。<br><br>
<strong>语法：</strong>lambda 参数列表: 表达式<br><br>
<strong>示例：</strong><br>
f = lambda x: x * x<br>
print(f(4))  # 16<br><br>
g = lambda x, y: x + y<br>
print(g(1, 2))  # 3<br><br>
<strong>典型用途：</strong>配合 map/filter/sorted 等函数使用，作为临时回调函数。<br>
sorted([('a',3), ('b',1), ('c',2)], key=lambda x: x[1])<br>
# → [('b',1), ('c',2), ('a',3)]`},
{title:"40. Python 函数式编程：map、filter、reduce", content:`<strong>核心思想：</strong>函数式编程把计算视为函数的组合，避免修改状态和可变数据。Python 提供了三个常用函数式工具：<br><br>
<strong>1. map(func, iterable)</strong>：对可迭代对象的每个元素应用函数，返回迭代器。<br>
list(map(lambda x: x*2, [1, 2, 3]))&nbsp;&nbsp;# → [2, 4, 6]<br><br>
<strong>2. filter(func, iterable)</strong>：过滤出使函数返回 True 的元素。<br>
list(filter(lambda x: x > 5, [3, 7, 1, 8]))&nbsp;&nbsp;# → [7, 8]<br><br>
<strong>3. reduce(func, iterable)</strong>：对序列两两累积计算（需 from functools import reduce）。<br>
from functools import reduce<br>
reduce(lambda x, y: x * y, [1, 2, 3, 4])&nbsp;&nbsp;# → 24（=1*2*3*4）<br><br>
<strong>面试提示：</strong>现在更推荐用列表推导式和生成器表达式替代 map/filter，可读性更好。reduce 在复杂场景下仍有价值。`},
{title:"41. Python 垃圾回收机制（GC）", content:`<strong>三种回收机制配合工作：</strong><br><br>
<strong>1. 引用计数（主流）</strong><br>
每个对象维护 ob_refcnt 计数，有新的引用则 +1，引用被删除则 -1。计数归零时立即回收。优点是实时、简单；缺点是无法处理循环引用（如 A 引用 B，B 引用 A）。<br><br>
<strong>2. 标记-清除（解决循环引用）</strong><br>
从根对象（全局变量、栈帧）出发，遍历所有可访问的对象并"标记"。遍历完后，未被标记的对象即为"垃圾"，予以清除。主要解决容器对象的循环引用问题。<br><br>
<strong>3. 分代回收（提升效率）</strong><br>
将对象按存活时间分为三代（0/1/2）：<br>
• 新创建的对象放入第 0 代，回收频率最高。<br>
• 经过垃圾回收仍存活的升入下一代。<br>
• 代龄越大，回收频率越低，因为长期存活的对象成为垃圾的概率更小。<br>
• 以空间换时间，显著减少每次垃圾回收需要检查的对象数量。`},
{title:"42. read()、readline() 和 readlines() 的区别", content:`<strong>三种方法对比：</strong><br><br>
• <strong>read(size=-1)：</strong>读取整个文件返回一个字符串（或字节串）。可传 size 限制读取大小。一次性加载大文件会耗尽内存。<br>
• <strong>readline()：</strong>每次读取并返回文件的下一行（包含换行符）。适合逐行处理，节省内存。<br>
• <strong>readlines()：</strong>读取整个文件，将每行作为元素存入列表返回。和 read() 一样不适合大文件，但直接得到按行分割的结果。<br><br>
<strong>大文件推荐做法：</strong><br>
for line in file:&nbsp;&nbsp;# 文件对象本身是迭代器，逐行读取效率最高<br>
&nbsp;&nbsp;&nbsp;&nbsp;process(line)`},
{title:"43. Python 2 和 Python 3 的主要区别", content:`<strong>关键差异速记：</strong><br><br>
• <strong>print：</strong>Python 2 是 print 语句（print "hello"）；Python 3 是函数（print("hello")）。<br>
• <strong>整数除法：</strong>Python 2 中 5/2=2（地板除，int）；Python 3 中 5/2=2.5（真除法）。5//2 在两者中都是地板除。<br>
• <strong>字符串：</strong>Python 2 默认 ASCII，有 unicode 和 str 之分；Python 3 默认 Unicode，str 直接是 Unicode。<br>
• <strong>range/xrange：</strong>Python 2 有 range（返回列表）和 xrange（惰性求值）；Python 3 只有 range（惰性求值，类似 xrange）。<br>
• <strong>异常语法：</strong>Python 2: except Exception, e；Python 3: except Exception as e。<br>
• <strong>input：</strong>Python 2 中 input() 会 eval 输入，raw_input() 才是字符串输入；Python 3 中 input() 就是字符串输入。<br>
• <strong>新式类：</strong>Python 3 所有类都是新式类，无需显式继承 object。<br>
• <strong>int/long：</strong>Python 2 有 int（32位）和 long（长整型）之分；Python 3 只有 int（任意精度，统一升级）。<br>
• <strong>xrange/range：</strong>Python 2 中 range 返回列表，xrange 惰性求值；Python 3 只有 range（惰性求值，类似 xrange）。<br>
• <strong>exec：</strong>Python 2 中 exec 是语句；Python 3 中 exec() 是函数。<br>
• <strong>比较运算符：</strong>Python 2 支持 <> 表示不等于；Python 3 统一使用 !=。<br>
• <strong>file：</strong>Python 2 中有 file() 函数；Python 3 中统一用 open()，可用 io.IOBase 检查文件类型。<br>
• <strong>字典 has_key：</strong>Python 2 用 dict.has_key(key)；Python 3 统一用 key in dict。<br>
• <strong>异常 StandardError：</strong>Python 2 有 StandardError 基类；Python 3 统一使用 Exception。<br>
• <strong>包 __init__：</strong>Python 2 中包必须有 __init__.py；Python 3 中不是必须的（但有仍是最佳实践）。<br>
• <strong>迭代器 next：</strong>Python 2 中迭代器用 obj.next()；Python 3 统一用 next(obj)。`},
{title:"44. 元类（metaclass）简介", content:`<strong>定义：</strong>元类是创建类的"类"。在 Python 中，类也是对象，而元类就是负责创建这个"类对象"的工厂。默认情况下，所有类的元类是 type。<br><br>
<strong>类的创建过程：</strong><br>
1. 遇到 class 关键字<br>
2. 收集类体中的属性和方法（存入字典）<br>
3. 调用元类的 __new__() 创建类对象<br>
4. 调用元类的 __init__() 初始化类对象<br><br>
<strong>type 创建类的等价写法：</strong><br>
# 用 class 语法<br>
class MyClass:<br>
&nbsp;&nbsp;&nbsp;&nbsp;x = 10<br>
# 等价于用 type<br>
MyClass = type('MyClass', (), {'x': 10})<br><br>
<strong>自定义元类应用场景：</strong><br>
• ORM 框架（如 Django/SQLAlchemy 用元类将类定义映射为数据库表）<br>
• 单例模式<br>
• 自动注册子类<br>
• 接口校验（强制子类实现某方法）<br><br>
<strong>面试引导：</strong>"元类在实际开发中很少直接用到，但如果要深入理解 Django ORM 或实现框架级功能则很有用。"`},
{title:"45. 魔术方法（Magic Methods / Dunder Methods）", content:`<strong>定义：</strong>魔术方法是 Python 中以双下划线 __ 开头和结尾的特殊方法，在特定操作发生时自动调用，无需手动调用。<br><br>
<strong>常见魔术方法分类：</strong><br>
• <strong>对象创建与销毁：</strong>__new__、__init__、__del__<br>
• <strong>字符串表示：</strong>__str__（给用户看）、__repr__（给开发者看）<br>
• <strong>容器方法：</strong>__len__、__getitem__、__setitem__、__contains__<br>
• <strong>运算符重载：</strong>__add__、__sub__、__eq__、__lt__ 等<br>
• <strong>可调用对象：</strong>__call__（使实例可以像函数一样被调用）<br>
• <strong>上下文管理：</strong>__enter__、__exit__<br><br>
<strong>自定义示例：</strong><br>
class Book:<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __init__(self, title):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;self.title = title<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __str__(self):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return f"《{self.title}》"<br>
&nbsp;&nbsp;&nbsp;&nbsp;def __len__(self):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return len(self.title)<br>
b = Book("Python教程")<br>
print(b)&nbsp;&nbsp;# 自动调用 __str__ → 《Python教程》<br>
print(len(b))&nbsp;&nbsp;# 自动调用 __len__ → 6`},
{title:"46. 虚拟环境（Virtual Environment）", content:`<strong>定义：</strong>虚拟环境是 Python 提供的创建隔离项目环境的工具，每个环境有独立的 Python 解释器和第三方包，项目之间互不干扰。<br><br>
<strong>为什么需要它？</strong><br>
• <strong>依赖隔离：</strong>项目 A 需要 Django 3.x，项目 B 需要 Django 4.x，不同版本不能共存于全局环境。<br>
• <strong>避免冲突：</strong>不会把系统的全局包搞乱，也避免不同项目依赖互相覆盖。<br>
• <strong>可复现：</strong>通过 pip freeze > requirements.txt 导出发包清单，其他人用 pip install -r requirements.txt 就能搭建完全相同环境。<br><br>
<strong>常用工具：</strong><br>
• <strong>venv（Python 3.3+ 内置，推荐）：</strong>python -m venv myenv<br>
• <strong>virtualenv（兼容 Python 2）：</strong>第三方替代品<br>
• <strong>conda：</strong>数据科学常用，可管理 Python 版本和非 Python 依赖<br>
• <strong>pipenv / poetry：</strong>集成了包管理和虚拟环境的工具`},
{title:"47. 递归（Recursion）的概念与注意事项", content:`<strong>定义：</strong>递归是指函数在其内部调用自身的编程技巧。通常用于解决可分解为相同子问题的问题，如树的遍历、阶乘、斐波那契数列、快速排序等。<br><br>
<strong>两个关键要素：</strong><br>
• <strong>基线条件（Base Case）：</strong>递归的出口，满足条件时直接返回结果，不再递归。<br>
• <strong>递归条件（Recursive Case）：</strong>将问题拆解为更小的子问题并调用自身。<br><br>
<strong>示例：阶乘</strong><br>
def factorial(n):<br>
&nbsp;&nbsp;&nbsp;&nbsp;if n <= 1:&nbsp;&nbsp;# 基线条件<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return 1<br>
&nbsp;&nbsp;&nbsp;&nbsp;return n * factorial(n-1)&nbsp;&nbsp;# 递归条件<br><br>
<strong>注意事项：</strong><br>
• <strong>栈溢出：</strong>Python 默认递归深度限制约 1000 层，超出会抛 RecursionError。可用 sys.setrecursionlimit(limit) 调整。<br>
• <strong>效率问题：</strong>递归会产生函数调用开销，有重复计算（如朴素斐波那契）。可用记忆化（functools.lru_cache）优化。<br>
• <strong>Python 不优化尾递归：</strong>不像一些函数式语言，Python 不会对尾递归进行优化，因此深度递归优先考虑迭代实现。`},
{title:"48. 多线程 vs 多进程 vs 协程（三大并发模型对比）", content:`<strong>三种并发方式的对比：</strong><br><br>
• <strong>多线程（threading）：</strong>在同一个进程中运行多个线程，共享进程内存空间。<br>
• <strong>多进程（multiprocessing）：</strong>启动多个独立的进程，每个进程有独立的 Python 解释器和内存空间。<br>
• <strong>协程（asyncio/async/await）：</strong>单线程内的用户态轻量级并发，由程序自身在 await 处主动让出控制权。<br><br>
<strong>对比表：</strong><br>
| 特性 | 多线程 | 多进程 | 协程 |
|------|--------|--------|------|
| 内存 | 共享，需加锁保护 | 独立，数据传递需 IPC | 共享，天然不竞争 |
| GIL 影响 | 受 GIL 限制（CPU 密集型失效） | 每个进程独立 GIL，绕开限制 | 单线程，不受 GIL 影响 |
| 切换开销 | 中（内核态切换） | 高（创建进程 + 切换内核态） | 低（用户态切换） |
| 适用场景 | I/O 密集型（网络请求、文件读写） | CPU 密集型（计算、图像处理） | 高并发 I/O（大量网络连接） |
| 数据安全 | 需锁/队列同步 | 进程间天然隔离 | 无共享数据竞争 |
| Python 实现 | threading 模块 | multiprocessing 模块 | asyncio 模块`},
{title:"49. 装饰器函数 vs 类装饰器", content:`<strong>装饰器函数：</strong><br>
• 接受一个函数或类作为参数，返回一个函数或类。<br>
• 最常见的装饰器形式，用 @ 语法简化，如 @timer、@login_required。<br>
• 适用场景：为单个函数或方法添加功能（日志、计时、权限校验、缓存）。<br><br>
<strong>类装饰器：</strong><br>
• 接受一个类作为参数，返回修改后的类。<br>
• 可以修改类的属性、方法，或包装类的实例化过程。<br>
• 适用场景：对整个类进行功能扩展（注册、单例、属性注入、接口校验）。<br><br>
<strong>示例对比：</strong><br>
# 装饰器函数：给函数加日志<br>
def log(func):<br>
&nbsp;&nbsp;&nbsp;&nbsp;def wrapper(*args, **kwargs):<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;print(f"调用 {func.__name__}")<br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;return func(*args, **kwargs)<br>
&nbsp;&nbsp;&nbsp;&nbsp;return wrapper<br><br>
# 类装饰器：给类注册到全局字典<br>
registry = {}<br>
def register(cls):<br>
&nbsp;&nbsp;&nbsp;&nbsp;registry[cls.__name__] = cls<br>
&nbsp;&nbsp;&nbsp;&nbsp;return cls<br><br>
<strong>选择建议：</strong>修饰单个函数/方法用函数装饰器；需要修改类的创建或添加类级别功能用类装饰器。`},
{title:"50. 元编程（Metaprogramming）", content:`<strong>定义：</strong>元编程是指编写能操作（创建、修改、分析）其他代码的代码。在 Python 中，代码本身也是对象（函数是对象、类是对象、模块也是对象），因此可以在运行时动态地检查和修改它们。<br><br>
<strong>Python 中实现元编程的常用手段：</strong><br>
• <strong>装饰器：</strong>在运行时修改函数或类的行为，是最常见的元编程形式。<br>
• <strong>元类（metaclass）：</strong>控制类的创建过程，在类定义时拦截并进行修改。<br>
• <strong>自省（introspection）：</strong>运行时获取对象信息（type、isinstance、getattr、dir 等）。<br>
• <strong>exec/eval：</strong>动态执行字符串形式的 Python 代码。<br>
• <strong>描述符（descriptor）：</strong>通过 __get__、__set__、__delete__ 控制属性访问行为。<br><br>
<strong>典型应用场景：</strong><br>
• ORM 框架（如 Django/SQLAlchemy）：将类定义自动映射为数据库表结构。<br>
• 自动注册插件/子类：扫描模块中所有实现某接口的类并自动注册。<br>
• 代码生成：减少重复的样板代码（如自动生成 getter/setter）。<br>
• 接口校验：强制子类必须实现某些方法。<br><br>
<strong>面试提示：</strong>元编程是高级话题，日常开发中较少直接使用，但理解其原理有助于深入理解框架的实现机制。`},
{title:"51. Python语言特点与解释型/编译型的区别", content:`<strong>Python 与其他语言的核心区别：</strong>Python 是解释型语言，程序运行时逐行解释执行，调试方便、开发效率高。Python 定位为"优雅、明确、简单"，拥有强大的第三方库生态，应用领域广泛。<br><br>
<strong>解释型语言：</strong>边解释边执行，如 Python、PHP、JavaScript。优点：跨平台性好、开发效率高、调试方便。缺点：执行速度较慢。<br><br>
<strong>编译型语言：</strong>编译后再执行，如 C、C++、Java（Java 是先编译成字节码再由 JVM 解释执行，属于混合型）、C#。优点：执行速度快。缺点：跨平台性较差、开发调试周期较长。<br><br>
<strong>Python 的优缺点：</strong><br>
• <strong>优点：</strong>语法简洁优美、功能强大、标准库和第三方库丰富、可移植性好、可扩展性和可嵌入性强。<br>
• <strong>缺点：</strong>运行速度相对较慢（CPU 密集型场景可通过 C 扩展、多进程等方式优化）。`},
{title:"52. Python 解释器种类及特点", content:`<strong>CPython（官方版本，最常用）：</strong>使用 C 语言开发，命令行下运行 python 启动的就是 CPython 解释器。使用最广，所有标准库和大多数第三方库都可在 CPython 上运行。<br><br>
<strong>IPython：</strong>基于 CPython 的交互式增强解释器，在交互方式上有所增强（如 TAB 补全、语法高亮、富媒体输出），但执行 Python 代码的能力和 CPython 完全一致。使用 In [序号]: 作为提示符。<br><br>
<strong>PyPy：</strong>用 Python 实现的解释器，采用 JIT（即时编译）技术动态编译 Python 代码，执行速度最快。大部分 Python 代码可在 PyPy 上运行，但与 CPython 存在一些差异。<br><br>
<strong>Jython：</strong>运行在 Java 平台上的 Python 解释器，可将 Python 代码编译成 Java 字节码执行，能无缝调用 Java 类库。<br><br>
<strong>IronPython：</strong>运行在 .NET 平台上的 Python 解释器，可将 Python 代码编译成 .NET 字节码，与 C# 等 .NET 语言互操作。<br><br>
<strong>小结：</strong>使用最广泛的仍是 CPython。需要与 Java 或 .NET 交互时，推荐通过网络调用的方式而非使用 Jython/IronPython，以保持程序独立性。`},
{title:"53. PEP8 编码规范与 Python 之禅", content:`<strong>PEP8 是什么？</strong><br>
PEP = Python Enhancement Proposal（Python 增强建议书）。PEP8 是 Python 代码的官方风格指南，旨在让代码"更好看、更易读"。核心建议包括：<br>
• 缩进：使用 4 个空格，不要混用 Tab 和空格。<br>
• 行宽：每行不超过 79 个字符。<br>
• 空行：函数/类定义之间用两个空行，类内方法之间用一个空行。<br>
• 导入：每个 import 占一行，标准库/第三方库/本地库分组导入。<br>
• 空格：运算符两边各加一个空格，函数参数默认值等号两边不加空格。<br>
• 命名：类名用驼峰（CamelCase），变量/函数用小写+下划线（snake_case），常量全大写。<br><br>
<strong>Python 之禅（import this）：</strong><br>
在 Python 交互环境中输入 <code>import this</code> 即可看到 Tim Peters 撰写的《Python 之禅》，它是 Python 设计哲学的 19 条格言，核心思想包括：<br>
• 优美胜于丑陋（Beautiful is better than ugly）<br>
• 明了胜于晦涩（Explicit is better than implicit）<br>
• 简洁胜于复杂（Simple is better than complex）<br>
• 可读性很重要（Readability counts）<br>
• 面对不确定性，拒绝猜测（In the face of ambiguity, refuse the temptation to guess）<br>
• 如果实现难以解释，那可能是个坏主意（If the implementation is hard to explain, it's a bad idea）`},
{title:"54. docstring 文档字符串与类型注解", content:`<strong>docstring（文档字符串）：</strong><br>
Python 的一个特性，在模块、函数、类或方法的第一行用三引号 <code>""" xxx """</code> 包裹的字符串，用于说明其用途、参数和返回值。可通过 <code>对象.__doc__</code> 在运行时获取 docstring 内容。<br><br>
<strong>示例：</strong><br>
def add(a, b):<br>
&nbsp;&nbsp;&nbsp;&nbsp;"""返回两个数的和<br>
&nbsp;&nbsp;&nbsp;&nbsp;:param a: 第一个数<br>
&nbsp;&nbsp;&nbsp;&nbsp;:param b: 第二个数<br>
&nbsp;&nbsp;&nbsp;&nbsp;:return: a + b 的结果<br>
&nbsp;&nbsp;&nbsp;&nbsp;"""<br>
&nbsp;&nbsp;&nbsp;&nbsp;return a + b<br><br>
<strong>类型注解（Type Hints）：</strong><br>
Python 3.5+ 支持的可选类型标注，使代码更具可读性和可维护性。解释器不会强制校验类型，但 IDE 和类型检查工具（如 mypy）可利用它做静态分析。<br><br>
<strong>示例：</strong><br>
def add(x: int, y: int) -> int:<br>
&nbsp;&nbsp;&nbsp;&nbsp;"""返回两个整数的和"""<br>
&nbsp;&nbsp;&nbsp;&nbsp;return x + y<br>
• 参数类型：用 <code>: 类型</code> 标注<br>
• 返回值类型：用 <code>-> 类型</code> 标注<br>
• 支持复杂类型：List[int]、Dict[str, int]、Optional[str]、Union[int, float]`},
{title:"55. Python 命名规范与注释规范", content:`<strong>Python 常见命名规范：</strong><br>
• <strong>类名：</strong>驼峰命名法（PascalCase），首字母大写，如 <code>MyClass</code>、<code>UserManager</code>。<br>
• <strong>全局变量/常量：</strong>全大写字母，单词之间用下划线分隔，如 <code>MAX_COUNT</code>、<code>API_BASE_URL</code>。<br>
• <strong>普通变量/函数：</strong>小写字母，单词之间用下划线分隔（snake_case），如 <code>user_name</code>、<code>get_data()</code>。<br>
• <strong>私有变量/函数：</strong>以双下划线 __ 开头，如 <code>__private_method</code>（触发名称修饰）。<br>
• <strong>保护成员：</strong>以单下划线 _ 开头，表示"内部使用"约定，如 <code>_internal_var</code>。<br>
• <strong>文件命名：</strong>全小写字母，单词之间用下划线分隔，如 <code>my_module.py</code>。<br><br>
<strong>Python 中的注释类型：</strong><br>
• <strong>单行注释：</strong><code># 这是单行注释</code><br>
• <strong>多行注释：</strong>多个 <code>#</code> 行，或使用三引号 <code>"""..."""</code>（但三引号本质是字符串）。<br>
• <strong>docstring：</strong>函数/类/模块第一行的三引号注释，用于生成文档，可通过 <code>__doc__</code> 访问。<br>
• <strong>行内注释：</strong>代码末尾的简短注释，至少空两格。<br><br>
<strong>一行导入多个库：</strong><br>
可以：<code>import json, random, requests</code>，但 PEP8 建议每个 import 单独一行以提高可读性。`},
{title:"56. Python 代码风格工具", content:`<strong>常用代码风格检查与格式化工具：</strong><br><br>
<strong>1. pylint：</strong>静态代码分析工具，检查代码错误、代码风格、命名规范、潜在问题等，给出评分和建议。配置灵活，可通过 <code>.pylintrc</code> 文件自定义规则。<br><br>
<strong>2. black：</strong>"不妥协的 Python 代码格式化器"，自动格式化代码以符合 PEP8 规范，几乎是零配置。最大的特点是格式化结果高度一致，无需人为纠结代码风格。<br><br>
<strong>3. flake8：</strong>是 pyflakes（语法检查）+ pycodestyle（PEP8 风格检查）+ mccabe（复杂度检查）的集成工具，轻量快速。<br><br>
<strong>4. mypy：</strong>静态类型检查工具，结合类型注解，在运行前发现类型错误。<br><br>
<strong>5. IDE 内置工具：</strong>PyCharm 等 IDE 自带 PEP8 检查，可实时高亮不符合规范的地方，并提供一键格式化。<br><br>
<strong>常用组合：</strong><br>
• 开发阶段：PyCharm + pylint<br>
• CI 阶段：black --check + flake8 + mypy<br>
• 提交前：black 自动格式化 + flake8 快速检查`},
{title:"57. Python 基本数据类型（6种）", content:`<strong>Python 3 中的 6 种标准数据类型：</strong><br><br>
<div style="overflow-x: auto;">
        <table style="border-collapse: collapse; width: 100%; background: rgba(0,255,255,0.05);">
                <thead>
                        <tr style="border-bottom: 2px solid #00ffff;">
                                <th style="border: 1px solid #00ffff; padding: 8px; text-align: left;">类型</th>
                                <th style="border: 1px solid #00ffff; padding: 8px; text-align: left;">名称</th>
                                <th style="border: 1px solid #00ffff; padding: 8px; text-align: left;">示例</th>

                        </tr>

                        <tr><td style="border: 1px solid #00ffff; padding: 8px;">Number</td><td style="border: 1px solid
  8px;">数字</td><td style="border: 1px solid #00ffff; padding: 8px;">1, 3.14, 2+3j</td><td style="border: 1px solid
  #00ffff; padding: 8px;">不可变</td></tr>
                        <tr><td style="border: 1px solid #00ffff; padding: 8px;">String</td><td style="border: 1px solid
  8px;">字符串</td><td style="border: 1px solid #00ffff; padding: 8px;">"hello", 'Python'</td><td style="border: 1px
  solid #00ffff; padding: 8px;">不可变</td></tr>
                        <tr><td style="border: 1px solid #00ffff; padding: 8px;">Tuple</td><td style="border: 1px solid
  8px;">元组</td><td style="border: 1px solid #00ffff; padding: 8px;">(1, 2, 3)</td><td style="border: 1px solid
  #00ffff; padding: 8px;">不可变</td></tr>
                        <tr><td style="border: 1px solid #00ffff; padding: 8px;">List</td><td style="border: 1px solid #
  8px;">列表</td><td style="border: 1px solid #00ffff; padding: 8px;">[1, 2, 3]</td><td style="border: 1px solid

                        <tr><td style="border: 1px solid #00ffff; padding: 8px;">Dictionary</td><td style="border: 1px s
   8px;">字典</td><td style="border: 1px solid #00ffff; padding: 8px;">{'name': '张三'}</td><td style="border: 1px solid
   #00ffff; padding: 8px;">可变</td></tr>

<br>
<strong>不可变类型（3 个）：</strong>Number、String、Tuple。不可变意味着对象创建后不能被修改，对变量重新赋值会创建新对象，原对象不变。<br><br>
<strong>可变类型（3 个）：</strong>List、Dictionary、Set。可变意味着对象创建后可以原地修改（增删改元素），不改变内存地址。<br><br>
<strong>面试考点：</strong>可变/不可变的区分对函数传参有重要影响——不可变对象传参时函数内修改不影响外部，可变对象在函数内修改会影响外部（详见第 28 题"函数参数传递"）。`}
];

const countdownEl = document.getElementById('countdown');
const progressBar = document.getElementById('progress-bar');
const sidebar = document.getElementById('sidebar-list');
const sidebarPanel = document.getElementById('sidebar');
const sidebarOverlay = document.getElementById('sidebar-overlay');
const sidebarToggle = document.getElementById('sidebar-toggle');
const sidebarClose = document.getElementById('sidebar-close');
const container = document.getElementById('knowledge-container');
const titleEl = document.getElementById('knowledge-title');
const nextBtn = document.getElementById('next-btn');
const clickHint = document.getElementById('click-hint');
const cardEl = document.getElementById('card');
const editBtn = document.getElementById('edit-btn');
const editModal = document.getElementById('edit-modal');
const editModalEditor = document.getElementById('edit-modal-editor');
const editModalClose = document.getElementById('edit-modal-close');
const editCancelBtn = document.getElementById('edit-cancel-btn');
const editSaveBtn = document.getElementById('edit-save-btn');

let index = 0;
let timeLeft = 30;
let phase = 'hidden'; // hidden(仅标题)→shown(展开内容)→下一知识点
let isEditModalOpen = false;
const storageKey = `knowledge-point-overrides:${location.pathname}`;


function getDetailContentEl() {
  return document.getElementById('detail-content');
}

function moveCaretToEnd(element) {
  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(element);
  range.collapse(false);
  selection.removeAllRanges();
  selection.addRange(range);
}

function syncEditButtonState() {
  if (editBtn) {
    editBtn.disabled = isEditModalOpen;
  }
}

function closeEditModal(saveChanges = false) {
  if (!isEditModalOpen) return;

  if (saveChanges && editModalEditor) {
    const updatedContent = editModalEditor.innerHTML;
    knowledgePoints[index].content = updatedContent;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      detailEl.innerHTML = updatedContent;
    }
    if (typeof sidebarMgr !== 'undefined') sidebarMgr.save();
  }

  if (editModalEditor) {
    editModalEditor.innerHTML = '';
  }

  if (editModal) {
    editModal.hidden = true;
    editModal.classList.remove('open');
  }

  document.body.classList.remove('modal-open');
  isEditModalOpen = false;
  syncEditButtonState();
}

function openEditModal() {
  if (isEditModalOpen || !editModal || !editModalEditor) return;

  editModalEditor.innerHTML = knowledgePoints[index].content;
  editModal.hidden = false;
  editModal.classList.add('open');
  document.body.classList.add('modal-open');
  isEditModalOpen = true;
  syncEditButtonState();

  window.requestAnimationFrame(() => {
    editModalEditor.focus();
    moveCaretToEnd(editModalEditor);
  });
}

if (editBtn) {
  editBtn.addEventListener('click', openEditModal);
}

if (editModalClose) {
  editModalClose.addEventListener('click', () => closeEditModal(false));
}

if (editCancelBtn) {
  editCancelBtn.addEventListener('click', () => closeEditModal(false));
}

if (editSaveBtn) {
  editSaveBtn.addEventListener('click', () => closeEditModal(true));
}

if (editModal) {
  editModal.addEventListener('click', (event) => {
    if (event.target === editModal) {
      closeEditModal(false);
    }
  });
}

document.addEventListener('keydown', (event) => {
  if (!isEditModalOpen) return;

  if (event.key === 'Escape') {
    event.preventDefault();
    closeEditModal(false);
  }

  if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
    event.preventDefault();
    closeEditModal(true);
  }
});

syncEditButtonState();

// ===== 侧边栏切换 =====
function openSidebar() {
  sidebarPanel.classList.add('open');
  sidebarOverlay.classList.add('show');
}
function closeSidebar() {
  sidebarPanel.classList.remove('open');
  sidebarOverlay.classList.remove('show');
}
sidebarToggle.addEventListener('click', openSidebar);
sidebarClose.addEventListener('click', closeSidebar);
sidebarOverlay.addEventListener('click', closeSidebar);

const sidebarSwipeArea = document.getElementById('sidebar-swipe-area');
if (sidebarSwipeArea) {
  let touchStartX = 0;
  let touchCurrentX = 0;
  let trackingSwipe = false;
  const SWIPE_OPEN_THRESHOLD = 24;

  sidebarSwipeArea.addEventListener('touchstart', (event) => {
    if (!event.touches || !event.touches.length) return;
    touchStartX = event.touches[0].clientX;
    touchCurrentX = touchStartX;
    trackingSwipe = true;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchmove', (event) => {
    if (!trackingSwipe || !event.touches || !event.touches.length) return;
    touchCurrentX = event.touches[0].clientX;
  }, { passive: true });

  sidebarSwipeArea.addEventListener('touchend', () => {
    if (!trackingSwipe) return;
    const deltaX = touchStartX - touchCurrentX;
    trackingSwipe = false;
    if (deltaX > SWIPE_OPEN_THRESHOLD) {
      openSidebar();
    }
  });
}

// 初始化侧边栏
var sidebarMgr = new SidebarManager({
  sidebarUl: sidebar,
  knowledgePoints: knowledgePoints,
  onNavigate: function (targetIndex) {
    if (window.stopTts) window.stopTts();
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
    closeSidebar();
  }
});
sidebarMgr.render();


function updateSidebarActive() {
  if (typeof sidebarMgr !== 'undefined') sidebarMgr.setActiveIndex(index);
}

function toggleContent(show) {
  const detailEl = getDetailContentEl();
  if (!detailEl) return;
  detailEl.style.display = show ? 'block' : 'none';
  if (clickHint) clickHint.style.display = show ? 'none' : 'block';
}

function showKnowledge() {
  if (!knowledgePoints.length) {
    titleEl.textContent = '暂无知识点';
    container.innerHTML = '';
    return;
  }
  if (index >= knowledgePoints.length) index = knowledgePoints.length - 1;
  const kp = knowledgePoints[index];
  phase = 'hidden';

  // 更新粘性标题
  titleEl.textContent = kp.title;
  titleEl.style.cursor = 'pointer';

  // 更新内容区
  container.innerHTML = window.renderTtsKnowledgeContent
    ? window.renderTtsKnowledgeContent(kp)
    : `<div id="detail-content" style="display:none;">${kp.content}</div>`;
  if (clickHint) clickHint.style.display = 'block';
  // 点击卡片任意空白区域都切换
  if (window._cardClickHandler) {
    cardEl.removeEventListener('click', window._cardClickHandler);
  }
  window._cardClickHandler = (e) => {
    // 排除标题、按钮、侧边栏切换、正文编辑区等交互元素
    const ignoreTags = ['BUTTON', 'H2'];
    if (ignoreTags.includes(e.target.tagName)) return;
    if (isEditModalOpen || e.target.closest('#detail-content')) return;
    if (e.target.closest('.next-btn') || e.target.closest('.sidebar-toggle') || e.target.closest('.countdown')) return;
    const detailEl = getDetailContentEl();
    if (detailEl) {
      const isHidden = detailEl.style.display === 'none';
      toggleContent(isHidden);
    }
  };
  cardEl.addEventListener('click', window._cardClickHandler);

  // 重置计时
  timeLeft = 30;
  countdownEl.textContent = timeLeft;
  progressBar.style.width = '0%';
  updateSidebarActive();
}

function goToNext() {
  if (window.stopTts) window.stopTts();
  closeEditModal(true);
  if (!knowledgePoints.length) return;
  index = (index + 1) % knowledgePoints.length;
  showKnowledge();
}
window.goToNextKnowledge = goToNext;

nextBtn.addEventListener('click', goToNext);

setupTtsPlayer({
  pageId: 'python-notes',
  knowledgePoints,
  getIndex: () => index,
  navigateToIndex: (targetIndex) => {
    closeEditModal(true);
    index = targetIndex;
    showKnowledge();
  },
  ensureExpanded: () => toggleContent(true),
  apiUrl: '/api/tts'
});

// 初始显示
showKnowledge();

// 每秒倒计时
setInterval(() => {
  if (isEditModalOpen) return;
  if (timeLeft > 0) {
    timeLeft--;
    countdownEl.textContent = timeLeft;
    progressBar.style.width = `${((30 - timeLeft) / 30) * 100}%`;
  } else {
    if (window.isTtsPlaying && window.isTtsPlaying()) {
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else if (phase === 'hidden') {
      // 30秒结束 → 自动展开内容
      toggleContent(true);
      phase = 'shown';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    } else {
      // 再30秒结束 → 收起内容
      toggleContent(false);
      phase = 'hidden';
      timeLeft = 30;
      countdownEl.textContent = timeLeft;
      progressBar.style.width = '0%';
    }
  }
}, 1000);
</script>
</body>
</html>
